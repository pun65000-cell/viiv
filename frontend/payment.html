<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>วิธีชำระเงิน — ViiV Platform</title>
  <style>
    :root {
      --gold:#c9a84c; --gold-dk:#9a7530; --gold-lt:#fdf3d0;
      --bg:#faf8f3; --card:#ffffff; --text:#1a1200; --muted:#7a6b4a;
      --border:#e8dfc8; --green:#16a34a;
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* NAV */
    nav{
      background:#fff; border-bottom:1px solid var(--border);
      padding:0 40px; height:60px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
    }
    .logo{ font-size:22px; font-weight:900; letter-spacing:4px; color:var(--gold); text-decoration:none; }
    .nav-back{ font-size:13px; color:var(--muted); text-decoration:none; display:flex; align-items:center; gap:6px; }
    .nav-back:hover{ color:var(--gold); }

    /* PAGE */
    .page{ max-width:560px; margin:0 auto; padding:48px 24px 80px; }
    .page-eyebrow{
      display:inline-block; background:var(--gold-lt); color:var(--gold-dk);
      font-size:12px; font-weight:700; padding:4px 16px; border-radius:20px;
      border:1px solid #e8d080; margin-bottom:18px; letter-spacing:0.5px;
    }
    h1{ font-size:28px; font-weight:900; color:var(--text); margin-bottom:8px; }
    .page-sub{ font-size:14px; color:var(--muted); margin-bottom:32px; line-height:1.7; }

    /* BANK CARD */
    .bank-card{
      background:#fff; border:1.5px solid var(--border); border-radius:16px;
      padding:28px 24px; margin-bottom:24px;
    }
    .bank-card-header{
      display:flex; align-items:center; gap:12px; margin-bottom:20px;
    }
    .bank-logo{
      width:44px; height:44px; border-radius:10px;
      background:var(--gold-lt); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:20px;
    }
    .bank-name-wrap{}
    .bank-name{ font-size:16px; font-weight:800; color:var(--text); }
    .bank-badge{
      display:inline-block; font-size:10px; font-weight:700;
      background:var(--green); color:#fff;
      padding:2px 8px; border-radius:10px; margin-top:3px;
    }

    /* FIELD ROWS */
    .field-row{ margin-bottom:14px; }
    .field-label{ font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
    .field-value{ font-size:15px; font-weight:600; color:var(--text); }
    .field-row-inline{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .field-row-inline .field-value{ flex:1; }
    .copy-btn{
      padding:6px 14px; font-size:12px; font-weight:700;
      background:var(--gold-lt); color:var(--gold-dk);
      border:1.5px solid var(--gold); border-radius:8px; cursor:pointer;
      transition:all .15s; white-space:nowrap;
    }
    .copy-btn:hover{ background:var(--gold); color:#1a1200; }
    .copy-btn.copied{ background:#dcfce7; color:var(--green); border-color:var(--green); }

    /* QR */
    .qr-section{ margin-top:20px; text-align:center; }
    .qr-label{ font-size:12px; color:var(--muted); margin-bottom:10px; font-weight:600; }
    .qr-img{
      width:200px; height:200px; border-radius:12px;
      border:1px solid var(--border); object-fit:contain;
      background:#f8f8f8;
    }
    .qr-placeholder{
      width:200px; height:200px; border-radius:12px;
      border:1px solid var(--border); background:#f8f8f8;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:12px; color:var(--muted);
    }

    /* LINE OA */
    .line-card{
      background:#fff; border:1.5px solid #06b96610; border-radius:16px;
      padding:20px 24px; display:flex; align-items:center; gap:16px;
      margin-bottom:24px;
    }
    .line-icon{ font-size:32px; flex-shrink:0; }
    .line-info{}
    .line-title{ font-size:14px; font-weight:700; color:var(--text); margin-bottom:2px; }
    .line-handle{ font-size:18px; font-weight:900; color:#06b966; }
    .line-note{ font-size:12px; color:var(--muted); margin-top:4px; }

    /* STEPS */
    .steps-card{
      background:#fff; border:1px solid var(--border); border-radius:16px;
      padding:24px; margin-bottom:24px;
    }
    .steps-title{ font-size:14px; font-weight:800; color:var(--text); margin-bottom:16px; }
    .step{ display:flex; gap:12px; margin-bottom:12px; }
    .step:last-child{ margin-bottom:0; }
    .step-num{
      width:24px; height:24px; border-radius:50%; flex-shrink:0;
      background:var(--gold); color:#1a1200;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:800;
    }
    .step-text{ font-size:13px; color:var(--muted); line-height:1.6; padding-top:3px; }

    /* LOADING / ERROR */
    .state-box{
      background:#fff; border:1px solid var(--border); border-radius:16px;
      padding:40px 24px; text-align:center; color:var(--muted); font-size:14px;
    }
    .spinner{
      width:28px; height:28px; border:3px solid var(--border);
      border-top-color:var(--gold); border-radius:50%;
      animation:spin .7s linear infinite; margin:0 auto 14px;
    }
    @keyframes spin{ to{ transform:rotate(360deg); } }

    /* FOOTER */
    footer{
      border-top:1px solid var(--border); padding:22px 40px;
      display:flex; align-items:center; justify-content:space-between;
      font-size:12px; color:#a09070; flex-wrap:wrap; gap:8px;
    }
    .f-logo{ color:var(--gold); font-weight:900; letter-spacing:2px; font-size:14px; }

    @media(max-width:600px){
      nav{ padding:0 16px; }
      .logo{ font-size:16px; letter-spacing:1.5px; }
      .page{ padding:32px 16px 60px; }
      footer{ padding:20px 16px; flex-direction:column; align-items:center; text-align:center; gap:8px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/">ViiV Platform</a>
    <a class="nav-back" href="/">← กลับหน้าหลัก</a>
  </nav>

  <div class="page">
    <div class="page-eyebrow">ชำระเงิน</div>
    <h1>วิธีชำระเงิน</h1>
    <p class="page-sub">โอนเงินผ่านบัญชีธนาคารด้านล่าง แล้วส่งสลิปให้ทีมงานทาง Line OA</p>

    <div id="paymentContent">
      <div class="state-box">
        <div class="spinner"></div>
        กำลังโหลดข้อมูล...
      </div>
    </div>
  </div>

  <footer>
    <span class="f-logo">ViiV Platform</span>
    <span>viiv.me · AI-Powered Sales Automation</span>
  </footer>

  <script>
    const BANK_ICONS = {
      kbank: '💚', scb: '💜', bbl: '💙', ktb: '🩵',
      gsb: '🩷', kk: '🟠', bay: '🟡', tmb: '🔵',
      ttb: '🔵', uob: '🔴', lhb: '🟢',
    };

    function esc(s) {
      return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderPayment(data) {
      const a = data.account;
      const icon = BANK_ICONS[a.bank_code] || '🏦';
      const qrHtml = a.qr_url
        ? `<img class="qr-img" src="${esc(window.location.origin + a.qr_url)}" alt="QR พร้อมเพย์" loading="lazy" />`
        : `<div class="qr-placeholder">ไม่มี QR</div>`;
      const branchHtml = a.branch
        ? `<div class="field-row"><div class="field-label">สาขา</div><div class="field-value">${esc(a.branch)}</div></div>`
        : '';

      document.getElementById('paymentContent').innerHTML = `
        <div class="bank-card">
          <div class="bank-card-header">
            <div class="bank-logo">${icon}</div>
            <div class="bank-name-wrap">
              <div class="bank-name">ธนาคาร${esc(a.bank_name)}</div>
              <span class="bank-badge">บัญชีหลัก</span>
            </div>
          </div>
          <div class="field-row-inline">
            <div>
              <div class="field-label">เลขบัญชี</div>
              <div class="field-value" id="acctNo">${esc(a.account_no)}</div>
            </div>
            <button class="copy-btn" id="copyAcctBtn" onclick="copyAcct()">คัดลอก</button>
          </div>
          <div class="field-row">
            <div class="field-label">ชื่อบัญชี</div>
            <div class="field-value">${esc(a.account_name)}</div>
          </div>
          ${branchHtml}
          <div class="qr-section">
            <div class="qr-label">สแกน QR พร้อมเพย์</div>
            ${qrHtml}
          </div>
        </div>

        <div class="line-card">
          <div class="line-icon">💬</div>
          <div class="line-info">
            <div class="line-title">ส่งสลิปทาง Line OA</div>
            <div class="line-handle">${esc(data.line_oa)}</div>
            <div class="line-note">ทีมงานยืนยันและเติมเครดิตให้ภายใน 1 ชั่วโมง (วันทำการ)</div>
          </div>
        </div>

        <div class="steps-card">
          <div class="steps-title">ขั้นตอนการเติมเครดิต</div>
          <div class="step"><div class="step-num">1</div><div class="step-text">โอนเงินเข้าบัญชีด้านบน ตามจำนวนที่ต้องการเติมเครดิต</div></div>
          <div class="step"><div class="step-num">2</div><div class="step-text">แคปเจอร์สลิปการโอน แล้วส่งให้ทีมงานทาง Line OA <strong>${esc(data.line_oa)}</strong></div></div>
          <div class="step"><div class="step-num">3</div><div class="step-text">ทีมงานตรวจสอบและเติมเครดิตเข้าบัญชีของคุณภายใน 1 ชั่วโมง (วันจันทร์–ศุกร์ 9:00–18:00)</div></div>
          <div class="step"><div class="step-num">4</div><div class="step-text">รับแจ้งเตือนยืนยันเครดิตเข้าระบบ พร้อมใช้งานทันที</div></div>
        </div>
      `;

      window._acctNo = a.account_no;
    }

    function copyAcct() {
      const btn = document.getElementById('copyAcctBtn');
      const txt = window._acctNo || '';
      navigator.clipboard.writeText(txt).then(() => {
        btn.textContent = 'คัดลอกแล้ว ✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'คัดลอก'; btn.classList.remove('copied'); }, 2000);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = txt; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); } catch(e) {}
        document.body.removeChild(ta);
        btn.textContent = 'คัดลอกแล้ว ✓'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'คัดลอก'; btn.classList.remove('copied'); }, 2000);
      });
    }

    fetch('/api/public/payment-info')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(renderPayment)
      .catch(() => {
        document.getElementById('paymentContent').innerHTML = `
          <div class="state-box">
            ⚠️ ไม่สามารถโหลดข้อมูลได้<br><br>
            กรุณาติดต่อ Line OA: <strong>@004krtts</strong>
          </div>`;
      });
  </script>
</body>
</html>
