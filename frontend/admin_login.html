<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>แอดมินเข้าสู่ระบบ | VIIV</title>
    <style>
      :root { --bg:#f7f7f7; --panel:#fff; --border:rgba(0,0,0,.08); --accent:#d4a017; --muted:rgba(0,0,0,.6); }
      *{ box-sizing:border-box; }
      body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:#111; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
      .card{ width:100%; max-width:420px; background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:22px; }
      .logo{ display:inline-flex; align-items:center; gap:10px; font-weight:900; font-size:20px; letter-spacing:.5px; margin-bottom:6px; }
      .logo-dot{ width:10px; height:10px; border-radius:999px; background:var(--accent); display:inline-block; }
      h1{ margin:0 0 18px 0; font-size:22px; }
      label{ display:block; font-weight:700; margin:10px 0 6px 0; }
      input{ width:100%; padding:12px; border:1px solid var(--border); border-radius:10px; margin-bottom:10px; }
      .btn{ width:100%; padding:12px 16px; border:none; border-radius:12px; cursor:pointer; font-weight:800; background:var(--accent); color:#111; }
      .muted{ color:var(--muted); margin-top:10px; text-align:center; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo"><span class="logo-dot"></span> VIIV</div>
      <h1>แอดมินเข้าสู่ระบบ</h1>
      <form id="form">
        <label for="email">อีเมล</label>
        <input id="email" type="email" value="admin@viiv.me" required />
        <label for="password">รหัสผ่าน</label>
        <input id="password" type="password" placeholder="••••••••" required />
        <button class="btn" type="submit">เข้าสู่ระบบ</button>
      </form>
      <div id="msg" class="muted"></div>
    </div>
    <script>
      const API = "https://auth.viiv.me";
      const KEY = "admin_token";
      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        document.getElementById("msg").textContent = "";
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        try {
          const res = await fetch(`${API}/admin/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json().catch(() => null);
          if (!res.ok || !data || !data.access_token) {
            alert("เข้าสู่ระบบไม่สำเร็จ");
            return;
          }
          localStorage.setItem(KEY, data.access_token);
          window.location.href = "/product_ui.html";
        } catch (e) {
          alert("เข้าสู่ระบบไม่สำเร็จ");
        }
      });
    </script>
  </body>
</html>
