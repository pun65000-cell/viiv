<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VIIV Mobile Admin</title>
    <style>
      :root {
        --bg: #fafafa;
        --panel: #ffffff;
        --border: rgba(0, 0, 0, 0.08);
        --accent: #d4a017;
        --success: #1f9d55;
        --muted: rgba(0, 0, 0, 0.65);
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: #111;
      }
      .wrap {
        max-width: 520px;
        margin: 0 auto;
        padding: 16px;
      }
      .title {
        font-weight: 800;
        font-size: 20px;
        margin-bottom: 12px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 14px;
      }
      .metric {
        font-size: 28px;
        font-weight: 800;
      }
      .muted {
        color: var(--muted);
        font-size: 14px;
      }
      .list {
        display: grid;
        gap: 8px;
        margin-top: 8px;
      }
      .item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }
      .item-title {
        font-weight: 700;
      }
      .btn {
        width: 100%;
        padding: 14px 16px;
        border: none;
        border-radius: 14px;
        font-weight: 800;
        font-size: 16px;
        background: var(--accent);
        color: #111;
      }
      .btn-small {
        padding: 10px 12px;
        font-size: 14px;
        border-radius: 12px;
      }
      .btn-success {
        background: var(--success);
        color: #fff;
      }
      .badge {
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.06);
        border: 1px solid var(--border);
      }
      .toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
      }
    </style>
    <style>
      body {
        background: #0f1115 !important;
        color: #e5e7eb !important;
      }

      .card, .box, .container {
        background: #1a1d24 !important;
        border-radius: 12px !important;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
      }

      input, select, textarea {
        background: #111318 !important;
        color: #e5e7eb !important;
        border: 1px solid #2a2f3a !important;
      }

      button {
        border-radius: 8px !important;
      }

      .btn-primary, button.primary {
        background: linear-gradient(90deg, #d4af37, #f1c40f) !important;
        color: #000 !important;
        font-weight: 600;
      }

      .sidebar {
        background: #0d0f14 !important;
      }

      .sidebar a {
        color: #aaa !important;
      }

      .sidebar a.active {
        background: rgba(212,175,55,0.15) !important;
        color: #f1c40f !important;
      }
    </style>
    <style>
      body {
        background: #0c0d11 !important;
        color: #e5e7eb !important;
        font-family: system-ui;
      }

      .card, .box, .container, .section {
        background: #16181d !important;
        border-radius: 14px !important;
        border: 1px solid rgba(255,255,255,0.05);
      }

      input, select, textarea {
        background: #0f1115 !important;
        color: #fff !important;
        border: 1px solid #2a2f3a !important;
      }

      button, .btn-primary {
        background: linear-gradient(90deg, #d4af37, #f1c40f) !important;
        color: #000 !important;
        font-weight: 600;
      }

      h1, h2, h3 {
        color: #fff !important;
      }

      p, span {
        color: #aaa !important;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:15px;
      ">
        <div style="color:#999;font-size:12px;">
          🛠 ADMIN PANEL (STORE LEVEL)
        </div>

        <div style="
          background:#1a1d24;
          padding:6px 12px;
          border-radius:8px;
          font-size:12px;
        ">
          Logged in
        </div>
      </div>
      <div class="row" style="margin-bottom: 10px">
        <div class="title">
          <h2 style="margin-bottom:5px;">
            My Store <span style="color:#f1c40f;">(ADMIN)</span>
          </h2>

          <div style="font-size:12px;color:#888;">
            Store Management Dashboard
          </div>
        </div>
        <button id="refreshAll" class="btn btn-small">รีเฟรช</button>
      </div>
      <div style="
        font-size:13px;
        color:#888;
        margin-bottom:10px;
      ">
        Current Store: <b id="storeName">My Store</b>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <div class="metric" id="todayRevenue">0</div>
            <div class="muted">วันนี้ขายได้ (บาท)</div>
          </div>
          <div style="text-align:right">
            <div class="metric" id="todayOrders">0</div>
            <div class="muted">จำนวนออเดอร์</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <div class="title">สินค้าขายดี</div>
          <div class="badge">Top 5</div>
        </div>
        <div id="topProducts" class="list"></div>
      </div>

      <div class="card">
        <div class="title">สต็อกใกล้หมด</div>
        <div id="lowStock" class="list"></div>
      </div>

      <div class="card">
        <div class="title">ออเดอร์ล่าสุด</div>
        <div id="latestOrders" class="list"></div>
      </div>
    </div>

    <script>
      const API = "https://auth.viiv.me";

      async function httpJson(url, options) {
        const res = await fetch(url, options);
        const json = await res.json().catch(() => null);
        return { ok: res.ok, status: res.status, json };
      }

      async function loadOrders() {
        const { ok, json } = await httpJson(`${API}/order/list`, { method: "GET" });
        if (!ok || !Array.isArray(json)) {
          console.log("API OFFLINE → SAFE MODE");
          document.getElementById("todayRevenue").textContent = "0";
          document.getElementById("todayOrders").textContent = "0";
          document.getElementById("latestOrders").textContent = "โหมดทดสอบ (API offline)";
          return [];
        }
        if (!json || json.length === 0) {
          console.log("ADMIN: NO DATA → SAFE MODE");
        }
        const totalRevenue = json.reduce((sum, o) => sum + Number(o.total || 0), 0);
        document.getElementById("todayRevenue").textContent = String(totalRevenue);
        document.getElementById("todayOrders").textContent = String(json.length);

        const latest = [...json].reverse(); // newest first (in-memory append order)
        const container = document.getElementById("latestOrders");
        container.textContent = "";
        if (latest.length === 0) {
          container.textContent = "ยังไม่มีออเดอร์";
        } else {
          for (const o of latest.slice(0, 10)) {
            const row = document.createElement("div");
            row.className = "item";

            const left = document.createElement("div");
            const title = document.createElement("div");
            title.className = "item-title";
            title.textContent = `#${o.order_id}`;
            const meta = document.createElement("div");
            const statusMap = {
              created: "สร้างแล้ว",
              waiting_payment: "รอชำระเงิน",
              paid: "ชำระเงินแล้ว",
            };
            meta.className = "muted";
            meta.textContent = `ยอดรวม: ${o.total} | สถานะ: ${statusMap[o.status] || o.status}`;
            left.appendChild(title);
            left.appendChild(meta);

            const btn = document.createElement("button");
            btn.className = "btn btn-small btn-success";
            btn.textContent = "ยืนยันแล้ว";
            btn.addEventListener("click", async () => {
              const { ok: ok2, json: j2 } = await httpJson(`${API}/order/confirm-payment`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ order_id: o.order_id }),
              });
              if (!ok2 || (j2 && j2.error)) {
                console.log("API OFFLINE → SAFE MODE");
                return;
              }
              await refreshAll();
            });

            row.appendChild(left);
            row.appendChild(btn);
            container.appendChild(row);
          }
        }
        return latest;
      }

      async function loadProducts() {
        const { ok, json } = await httpJson(`${API}/product/list`, { method: "GET" });
        const topEl = document.getElementById("topProducts");
        const lowEl = document.getElementById("lowStock");
        topEl.textContent = "";
        lowEl.textContent = "";
        if (!ok || !Array.isArray(json)) {
          console.log("API OFFLINE → SAFE MODE");
          topEl.textContent = "โหมดทดสอบ (API offline)";
          lowEl.textContent = "โหมดทดสอบ (API offline)";
          return;
        }
        if (!json || json.length === 0) {
          console.log("ADMIN: NO DATA → SAFE MODE");
        }
        const products = json.map((p) => ({
          id: p["รหัสสินค้า"],
          name: p["ชื่อสินค้า"],
          sold: Number(p["ขายแล้ว"] || 0),
          stock: Number(p["สต็อก"] || 0),
        }));
        // top 5 by sold
        const top = [...products].sort((a, b) => b.sold - a.sold).slice(0, 5);
        if (top.length === 0) {
          topEl.textContent = "ยังไม่มีข้อมูล";
        } else {
          for (const t of top) {
            const row = document.createElement("div");
            row.className = "item";
            row.innerHTML = `<div class="item-title">${t.name}</div><div class="badge">ขายแล้ว: ${t.sold}</div>`;
            topEl.appendChild(row);
          }
        }
        // low stock (<5)
        const low = products.filter((p) => p.stock < 5);
        if (low.length === 0) {
          lowEl.textContent = "ยังไม่มีสินค้าใกล้หมด";
        } else {
          for (const l of low) {
            const row = document.createElement("div");
            row.className = "item";
            row.innerHTML = `<div class="item-title">${l.name}</div><div class="badge">สต็อก: ${l.stock}</div>`;
            lowEl.appendChild(row);
          }
        }
      }

      async function refreshAll() {
        await Promise.all([loadOrders(), loadProducts()]);
      }

      document.getElementById("refreshAll").addEventListener("click", refreshAll);

      (async () => {
        await refreshAll();
      })();
    </script>
  </body>
</html>
