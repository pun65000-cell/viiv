<!doctype html>

<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VIIV Merchant</title>
    <link rel="stylesheet" href="/merchant/css/theme.css" />
  </head>
  <body>
    <div class="layout">
      <div class="sidebar">
        <div class="brand">
          <div class="brand-title"><span class="viiv">VIIV</span> <span class="role">Merchant</span></div>
          <div class="brand-accent"></div>
        </div>

        <div class="menu">
          <a href="#" class="active">Dashboard</a>
          <a href="#">คำสั่งซื้อ (Orders)</a>
          <a href="#">สินค้า (Products)</a>
          <a href="#">รายได้ (Revenue)</a>
          <a href="#">ตั้งค่า (Settings)</a>
        </div>

        <div class="sidebar-footer">VIIV Merchant v 0.1.0</div>
      </div>

      <div class="main">
        <div class="pagebar">
          <div class="pagebar-title">Dashboard</div>
          <div class="profile">
            <div class="profile-name">Merchant</div>
            <button id="profileBtn" class="btn" type="button">▼</button>
            <div id="profileDropdown" class="dropdown">
              <button type="button">โปรไฟล์</button>
              <button type="button">ออกจากระบบ</button>
            </div>
          </div>
        </div>

        <div class="card">
          <h1 class="card-title">Dashboard</h1>
          <div class="card-subtitle">ภาพรวมร้านค้า</div>
          <div>กำลังพัฒนา...</div>
          <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn btn-primary" type="button">ปุ่มหลัก</button>
            <button class="btn btn-secondary" type="button">ปุ่มรอง</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/merchant/js/app.js"></script>
  </body>
</html>
