<body>
<style>
  .shp-wrap { padding:24px; max-width:1100px; margin:0 auto; }
  .shp-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:12px; flex-wrap:wrap; }
  .shp-head h2 { font-size:1.2rem; font-weight:700; color:var(--text-main,#1a1a1a); margin:0 0 3px; }
  .shp-head p { font-size:0.85rem; color:var(--text-sub,#888); margin:0; }
  .shp-btn-add {
    display:inline-flex; align-items:center; gap:8px;
    padding:9px 16px; border:1px solid var(--accent,#c9a84c);
    border-radius:9px; background:var(--accent,#c9a84c);
    color:#1a1200; font-weight:700; font-size:13px; cursor:pointer;
  }
  .shp-btn-add:hover { background:var(--accent-h,#b8942a); }
  .shp-grid {
    display:grid; gap:14px;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
  }
  .shp-card {
    background:#fff; border:1px solid rgba(0,0,0,.08);
    border-radius:12px; padding:16px;
    cursor:pointer; transition:border-color .15s, transform .1s, box-shadow .15s;
    position:relative;
  }
  .shp-card:hover { border-color:var(--accent,#c9a84c); transform:translateY(-1px); box-shadow:0 6px 16px rgba(0,0,0,.06); }
  .shp-card.active { border-color:var(--accent,#c9a84c); background:#fffdf5; }
  .shp-card-row { display:flex; align-items:center; gap:12px; }
  .shp-card-av {
    width:44px; height:44px; border-radius:10px;
    background:var(--accent,#c9a84c); color:#1a1200;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:18px; flex-shrink:0; overflow:hidden;
  }
  .shp-card-av img { width:100%; height:100%; object-fit:cover; }
  .shp-card-info { flex:1; min-width:0; }
  .shp-card-name { font-weight:700; font-size:14px; color:var(--text-main,#1a1a1a); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .shp-card-sub { font-size:11px; color:var(--text-sub,#888); font-family:monospace; margin-top:2px; }
  .shp-badge {
    display:inline-block; font-size:10px; font-weight:700;
    padding:2px 8px; border-radius:10px; margin-top:6px;
    background:rgba(201,168,76,.15); color:#7a5a00;
    border:1px solid rgba(201,168,76,.4);
  }
  .shp-badge.owner { background:rgba(34,139,84,.12); color:#1e6b42; border-color:rgba(34,139,84,.4); }
  .shp-edit {
    position:absolute; top:8px; right:8px;
    width:28px; height:28px; border-radius:6px;
    border:0; background:transparent; color:#888;
    cursor:pointer; font-size:16px;
  }
  .shp-edit:hover { background:rgba(0,0,0,.06); color:#1a1a1a; }
  .shp-empty { text-align:center; padding:60px 20px; color:#888; }
  .shp-empty-icon { font-size:48px; margin-bottom:12px; opacity:.4; }

  /* popup */
  .shp-mask {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
    z-index:9000; align-items:center; justify-content:center; padding:16px;
  }
  .shp-mask.open { display:flex; }
  .shp-modal {
    background:#fff; border-radius:14px; width:100%; max-width:380px;
    padding:22px; box-shadow:0 12px 32px rgba(0,0,0,.2);
  }
  .shp-modal h3 { font-size:1.05rem; font-weight:700; margin:0 0 14px; color:var(--text-main,#1a1a1a); }
  .shp-modal label { display:block; font-size:12px; color:var(--text-sub,#888); margin-bottom:5px; }
  .shp-modal input {
    width:100%; padding:9px 12px; border:1px solid rgba(0,0,0,.12);
    border-radius:9px; font-size:14px; background:#faf9f7; outline:none;
    transition:border-color .15s; box-sizing:border-box;
  }
  .shp-modal input:focus { border-color:var(--accent,#c9a84c); }
  .shp-modal .hint { font-size:11px; color:var(--text-sub,#888); margin-top:6px; }
  .shp-modal .err { font-size:12px; color:#d03030; margin-top:8px; min-height:16px; }
  .shp-modal-actions { display:flex; gap:8px; margin-top:18px; flex-wrap:wrap; }
  .shp-modal-actions button {
    flex:1; min-width:90px; padding:9px 14px; border-radius:9px;
    font-size:13px; font-weight:700; cursor:pointer; border:1px solid;
  }
  .shp-modal-actions .save { background:var(--accent,#c9a84c); border-color:var(--accent,#c9a84c); color:#1a1200; }
  .shp-modal-actions .save:hover { background:var(--accent-h,#b8942a); }
  .shp-modal-actions .save:disabled { background:#d0cdc8; border-color:#bbb; color:#888; cursor:not-allowed; }
  .shp-modal-actions .cancel { background:#fff; border-color:rgba(0,0,0,.12); color:var(--text-main,#1a1a1a); }
  .shp-modal-actions .cancel:hover { background:#f5f3ef; }
  .shp-modal-actions .del { background:#fff; border-color:#d03030; color:#d03030; }
  .shp-modal-actions .del:hover { background:#fee; }
</style>

<div class="shp-wrap">
  <div class="shp-head">
    <div>
      <h2>ร้านสาขา</h2>
      <p>คลิกการ์ดเพื่อสลับร้าน · กดปุ่ม + เพื่อเพิ่มสาขาใหม่</p>
    </div>
    <button class="shp-btn-add" onclick="ShpPage.openAdd()">
      <span style="font-size:16px;line-height:1">+</span>
      <span>เพิ่มสาขา</span>
    </button>
  </div>

  <div id="shpGrid" class="shp-grid">
    <div class="shp-empty">
      <div class="shp-empty-icon">⏳</div>
      <div>กำลังโหลด...</div>
    </div>
  </div>
</div>

<div class="shp-mask" id="shpMask">
  <div class="shp-modal">
    <h3 id="shpMTitle">เพิ่มสาขา</h3>
    <label>Shop ID (subdomain)</label>
    <input id="shpMInput" type="text" placeholder="เช่น testshop" autocomplete="off" />
    <div class="hint">ใส่ subdomain ของร้านที่ต้องการเข้าร่วม (ไม่ต้องใส่ .viiv.me)</div>
    <div class="err" id="shpMErr"></div>
    <div class="shp-modal-actions">
      <button class="save" id="shpMSave" onclick="ShpPage.save()">บันทึก</button>
      <button class="cancel" onclick="ShpPage.close()">ยกเลิก</button>
      <button class="del" id="shpMDel" style="display:none" onclick="ShpPage.del()">ลบ</button>
    </div>
  </div>
</div>

<script>
(function(){
  const tok = () => (typeof getToken === 'function' ? getToken() : (localStorage.getItem('viiv_token')||''));
  const authHdr = () => { const t=tok(); return t?{'Authorization':'Bearer '+t}:{}; };

  const ShpPage = {
    _shops: [],
    _curTid: null,    // current tenant_id from token
    _editMode: null,  // null | 'add' | {id, subdomain, role}

    async load(){
      const grid = document.getElementById('shpGrid');
      try {
        const t = tok();
        if (t) {
          try {
            const b = t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
            const pad = b + '=='.slice((b.length%4)||4);
            const p = JSON.parse(atob(pad));
            this._curTid = p.tenant_id || null;
          } catch(_) {}
        }
        const res = await fetch('/api/platform/my-shops', { headers: authHdr() });
        if (!res.ok) throw new Error('HTTP '+res.status);
        this._shops = await res.json();
        this._render();
      } catch(e) {
        grid.innerHTML = '<div class="shp-empty"><div class="shp-empty-icon">⚠</div><div>โหลดไม่สำเร็จ — '+e.message+'</div></div>';
      }
    },

    _render(){
      const grid = document.getElementById('shpGrid');
      if (!this._shops.length) {
        grid.innerHTML = '<div class="shp-empty"><div class="shp-empty-icon">🏪</div><div>ยังไม่มีร้าน — กดปุ่ม "เพิ่มสาขา" เพื่อเริ่มต้น</div></div>';
        return;
      }
      grid.innerHTML = this._shops.map(s => {
        const active = s.id === this._curTid ? ' active' : '';
        const isOwner = s.role === 'owner';
        const initial = (s.store_name||s.subdomain||'?').charAt(0).toUpperCase();
        return '<div class="shp-card'+active+'" onclick="ShpPage.switchTo(\''+esc(s.subdomain)+'\')">' +
          (isOwner ? '' : '<button class="shp-edit" onclick="event.stopPropagation();ShpPage.openEdit(\''+esc(s.id)+'\',\''+esc(s.subdomain)+'\',\''+esc(s.role)+'\')">⋮</button>') +
          '<div class="shp-card-row">' +
            '<div class="shp-card-av">'+initial+'</div>' +
            '<div class="shp-card-info">' +
              '<div class="shp-card-name">'+esc(s.store_name||s.subdomain)+'</div>' +
              '<div class="shp-card-sub">'+esc(s.subdomain||s.id)+'.viiv.me</div>' +
              '<div class="shp-badge'+(isOwner?' owner':'')+'">'+esc(s.role||'staff')+'</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    },

    openAdd(){
      this._editMode = 'add';
      document.getElementById('shpMTitle').textContent = 'เพิ่มสาขา';
      document.getElementById('shpMInput').value = '';
      document.getElementById('shpMInput').disabled = false;
      document.getElementById('shpMErr').textContent = '';
      document.getElementById('shpMDel').style.display = 'none';
      document.getElementById('shpMask').classList.add('open');
      setTimeout(()=>document.getElementById('shpMInput').focus(), 50);
    },

    openEdit(id, subdomain, role){
      this._editMode = { id, subdomain, role };
      document.getElementById('shpMTitle').textContent = 'แก้ไขสาขา';
      document.getElementById('shpMInput').value = subdomain;
      document.getElementById('shpMInput').disabled = true;
      document.getElementById('shpMErr').textContent = '';
      document.getElementById('shpMDel').style.display = '';
      document.getElementById('shpMask').classList.add('open');
    },

    close(){
      document.getElementById('shpMask').classList.remove('open');
      this._editMode = null;
    },

    async save(){
      const sd = (document.getElementById('shpMInput').value||'').trim().toLowerCase();
      const err = document.getElementById('shpMErr');
      err.textContent = '';
      if (!sd) { err.textContent = 'กรุณาใส่ Shop ID'; return; }
      const btn = document.getElementById('shpMSave');
      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
      try {
        const res = await fetch('/api/platform/join-shop', {
          method:'POST',
          headers:{'Content-Type':'application/json', ...authHdr()},
          body: JSON.stringify({ subdomain: sd }),
        });
        const data = await res.json().catch(()=>({}));
        if (res.ok && data.access_token) {
          this._redirect(data.subdomain, data.access_token);
        } else {
          err.textContent = data.detail || ('เกิดข้อผิดพลาด ('+res.status+')');
        }
      } catch(e) {
        err.textContent = 'ไม่สามารถเชื่อมต่อ server ได้';
      } finally {
        btn.disabled = false; btn.textContent = 'บันทึก';
      }
    },

    async switchTo(subdomain){
      // คลิก card → join-shop (idempotent ถ้าเป็นสมาชิกอยู่แล้ว) + redirect
      try {
        const res = await fetch('/api/platform/join-shop', {
          method:'POST',
          headers:{'Content-Type':'application/json', ...authHdr()},
          body: JSON.stringify({ subdomain }),
        });
        const data = await res.json().catch(()=>({}));
        if (res.ok && data.access_token) {
          this._redirect(data.subdomain, data.access_token);
        } else {
          alert(data.detail || ('สลับร้านไม่สำเร็จ ('+res.status+')'));
        }
      } catch(e) { alert('ไม่สามารถเชื่อมต่อ server ได้'); }
    },

    async del(){
      if (!this._editMode || this._editMode === 'add') return;
      if (!confirm('ลบสาขานี้ออกจากรายการ?')) return;
      const tid = this._editMode.id;
      const btn = document.getElementById('shpMDel');
      btn.disabled = true;
      try {
        const res = await fetch('/api/platform/my-shops/'+encodeURIComponent(tid), {
          method:'DELETE', headers: authHdr(),
        });
        const data = await res.json().catch(()=>({}));
        if (res.ok) {
          this.close();
          await this.load();
        } else {
          document.getElementById('shpMErr').textContent = data.detail || ('ลบไม่สำเร็จ ('+res.status+')');
        }
      } catch(e) {
        document.getElementById('shpMErr').textContent = 'ไม่สามารถเชื่อมต่อ server ได้';
      } finally { btn.disabled = false; }
    },

    _redirect(subdomain, token){
      // ส่ง token ผ่าน URL param เพราะ localStorage แยก origin
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const path = isMobile ? '/pwa/' : '/superboard/';
      window.location.href = 'https://' + subdomain + '.viiv.me' + path + '?token=' + encodeURIComponent(token);
    },
  };

  function esc(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  window.ShpPage = ShpPage;
  ShpPage.load();
})();
</script>
</body>
