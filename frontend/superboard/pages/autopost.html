<body>
<div class="spa-loading-wrap" id="loadWrap">
  <div class="spa-loader-box">
    <div class="spa-spinner"></div>
    <div class="spa-loader-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none">
  <path d="M22 2 L11 13" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M22 2 L15 22 L11 13 L2 9 Z" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg></div>
    <div class="spa-loader-title">Auto Post</div>
    <div class="spa-loader-sub">โพสต์สินค้าอัตโนมัติทุก Platform<br>กำลังอยู่ในระหว่างการพัฒนา</div>
    <div class="spa-coming-badge" id="badge" style="display:none">
      <span class="spa-badge-dot"></span>Coming Soon
    </div>
  </div>
</div>
<script>
(function(){
  setTimeout(function(){
    var w = document.getElementById('loadWrap');
    var sp = w.querySelector('.spa-spinner');
    if(sp) sp.style.opacity = '0';
    document.getElementById('badge').style.display = 'inline-flex';
  }, 1200);
})();
</script>
</body>
