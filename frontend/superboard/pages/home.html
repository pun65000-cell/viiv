<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
<div class="home-shell" style="width:100%;height:100%">
  <iframe src="/superboard/dashboard/index.html?v=5795" id="dashFrame" style="width:100%;height:100%;border:none;display:block"></iframe>
</div>
<script>
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'viiv_token') {
      var frame = document.getElementById('dashFrame');
      if (frame && frame.contentWindow) {
        frame.contentWindow.postMessage(e.data, '*');
      }
    }
  });
</script>
</body>
</html>
