<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
<style>
.home-shell { display: flex; flex-direction: column; width: 100%; height: 100%; }
.home-shell > iframe { flex: 1; width: 100%; border: none; display: block; }

/* เฉพาะ PC */
@media (max-width: 768px) { .platform-status-bar { display: none !important; } }
.platform-status-bar {
  display: flex; align-items: center; gap: 12px;
  background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
  padding: 10px 16px; margin: 12px 16px 8px;
  flex-shrink: 0;
}
.psb-label { font-size: 11px; font-weight: 700; color: #9ca3af; letter-spacing: 0.5px; flex-shrink: 0; }
.psb-items { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex: 1; }
.psb-item {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px; cursor: pointer;
  border: 1px solid #e5e7eb; background: #f9fafb;
  font-size: 12px; transition: all .15s;
}
.psb-item:hover { border-color: #e8b93e; background: #fdf9ef; }
.psb-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #d1d5db; flex-shrink: 0;
}
.psb-dot.connected { background: #22c55e; }
.psb-dot.error { background: #ef4444; }
.psb-name { font-size: 11px; font-weight: 600; color: #374151; }
.psb-settings {
  font-size: 11px; color: #e8b93e; font-weight: 600;
  cursor: pointer; margin-left: auto; white-space: nowrap;
}
.psb-settings:hover { text-decoration: underline; }
</style>

<div class="home-shell">
  <div class="platform-status-bar" id="platformStatusBar">
    <span class="psb-label">PLATFORMS</span>
    <div class="psb-items" id="psbItems">
      <div class="psb-item" id="psb-line" onclick="sbNav('connections')">
        <span class="psb-icon">💚</span>
        <span class="psb-name">LINE</span>
        <span class="psb-dot" id="dot-line"></span>
      </div>
      <div class="psb-item" id="psb-facebook" onclick="sbNav('connections')">
        <span class="psb-icon">📘</span>
        <span class="psb-name">Facebook</span>
        <span class="psb-dot" id="dot-facebook"></span>
      </div>
      <div class="psb-item" id="psb-tiktok" onclick="sbNav('connections')">
        <span class="psb-icon">🎵</span>
        <span class="psb-name">TikTok</span>
        <span class="psb-dot" id="dot-tiktok"></span>
      </div>
      <div class="psb-item" id="psb-instagram" onclick="sbNav('connections')">
        <span class="psb-icon">📸</span>
        <span class="psb-name">Instagram</span>
        <span class="psb-dot" id="dot-instagram"></span>
      </div>
      <div class="psb-item" id="psb-youtube" onclick="sbNav('connections')">
        <span class="psb-icon">▶️</span>
        <span class="psb-name">YouTube</span>
        <span class="psb-dot" id="dot-youtube"></span>
      </div>
      <a class="psb-settings" onclick="sbNav('connections')">ตั้งค่า →</a>
    </div>
  </div>
  <iframe src="/superboard/dashboard/index.html?v=20260501" id="dashFrame"></iframe>
</div>

<script>
  // Forward viiv_token from Superboard into dashboard iframe
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'viiv_token') {
      var frame = document.getElementById('dashFrame');
      if (frame && frame.contentWindow) {
        frame.contentWindow.postMessage(e.data, '*');
      }
    }
  });

  // โหลดสถานะ platform จาก API
  async function loadPlatformStatus() {
    try {
      const tok = localStorage.getItem('viiv_token') || localStorage.getItem('platform_token') || '';
      const r = await fetch('/api/pos/line/settings', {
        headers: { 'Authorization': 'Bearer ' + tok }
      });
      if (r.ok) {
        const d = await r.json();
        const hasLine = !!(d.channel_token || d.line_channel_token);
        const dot = document.getElementById('dot-line');
        if (dot) dot.className = 'psb-dot ' + (hasLine ? 'connected' : '');
      }
    } catch(e) {}
    // Facebook/TikTok/IG/YT — เพิ่ม API check ทีหลังได้
  }
  loadPlatformStatus();
</script>
</body>
</html>
