<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <iframe src="/superboard/dashboard/index.html?v=20260501" id="dashFrame"></iframe>
  <script>
    // Forward viiv_token from Superboard into dashboard iframe
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'viiv_token') {
        var frame = document.getElementById('dashFrame');
        if (frame && frame.contentWindow) {
          frame.contentWindow.postMessage(e.data, '*');
        }
      }
    });
  </script>
</body>
</html>
