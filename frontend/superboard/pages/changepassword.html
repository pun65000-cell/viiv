<body>
<div style="padding:24px;max-width:480px;">

  <div style="margin-bottom:24px;">
    <h2 style="font-size:1.15rem;font-weight:700;color:var(--text-main,#1a1a1a);margin:0 0 3px;">เปลี่ยนรหัสผ่าน</h2>
    <p style="font-size:0.82rem;color:var(--text-sub,#888);margin:0;">กรอกรหัสผ่านปัจจุบันและรหัสผ่านใหม่</p>
  </div>

  <!-- Success banner -->
  <div id="cpSuccess" style="display:none;background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:12px 16px;margin-bottom:18px;display:none;align-items:center;gap:10px;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#16a34a" stroke-width="1.8"/><path d="M8 12l3 3 5-5" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span style="font-size:0.85rem;font-weight:600;color:#16a34a;">เปลี่ยนรหัสผ่านสำเร็จแล้ว</span>
  </div>

  <div style="background:var(--card-bg,#fff);border:1.5px solid var(--border,#e0e0e0);border-radius:14px;padding:28px 24px;">

    <!-- รหัสปัจจุบัน -->
    <div class="cp-field" style="margin-bottom:18px;">
      <label class="cp-label">รหัสผ่านปัจจุบัน <span style="color:#ef4444;">*</span></label>
      <div style="position:relative;">
        <input class="cp-input" type="password" id="cpOld" placeholder="••••••••" oninput="cpCheck()" style="padding-right:40px;"/>
        <button type="button" onclick="cpToggle('cpOld','cpEye0')" class="cp-eye-btn">
          <svg id="cpEye0" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/></svg>
        </button>
      </div>
    </div>

    <div style="height:1px;background:var(--border,#e5e5e5);margin-bottom:18px;"></div>

    <!-- รหัสใหม่ -->
    <div class="cp-field" style="margin-bottom:14px;">
      <label class="cp-label">รหัสผ่านใหม่ <span style="color:#ef4444;">*</span></label>
      <div style="position:relative;">
        <input class="cp-input" type="password" id="cpNew" placeholder="อย่างน้อย 8 ตัวอักษร" oninput="cpCheck()" style="padding-right:40px;"/>
        <button type="button" onclick="cpToggle('cpNew','cpEye1')" class="cp-eye-btn">
          <svg id="cpEye1" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/></svg>
        </button>
      </div>
      <!-- strength bar -->
      <div style="margin-top:6px;height:4px;border-radius:4px;background:var(--border,#e5e5e5);overflow:hidden;">
        <div id="cpStrengthBar" style="height:100%;width:0%;border-radius:4px;transition:width .3s,background .3s;"></div>
      </div>
      <div id="cpStrengthText" style="font-size:0.72rem;color:var(--text-sub,#aaa);margin-top:3px;"></div>
    </div>

    <!-- ยืนยันรหัสใหม่ -->
    <div class="cp-field" style="margin-bottom:6px;">
      <label class="cp-label">ยืนยันรหัสผ่านใหม่ <span style="color:#ef4444;">*</span></label>
      <div style="position:relative;">
        <input class="cp-input" type="password" id="cpConf" placeholder="พิมพ์รหัสผ่านใหม่อีกครั้ง" oninput="cpCheck()" style="padding-right:40px;"/>
        <button type="button" onclick="cpToggle('cpConf','cpEye2')" class="cp-eye-btn">
          <svg id="cpEye2" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/></svg>
        </button>
      </div>
    </div>
    <div id="cpMatchErr" style="display:none;font-size:0.75rem;color:#ef4444;margin-bottom:12px;">รหัสผ่านไม่ตรงกัน</div>

    <!-- Actions -->
    <div style="display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border,#e0e0e0);padding-top:18px;margin-top:18px;">
      <button type="button" onclick="cpCancel()" style="padding:9px 20px;background:transparent;border:1.5px solid var(--border,#e0e0e0);border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;color:var(--text-sub,#666);">ยกเลิก</button>
      <button type="button" id="cpSaveBtn" onclick="cpSave()" disabled style="padding:9px 24px;border:none;border-radius:8px;font-size:0.85rem;font-weight:700;cursor:not-allowed;background:#d0d0d0;color:#aaa;transition:background .2s;">บันทึก</button>
    </div>

  </div>
</div>

<style>
.cp-label{display:block;font-size:0.78rem;font-weight:600;color:var(--text-main,#1a1a1a);margin-bottom:5px;}
.cp-input{width:100%;padding:9px 11px;border:1.5px solid var(--border,#e0e0e0);border-radius:7px;font-size:0.85rem;color:var(--text-main,#1a1a1a);background:var(--input-bg,#fafafa);outline:none;transition:border-color .2s;font-family:inherit;box-sizing:border-box;}
.cp-input:focus{border-color:#C9A84C;}
.cp-eye-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#aaa;padding:3px;display:flex;align-items:center;}
.cp-eye-btn:hover{color:#666;}
</style>

<script>
(function(){
'use strict';

window.cpToggle = function(inputId, iconId){
  var el = document.getElementById(inputId);
  var ic = document.getElementById(iconId);
  var show = el.type === 'password';
  el.type = show ? 'text' : 'password';
  ic.innerHTML = show
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>';
};

window.cpCheck = function(){
  var old  = document.getElementById('cpOld').value;
  var nw   = document.getElementById('cpNew').value;
  var conf = document.getElementById('cpConf').value;
  var btn  = document.getElementById('cpSaveBtn');
  var err  = document.getElementById('cpMatchErr');

  // strength
  var bar  = document.getElementById('cpStrengthBar');
  var txt  = document.getElementById('cpStrengthText');
  var score = 0;
  if(nw.length >= 8) score++;
  if(/[A-Z]/.test(nw)) score++;
  if(/[0-9]/.test(nw)) score++;
  if(/[^A-Za-z0-9]/.test(nw)) score++;
  var levels = [
    {w:'25%', bg:'#ef4444', t:'ง่ายเกินไป'},
    {w:'50%', bg:'#f97316', t:'พอใช้ได้'},
    {w:'75%', bg:'#eab308', t:'ดี'},
    {w:'100%',bg:'#22c55e', t:'แข็งแกร่งมาก'}
  ];
  if(nw.length === 0){ bar.style.width='0'; txt.textContent=''; }
  else { var lv=levels[score-1]||levels[0]; bar.style.width=lv.w; bar.style.background=lv.bg; txt.textContent=lv.t; txt.style.color=lv.bg; }

  // match check
  var match = nw === conf;
  err.style.display = (conf.length > 0 && !match) ? 'block' : 'none';

  var ok = old.length > 0 && nw.length >= 8 && match;
  btn.disabled = !ok;
  btn.style.background = ok ? '#C9A84C' : '#d0d0d0';
  btn.style.color      = ok ? '#1a1a1a' : '#aaa';
  btn.style.cursor     = ok ? 'pointer'  : 'not-allowed';
};

window.cpCancel = function(){
  ['cpOld','cpNew','cpConf'].forEach(function(id){ document.getElementById(id).value=''; });
  cpCheck();
  document.getElementById('cpSuccess').style.display='none';
};

window.cpSave = async function(){
  var btn = document.getElementById('cpSaveBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';
  try{
    var token = localStorage.getItem('viiv_token');
    var res = await fetch('/admin/change-password',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({
        current_password: document.getElementById('cpOld').value,
        new_password:     document.getElementById('cpNew').value
      })
    });
    if(res.ok){
      var s = document.getElementById('cpSuccess');
      s.style.display = 'flex';
      s.scrollIntoView({behavior:'smooth'});
      cpCancel();
    } else {
      var d = await res.json();
      alert(d.detail || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
    }
  } catch(e){
    alert('เชื่อมต่อระบบไม่ได้');
  }
  btn.textContent = 'บันทึก';
  cpCheck();
};

})();
</script>
</body>
