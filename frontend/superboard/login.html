<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>เข้าสู่ระบบ — VIIV</title>
  <link rel="stylesheet" href="/superboard/css/theme.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--sidebar-bg,#1a1a1a);font-family:var(--font,sans-serif);}
    .login-wrap{width:100%;max-width:420px;padding:16px;}
    .login-card{background:var(--card-bg,#fff);border-radius:16px;padding:40px 36px 32px;box-shadow:0 8px 40px rgba(0,0,0,.18);}
    .login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
    .login-logo-box{width:36px;height:36px;background:#C9A84C;border-radius:8px;display:flex;align-items:center;justify-content:center;}
    .login-logo-text{font-size:1.3rem;font-weight:800;color:var(--text-main,#1a1a1a);letter-spacing:.04em;}
    .login-title{font-size:1.15rem;font-weight:700;color:var(--text-main,#1a1a1a);margin-bottom:4px;}
    .login-sub{font-size:0.83rem;color:var(--text-sub,#888);margin-bottom:28px;}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:0.8rem;font-weight:600;color:var(--text-main,#1a1a1a);margin-bottom:6px;}
    .form-input{width:100%;padding:10px 13px;border:1.5px solid var(--border,#e0e0e0);border-radius:8px;font-size:0.88rem;color:var(--text-main,#1a1a1a);background:var(--input-bg,#fafafa);outline:none;transition:border-color .2s;}
    .form-input:focus{border-color:#C9A84C;}
    .form-input::placeholder{color:#bbb;}
    .btn-login{width:100%;padding:11px;background:#C9A84C;color:#1a1a1a;border:none;border-radius:8px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:4px;}
    .btn-login:hover{opacity:.88;}
    .btn-login:disabled{opacity:.5;cursor:not-allowed;}
    .login-err{display:none;background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;border-radius:8px;padding:9px 13px;font-size:0.8rem;margin-bottom:14px;}
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
    .divider-line{flex:1;height:1px;background:var(--border,#e0e0e0);}
    .divider-text{font-size:0.75rem;color:var(--text-sub,#aaa);white-space:nowrap;}
    .social-btns{display:flex;flex-direction:column;gap:10px;}
    .btn-social{width:100%;padding:10px 13px;border:1.5px solid var(--border,#e0e0e0);border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;background:#fff;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s,background .2s;color:var(--text-main,#1a1a1a);}
    .btn-social:hover{border-color:#C9A84C;background:#fffdf5;}
    .btn-social-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .login-footer{text-align:center;margin-top:22px;font-size:0.8rem;color:var(--text-sub,#888);}
    .login-footer a{color:#C9A84C;font-weight:600;text-decoration:none;}
    .login-footer a:hover{text-decoration:underline;}
    .spinner-sm{width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#1a1a1a;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M4 5 L12 18 L20 5" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 7 L20 7 L20 13" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M11.5 12.5 L20 7" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="login-logo-text">VIIV</span>
    </div>
    <div class="login-title">เข้าสู่ระบบ</div>
    <div class="login-sub">ยินดีต้อนรับกลับ — เข้าสู่ระบบเพื่อจัดการร้านค้า</div>

    <div class="login-err" id="loginErr"></div>

    <div class="form-group">
      <label class="form-label">อีเมล</label>
      <input class="form-input" type="email" id="loginEmail" placeholder="email@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">รหัสผ่าน</label>
      <div style="position:relative;">
        <input class="form-input" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" style="padding-right:42px;"/>
        <button type="button" onclick="togglePass()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#aaa;padding:4px;display:flex;align-items:center;" id="togglePassBtn" title="แสดง/ซ่อนรหัสผ่าน">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">หรือเข้าสู่ระบบด้วย</span>
      <div class="divider-line"></div>
    </div>

    <div class="social-btns">
      <button class="btn-social" onclick="goRegister()">
        <span class="btn-social-icon">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        </span>
        Google
      </button>
      <button class="btn-social" onclick="goRegister()">
        <span class="btn-social-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        </span>
        Facebook
      </button>
      <button class="btn-social" onclick="goRegister()">
        <span class="btn-social-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#06C755"><path d="M12 2C6.477 2 2 6.145 2 11.243c0 4.562 3.676 8.373 8.627 9.088.317.057.748.174.858.4.099.205.065.526.032.733l-.138.863c-.042.253-.196.99.866.54 1.062-.45 5.733-3.512 7.822-6.01C21.404 14.893 22 13.135 22 11.243 22 6.145 17.523 2 12 2z"/></svg>
        </span>
        LINE
      </button>
    </div>

    <div class="login-footer">
      ยังไม่มีบัญชี? <a href="/register">สมัครใช้งานฟรี</a>
      &nbsp;·&nbsp;
      <a href="/superboard/">ลืมรหัสผ่าน?</a>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
var TOKEN_KEY = 'viiv_token';

window.goRegister = function(){
  window.location.href = '/register';
};

window.togglePass = function(){
  var input = document.getElementById('loginPass');
  var icon  = document.getElementById('eyeIcon');
  if(input.type === 'password'){
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>';
  }
};

window.doLogin = async function(){
  var email = document.getElementById('loginEmail').value.trim();
  var pass  = document.getElementById('loginPass').value;
  var btn   = document.getElementById('loginBtn');
  var err   = document.getElementById('loginErr');
  err.style.display = 'none';
  if(!email || !pass){ showErr('กรุณากรอกอีเมลและรหัสผ่าน'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm"></span>';
  try{
    var res = await fetch('/api/staff/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email:email, password:pass, tenant_id:'ten_1'})
    });
    var data = await res.json();
    if(res.ok && data.access_token){
      localStorage.setItem(TOKEN_KEY, data.access_token);
      window.location.href = '/superboard/';
    } else if(res.status === 429){
      showErr(data.detail || 'ลองใหม่อีกครั้งใน 1 นาที');
    } else if(res.status === 401 || res.status === 404){
      showErr('อีเมลหรือรหัสผ่านไม่ถูกต้อง');
    } else {
      showErr(data.detail || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
    }
  } catch(e){
    showErr('เชื่อมต่อระบบไม่ได้ กรุณาลองใหม่');
  }
  btn.disabled = false;
  btn.innerHTML = 'เข้าสู่ระบบ';
};

function showErr(msg){
  var el = document.getElementById('loginErr');
  el.textContent = msg;
  el.style.display = 'block';
}

document.addEventListener('keydown', function(e){
  if(e.key === 'Enter') doLogin();
});

// ถ้า login อยู่แล้ว redirect
if(localStorage.getItem(TOKEN_KEY)){
  window.location.href = '/superboard/';
}
})();
</script>
</body>
</html>
