<script>

// ── PROFILE ──────────────────────────────────────────────────────────────────
const Profile = {
  _initialFromJwt() {
    try {
      const t = (window.Auth && Auth.token) || localStorage.getItem('viiv_token') || '';
      const b = t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
      const p = JSON.parse(atob(b + '=='.slice((b.length%4)||4)));
      return { name: p.name || '', email: p.email || '', role: p.role || '' };
    } catch { return { name:'', email:'', role:'' }; }
  },
  openSheet() {
    const stored = JSON.parse(localStorage.getItem('viiv_profile') || '{}');
    const jwt = this._initialFromJwt();
    const p = {
      nickname:   stored.nickname   || jwt.name  || '',
      email:      stored.email      || jwt.email || '',
      phone:      stored.phone      || '',
      avatar_url: stored.avatar_url || '',
      role:       stored.role       || jwt.role  || '',
    };
    document.getElementById('pm-nick').value  = p.nickname;
    document.getElementById('pm-email').value = p.email;
    document.getElementById('pm-phone').value = p.phone;

    const av = document.getElementById('pm-avatar');
    const inp = '<div class="pm-avatar-edit">✎</div><input type="file" id="pm-avatar-inp" accept="image/*" style="display:none" onchange="Profile.previewAvatar(this)">';
    if (p.avatar_url) av.innerHTML = '<img src="' + p.avatar_url + '">' + inp;
    else av.innerHTML = (p.nickname || 'A').charAt(0).toUpperCase() + inp;

    document.getElementById('pm-role-lbl').textContent = p.role || '';
    document.getElementById('profile-modal').classList.add('open');
  },
  closeSheet() {
    document.getElementById('profile-modal').classList.remove('open');
  },
  onBg(e) {
    if (e.target === document.getElementById('profile-modal')) this.closeSheet();
  },
  previewAvatar(inp) {
    if (!inp.files || !inp.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
      const av = document.getElementById('pm-avatar');
      const after = '<div class="pm-avatar-edit">✎</div><input type="file" id="pm-avatar-inp" accept="image/*" style="display:none" onchange="Profile.previewAvatar(this)">';
      av.innerHTML = '<img src="' + e.target.result + '">' + after;
    };
    reader.readAsDataURL(inp.files[0]);
  },
  save() {
    const old = JSON.parse(localStorage.getItem('viiv_profile') || '{}');
    const p = {
      nickname: document.getElementById('pm-nick').value.trim(),
      email:    document.getElementById('pm-email').value.trim(),
      phone:    document.getElementById('pm-phone').value.trim(),
      role:     old.role || this._initialFromJwt().role || '',
    };
    const img = document.querySelector('#pm-avatar img');
    if (img) p.avatar_url = img.src;
    else if (old.avatar_url) p.avatar_url = old.avatar_url;
    localStorage.setItem('viiv_profile', JSON.stringify(p));
    this._applyUI(p);
    this.closeSheet();
    App.toast('✅ บันทึกโปรไฟล์แล้ว');
  },
  _applyUI(p) {
    const btn = document.getElementById('tb-profile-btn');
    if (!btn) return;
    if (p.avatar_url) btn.innerHTML = '<img src="' + p.avatar_url + '">';
    else btn.textContent = (p.nickname || 'A').charAt(0).toUpperCase();
  },
  logout() { Auth.logout(); },
  init() {
    const stored = JSON.parse(localStorage.getItem('viiv_profile') || '{}');
    const jwt = this._initialFromJwt();
    const p = {
      nickname: stored.nickname || jwt.name || '',
      avatar_url: stored.avatar_url || '',
    };
    if (p.nickname || p.avatar_url) this._applyUI(p);
  }
};

// ถ้ายังไม่มี hash → บังคับเป็น #home เพื่อให้ URL bar แสดง state ชัดเจน
if (!location.hash) location.replace('/pwa/#home');

App.init();
Router.init();
Profile.init();

function openSheet(content) {
  document.getElementById('sheet-content').innerHTML = content;
  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/pwa/sw.js', { scope: '/pwa/' }).catch(() => {});
}
</script>
