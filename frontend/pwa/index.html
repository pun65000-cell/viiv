<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#fffdf8"/>
<link rel="manifest" href="/pwa/manifest.json"/>
<link rel="stylesheet" href="/pwa/css/app.css?v=1142"/>
<title>VIIV</title>
</head>
<body>

<div id="app">

  <!-- TOPBAR -->
  <header id="topbar">
    <div id="tb-back" onclick="Router.back()">←</div>
    <div id="tb-logo">○ ViiV</div>
    <div id="tb-title" style="display:none"></div>
    <div class="tb-right">
      <span id="tb-clock"></span>
    </div>
  </header>

  <!-- PULL TO REFRESH -->
  <div id="ptr"><div id="ptr-spinner"></div></div>

  <!-- PAGE CONTENT -->
  <main id="page-container"></main>

  <!-- BOTTOM NAVBAR -->
  <nav id="navbar">
    <button class="nb-btn active" data-page="home" onclick="Router.go('home')">
      <span class="nb-icon">⊡</span><span class="nb-label">โฮม</span>
    </button>
    <button class="nb-btn" data-page="pos" onclick="Router.go('pos')">
      <span class="nb-icon">🖥</span><span class="nb-label">POS</span>
    </button>
    <button class="nb-btn" data-page="chat" onclick="Router.go('chat')">
      <span class="nb-icon">💬</span><span class="nb-label">Chat</span>
    </button>
    <button class="nb-btn" data-page="autopost" onclick="Router.go('autopost')">
      <span class="nb-icon">📲</span><span class="nb-label">AutoPost</span>
    </button>
    <button class="nb-btn" data-page="more" onclick="Router.go('more')">
      <span class="nb-icon">⚙️</span><span class="nb-label">จัดการ</span>
    </button>
  </nav>

</div>

<!-- BOTTOM SHEET OVERLAY -->
<div id="sheet-overlay" class="sheet-overlay" onclick="closeSheet()"></div>
<div id="sheet" class="sheet">
  <div class="sheet-handle"></div>
  <div id="sheet-content"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="/pwa/js/router.js?v=1144"></script>
<script src="/pwa/js/app.js?v=1144"></script>
<script src="/pwa/pages/home.js?v=1144"></script>
<script src="/pwa/pages/pos.js?v=1144"></script>
<script src="/pwa/pages/billing.js?v=1144"></script>
<script src="/pwa/pages/orders.js?v=1144"></script>
<script src="/pwa/pages/products.js?v=1144"></script>
<script src="/pwa/pages/members.js?v=1144"></script>
<script src="/pwa/pages/chat.js?v=1144"></script>
<script src="/pwa/pages/autopost.js?v=1144"></script>
<script src="/pwa/pages/more.js?v=1144"></script>
<script>

App.init();
Router.init();

function openSheet(content) {
  document.getElementById('sheet-content').innerHTML = content;
  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
}
</script>
</body>
</html>
