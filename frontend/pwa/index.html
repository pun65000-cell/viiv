<!-- PROFILE MODAL -->
<div id="profile-modal" onclick="Profile.onBg(event)">
  <div class="pm-sheet">
    <div class="pm-handle"><div class="pm-handle-bar"></div></div>
    <div class="pm-header">
      <div class="pm-title">โปรไฟล์ของฉัน</div>
      <button class="pm-close" onclick="Profile.closeSheet()">✕</button>
    </div>
    <div class="pm-body">
      <div class="pm-avatar-row">
        <div class="pm-avatar" id="pm-avatar" onclick="document.getElementById('pm-avatar-inp').click()">
          A<div class="pm-avatar-edit">✎</div>
          <input type="file" id="pm-avatar-inp" accept="image/*" style="display:none" onchange="Profile.previewAvatar(this)">
        </div>
        <div>
          <div class="pm-status-badge" id="pm-badge"><span class="pm-status-dot"></span> Admin · Online</div>
          <div class="pm-role-lbl" id="pm-role-lbl"></div>
        </div>
      </div>
      <div class="pm-section-lbl">ข้อมูลส่วนตัว</div>
      <div class="pm-row2">
        <div class="pm-field"><label>ชื่อ</label><input type="text" id="pm-fname" placeholder="ชื่อ"></div>
        <div class="pm-field"><label>นามสกุล</label><input type="text" id="pm-lname" placeholder="นามสกุล"></div>
      </div>
      <div class="pm-row2">
        <div class="pm-field"><label>เบอร์โทร</label><input type="tel" id="pm-phone" placeholder="0812345678"></div>
        <div class="pm-field"><label>อีเมล</label><input type="email" id="pm-email" placeholder="email@example.com"></div>
      </div>
      <div class="pm-field">
        <label>ตำแหน่ง / สิทธิ์</label>
        <input type="text" id="pm-role" readonly>
        <div class="pm-hint">ปรับได้เฉพาะผู้ดูแลระบบ</div>
      </div>
      <div class="pm-divider"></div>
      <div class="pm-section-lbl">เปลี่ยนรหัสผ่าน</div>
      <div class="pm-field"><label>รหัสผ่านปัจจุบัน</label><input type="password" id="pm-pw-old" placeholder="••••••••" autocomplete="current-password"></div>
      <div class="pm-row2">
        <div class="pm-field"><label>รหัสผ่านใหม่</label><input type="password" id="pm-pw-new" placeholder="••••••••" autocomplete="new-password"></div>
        <div class="pm-field"><label>ยืนยันรหัสผ่าน</label><input type="password" id="pm-pw-cf" placeholder="••••••••" autocomplete="new-password"></div>
      </div>
      <div class="pm-hint">เว้นว่างไว้ถ้าไม่ต้องการเปลี่ยนรหัสผ่าน</div>
    </div>
    <div class="pm-actions">
      <button class="pm-btn pm-btn-cancel" onclick="Profile.closeSheet()">ยกเลิก</button>
      <button class="pm-btn pm-btn-save" onclick="Profile.save()">บันทึก</button>
    </div>
  </div>
</div>

<script>

// ── PROFILE ──────────────────────────────────────────────────────────────────
const Profile = {
  toggleDD() {
    document.getElementById('tb-profile-dd').classList.toggle('open');
  },
  closeDD() {
    var _dd = document.getElementById('tb-profile-dd'); if(_dd) _dd.classList.remove('open');
  },
  openSheet() {
    this.closeDD();
    const p = JSON.parse(localStorage.getItem('viiv_profile') || '{}');
    document.getElementById('pm-fname').value = p.first_name || '';
    document.getElementById('pm-lname').value  = p.last_name  || '';
    document.getElementById('pm-phone').value  = p.phone      || '';
    document.getElementById('pm-email').value  = p.email      || '';
    document.getElementById('pm-role').value   = p.role       || '—';
    document.getElementById('pm-pw-old').value = '';
    document.getElementById('pm-pw-new').value = '';
    document.getElementById('pm-pw-cf').value  = '';
    // avatar
    const av = document.getElementById('pm-avatar');
    const inp = '<div class="pm-avatar-edit">✎</div><input type="file" id="pm-avatar-inp" accept="image/*" style="display:none" onchange="Profile.previewAvatar(this)">';
    if (p.avatar_url) av.innerHTML = '<img src="' + p.avatar_url + '">' + inp;
    else av.innerHTML = (p.first_name || 'A').charAt(0).toUpperCase() + inp;
    // badge
    const badge = document.getElementById('pm-badge');
    badge.innerHTML = '<span class="pm-status-dot"></span> ' + (p.role || 'Admin') + ' · Online';
    document.getElementById('pm-role-lbl').textContent = p.role || '';
    document.getElementById('profile-modal').classList.add('open');
  },
  closeSheet() {
    document.getElementById('profile-modal').classList.remove('open');
  },
  onBg(e) {
    if (e.target === document.getElementById('profile-modal')) this.closeSheet();
  },
  previewAvatar(inp) {
    if (!inp.files || !inp.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
      const av = document.getElementById('pm-avatar');
      const after = '<div class="pm-avatar-edit">✎</div><input type="file" id="pm-avatar-inp" accept="image/*" style="display:none" onchange="Profile.previewAvatar(this)">';
      av.innerHTML = '<img src="' + e.target.result + '">' + after;
    };
    reader.readAsDataURL(inp.files[0]);
  },
  save() {
    const pwNew = document.getElementById('pm-pw-new').value.trim();
    const pwCf  = document.getElementById('pm-pw-cf').value.trim();
    const pwOld = document.getElementById('pm-pw-old').value.trim();
    if (pwNew || pwCf) {
      if (!pwOld) { App.toast('กรุณากรอกรหัสผ่านปัจจุบัน'); return; }
      if (pwNew !== pwCf) { App.toast('รหัสผ่านใหม่ไม่ตรงกัน'); return; }
      if (pwNew.length < 6) { App.toast('รหัสผ่านใหม่อย่างน้อย 6 ตัว'); return; }
    }
    const old = JSON.parse(localStorage.getItem('viiv_profile') || '{}');
    const p = {
      first_name: document.getElementById('pm-fname').value.trim(),
      last_name:  document.getElementById('pm-lname').value.trim(),
      phone:      document.getElementById('pm-phone').value.trim(),
      email:      document.getElementById('pm-email').value.trim(),
      role:       old.role || '',
    };
    const img = document.querySelector('#pm-avatar img');
    if (img) p.avatar_url = img.src;
    localStorage.setItem('viiv_profile', JSON.stringify(p));
    this._applyUI(p);
    this.closeSheet();
    App.toast('✅ บันทึกโปรไฟล์แล้ว');
  },
  _applyUI(p) {
    const btn = document.getElementById('tb-profile-btn');
    if (p.avatar_url) btn.innerHTML = '<img src="' + p.avatar_url + '">';
    else btn.textContent = (p.first_name || 'A').charAt(0).toUpperCase();
    const name = (p.first_name ? p.first_name + ' ' + (p.last_name || '') : 'Admin').trim();
    document.getElementById('pd-name').textContent = name;
    document.getElementById('pd-role').textContent = p.role || 'ผู้ดูแลระบบ';
  },
  logout() { Auth.logout(); },
  init() {
    const p = JSON.parse(localStorage.getItem('viiv_profile') || '{}');
    if (p.first_name || p.avatar_url) this._applyUI(p);
  }
};

document.addEventListener('click', e => {
  if (!e.target.closest('#tb-profile-wrap')) Profile.closeDD();
});

App.init();
Router.init();
Profile.init();

function openSheet(content) {
  document.getElementById('sheet-content').innerHTML = content;
  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
}
</script>
