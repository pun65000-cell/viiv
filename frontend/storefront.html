<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VIIV Storefront</title>
    <style>
      :root {
        --bg: #f5f5f5;
        --panel: #ffffff;
        --border: rgba(0, 0, 0, 0.1);
        --muted: rgba(0, 0, 0, 0.6);
        --accent: #d4a017;
        --success: #1f9d55;
        --affiliate: #e07a20;
      }

      body {
        margin: 0;
        font-family: sans-serif;
        background: var(--bg);
        color: #111;
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 18px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .brand {
        font-weight: 700;
        font-size: 18px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
        display: inline-block;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .media {
        width: 100%;
        aspect-ratio: 4 / 3;
        background: rgba(0, 0, 0, 0.04);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .body {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .name {
        font-weight: 700;
        line-height: 1.3;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .price {
        font-weight: 700;
      }

      .badge {
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        background: rgba(0, 0, 0, 0.04);
      }

      .badge.normal {
        border-color: rgba(31, 157, 85, 0.3);
        background: rgba(31, 157, 85, 0.12);
      }

      .badge.affiliate {
        border-color: rgba(224, 122, 32, 0.3);
        background: rgba(224, 122, 32, 0.12);
      }

      .btn {
        padding: 10px 14px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 700;
      }

      .btn-buy {
        background: var(--success);
        color: #fff;
      }

      .btn-affiliate {
        background: var(--affiliate);
        color: #fff;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        margin-top: 16px;
      }

      .panel-title {
        font-weight: 700;
        margin-bottom: 8px;
      }

      .muted {
        color: var(--muted);
      }

      .btn-primary {
        background: var(--accent);
        color: #111;
      }

      .payment {
        margin-top: 10px;
        display: none;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="brand"><span class="dot"></span> VIIV Store</div>
        <button id="refreshBtn" class="btn btn-primary">รีเฟรชสินค้า</button>
      </div>

      <div id="products" class="grid"></div>

      <div class="panel">
        <div class="panel-title">ตะกร้าสินค้า</div>
        <div>รหัสตะกร้า: <span id="cartId">-</span></div>
        <div id="cartItems" class="muted" style="margin-top: 8px">ยังไม่มีสินค้าในตะกร้า</div>
        <div style="margin-top: 8px">รวมทั้งหมด: <span id="cartTotal">0</span> บาท</div>
        <div style="margin-top: 10px">
          <button id="checkoutBtn" class="btn btn-primary">ชำระเงิน</button>
        </div>

        <div id="payment" class="payment">
          <div class="panel-title" style="margin-top: 10px">🧾 หน้าชำระเงิน</div>
          <div>เลขคำสั่งซื้อ: <span id="orderId">-</span></div>
          <div>ยอดชำระ: <span id="orderTotal">0</span> บาท</div>
          <div style="margin-top: 10px">
            <div class="panel-title">💳 วิธีชำระเงิน</div>
            <div>1. QR PromptPay</div>
            <img id="qrImg" alt="QR PromptPay" style="width: 240px; height: 240px; border-radius: 12px" />
            <div style="margin-top: 10px">2. หรือโอนผ่านบัญชี:</div>
            <div>ธนาคาร: กสิกรไทย</div>
            <div>เลขบัญชี: 123-4-56789-0</div>
            <div>ชื่อบัญชี: ร้าน VIIV</div>
            <div style="margin-top: 10px">📌 หลังโอนเงิน กรุณาส่งสลิปในแชท</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API = "https://auth.viiv.me";

      let cartId = null;
      let productMap = new Map();
      let lastCart = null;

      const $ = (id) => document.getElementById(id);

      async function httpJson(url, options) {
        const res = await fetch(url, options);
        const json = await res.json().catch(() => null);
        return { ok: res.ok, status: res.status, json };
      }

      async function ensureCart() {
        if (cartId) return cartId;
        const { ok, json } = await httpJson(`${API}/pos/cart/create`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });
        if (!ok || !json || !json.cart_id) {
          throw new Error("สร้างตะกร้าไม่สำเร็จ");
        }
        cartId = json.cart_id;
        $("cartId").textContent = cartId;
        return cartId;
      }

      function getFirstMediaUrl(p) {
        const media = p["มีเดีย"];
        if (Array.isArray(media) && media.length > 0) {
          const first = media[0];
          if (first && first.url) return first.url;
        }
        const fallback = p["รูปภาพ"];
        return fallback || "";
      }

      async function loadProducts() {
        const container = $("products");
        container.textContent = "";
        productMap = new Map();

        const { ok, json } = await httpJson(`${API}/product/list`, { method: "GET" });
        if (!ok || !Array.isArray(json)) {
          container.textContent = "โหลดสินค้าไม่สำเร็จ";
          return;
        }

        if (json.length === 0) {
          container.textContent = "ยังไม่มีสินค้า";
          return;
        }

        for (const p of json) {
          const id = p["รหัสสินค้า"];
          productMap.set(id, p);

          const card = document.createElement("div");
          card.className = "card";

          const media = document.createElement("div");
          media.className = "media";
          const url = getFirstMediaUrl(p);
          if (url) {
            const img = document.createElement("img");
            img.src = url;
            img.alt = p["ชื่อสินค้า"] || "";
            media.appendChild(img);
          } else {
            media.textContent = "ไม่มีรูป";
          }
          card.appendChild(media);

          const body = document.createElement("div");
          body.className = "body";

          const name = document.createElement("div");
          name.className = "name";
          name.textContent = p["ชื่อสินค้า"] || "-";
          body.appendChild(name);

          const row = document.createElement("div");
          row.className = "row";
          const price = document.createElement("div");
          price.className = "price";
          price.textContent = `${p["ราคา"] || 0} บาท`;
          row.appendChild(price);

          const badge = document.createElement("div");
          const t = p["ประเภท"];
          badge.className = `badge ${t === "affiliate" ? "affiliate" : "normal"}`;
          badge.textContent = t === "affiliate" ? "Affiliate" : "สินค้าปกติ";
          row.appendChild(badge);
          body.appendChild(row);

          const btn = document.createElement("button");
          if (t === "affiliate") {
            btn.className = "btn btn-affiliate";
            btn.textContent = "ดูสินค้า";
            btn.addEventListener("click", async () => {
              await httpJson(`${API}/product/click`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ product_id: id }),
              });
              const url = p["ลิงก์พันธมิตร"] || "";
              if (url) window.open(url, "_blank");
            });
          } else {
            btn.className = "btn btn-buy";
            btn.textContent = "สั่งซื้อ";
            btn.addEventListener("click", async () => {
              const cid = await ensureCart();
              const { ok: addOk, json: addJson } = await httpJson(`${API}/pos/cart/add-item`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ cart_id: cid, product_id: id, quantity: 1 }),
              });
              if (!addOk || !addJson) {
                alert("เพิ่มลงตะกร้าไม่สำเร็จ");
                return;
              }
              if (addJson.error) {
                alert(addJson.error);
                return;
              }
              await loadCart();
            });
          }
          body.appendChild(btn);

          card.appendChild(body);
          container.appendChild(card);
        }
      }

      async function loadCart() {
        if (!cartId) {
          $("cartItems").textContent = "ยังไม่มีสินค้าในตะกร้า";
          $("cartTotal").textContent = "0";
          return;
        }

        const { ok, json } = await httpJson(`${API}/pos/cart/get`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cart_id: cartId }),
        });
        if (!ok || !json || json.error) {
          $("cartItems").textContent = "โหลดตะกร้าไม่สำเร็จ";
          return;
        }

        lastCart = json;
        const items = Array.isArray(json.items) ? json.items : [];
        const total = json.total || 0;
        $("cartTotal").textContent = String(total);

        if (items.length === 0) {
          $("cartItems").textContent = "ยังไม่มีสินค้าในตะกร้า";
          return;
        }

        const ul = document.createElement("ul");
        for (const item of items) {
          const li = document.createElement("li");
          const p = productMap.get(item.product_id);
          const name = (p && p["ชื่อสินค้า"]) || item.product_id;
          li.textContent = `${name} x${item.quantity}`;
          ul.appendChild(li);
        }
        $("cartItems").textContent = "";
        $("cartItems").appendChild(ul);
      }

      async function checkout() {
        if (!cartId) {
          alert("ยังไม่มีตะกร้า");
          return;
        }
        const { ok, json } = await httpJson(`${API}/pos/checkout`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cart_id: cartId }),
        });
        if (!ok || !json) {
          alert("ชำระเงินไม่สำเร็จ");
          return;
        }
        if (json.error) {
          alert(json.error);
          return;
        }

        const orderId = json.order_id || "-";
        const amount = Number(json.total || 0);
        $("orderId").textContent = orderId;
        $("orderTotal").textContent = String(amount);
        $("qrImg").src = `https://promptpay.io/0812345678.png/${encodeURIComponent(String(amount))}`;
        $("payment").style.display = "block";
      }

      $("refreshBtn").addEventListener("click", loadProducts);
      $("checkoutBtn").addEventListener("click", checkout);

      (async () => {
        await loadProducts();
        try {
          await ensureCart();
          await loadCart();
        } catch (e) {}
      })();
    </script>
  </body>
</html>
