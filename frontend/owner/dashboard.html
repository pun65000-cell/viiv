    <style>
      body {
        background-color: #f5f6f8;

      }

      .sidebar {
        background-color: #1e1e2f !important;
      }

      .sidebar a {
        color: #c7c7d1 !important;
      }

      .sidebar a:hover {
        color: #ffffff !important;

    <style>
      body {
        font-family: sans-serif;
        background: #f5f5f5;
        padding: 20px;
        margin: 0;
        color: #111;
      }

      :root {
        --bg: #f5f5f5;
        --panel: #ffffff;
        --border: rgba(0, 0, 0, 0.08);
        --muted: rgba(0, 0, 0, 0.6);
        --sidebar: #1a1a1a;
        --accent: #d4a017;
        --success: #1f9d55;
        --affiliate: #e07a20;
      }

      .layout {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 240px;
        background: var(--sidebar);
        color: #fff;
        padding: 18px 14px;
        box-sizing: border-box;
      }

      .brand {
        font-weight: 700;
        letter-spacing: 0.2px;
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-badge {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
        display: inline-block;
      }

      .nav {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .nav-item {
        background: transparent;
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 10px 12px;
        text-align: left;
        cursor: pointer;
      }

      .nav-item:hover {
        border-color: rgba(255, 255, 255, 0.2);
      }

      .nav-item.active {
        background: rgba(212, 160, 23, 0.16);
        border-color: rgba(212, 160, 23, 0.55);
        color: #fff;
      }

      .main {
        margin-left: 240px;
        width: calc(100% - 240px);
        padding: 22px;
        box-sizing: border-box;
      }

      .main-inner {
        max-width: 900px;
        margin: 0 auto;
      }

      .page-title {
        margin: 0 0 16px 0;
        font-size: 22px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 18px;
        background: var(--panel);
      }

      h2 {
        margin: 0 0 10px 0;
      }

      h3 {
        margin: 14px 0 10px 0;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 8px;
        margin-top: 6px;
        margin-bottom: 10px;
        box-sizing: border-box;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
      }

      .btn {
        padding: 10px 16px;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: #111;
        cursor: pointer;
      }

      .btn:hover {
        filter: brightness(0.96);
      }

      .btn-success {
        background: var(--success);
        color: #fff;
      }

      .btn-affiliate {
        background: var(--affiliate);
        color: #fff;
      }

      .btn-secondary {
        background: rgba(0, 0, 0, 0.06);
        color: #111;
      }

      .btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .topbar {
        background: white;
        border-bottom: 1px solid #eee;
        padding: 10px 20px;
        display: flex;
        gap: 10px;
        border-radius: 12px;
        margin-bottom: 18px;
      }

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-content {
        background: white;
        width: 400px;
        max-height: 90vh;
        overflow-y: auto;
        padding: 20px;
        border-radius: 10px;
      }

      .media-preview {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 6px;
        margin-bottom: 10px;
      }

      .media-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 10px;
        padding: 8px;
      }

      .media-item-left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .media-thumb {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        object-fit: cover;
        background: rgba(0, 0, 0, 0.04);
        flex: 0 0 auto;
      }

      .media-url {
        font-size: 12px;
        color: rgba(0, 0, 0, 0.65);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .hidden {
        display: none;
      }

      .view {
        display: none;
      }

      .view.active {
        display: block;
      }

      #products {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 12px;
      }

      .product {
        border: 1px solid rgba(0, 0, 0, 0.06);
        padding: 12px;
        border-radius: 12px;
        background: #fff;
      }

      .product img {
        border-radius: 10px;
        display: block;
        margin-bottom: 10px;
        object-fit: cover;
      }
      .low-stock {
        color: #c1121f;
        font-weight: 700;
      }

      @media (max-width: 880px) {
        .sidebar {
          position: static;
          width: 100%;
          display: flex;
          align-items: center;
          gap: 10px;
        }

        .nav {
          flex-direction: row;
          flex-wrap: wrap;
        }

        .main {
          margin-left: 0;
          width: 100%;
          padding: 16px;
        }

        #products {
          grid-template-columns: 1fr;
        }
      }
    </style>

    <script>
      const IS_OWNER_DOMAIN = window.location.hostname.includes("owner.viiv.me");
      const ADMIN_EMAIL = "admin@viiv.me";
      function getToken() {
        return localStorage.getItem("token") || localStorage.getItem("access_token");
      }

      function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("access_token");
        localStorage.removeItem("register_token");
        localStorage.removeItem("admin_token");
        // AUTH CONTROLLED BY auth.js
        // console.log("AUTH CHECK:", { hostname: window.location.hostname, isOwner: IS_OWNER_DOMAIN, token: typeof token !== "undefined" ? token : null });
        // if (!IS_OWNER_DOMAIN) {
        //   console.trace("REDIRECT TRIGGERED");
        //   // BLOCKED REDIRECT
        //   // window.location.href = "/login.html";
        // }
      }

      function toggleUserMenu() {
        const menu = document.getElementById("dropdown");
        if (!menu) return;
        menu.style.display = menu.style.display === "none" ? "block" : "none";
      }

      function goProfile() {
        console.log("API FAIL:", "Profile page not implemented yet");
        document.body.insertAdjacentHTML(
          "beforeend",
          "<div style='padding:20px;color:#aaa'>⚠️ ไม่สามารถโหลดข้อมูล (โหมดทดสอบ)</div>",
        );
      }

      window.addEventListener("load", () => {
        const token = getToken();
        // AUTH CONTROLLED BY auth.js
        // console.log("AUTH CHECK:", { hostname: window.location.hostname, isOwner: IS_OWNER_DOMAIN, token: typeof token !== "undefined" ? token : null });
        // if (!token && !IS_OWNER_DOMAIN) {
        //   console.trace("REDIRECT TRIGGERED");
        //   // BLOCKED REDIRECT
        //   // window.location.href = "/login.html";
        //   return;
        // }
        // if (!token) return;
        (async () => {
          if (typeof supabase !== "undefined" && supabase && supabase.auth && typeof supabase.auth.getUser === "function") {
            const user = (await supabase.auth.getUser()).data.user;
            if (user && user.email === ADMIN_EMAIL) {
              console.log("ADMIN ACCESS GRANTED");
            } else {
              console.log("NOT ADMIN (TEMP ALLOW)");
            }
          } else {
            console.log("NOT ADMIN (TEMP ALLOW)");
          }
        })();
        const el = document.getElementById("user-email");
        if (!el) return;
        try {
          const parts = token.split(".");
          if (parts.length >= 2) {
            const b64 = parts[1].replace(/-/g, "+").replace(/_/g, "/");
            const json = JSON.parse(decodeURIComponent(escape(atob(b64))));
            el.innerText = json.email || "Logged in";
          } else {
            el.innerText = "Logged in";
          }
        } catch (e) {
          el.innerText = "Logged in";
        }
      });

      function loadOwnerApi() {
        return new Promise((resolve, reject) => {
          if (window.OwnerAPI) return resolve(window.OwnerAPI);
          const s = document.createElement("script");
          s.src = "/owner/js/api.js";
          s.onload = () => resolve(window.OwnerAPI || window.api || null);
          s.onerror = () => reject(new Error("โหลด api.js ไม่สำเร็จ"));
          document.head.appendChild(s);
        });
      }

      function loadStores() {
        renderDashboardFromApi();
      }

      window.addEventListener("message", (event) => {
        if (event && event.data && event.data.type === "REGISTER_SUCCESS") {
          closeRegister();
          loadStores();
        }
      });

      async function renderStoresFromApi(data) {
        try {
          let raw = data;
          if (typeof raw === "undefined") {
            const api = await loadOwnerApi();
            if (!api || typeof api.getStores !== "function") {
              console.log("API NOT READY → SKIP");
              return;
            }
            raw = await api.getStores();
          }
          console.log("getStores:", raw);
          let stores = Array.isArray(raw) ? raw.filter(Boolean) : [];
          if (!stores.length) {
            console.log("USING MOCK STORES");
            stores = [
              { id: 1, name: "Demo Store A", total_products: 12 },
              { id: 2, name: "Demo Store B", total_products: 5 },
            ];
          }
          const html = stores.length
            ? "<ul>" +
              stores
                .map((s) => {
                  const name = s.name || s.store_name || s.title || s.id || "-";
                  const domain = s.domain || s.slug || s.subdomain || "";
                  return `<li>${name}${domain ? " — " + domain : ""}</li>`;
                })
                .join("") +
              "</ul>"
            : "ยังไม่มีร้านค้า";
          const target = document.getElementById("storesList") || document.getElementById("contentArea");
          if (target) target.innerHTML = html;
          if (!stores.length) {
            console.log("NO DATA → SHOW EMPTY STATE");
            document.body.insertAdjacentHTML(
              "beforeend",
              "<p style='padding:20px;color:#888'>No data (API disabled)</p>",
            );
          }
        } catch (e) {
          console.error(e);
          console.log("API FAIL:", e);
          document.body.insertAdjacentHTML(
            "beforeend",
            "<div style='padding:20px;color:#aaa'>⚠️ ไม่สามารถโหลดข้อมูล (โหมดทดสอบ)</div>",
          );
        }
      }

      async function renderProductsFromApi(data) {
        const selectedStoreIdRaw = document.getElementById("storeSelect")
          ? document.getElementById("storeSelect").value
          : "";
        const selectedStoreId = selectedStoreIdRaw ? String(selectedStoreIdRaw) : "";
        console.log("Selected store_id:", selectedStoreId);

        if (!selectedStoreId) {
          const target = document.getElementById("productsList") || document.getElementById("contentArea");
          if (target) target.innerHTML = "กรุณาเลือกร้านค้าก่อน";
          return;
        }

        try {
          let raw = data;
          if (typeof raw === "undefined") {
            const api = await loadOwnerApi();
            if (!api || typeof api.getProducts !== "function") {
              console.log("API NOT READY → SKIP");
              return;
            }
            raw = await api.getProducts({ store_id: selectedStoreId });
          }
          console.log("getProducts:", raw);
          let products = Array.isArray(raw) ? raw.filter(Boolean) : [];
          if (!products.length) {
            console.log("USING MOCK PRODUCTS");
            products = [
              { name: "Chicken Clean Protein", price: 79 },
              { name: "Healthy Rice Bowl", price: 59 },
            ];
          }
          const total = products.length;
          const html = "จำนวนสินค้า: " + total;
          const target = document.getElementById("productsList") || document.getElementById("contentArea");
          if (target) target.innerHTML = html;
          if (!products.length) {
            console.log("NO DATA → SHOW EMPTY STATE");
            document.body.insertAdjacentHTML(
              "beforeend",
              "<p style='padding:20px;color:#888'>No data (API disabled)</p>",
            );
          }
        } catch (e) {
          console.error(e);
          console.log("API FAIL:", e);
          document.body.insertAdjacentHTML(
            "beforeend",
            "<div style='padding:20px;color:#aaa'>⚠️ ไม่สามารถโหลดข้อมูล (โหมดทดสอบ)</div>",
          );
        }
      }

      async function renderDashboardFromApi() {
        const content = document.getElementById("contentArea");
        content.innerHTML = `กำลังโหลด...`;

        let stores = [];
        try {
          const api = await loadOwnerApi();
          if (!api || typeof api.getStores !== "function") {
            console.log("API NOT READY → SKIP");
            content.innerHTML = "<p style='padding:20px;color:#888'>No data (API disabled)</p>";
            return;
          }
          const data = await api.getStores();
          if (!data || !Array.isArray(data)) {
            console.log("NO DATA → SAFE MODE");
            content.innerHTML = "<p style='padding:20px;color:#888'>No data (API disabled)</p>";
            return;
          }
          console.log("getStores:", data);
          stores = Array.isArray(data) ? data.filter(Boolean) : [];
        } catch (e) {
          console.error(e);
          console.log("STORE LOAD FAILED → USING EMPTY STATE");
          content.innerHTML = "โหลดข้อมูลไม่สำเร็จ";
          return;
        }

        if (stores.length === 0) {
          content.innerHTML = `สร้างร้านของคุณก่อนเริ่มใช้งาน`;
          console.log("NO DATA → SHOW EMPTY STATE");
          document.body.insertAdjacentHTML(
            "beforeend",
            "<p style='padding:20px;color:#888'>No data (API disabled)</p>",
          );
          return;
        }

        let storeCounts = [];
        try {
          const api = await loadOwnerApi();
          storeCounts = await Promise.all(
            stores.map(async (s) => {
              if (!s) return { store: {}, total_products: 0 };
              const storeId = s.id;
              try {
                const products = await api.getProducts({ store_id: storeId });
                console.log("getProducts for store:", storeId, products);
                const total = Array.isArray(products) ? products.length : 0;
                return { store: s, total_products: total };
              } catch (err) {
                console.error(err);
                return { store: s, total_products: 0 };
              }
            }),
          );
        } catch (e) {
          console.error(e);
          console.log("API FAIL:", e);
          document.body.insertAdjacentHTML(
            "beforeend",
            "<div style='padding:20px;color:#aaa'>⚠️ ไม่สามารถโหลดข้อมูล (โหมดทดสอบ)</div>",
          );
          return;
        }

        const options = stores
          .map((s) => {
            const id = s.id;
            const name = s.name || s.store_name || s.title || s.id || "-";
            return `<option value="${id}">${name}</option>`;
          })
          .join("");

        const summaryHtml = storeCounts
          .map(({ store, total_products }) => {
            const name = store.name || store.store_name || store.title || store.id || "-";
            return `<div class="card" style="margin-bottom: 12px;">
              <div><b>${name}</b></div>
              <div>จำนวนสินค้า: ${total_products}</div>
            </div>`;
          })
          .join("");

        content.innerHTML = `
          <div style="margin-bottom:12px;">
            <b>ร้านค้า</b>
            <div style="display:flex; gap:8px; align-items:center; margin-top:8px; flex-wrap:wrap;">
              <select id="storeSelect">${options}</select>
              <button id="refreshBtn" type="button">รีเฟรช</button>
            </div>
          </div>

          <div style="margin-bottom:12px;">
            <b>เพิ่มสินค้า</b>
            <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;">
              <input id="productName" type="text" placeholder="ชื่อสินค้า" />
              <input id="productPrice" type="number" placeholder="ราคา" />
              <button id="createProductBtn" type="button">สร้าง</button>
            </div>
          </div>

          <div>
            <b>สินค้า</b>
            <div id="productsList" style="margin-top:8px;">-</div>
          </div>

          <div style="margin-top: 18px;">
            <b>สรุปร้านค้า</b>
            <div id="storeSummaryArea" style="margin-top:8px;">
              ${summaryHtml}
            </div>
          </div>
        `;

        const storeSelect = document.getElementById("storeSelect");
        storeSelect.addEventListener("change", async () => {
          await renderProductsFromApi();
        });
        document.getElementById("refreshBtn").addEventListener("click", async () => {
          await renderDashboardFromApi();
        });

        await renderProductsFromApi();

        const btn = document.getElementById("createProductBtn");
        btn.addEventListener("click", async () => {
          const name = document.getElementById("productName").value;
          const priceRaw = document.getElementById("productPrice").value;
          const price = priceRaw === "" ? null : Number(priceRaw);
          const storeIdRaw = document.getElementById("storeSelect").value;
          const store_id = String(storeIdRaw);
          const payload =
            price === null ? { store_id, name } : { store_id, name, price };
          console.log("createProduct:", payload);

          try {
            const api = await loadOwnerApi();
            if (!api || typeof api.createProduct !== "function") {
              console.log("API NOT READY → SKIP");
              return;
            }
            await api.createProduct(payload);
            console.log("API FAIL:", "สร้างสินค้าเรียบร้อย");
            document.body.insertAdjacentHTML(
              "beforeend",
              "<div style='padding:20px;color:#aaa'>⚠️ ไม่สามารถโหลดข้อมูล (โหมดทดสอบ)</div>",
            );
            await renderDashboardFromApi();
          } catch (e) {
            console.error(e);
            console.log("API FAIL:", e);
            document.body.insertAdjacentHTML(
              "beforeend",
              "<div style='padding:20px;color:#aaa'>⚠️ ไม่สามารถโหลดข้อมูล (โหมดทดสอบ)</div>",
            );
          }
        });
      }

      const nav = document.getElementById("nav");
      nav.addEventListener("click", (e) => {
        const btn = e.target && e.target.closest ? e.target.closest(".nav-item") : null;
        if (!btn) return;

        const view = btn.getAttribute("data-view");
        if (!view) return;

        for (const b of nav.querySelectorAll(".nav-item")) {
          b.classList.toggle("active", b === btn);
        }

        loadSection(view);
      });

      function loadSection(section) {
        const title = document.getElementById("pageTitle");
        const content = document.getElementById("contentArea");
        const topbar = document.getElementById("topbar");

        // RESET
        topbar.innerHTML = "";

        if (section === "users") {
          title.innerText = "ค้นหาร้านค้า";
          topbar.innerHTML = `
            <button onclick="closeRegister(); renderStoreLookup()">ค้นหาร้านค้า</button>
            <button onclick="openRegister()">สร้างร้านค้า</button>
          `;
          renderStoreLookup();
        }

        if (section === "stores") {
          title.innerText = "จัดการร้านค้า";

          topbar.innerHTML = `
            <button onclick="renderStores()">ร้านค้าทั้งหมด</button>
          `;

          renderStores();
        }

        if (section === "packages") {
          title.innerText = "จัดการแพ็กเกจ";

          topbar.innerHTML = `
            <button onclick="renderPackages()">ภาพรวม</button>
            <button onclick="renderCreatePackage()">สร้างแพ็คเกจ</button>
          `;

          renderPackages();
        }

        if (section === "dashboard") {
          title.innerText = "แดชบอร์ด";
          renderDashboardFromApi();
        }

        if (section === "personnel") {
          title.innerText = "บุคลากร";
          topbar.innerHTML = "";
          renderPersonnel();
        }
      }

      function renderStoreLookup() {
        const content = document.getElementById("contentArea");
        content.innerHTML = `
          <div id="registerContainer" style="display:none; margin-bottom:16px;"></div>
          <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
            <input id="searchInput" placeholder="ค้นหา store_id / email" style="flex:1;" />
            <button id="searchBtn" type="button">ค้นหา</button>
          </div>
          <div id="searchResult" style="margin-top:12px;"></div>
        `;

        const input = document.getElementById("searchInput");
        const btn = document.getElementById("searchBtn");
        const resultEl = document.getElementById("searchResult");

        async function runSearch() {
          const keyword = (input.value || "").toLowerCase().trim();
          resultEl.innerHTML = "กำลังค้นหา...";

          try {
            const api = await loadOwnerApi();
            if (!api || typeof api.getStores !== "function") {
              console.log("API NOT READY → SKIP");
              resultEl.innerHTML = "";
              return;
            }
            const data = await api.getStores();
            console.log("getStores (lookup):", data);
            const stores = Array.isArray(data) ? data.filter(Boolean) : [];

            const filtered = keyword
              ? stores.filter((s) => {
                  const id = String(s.id || "").toLowerCase();
                  const subdomain = String(s.subdomain || s.domain || s.slug || "").toLowerCase();
                  return id.includes(keyword) || subdomain.includes(keyword);
                })
              : stores;

            if (filtered.length === 0) {
              resultEl.innerHTML = "ไม่พบร้านค้าที่ตรงกับคำค้นหา";
              return;
            }

            const html =
              filtered
                .map((s) => {
                  const storeId = s.id || "-";
                  const subdomain = s.subdomain || s.domain || s.slug || "-";
                  const ownerId = s.owner_id || "-";
                  const createdAt = s.created_at || "-";
                  return `
                    <div class="card" style="margin-bottom: 12px;">
                      <div><b>รหัสร้านค้า:</b> ${storeId}</div>
                      <div><b>ซับโดเมน:</b> ${subdomain}</div>
                      <div><b>รหัสเจ้าของ:</b> ${ownerId}</div>
                      <div><b>วันที่สร้าง:</b> ${createdAt}</div>
                      <div style="margin-top:10px;">
                        <button type="button" class="nav-item" onclick="selectStoreAndGoDashboard('${storeId}')">ดูรายละเอียด</button>
                      </div>
                    </div>
                  `;
                })
                .join("");

            resultEl.innerHTML = html;
          } catch (e) {
            console.error(e);
            console.log("API FAIL:", e);
            document.body.insertAdjacentHTML(
              "beforeend",
              "<div style='padding:20px;color:#aaa'>⚠️ ไม่สามารถโหลดข้อมูล (โหมดทดสอบ)</div>",
            );
            resultEl.innerHTML = "";
          }
        }

        btn.addEventListener("click", runSearch);
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") runSearch();
        });
      }

      function openRegister() {
        const container = document.getElementById("registerContainer");
        if (!container) return;

        container.innerHTML = `
          <iframe
            id="registerFrame"
            src="/register.html?mode=owner&t=${Date.now()}"
            style="width:100%; height:700px; border:none; border-radius:12px;"
          ></iframe>
        `;
        container.style.display = "block";
        console.log("OPEN REGISTER (fresh)");
      }

      function closeRegister() {
        const container = document.getElementById("registerContainer");
        if (!container) return;
        container.innerHTML = "";
        container.style.display = "none";
        console.log("CLOSE REGISTER");
      }

      function selectStoreAndGoDashboard(storeId) {
        try {
          const storeSelect = document.getElementById("storeSelect");
          if (storeSelect) {
            storeSelect.value = String(storeId);
          }
        } catch (e) {}
        loadSection("dashboard");
        setTimeout(() => {
          try {
            const storeSelect = document.getElementById("storeSelect");
            if (storeSelect) {
              storeSelect.value = String(storeId);
              storeSelect.dispatchEvent(new Event("change"));
            }
          } catch (e) {}
        }, 0);
      }

      function renderStores() {
        renderStoresFromApi();
      }

      function renderPackages() {
        document.getElementById("contentArea").innerHTML = "ภาพรวมแพ็คเกจ + จำนวนผู้ใช้งาน";
      }

      function renderCreatePackage() {
        document.getElementById("contentArea").innerHTML = "ฟอร์มสร้างแพ็คเกจ";
      }

      function renderPersonnel() {
        const content = document.getElementById("contentArea");
        const staffs = JSON.parse(localStorage.getItem("staffs") || "[]");

        const permText = (p) => {
          const parts = [];
          if (p && p.viewStores) parts.push("ดูร้านค้า");
          if (p && p.manageProducts) parts.push("จัดการสินค้า");
          if (p && p.viewOrders) parts.push("ดูออเดอร์");
          return parts.length ? parts.join(", ") : "ไม่มีสิทธิ์";
        };

        const listHtml = staffs.length
          ? staffs
              .map((s) => {
                const name = s.name || "-";
                const email = s.email || "-";
                return `
                  <div class="card" style="margin-bottom: 12px;">
                    <div><b>${name}</b></div>
                    <div>${email}</div>
                    <div style="margin-top:6px;">สิทธิ์: ${permText(s.permissions)}</div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;">
                      <button type="button" onclick="resetPassword('${s.id}')">รีเซ็ตรหัสผ่าน</button>
                      <button type="button" onclick="deleteStaff('${s.id}')">ลบ</button>
                    </div>
                  </div>
                `;
              })
              .join("")
          : `<div class="muted">ยังไม่มีผู้ช่วย</div>`;

        content.innerHTML = `
          <div class="card">
            <div style="font-weight:700; margin-bottom:10px;">สร้างผู้ช่วย</div>
            <input id="staffName" placeholder="ชื่อ">
            <input id="staffEmail" placeholder="Email">
            <input id="staffPassword" placeholder="Password">
            <div style="margin-top:8px; margin-bottom:8px; font-weight:700;">สิทธิ์:</div>
            <label><input type="checkbox" id="permStores"> ดูร้านค้า</label>
            <label><input type="checkbox" id="permProducts"> จัดการสินค้า</label>
            <label><input type="checkbox" id="permOrders"> ดูออเดอร์</label>
            <div style="margin-top:10px;">
              <button type="button" onclick="createStaff()">สร้างผู้ช่วย</button>
            </div>
          </div>

          <div class="card">
            <div style="font-weight:700; margin-bottom:10px;">รายชื่อผู้ช่วย</div>
            ${listHtml}
          </div>

          <div class="card">
            <div style="font-weight:700; margin-bottom:10px;">เปลี่ยนรหัสผ่านของคุณ</div>
            <input id="ownerPassword" placeholder="รหัสผ่านใหม่">
            <button type="button" onclick="resetOwnerPass()">เปลี่ยน</button>
          </div>
        `;
      }

      function createStaff() {
        const staffs = JSON.parse(localStorage.getItem("staffs") || "[]");

        const name = document.getElementById("staffName").value;
        const email = document.getElementById("staffEmail").value;
        const password = document.getElementById("staffPassword").value;

        if (!name || !email || !password) {
          console.log("API FAIL:", "กรุณากรอกข้อมูลให้ครบ");
          document.body.insertAdjacentHTML(
            "beforeend",
            "<div style='padding:20px;color:#aaa'>⚠️ ไม่สามารถโหลดข้อมูล (โหมดทดสอบ)</div>",
          );
          return;
        }

        const id =
          window.crypto && typeof crypto.randomUUID === "function"
            ? crypto.randomUUID()
            : String(Date.now()) + "-" + String(Math.random()).slice(2);

        const newStaff = {
          id,
          name,
          email,
          password,
          permissions: {
            viewStores: document.getElementById("permStores").checked,
            manageProducts: document.getElementById("permProducts").checked,
            viewOrders: document.getElementById("permOrders").checked,
          },
        };

        staffs.push(newStaff);
        localStorage.setItem("staffs", JSON.stringify(staffs));
        renderPersonnel();
      }

      function resetPassword(id) {
        const staffs = JSON.parse(localStorage.getItem("staffs") || "[]");
        const newPass = prompt("ใส่ password ใหม่:");
        if (!newPass) return;

        const updated = staffs.map((s) => {
          if (s.id === id) {
            s.password = newPass;
          }
          return s;
        });

        localStorage.setItem("staffs", JSON.stringify(updated));
        renderPersonnel();
      }

      function deleteStaff(id) {
        const staffs = JSON.parse(localStorage.getItem("staffs") || "[]");
        const filtered = staffs.filter((s) => s.id !== id);
        localStorage.setItem("staffs", JSON.stringify(filtered));
        renderPersonnel();
      }

      function resetOwnerPass() {
        const newPass = document.getElementById("ownerPassword").value;
        if (!newPass) {
          console.log("API FAIL:", "กรุณากรอกรหัสผ่านใหม่");
          document.body.insertAdjacentHTML(
            "beforeend",
            "<div style='padding:20px;color:#aaa'>⚠️ ไม่สามารถโหลดข้อมูล (โหมดทดสอบ)</div>",
          );
          return;
        }
        localStorage.setItem("owner_password", newPass);
        console.log("API FAIL:", "เปลี่ยนรหัสผ่านสำเร็จ (mock)");
        document.body.insertAdjacentHTML(
          "beforeend",
          "<div style='padding:20px;color:#aaa'>⚠️ ไม่สามารถโหลดข้อมูล (โหมดทดสอบ)</div>",
        );
      }

      document.addEventListener("DOMContentLoaded", async () => {
        console.log("OWNER DASHBOARD LOADED");
        console.log("Current token:", localStorage.getItem("access_token"));
        try {
          await renderDashboardFromApi();
        } catch (e) {
          console.error(e);
        }
      });
    </script>
    <script src="/core/auth.js"></script><script>
      requireAuth();
    </script>
  </body>
</html>
