<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ร้านของฉัน | VIIV Owner</title>
    <style>
      :root {
        --bg-main: #f5f6f8;
        --bg-sidebar: #111111;
        --bg-card: #ffffff;
        --border: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg-main); color: var(--text); }
      .layout { display: flex; min-height: 100vh; }
      .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 240px; background: var(--bg-sidebar); padding: 18px 14px; }
      .brand { font-weight: 800; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; color: #fff; }
      .brand-badge { width: 10px; height: 10px; border-radius: 999px; background: #fff; display: inline-block; }
      .nav { display: flex; flex-direction: column; gap: 6px; }
      .nav-item { display: block; text-decoration: none; background: transparent; color: #9ca3af; border: 1px solid #222; border-left: 3px solid transparent; border-radius: 10px; padding: 10px 12px; transition: all 0.2s ease; }
      .nav-item:hover { background: #1f2937; color: #fff; }
      .nav-item.active { background: #1f2937; color: #fff; border-left: 3px solid #ffffff; }
      .main { margin-left: 240px; width: calc(100% - 240px); padding: 22px; }
      .main-inner { max-width: 980px; margin: 0 auto; position: relative; }
      .page-title { margin: 0 0 4px 0; font-size: 22px; }
      .subtitle { margin: 0 0 16px 0; font-size: 13px; color: var(--muted); }
      .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
      @media (max-width: 880px) { .sidebar { position: static; width: 100%; } .main { margin-left: 0; width: 100%; padding: 16px; } }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-badge"></span>
          <span>VIIV Owner</span>
        </div>
        <nav class="nav">
          <a class="nav-item" href="/owner/dashboard.html">Dashboard</a>
          <a class="nav-item active" href="/owner/store.html">ร้านของฉัน</a>
          <a class="nav-item" href="/owner/subscription.html">แพ็คเกจ</a>
        </nav>
      </aside>

      <main class="main">
        <div class="main-inner">
          <h1 class="page-title">ร้านของฉัน</h1>
          <div class="subtitle">Owner panel</div>
          <div class="card">
            <div style="color:#6b7280;font-size:13px;">โหมดทดสอบ (หน้านี้แยกไฟล์แล้ว)</div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
