<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Owner Register Store</title>
  </head>
  <body>
    <form id="storeForm">
      <input id="store_name" type="text" placeholder="Store name" />
      <input id="subdomain" type="text" placeholder="Subdomain" />
      <button type="submit">Create Store</button>
    </form>

    <script>
      function loadOwnerApi() {
        return new Promise((resolve, reject) => {
          if (window.OwnerAPI) return resolve(window.OwnerAPI);
          const s = document.createElement("script");
          s.src = "/owner/js/api.js";
          s.onload = () => resolve(window.OwnerAPI);
          s.onerror = () => reject(new Error("Failed to load api.js"));
          document.head.appendChild(s);
        });
      }

      document.getElementById("storeForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        console.log("OWNER REGISTER SUBMIT");
        const store_name = document.getElementById("store_name").value;
        const store_domain = document.getElementById("subdomain").value;

        try {
          const api = await loadOwnerApi();
          const res = await api.createStore({ store_name, store_domain });
          console.log("createStore result:", res);
          alert("Store created");
          // window.location.href = "/owner/dashboard.html";
        } catch (err) {
          console.error(err);
          alert("Error: " + (err && err.message ? err.message : "unknown"));
        }
      });
    </script>
  </body>
</html>
