<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VIIV Platform — เข้าสู่ระบบ</title>
  <style>
    :root {
      --accent:       #e8b93e;
      --accent-hover: #d4a52c;
      --accent-active:#bf941e;
      --bg:           #111111;
      --card-bg:      #1a1a1a;
      --card-border:  #2a2a2a;
      --input-bg:     #141414;
      --input-border: #333333;
      --text:         #f0ede8;
      --muted:        #666666;
      --error:        #e05555;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 380px;
      padding: 24px 16px;
    }

    /* logo */
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-text {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
    }
    .logo-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    /* card */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 28px 28px 24px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 20px;
    }

    /* form */
    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 9px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: #444; }

    /* button */
    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 11px;
      background: var(--accent);
      border: 1px solid var(--accent-active);
      border-radius: 9px;
      color: #1a1200;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.12s;
    }
    .btn-login:hover   { background: var(--accent-hover); }
    .btn-login:active  { background: var(--accent-active); transform: scale(0.99); }
    .btn-login:disabled {
      background: #3a3020;
      color: #666;
      border-color: #3a3020;
      cursor: not-allowed;
    }

    /* error */
    .msg {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      color: var(--error);
    }
    .msg.ok { color: #5db87a; }

    /* footer */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: #333;
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="logo">
    <div class="logo-text">VIIV Platform</div>
    <div class="logo-sub">AI-Powered Sales Automation</div>
  </div>

  <div class="card">
    <div class="card-title">เข้าสู่ระบบ</div>

    <div class="field">
      <label for="email">อีเมล</label>
      <input id="email" type="email" placeholder="admin@viiv.me" autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">รหัสผ่าน</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="footer">VIIV Platform v0.1.0</div>
</div>

<script>
// ─── auth helpers (inline — ไม่ depend on module) ────────────────────────
const TOKEN_KEY = 'platform_token';

function saveToken(token) {
  localStorage.setItem(TOKEN_KEY, token);
}

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const msg      = document.getElementById('msg');

  msg.textContent = '';
  msg.className   = 'msg';

  if (!email || !password) {
    msg.textContent = 'กรุณากรอกอีเมลและรหัสผ่าน';
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'กำลังเข้าสู่ระบบ...';

  try {
    const res = await fetch('/api/platform/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password }),
    });

    if (res.ok) {
      const data = await res.json();
      saveToken(data.access_token);
      msg.textContent = 'เข้าสู่ระบบสำเร็จ กำลังโหลด...';
      msg.className   = 'msg ok';
      setTimeout(() => {
        window.location.href = '/platform/dashboard.html';
      }, 400);
    } else if (res.status === 401) {
      msg.textContent = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
    } else {
      msg.textContent = 'เกิดข้อผิดพลาด (' + res.status + ')';
    }
  } catch (err) {
    msg.textContent = 'ไม่สามารถเชื่อมต่อ server ได้';
  } finally {
    btn.disabled    = false;
    btn.textContent = 'เข้าสู่ระบบ';
  }
}

// Enter key
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });

  // ถ้ามี token → validate กับ backend ก่อน redirect
  const t = localStorage.getItem('platform_token');
  if (t) {
    fetch('/api/platform/me', {
      headers: { 'Authorization': 'Bearer ' + t }
    }).then(r => {
      if (r.ok) {
        window.location.href = '/platform/dashboard.html';
      } else {
        localStorage.removeItem('platform_token'); // token เสีย/หมดอายุ → ลบทิ้ง
      }
    }).catch(() => localStorage.removeItem('platform_token'));
  }
});
</script>

</body>
</html>
