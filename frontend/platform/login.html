<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>VIIV Platform Login</title>

<style>
body {
    font-family: sans-serif;
    background: #e6e9ef;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
}

button {
    width: 100%;
    padding: 10px;
    background: #d6a94b;
    border: none;
    color: white;
    cursor: pointer;
}

/* === SAFE COMPACT UI PATCH (INLINE MODE) === */

.sidebar {
width: 200px;
}

.sidebar .menu-item {
padding: 8px 10px;
font-size: 13px;
}

body {
font-size: 14px;
}

h1 {
font-size: 20px;
font-weight: 600;
}

h2 {
font-size: 16px;
}

.card, .panel, .content-box {
border-radius: 12px;
padding: 16px;
border: 1px solid #eee;
box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}

input, select {
padding: 6px 10px;
font-size: 13px;
}

button {
padding: 6px 12px;
font-size: 13px;
}
</style>

</head>
<body>

<div class="card">
    <h2>VIIV Platform</h2>

    <input id="email" placeholder="email" />
    <input id="password" type="password" placeholder="password" />

    <button onclick="login()">เข้าสู่ระบบ</button>

    <p id="msg"></p>
</div>

<script src="/platform/js/auth.js"></script>

</body>
</html>
