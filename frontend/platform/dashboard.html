<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VIIV Platform</title>
  <style>
    :root {
      --bg-main:       #1a1a1a;
      --sidebar-bg:    #0e0e0e;
      --sidebar-border:#222222;
      --content-bg:    #f0ede8;
      --card-bg:       #ffffff;
      --card-border:   #e0ddd6;

      /* Gold — ชัดขึ้น 20% จาก #d6a94b → #e8b93e */
      --accent:        #e8b93e;
      --accent-hover:  #d4a52c;
      --accent-active: #bf941e;
      --accent-dim:    rgba(232,185,62,0.15);
      --accent-border: rgba(232,185,62,0.7);

      --text:          #1f2937;
      --text-inv:      #ffffff;
      --muted:         #6b7280;
      --border:        rgba(0,0,0,0.10);
      --nav-text:      #9a9a9a;
      --nav-hover-bg:  #1a1a1a;
      --nav-label:     #484848;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: var(--bg-main);
      display: flex;
      min-height: 100vh;
      color: var(--text);
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 210px;
      min-width: 210px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--sidebar-border);
    }
    .brand-title { font-size: 17px; font-weight: 700; letter-spacing: 1px; color: var(--accent); }
    .brand-dot   { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); margin-left: 2px; }

    .nav { flex: 1; padding: 10px 0; overflow-y: auto; }

    .nav-group-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--nav-label);
      padding: 10px 16px 4px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .menu a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px 9px 16px;
      color: var(--nav-text);
      text-decoration: none;
      font-size: 13px;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .menu a .nav-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; opacity: 0.7; }
    .menu a:hover    { background: var(--nav-hover-bg); color: #d0d0d0; }
    .menu a.active   {
      background: rgba(232,185,62,0.10);
      color: var(--accent);
      border-left-color: var(--accent);
      font-weight: 600;
    }
    .menu a.active .nav-icon { opacity: 1; }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--sidebar-border);
      font-size: 11px;
      color: var(--nav-label);
      text-align: center;
    }

    /* ─── MAIN ─── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--content-bg);
      min-width: 0;
    }

    /* topbar */
    .topbar {
      background: #f8f6f2;
      border-bottom: 1px solid #ddd;
      height: 50px;
      padding: 0 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .topbar-right  { display: flex; align-items: center; gap: 12px; }

    .badge-admin {
      font-size: 11px;
      font-weight: 600;
      background: var(--accent);
      color: #1a1200;
      padding: 3px 12px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .profile-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      position: relative;
    }
    .profile-btn:hover { border-color: rgba(0,0,0,0.18); }

    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px;
      min-width: 160px;
      display: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.10);
      z-index: 100;
    }
    .dropdown.open { display: block; }
    .dropdown button {
      width: 100%; text-align: left; padding: 8px 10px;
      border-radius: 8px; border: 0; background: transparent;
      color: var(--text); cursor: pointer; font-size: 13px;
    }
    .dropdown button:hover { background: #f5f3ef; }

    /* action topbar (search / create) */
    .actionbar {
      background: #fff;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 8px 14px;
      margin: 16px 20px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .actionbar.hidden { display: none; }

    .actionbar input {
      flex: 1;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #faf9f7;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .actionbar input:focus { border-color: var(--accent); }

    /* ─── BUTTONS ─── */
    .btn {
      padding: 7px 14px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.1s, border-color 0.1s;
    }
    .btn:hover { border-color: rgba(0,0,0,0.18); background: #f5f3ef; }

    /* accent +20% จาก original #d6a94b → #e8b93e (ชัดขึ้นชัวร์) */
    .btn-accent {
      background: var(--accent);
      border-color: var(--accent-active);
      color: #1a1200;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .btn-accent:hover  { background: var(--accent-hover); border-color: var(--accent-active); }
    .btn-accent:active { background: var(--accent-active); transform: scale(0.98); }

    /* ─── CONTENT CARD ─── */
    .content-wrap { flex: 1; padding: 16px 20px 20px; overflow-y: auto; }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 22px 24px;
      min-height: 60vh;
    }
    .card-heading { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .card-sub     { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

    /* stats row */
    .stats-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat {
      flex: 1; min-width: 100px;
      background: #f8f6f2;
      border-radius: 9px;
      padding: 12px 16px;
      border: 1px solid #eae8e2;
    }
    .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .stat-val   { font-size: 22px; font-weight: 600; color: var(--text); }
    .stat-val.gold { color: #a07820; }

    /* shop list */
    .shop-list { display: flex; flex-direction: column; gap: 8px; }
    .shop-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 14px;
      background: #f8f6f2;
      border: 1px solid #eae8e2;
      border-radius: 9px;
      font-size: 13px;
    }
    .shop-name { font-weight: 500; color: #333; }
    .shop-id   { font-size: 11px; color: #aaa; margin-top: 2px; font-family: monospace; }

    .pill {
      font-size: 11px; font-weight: 600; padding: 3px 11px;
      border-radius: 20px;
    }
    .pill-active   { background: #e4f3ec; color: #1e6b42; }
    .pill-inactive { background: #f5f0e5; color: #9a7020; }

    /* placeholder page */
    .page-placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; color: var(--muted);
      gap: 10px;
    }
    .page-placeholder .ph-icon { font-size: 36px; opacity: 0.3; }
    .page-placeholder .ph-text { font-size: 14px; }

    @media (max-width: 800px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<div class="sidebar">
  <div class="brand">
    <span class="brand-title">VIIV Platform</span>
    <span class="brand-dot"></span>
  </div>

  <nav class="nav">
    <div class="menu" id="navMenu">
      <!-- Platform -->
      <div class="nav-group-label">Platform</div>
      <a href="#" data-page="dashboard">
        <span class="nav-icon">▣</span> Dashboard
      </a>
      <a href="#" data-page="shops" class="active">
        <span class="nav-icon">⊞</span> จัดการร้านค้า
      </a>
      <a href="#" data-page="packet">
        <span class="nav-icon">◈</span> Packet
      </a>
      <a href="#" data-page="finance">
        <span class="nav-icon">◎</span> บัญชีการเงิน
      </a>
      <a href="#" data-page="orders">
        <span class="nav-icon">≡</span> คำสั่งซื้อ
      </a>
      <a href="#" data-page="notify">
        <span class="nav-icon">◉</span> แจ้งเตือน
      </a>

      <!-- Merchant -->
      <div class="nav-group-label">Merchant</div>
      <a href="#" data-page="ai">
        <span class="nav-icon">✦</span> จัดการ AI
      </a>
      <a href="#" data-page="myshop">
        <span class="nav-icon">⌂</span> My Shop
      </a>
      <a href="#" data-page="pos">
        <span class="nav-icon">⊡</span> POS
      </a>
      <a href="#" data-page="chat">
        <span class="nav-icon">◌</span> Chat
      </a>
      <a href="#" data-page="autopost">
        <span class="nav-icon">↗</span> Auto Post
      </a>

      <!-- System -->
      <div class="nav-group-label">System</div>
      <a href="#" data-page="settings">
        <span class="nav-icon">⚙</span> ตั้งค่าระบบ
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">VIIV Platform v0.1.0</div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">

  <!-- Topbar -->
  <div class="topbar">
    <span class="topbar-title" id="topbarTitle">จัดการร้านค้า</span>
    <div class="topbar-right">
      <span class="badge-admin" id="topbarBadge">Admin</span>
      <div class="profile-btn" id="profileBtn">
        Admin <span>▾</span>
        <div class="dropdown" id="profileDropdown">
          <button id="profileMenuBtn">โปรไฟล์</button>
          <button id="logoutBtn">ออกจากระบบ</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Action bar (search/create) -->
  <div class="actionbar" id="actionbar">
    <input type="text" id="searchInput" placeholder="ค้นหา Shop ID" />
    <button class="btn" id="searchBtn">ค้นหา</button>
    <button class="btn btn-accent" id="createBtn">+ สร้างร้าน</button>
  </div>

  <!-- Content card -->
  <div class="content-wrap">
    <div class="card">
      <div class="card-heading" id="cardHeading">จัดการร้านค้า</div>
      <div class="card-sub"     id="cardSub">จัดการข้อมูลร้านค้าทั้งหมด</div>
      <div id="cardBody"></div>
    </div>
  </div>

</div>

<script type="module">
// ─── Page config ───────────────────────────────────────────────────────────
const PAGES = {
  dashboard: {
    title:  'Dashboard',
    sub:    'ภาพรวมระบบ',
    badge:  'Admin',
    action: false,
    render: renderDashboard,
  },
  shops: {
    title:  'จัดการร้านค้า',
    sub:    'จัดการข้อมูลร้านค้าทั้งหมด',
    badge:  'Admin',
    action: true,
    searchPlaceholder: 'ค้นหา Shop ID',
    createLabel: '+ สร้างร้าน',
    render: renderShops,
  },
  packet: {
    title:  'Packet',
    sub:    'จัดการแพ็กเกจและเครดิต',
    badge:  'Admin',
    action: false,
    render: renderPlaceholder,
  },
  finance: {
    title:  'บัญชีการเงิน',
    sub:    'รายรับรายจ่ายและ credit ledger',
    badge:  'Admin',
    action: false,
    render: renderPlaceholder,
  },
  orders: {
    title:  'คำสั่งซื้อ',
    sub:    'รายการสั่งซื้อทั้งหมด',
    badge:  'Admin',
    action: false,
    render: renderPlaceholder,
  },
  notify: {
    title:  'แจ้งเตือน',
    sub:    'การแจ้งเตือนจากระบบ',
    badge:  'Admin',
    action: false,
    render: renderPlaceholder,
  },
  ai: {
    title:  'จัดการ AI',
    sub:    'ตั้งค่า AI tier และ prompt — ควบคุมผ่าน Concore',
    badge:  'Merchant',
    action: false,
    render: renderPlaceholder,
  },
  myshop: {
    title:  'My Shop',
    sub:    'ข้อมูลร้านของฉัน',
    badge:  'Merchant',
    action: false,
    render: renderPlaceholder,
  },
  pos: {
    title:  'POS',
    sub:    'ระบบขายหน้าร้าน — single source of truth',
    badge:  'Merchant',
    action: false,
    render: renderPlaceholder,
  },
  chat: {
    title:  'Chat',
    sub:    'AI chat ปิดการขายใน DM',
    badge:  'Merchant',
    action: false,
    render: renderPlaceholder,
  },
  autopost: {
    title:  'Auto Post',
    sub:    'โพสต์อัตโนมัติทุก platform',
    badge:  'Merchant',
    action: false,
    render: renderPlaceholder,
  },
  settings: {
    title:  'ตั้งค่าระบบ',
    sub:    'ตั้งค่าระบบและ integration',
    badge:  'System',
    action: false,
    render: renderPlaceholder,
  },
};

// ─── Render functions ───────────────────────────────────────────────────────
function renderDashboard(el) {
  el.innerHTML = `
    <div class="stats-row">
      <div class="stat"><div class="stat-label">ร้านทั้งหมด</div><div class="stat-val">2</div></div>
      <div class="stat"><div class="stat-label">Active</div><div class="stat-val gold">1</div></div>
      <div class="stat"><div class="stat-label">Inactive</div><div class="stat-val">1</div></div>
      <div class="stat"><div class="stat-label">Credits คงเหลือ</div><div class="stat-val gold">—</div></div>
    </div>
  `;
}

function renderShops(el) {
  el.innerHTML = `
    <div class="stats-row">
      <div class="stat"><div class="stat-label">ร้านทั้งหมด</div><div class="stat-val">2</div></div>
      <div class="stat"><div class="stat-label">Active</div><div class="stat-val gold">1</div></div>
      <div class="stat"><div class="stat-label">Inactive</div><div class="stat-val">1</div></div>
    </div>
    <div class="shop-list">
      <div class="shop-row">
        <div>
          <div class="shop-name">ร้านตัวอย่าง A</div>
          <div class="shop-id">ten_fa7f2c98-e7a3-4eec-bbba-7580d9f88870</div>
        </div>
        <span class="pill pill-active">active</span>
      </div>
      <div class="shop-row">
        <div>
          <div class="shop-name">ร้านตัวอย่าง B</div>
          <div class="shop-id">ten_7b3e1d02-c84f-41aa-9901-000000000002</div>
        </div>
        <span class="pill pill-inactive">inactive</span>
      </div>
    </div>
  `;
}

function renderPlaceholder(el, page) {
  el.innerHTML = `
    <div class="page-placeholder">
      <div class="ph-icon">◈</div>
      <div class="ph-text">${page.title} — coming soon</div>
    </div>
  `;
}

// ─── Router ─────────────────────────────────────────────────────────────────
function navigate(key) {
  const page = PAGES[key];
  if (!page) return;

  // nav highlight
  document.querySelectorAll('#navMenu a').forEach(a => {
    a.classList.toggle('active', a.dataset.page === key);
  });

  // topbar
  document.getElementById('topbarTitle').textContent = page.title;
  document.getElementById('topbarBadge').textContent  = page.badge;

  // actionbar
  const ab = document.getElementById('actionbar');
  if (page.action) {
    ab.classList.remove('hidden');
    document.getElementById('searchInput').placeholder = page.searchPlaceholder || 'ค้นหา...';
    document.getElementById('createBtn').textContent   = page.createLabel || '+ สร้างใหม่';
  } else {
    ab.classList.add('hidden');
  }

  // card
  document.getElementById('cardHeading').textContent = page.title;
  document.getElementById('cardSub').textContent     = page.sub;

  const body = document.getElementById('cardBody');
  page.render(body, page);
}

// ─── Events ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // nav links
  document.querySelectorAll('#navMenu a[data-page]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      navigate(a.dataset.page);
    });
  });

  // profile dropdown
  const profileBtn = document.getElementById('profileBtn');
  const dropdown   = document.getElementById('profileDropdown');
  profileBtn.addEventListener('click', e => {
    e.stopPropagation();
    dropdown.classList.toggle('open');
  });
  document.addEventListener('click', () => dropdown.classList.remove('open'));

  document.getElementById('profileMenuBtn').addEventListener('click', () => alert('โปรไฟล์ — coming soon'));
  document.getElementById('logoutBtn').addEventListener('click', () => {
    if (confirm('ออกจากระบบ?')) location.href = '/platform/login.html';
  });

  // init
  navigate('shops');
});
</script>

</body>
</html>
