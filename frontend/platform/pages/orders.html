<!doctype html><html><body>
<style>
.or-wrap{padding:0}
.or-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.or-bar-title{font-size:15px;font-weight:700;color:#1f2937;flex:1}
.or-search{flex:0 0 220px;padding:7px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;outline:none}
.or-search:focus{border-color:#e8b93e}
.or-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.or-stat{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid rgba(0,0,0,.07)}
.or-stat-lbl{font-size:11px;color:#6b7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.or-stat-val{font-size:24px;font-weight:700;color:#1f2937}
.or-table-wrap{background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,.07);overflow:hidden}
table.or-tbl{width:100%;border-collapse:collapse;font-size:12px}
table.or-tbl th{padding:10px 16px;text-align:left;color:#6b7280;font-weight:600;background:#fafafa;border-bottom:1px solid #f3f4f6;font-size:11px}
table.or-tbl td{padding:11px 16px;border-bottom:1px solid #f9fafb;color:#374151}
table.or-tbl tr:last-child td{border:none}
table.or-tbl tr:hover td{background:#fffbf2}
.or-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.or-badge.paid{background:#dcfce7;color:#166534}
.or-badge.open{background:#dbeafe;color:#1e40af}
.or-badge.cancel{background:#fee2e2;color:#991b1b}
</style>

<div class="or-wrap">
  <div class="or-bar">
    <div class="or-bar-title">🧾 คำสั่งซื้อทั้งระบบ</div>
    <input class="or-search" id="or-q" placeholder="ค้นหาร้าน / รหัสออเดอร์..." oninput="orSearch(this.value)">
  </div>

  <div class="or-stats">
    <div class="or-stat">
      <div class="or-stat-lbl">ออเดอร์วันนี้</div>
      <div class="or-stat-val" id="or-today">—</div>
    </div>
    <div class="or-stat">
      <div class="or-stat-lbl">ยอด/วันนี้</div>
      <div class="or-stat-val" style="color:#b45309" id="or-today-amt">—</div>
    </div>
    <div class="or-stat">
      <div class="or-stat-lbl">ออเดอร์/เดือน</div>
      <div class="or-stat-val" id="or-month">—</div>
    </div>
    <div class="or-stat">
      <div class="or-stat-lbl">ยอด/เดือน</div>
      <div class="or-stat-val" style="color:#16a34a" id="or-month-amt">—</div>
    </div>
  </div>

  <div class="or-table-wrap">
    <table class="or-tbl">
      <thead><tr>
        <th>รหัส</th><th>ร้านค้า</th><th>วันที่</th><th>สินค้า</th><th>ยอด</th><th>ชำระ</th><th>สถานะ</th>
      </tr></thead>
      <tbody id="or-rows">
        <tr><td colspan="7" style="text-align:center;color:#9ca3af;padding:30px">กำลังโหลด...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
(function(){
  var tok = (window.platformToken && window.platformToken()) || '';
  var h = tok ? {'Authorization':'Bearer '+tok} : {};
  var fmt = n => Number(n||0).toLocaleString('th-TH',{maximumFractionDigits:0});
  var _q = '';

  function load(q){
    var url = '/api/platform/orders'+(q?'?q='+encodeURIComponent(q):'');
    fetch(url,{headers:h}).then(r=>r.ok?r.json():null).then(d=>{
      if(!d) return;
      document.getElementById('or-today').textContent = fmt(d.today_orders||0);
      document.getElementById('or-today-amt').textContent = '฿'+fmt(d.today_sales||0);
      document.getElementById('or-month').textContent = fmt(d.month_orders||0);
      document.getElementById('or-month-amt').textContent = '฿'+fmt(d.month_sales||0);
      if(d.orders && d.orders.length){
        document.getElementById('or-rows').innerHTML = d.orders.map(o=>`
          <tr>
            <td style="font-family:monospace;color:#6b7280">${o.id||'—'}</td>
            <td>${o.shop||'—'}</td>
            <td>${o.date||'—'}</td>
            <td>${o.items||'—'}</td>
            <td style="font-weight:600">฿${fmt(o.amount||0)}</td>
            <td>${o.pay_method||'—'}</td>
            <td><span class="or-badge ${o.status||'open'}">${o.status==='paid'?'ชำระแล้ว':o.status==='cancel'?'ยกเลิก':'เปิด'}</span></td>
          </tr>`).join('');
      } else {
        document.getElementById('or-rows').innerHTML = '<tr><td colspan="7" style="text-align:center;color:#9ca3af;padding:30px">ไม่มีข้อมูล</td></tr>';
      }
    }).catch(()=>{
      document.getElementById('or-rows').innerHTML = '<tr><td colspan="7" style="text-align:center;color:#9ca3af;padding:30px">ยังไม่เปิดใช้งาน</td></tr>';
    });
  }

  window.orSearch = function(v){ _q=v; clearTimeout(window._orT); window._orT=setTimeout(()=>load(_q),400); };
  load('');
})();
</script>
</body></html>
