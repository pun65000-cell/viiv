<!doctype html><html><body>
<style>
.ai-wrap{padding:0}
.ai-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.ai-bar-title{font-size:15px;font-weight:700;color:#1f2937;flex:1}
.ai-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.ai-stat{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid rgba(0,0,0,.07)}
.ai-stat-lbl{font-size:11px;color:#6b7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.ai-stat-val{font-size:24px;font-weight:700;color:#1f2937}
.ai-row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.ai-card{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid rgba(0,0,0,.07)}
.ai-card-title{font-size:13px;font-weight:700;color:#374151;margin-bottom:14px}
.ai-shop-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.ai-shop-row:last-child{border:none}
.ai-shop-name{flex:1;color:#374151}
.ai-shop-cnt{color:#6b7280;font-size:11px}
.ai-toggle{position:relative;width:34px;height:18px;flex-shrink:0}
.ai-toggle input{opacity:0;width:0;height:0}
.ai-toggle-sl{position:absolute;inset:0;background:#d1d5db;border-radius:10px;cursor:pointer;transition:.2s}
.ai-toggle-sl:before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.ai-toggle input:checked + .ai-toggle-sl{background:#22c55e}
.ai-toggle input:checked + .ai-toggle-sl:before{transform:translateX(16px)}
.ai-model-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.ai-model-row:last-child{border:none}
.ai-model-lbl{color:#374151;font-weight:500}
.ai-model-val{color:#6b7280}
.ai-badge-active{background:#dcfce7;color:#166534;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
</style>

<div class="ai-wrap">
  <div class="ai-bar">
    <div class="ai-bar-title">🤖 จัดการ AI ทั้งระบบ</div>
  </div>

  <div class="ai-stats">
    <div class="ai-stat">
      <div class="ai-stat-lbl">ตอบรับ/วันนี้</div>
      <div class="ai-stat-val" style="color:#7c3aed" id="ai-today">—</div>
    </div>
    <div class="ai-stat">
      <div class="ai-stat-lbl">ปิดการขาย</div>
      <div class="ai-stat-val" style="color:#16a34a" id="ai-close">—</div>
    </div>
    <div class="ai-stat">
      <div class="ai-stat-lbl">ร้านที่เปิด AI</div>
      <div class="ai-stat-val" id="ai-shops">—</div>
    </div>
    <div class="ai-stat">
      <div class="ai-stat-lbl">Token ใช้/เดือน</div>
      <div class="ai-stat-val" id="ai-tokens">—</div>
    </div>
  </div>

  <div class="ai-row2">
    <div class="ai-card">
      <div class="ai-card-title">⚙ AI Config ระบบ</div>
      <div class="ai-model-row">
        <span class="ai-model-lbl">Model ปัจจุบัน</span>
        <span class="ai-model-val">claude-haiku-4-5</span>
      </div>
      <div class="ai-model-row">
        <span class="ai-model-lbl">Model complex</span>
        <span class="ai-model-val">claude-sonnet-4-6</span>
      </div>
      <div class="ai-model-row">
        <span class="ai-model-lbl">Max tokens/req</span>
        <span class="ai-model-val">1,024</span>
      </div>
      <div class="ai-model-row">
        <span class="ai-model-lbl">Temperature</span>
        <span class="ai-model-val">0.7</span>
      </div>
      <div class="ai-model-row">
        <span class="ai-model-lbl">API Status</span>
        <span class="ai-badge-active">● Online</span>
      </div>
    </div>
    <div class="ai-card">
      <div class="ai-card-title">🏪 AI สถานะรายร้าน</div>
      <div id="ai-shop-list">
        <div style="text-align:center;color:#9ca3af;padding:20px;font-size:12px">กำลังโหลด...</div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var tok = (window.platformToken && window.platformToken()) || '';
  var h = tok ? {'Authorization':'Bearer '+tok} : {};
  var fmt = n => Number(n||0).toLocaleString('th-TH',{maximumFractionDigits:0});

  fetch('/api/platform/ai-stats',{headers:h}).then(r=>r.ok?r.json():null).then(d=>{
    if(!d) return;
    document.getElementById('ai-today').textContent = fmt(d.today_replies||0);
    document.getElementById('ai-close').textContent = fmt(d.today_closed||0);
    document.getElementById('ai-shops').textContent = fmt(d.active_shops||0);
    document.getElementById('ai-tokens').textContent = fmt(d.month_tokens||0);
    if(d.shops && d.shops.length){
      document.getElementById('ai-shop-list').innerHTML = d.shops.map(s=>`
        <div class="ai-shop-row">
          <div class="ai-shop-name">${s.name||'—'}</div>
          <div class="ai-shop-cnt">${fmt(s.replies||0)} ตอบ</div>
          <label class="ai-toggle">
            <input type="checkbox" ${s.ai_enabled?'checked':''} onchange="aiToggle('${s.id}',this.checked)">
            <span class="ai-toggle-sl"></span>
          </label>
        </div>`).join('');
    } else {
      document.getElementById('ai-shop-list').innerHTML = '<div style="text-align:center;color:#9ca3af;padding:20px;font-size:12px">ยังไม่มีข้อมูล</div>';
    }
  }).catch(()=>{});

  window.aiToggle = function(id, enabled){
    var tok2 = (window.platformToken && window.platformToken()) || '';
    fetch('/api/platform/shop-features',{
      method:'POST', headers:{...h,'Content-Type':'application/json'},
      body: JSON.stringify({shop_id:id, feature:'ai_bot', enabled})
    }).catch(()=>{});
  };
})();
</script>
</body></html>
