<!doctype html><html><body>
<style>
.fn-wrap{padding:0}
.fn-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.fn-bar-title{font-size:15px;font-weight:700;color:#1f2937;flex:1}
.fn-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.fn-stat{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid rgba(0,0,0,.07)}
.fn-stat-lbl{font-size:11px;color:#6b7280;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fn-stat-val{font-size:26px;font-weight:700}
.fn-stat-sub{font-size:11px;color:#9ca3af;margin-top:4px}
.fn-table-wrap{background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,.07);overflow:hidden}
.fn-table-head{padding:14px 20px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:10px}
.fn-table-head-title{font-size:13px;font-weight:700;color:#374151;flex:1}
table.fn-tbl{width:100%;border-collapse:collapse;font-size:12px}
table.fn-tbl th{padding:10px 16px;text-align:left;color:#6b7280;font-weight:600;background:#fafafa;border-bottom:1px solid #f3f4f6;font-size:11px}
table.fn-tbl td{padding:11px 16px;border-bottom:1px solid #f9fafb;color:#374151}
table.fn-tbl tr:last-child td{border:none}
table.fn-tbl tr:hover td{background:#fffbf2}
.fn-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.fn-badge.in{background:#dcfce7;color:#166534}
.fn-badge.out{background:#fee2e2;color:#991b1b}
.fn-badge.pend{background:#fef9c3;color:#854d0e}
</style>

<div class="fn-wrap">
  <div class="fn-bar">
    <div class="fn-bar-title">💰 บัญชีการเงิน</div>
  </div>

  <div class="fn-stats">
    <div class="fn-stat">
      <div class="fn-stat-lbl">รายรับ/เดือน</div>
      <div class="fn-stat-val" style="color:#16a34a" id="fn-income">—</div>
      <div class="fn-stat-sub">ค่าแพ็กเกจ + credit</div>
    </div>
    <div class="fn-stat">
      <div class="fn-stat-lbl">ค้างชำระ</div>
      <div class="fn-stat-val" style="color:#dc2626" id="fn-overdue">—</div>
      <div class="fn-stat-sub">ต้องติดตาม</div>
    </div>
    <div class="fn-stat">
      <div class="fn-stat-lbl">รอตรวจสอบ</div>
      <div class="fn-stat-val" style="color:#d97706" id="fn-pending">—</div>
      <div class="fn-stat-sub">transaction</div>
    </div>
    <div class="fn-stat">
      <div class="fn-stat-lbl">รายรับสะสม</div>
      <div class="fn-stat-val" style="color:#b45309" id="fn-total">—</div>
      <div class="fn-stat-sub">ทั้งหมด</div>
    </div>
  </div>

  <div class="fn-table-wrap">
    <div class="fn-table-head">
      <div class="fn-table-head-title">Transaction ล่าสุด</div>
    </div>
    <div id="fn-body">
      <table class="fn-tbl">
        <thead><tr>
          <th>วันที่</th><th>ร้านค้า</th><th>ประเภท</th><th>จำนวน</th><th>สถานะ</th>
        </tr></thead>
        <tbody id="fn-rows">
          <tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:30px">กำลังโหลด...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
(function(){
  var tok = (window.platformToken && window.platformToken()) || '';
  var h = tok ? {'Authorization':'Bearer '+tok} : {};
  var fmt = n => Number(n||0).toLocaleString('th-TH',{maximumFractionDigits:0});

  fetch('/api/platform/finance',{headers:h}).then(r=>r.ok?r.json():null).then(d=>{
    if(!d) return;
    document.getElementById('fn-income').textContent  = '฿'+fmt(d.month_income||0);
    document.getElementById('fn-overdue').textContent = d.overdue||0;
    document.getElementById('fn-pending').textContent = d.pending||0;
    document.getElementById('fn-total').textContent   = '฿'+fmt(d.total_income||0);
    if(d.transactions && d.transactions.length){
      document.getElementById('fn-rows').innerHTML = d.transactions.map(t=>`
        <tr>
          <td>${t.date||'—'}</td>
          <td>${t.shop||'—'}</td>
          <td>${t.type||'—'}</td>
          <td style="font-weight:600">฿${fmt(t.amount||0)}</td>
          <td><span class="fn-badge ${t.status==='paid'?'in':t.status==='pending'?'pend':'out'}">${t.status==='paid'?'ชำระแล้ว':t.status==='pending'?'รอตรวจ':'ค้างชำระ'}</span></td>
        </tr>`).join('');
    } else {
      document.getElementById('fn-rows').innerHTML = '<tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:30px">ยังไม่มีข้อมูล</td></tr>';
    }
  }).catch(()=>{
    document.getElementById('fn-rows').innerHTML = '<tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:30px">ยังไม่เปิดใช้งาน</td></tr>';
  });
})();
</script>
</body></html>
