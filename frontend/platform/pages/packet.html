<!doctype html><html lang="th"><head><meta charset="utf-8"></head>
<body>
<style>
.pk-wrap { display:flex;flex-direction:column;gap:0; }
.pk-topbar { display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap; }
.pk-topbar-title { font-size:15px;font-weight:700;color:#1f2937;flex:1; }
.pk-btn {
  padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;
  cursor:pointer;border:1.5px solid #e5e7eb;background:#fff;
  color:#1f2937;transition:background .15s,border-color .15s;
}
.pk-btn:hover { background:#f5f3ef;border-color:rgba(0,0,0,.18); }
.pk-btn-accent { background:#e8b93e;border-color:#bf941e;color:#1a1200; }
.pk-btn-accent:hover { background:#d4a52c; }
.pk-btn-save { background:#22c55e;border-color:#16a34a;color:#fff;font-size:12px;padding:6px 14px; }
.pk-btn-save:hover { background:#16a34a; }
.pk-btn-sm { padding:5px 12px;font-size:12px; }

.pk-section { background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;margin-bottom:20px; }
.pk-sec-hdr {
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 22px;border-bottom:1px solid #f0ede8;background:#f8f6f2;
}
.pk-sec-title { font-size:14px;font-weight:700;color:#1f2937;display:flex;align-items:center;gap:8px; }
.pk-sec-note { font-weight:400;font-size:12px;color:#6b7280; }
.pk-sec-body { padding:20px 22px; }

/* ── Module cards ── */
.pk-mod-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px; }
.pk-mod-card {
  border:1.5px solid #e5e7eb;border-radius:12px;
  padding:16px 18px;background:#faf9f7;
  display:flex;flex-direction:column;gap:10px;
}
.pk-mod-card.locked-card { border-color:rgba(232,185,62,.5);background:rgba(232,185,62,.04); }
.pk-mod-card-hdr { display:flex;align-items:center;gap:10px; }
.pk-mod-icon-wrap {
  width:36px;height:36px;border-radius:9px;background:#f0ede8;
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.pk-mod-card-title { font-size:14px;font-weight:700;color:#1f2937; }
.pk-mod-locked-badge {
  font-size:10px;background:#e8b93e;color:#1a1200;
  padding:1px 7px;border-radius:10px;font-weight:700;margin-left:auto;
}
.pk-mod-price-preview {
  font-size:13px;font-weight:700;color:#b45309;
  background:#fef9ec;border:1px solid rgba(232,185,62,.4);
  border-radius:7px;padding:5px 10px;text-align:center;
}
.pk-mod-price-preview.free { color:#6b7280;background:#f5f5f5;border-color:#e5e7eb; }

/* ── Plan cards ── */
.pk-plan-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px; }
.pk-plan-card {
  border:1.5px solid #e5e7eb;border-radius:12px;
  padding:16px 18px;background:#faf9f7;
  display:flex;flex-direction:column;gap:10px;position:relative;
}
.pk-plan-card.is-free   { border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.04); }
.pk-plan-card.is-custom { border-color:rgba(124,58,237,.4);background:rgba(124,58,237,.04); }
.pk-plan-badge {
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;
  display:inline-block;margin-bottom:2px;
}
.pk-plan-badge.recommend { background:#e8b93e;color:#1a1200; }
.pk-plan-badge.custom    { background:#7c3aed;color:#fff; }
.pk-plan-badge.free      { background:#22c55e;color:#fff; }
.pk-plan-name-label { font-size:13px;font-weight:700;color:#1f2937; }
.pk-plan-price-block { display:flex;flex-direction:column;gap:2px; }
.pk-plan-orig-price { font-size:12px;color:#9ca3af;text-decoration:line-through; }
.pk-plan-final-price { font-size:20px;font-weight:800;color:#b45309; }
.pk-plan-final-price.free   { color:#16a34a;font-size:15px; }
.pk-plan-final-price.custom { color:#7c3aed;font-size:13px;line-height:1.5; }
.pk-plan-disc-badge {
  font-size:10px;font-weight:700;background:#fef2f2;color:#b91c1c;
  border:1px solid #fca5a5;border-radius:8px;padding:2px 8px;width:fit-content;
}
.pk-plan-foot { margin-top:4px;display:flex;justify-content:flex-end;gap:8px; }

/* ── Fields ── */
.pk-field { display:flex;flex-direction:column;gap:4px; }
.pk-field label { font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.4px; }
.pk-field input,.pk-field textarea,.pk-field select {
  padding:8px 11px;border:1px solid #e5e7eb;border-radius:8px;
  font-size:13px;outline:none;background:#fff;font-family:inherit;
  transition:border-color .15s;
}
.pk-field input:focus,.pk-field textarea:focus,.pk-field select:focus { border-color:#e8b93e; }
.pk-field textarea { resize:vertical;min-height:58px; }
.pk-field-row { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
.pk-field-note { font-size:11px;color:#9ca3af;margin-top:2px; }

/* ── Stats ── */
.pk-stats { display:flex;gap:12px;margin-bottom:20px; }
.pk-stat { flex:1;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 18px; }
.pk-stat-lbl { font-size:12px;color:#6b7280;margin-bottom:4px;font-weight:500; }
.pk-stat-val { font-size:24px;font-weight:700;color:#1f2937; }
.pk-stat-val.gold  { color:#a07820; }
.pk-stat-val.green { color:#1e6b42; }

/* ── Toast ── */
#pk-toast {
  position:fixed;bottom:24px;right:24px;z-index:9999;
  padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;
  background:#1f2937;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.2);
  opacity:0;transform:translateY(10px);transition:opacity .25s,transform .25s;
  pointer-events:none;
}
#pk-toast.show { opacity:1;transform:none; }
.pk-loading { display:flex;align-items:center;justify-content:center;padding:40px;color:#9ca3af;gap:8px; }
.pk-loading::before { content:'';width:14px;height:14px;border:2px solid #e5e7eb;border-top-color:#e8b93e;border-radius:50%;animation:pkSpin .7s linear infinite; }
@keyframes pkSpin { to{transform:rotate(360deg)} }
</style>

<div class="pk-wrap">
  <div class="pk-topbar">
    <div class="pk-topbar-title">📦 จัดการแพ็กเกจ & โมดูล</div>
    <button class="pk-btn pk-btn-accent" onclick="pkSaveAll()">💾 บันทึกทั้งหมด</button>
    <button class="pk-btn" onclick="pkLoad()">↺ รีเฟรช</button>
  </div>

  <div class="pk-stats">
    <div class="pk-stat"><div class="pk-stat-lbl">โมดูลทั้งหมด</div><div class="pk-stat-val" id="pk-mod-count">—</div></div>
    <div class="pk-stat"><div class="pk-stat-lbl">แผนการสมัคร</div><div class="pk-stat-val gold" id="pk-plan-count">—</div></div>
    <div class="pk-stat"><div class="pk-stat-lbl">ร้านค้าทั้งหมด</div><div class="pk-stat-val green" id="pk-shop-count">—</div></div>
  </div>

  <div class="pk-section">
    <div class="pk-sec-hdr">
      <span class="pk-sec-title">🧩 โมดูล <span class="pk-sec-note">(ราคาเสริมต่อโมดูลผูกพันกับยอดรวมใน "แผนการสมัคร")</span></span>
      <button class="pk-btn pk-btn-sm pk-btn-accent" onclick="pkAddModule()">+ เพิ่มโมดูล</button>
    </div>
    <div class="pk-sec-body">
      <div class="pk-mod-grid" id="pk-mod-grid"><div class="pk-loading">กำลังโหลด</div></div>
    </div>
  </div>

  <div class="pk-section">
    <div class="pk-sec-hdr">
      <span class="pk-sec-title">📋 แผนการสมัคร <span class="pk-sec-note">(ราคาฐาน + โมดูลเสริม − ส่วนลด = ราคาในฟอร์มสมัคร)</span></span>
      <button class="pk-btn pk-btn-sm pk-btn-accent" onclick="pkAddPlan()">+ เพิ่มแผน</button>
    </div>
    <div class="pk-sec-body">
      <div class="pk-plan-grid" id="pk-plan-grid"><div class="pk-loading">กำลังโหลด</div></div>
    </div>
  </div>
</div>

<div id="pk-toast"></div>

<script>
(function(){
'use strict';

var _modules = [];
var _plans   = [];

function tok(){
  return (window.platformToken&&window.platformToken())||
         localStorage.getItem('platform_token')||'';
}
function hdr(){ return {'Authorization':'Bearer '+tok(),'Content-Type':'application/json'}; }

function showToast(msg,color){
  var t=document.getElementById('pk-toast');
  t.textContent=msg; t.style.background=color||'#1f2937';
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Defaults ───────────────────────────────────────────────────
function getDefaultModules(){
  return [
    {id:'pos',       name:'POS',       icon:'🖥',  description:'ระบบขายหน้าร้าน จัดการสินค้า สต็อก',   locked:true,  price:0},
    {id:'affiliate', name:'Affiliate', icon:'🔗',  description:'ระบบ Affiliate แนะนำ-รับค่าคอมมิชชัน', locked:true,  price:0},
    {id:'chat',      name:'Chat',      icon:'💬',  description:'AI ปิดการขายใน DM keyword trigger',    locked:false, price:200},
    {id:'autopost',  name:'Auto Post', icon:'📲',  description:'โพสต์อัตโนมัติทุก platform',           locked:false, price:300},
  ];
}
function getDefaultPlans(){
  return [
    {id:'trial',   name:'ทดลองใช้ฟรี',  badge:'แนะนำ',price:0,   unit:'ฟรี 10 วัน',features:'ทุกโมดูลครบ\nไม่ต้องใช้บัตรเครดิต',is_free:true, is_custom:false,discount:0},
    {id:'starter', name:'เริ่มต้น',       badge:'',      price:599, unit:'/เดือน',   features:'1 ร้าน · AI Basic\n500 credits/เดือน',    is_free:false,is_custom:false,discount:0},
    {id:'business',name:'ธุรกิจออนไลน์', badge:'',      price:1099,unit:'/เดือน',   features:'3 ร้าน · AI Pro\n2,000 credits/เดือน',   is_free:false,is_custom:false,discount:0},
    {id:'pro',     name:'มืออาชีพ',       badge:'',      price:1699,unit:'/เดือน',   features:'10 ร้าน · AI Max\n5,000 credits/เดือน', is_free:false,is_custom:false,discount:0},
    {id:'privacy', name:'Privacy',        badge:'Custom',price:3459,unit:'',          features:'เริ่มต้น 3,459฿ ปรับตามความต้องการ',    is_free:false,is_custom:true, discount:0},
  ];
}

// ── Load ───────────────────────────────────────────────────────
function pkLoad(){
  document.getElementById('pk-mod-grid').innerHTML  = '<div class="pk-loading">กำลังโหลด</div>';
  document.getElementById('pk-plan-grid').innerHTML = '<div class="pk-loading">กำลังโหลด</div>';
  fetch('/api/platform/pkg-config',{headers:hdr()})
  .then(function(r){return r.ok?r.json():null;})
  .then(function(d){
    _modules=(d&&d.modules)?JSON.parse(JSON.stringify(d.modules)):getDefaultModules();
    _plans  =(d&&d.plans)  ?JSON.parse(JSON.stringify(d.plans))  :getDefaultPlans();
    // migrate: ensure price/discount fields exist
    _modules.forEach(function(m){ if(m.price==null) m.price=0; });
    _plans.forEach(function(p){ if(p.discount==null) p.discount=0; });
    renderModules(); renderPlans();
  })
  .catch(function(){
    _modules=getDefaultModules(); _plans=getDefaultPlans();
    renderModules(); renderPlans();
    showToast('⚠ โหลดจาก API ไม่ได้ — แสดงค่าเริ่มต้น','#92400e');
  });
  fetch('/api/platform/shops',{headers:hdr()})
  .then(function(r){return r.ok?r.json():[];})
  .then(function(d){
    var shops=Array.isArray(d)?d:(d.shops||[]);
    document.getElementById('pk-shop-count').textContent=shops.length;
  }).catch(function(){document.getElementById('pk-shop-count').textContent='—';});
}

// ── Render Modules ─────────────────────────────────────────────
function renderModules(){
  document.getElementById('pk-mod-count').textContent=_modules.length;
  var grid=document.getElementById('pk-mod-grid');
  if(!_modules.length){grid.innerHTML='<div style="color:#9ca3af;padding:20px">ยังไม่มีโมดูล</div>';return;}
  grid.innerHTML=_modules.map(function(m,i){
    var priceVal=Number(m.price)||0;
    var priceDisp=priceVal>0
      ?('<span class="pk-mod-price-preview">+฿'+priceVal.toLocaleString()+' / เดือน</span>')
      :('<span class="pk-mod-price-preview free">รวมในแผนหลัก (ฟรี)</span>');
    return '<div class="pk-mod-card'+(m.locked?' locked-card':'')+'" id="pk-mc-'+i+'">' +
      '<div class="pk-mod-card-hdr">' +
        '<div class="pk-mod-icon-wrap"><span id="pk-m-icon-disp-'+i+'">'+esc(m.icon||'📦')+'</span></div>' +
        '<div class="pk-mod-card-title" id="pk-m-name-disp-'+i+'">'+esc(m.name)+'</div>' +
        (m.locked?'<span class="pk-mod-locked-badge">บังคับ</span>':'') +
      '</div>' +
      '<div id="pk-m-price-disp-'+i+'" style="margin:-4px 0">'+priceDisp+'</div>' +
      '<div class="pk-field"><label>ไอคอน (emoji)</label>' +
        '<input id="pk-m-icon-'+i+'" value="'+esc(m.icon||'📦')+'" maxlength="4" '+
          'oninput="document.getElementById(\'pk-m-icon-disp-'+i+'\').textContent=this.value"/>' +
      '</div>' +
      '<div class="pk-field"><label>ชื่อโมดูล</label>' +
        '<input id="pk-m-name-'+i+'" value="'+esc(m.name)+'" '+
          'oninput="document.getElementById(\'pk-m-name-disp-'+i+'\').textContent=this.value"/>' +
      '</div>' +
      '<div class="pk-field"><label>คำอธิบาย</label>' +
        '<textarea id="pk-m-desc-'+i+'">'+esc(m.description||'')+'</textarea></div>' +
      '<div class="pk-field-row">' +
        '<div class="pk-field"><label>ราคาเสริม (฿/เดือน)</label>' +
          '<input type="number" id="pk-m-price-'+i+'" value="'+priceVal+'" min="0" '+
            'oninput="pkUpdateModPricePreview('+i+')"/>' +
          '<div class="pk-field-note">0 = รวมในแผนหลัก</div>' +
        '</div>' +
        '<div class="pk-field"><label>สถานะ</label>' +
          '<select id="pk-m-locked-'+i+'">' +
            '<option value="1"'+(m.locked?' selected':'')+'>บังคับ</option>' +
            '<option value="0"'+(!m.locked?' selected':'')+'>เลือกได้</option>' +
          '</select>' +
        '</div>' +
      '</div>' +
      '<div class="pk-mod-foot">' +
        '<button class="pk-btn pk-btn-sm" style="color:#b91c1c;border-color:#fca5a5" onclick="pkRemoveModule('+i+')">ลบ</button>' +
        '<button class="pk-btn pk-btn-sm pk-btn-save" onclick="pkSaveModuleRow('+i+')">บันทึก</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

window.pkUpdateModPricePreview=function(i){
  var p=Number(document.getElementById('pk-m-price-'+i).value)||0;
  var el=document.getElementById('pk-m-price-disp-'+i);
  el.innerHTML=p>0
    ?'<span class="pk-mod-price-preview">+฿'+p.toLocaleString()+' / เดือน</span>'
    :'<span class="pk-mod-price-preview free">รวมในแผนหลัก (ฟรี)</span>';
};
window.pkRemoveModule=function(i){
  if(!confirm('ลบโมดูล "'+_modules[i].name+'" ?')) return;
  _modules.splice(i,1); renderModules();
};
window.pkAddModule=function(){
  _modules.push({id:'mod_'+Date.now(),name:'โมดูลใหม่',icon:'⭐',description:'',locked:false,price:0});
  renderModules();
  var g=document.getElementById('pk-mod-grid');
  if(g.lastElementChild) g.lastElementChild.scrollIntoView({behavior:'smooth'});
};
window.pkSaveModuleRow=function(i){
  _modules[i].icon       =document.getElementById('pk-m-icon-'+i).value.trim()||'📦';
  _modules[i].name       =document.getElementById('pk-m-name-'+i).value.trim();
  _modules[i].description=document.getElementById('pk-m-desc-'+i).value.trim();
  _modules[i].price      =Number(document.getElementById('pk-m-price-'+i).value)||0;
  _modules[i].locked     =document.getElementById('pk-m-locked-'+i).value==='1';
  renderModules();
  showToast('✅ อัปเดตโมดูลแล้ว','#16a34a');
};

// ── Render Plans ───────────────────────────────────────────────
function pkPlanPriceHTML(p,i){
  if(p.is_free) return '<div class="pk-plan-price-block"><div class="pk-plan-final-price free" id="pk-p-fdisp-'+i+'">'+esc(p.unit||'ฟรี')+'</div></div>';
  if(p.is_custom){
    var lines=(p.features||'').split('\n');
    return '<div class="pk-plan-price-block"><div class="pk-plan-final-price custom" id="pk-p-fdisp-'+i+'">'+esc(lines[0]||'Custom')+'</div></div>';
  }
  var base=Number(p.price)||0;
  var disc=Number(p.discount)||0;
  var final=Math.max(0,base-disc);
  var unit=esc(p.unit||'/เดือน');
  if(disc>0){
    return '<div class="pk-plan-price-block">'+
      '<div class="pk-plan-orig-price">฿'+base.toLocaleString()+' '+unit+'</div>'+
      '<div class="pk-plan-final-price" id="pk-p-fdisp-'+i+'">฿'+final.toLocaleString()+' <small style="font-size:12px;font-weight:400;color:#9ca3af">'+unit+'</small></div>'+
      '<div class="pk-plan-disc-badge">ถูกลง ฿'+disc.toLocaleString()+'</div>'+
    '</div>';
  }
  return '<div class="pk-plan-price-block">'+
    '<div class="pk-plan-final-price" id="pk-p-fdisp-'+i+'">฿'+base.toLocaleString()+' <small style="font-size:12px;font-weight:400;color:#9ca3af">'+unit+'</small></div>'+
  '</div>';
}

function renderPlans(){
  document.getElementById('pk-plan-count').textContent=_plans.length;
  var grid=document.getElementById('pk-plan-grid');
  if(!_plans.length){grid.innerHTML='<div style="color:#9ca3af;padding:20px">ยังไม่มีแผน</div>';return;}
  grid.innerHTML=_plans.map(function(p,i){
    var cls=p.is_free?'is-free':p.is_custom?'is-custom':'';
    var badgeType=p.is_custom?'custom':p.is_free?'free':'recommend';
    return '<div class="pk-plan-card '+cls+'">' +
      (p.badge?'<div><span class="pk-plan-badge '+badgeType+'">'+esc(p.badge)+'</span></div>':'') +
      '<div class="pk-plan-name-label" id="pk-p-name-disp-'+i+'">'+esc(p.name)+'</div>' +
      pkPlanPriceHTML(p,i) +
      '<div class="pk-field"><label>ชื่อแผน</label>' +
        '<input id="pk-p-name-'+i+'" value="'+esc(p.name)+'" '+
          'oninput="document.getElementById(\'pk-p-name-disp-'+i+'\').textContent=this.value"/></div>' +
      '<div class="pk-field"><label>Badge / Label</label>' +
        '<input id="pk-p-badge-'+i+'" value="'+esc(p.badge||'')+'" placeholder="แนะนำ / Custom / ฯลฯ"/></div>' +
      '<div class="pk-field-row">' +
        '<div class="pk-field"><label>ตัวคูณ (×)</label>' +
          '<input type="number" id="pk-p-mult-'+i+'" value="'+Number(p.multiplier||1)+'" min="0" step="0.1" '+
            'oninput="pkUpdatePlanPreview('+i+')"/>' +
          '<div class="pk-field-note">×1=เริ่มต้น ×2=ออนไลน์ ×3=มืออาชีพ</div>' +
        '</div>' +
        '<div class="pk-field"><label>ส่วนลด (฿)</label>' +
          '<input type="number" id="pk-p-disc-'+i+'" value="'+Number(p.discount||0)+'" min="0" '+
            'oninput="pkUpdatePlanPreview('+i+')"/>' +
          '<div class="pk-field-note">0 = ไม่มีส่วนลด</div>' +
        '</div>' +
      '</div>' +
      '<div class="pk-field"><label>หน่วย</label>' +
        '<input id="pk-p-unit-'+i+'" value="'+esc(p.unit||'')+'" placeholder="/เดือน หรือ /ปี"/></div>' +
      '<div class="pk-field"><label>รายละเอียด / Features</label>' +
        '<textarea id="pk-p-feat-'+i+'">'+esc(p.features||'')+'</textarea></div>' +
      '<div class="pk-field"><label>ประเภท</label>' +
        '<select id="pk-p-type-'+i+'">' +
          '<option value="normal"'+(!p.is_free&&!p.is_custom?' selected':'')+'>ปกติ</option>' +
          '<option value="free"'+(p.is_free?' selected':'')+'>ฟรี</option>' +
          '<option value="custom"'+(p.is_custom?' selected':'')+'>Custom (กำหนดเอง)</option>' +
        '</select></div>' +
      '<div class="pk-plan-foot">' +
        '<button class="pk-btn pk-btn-sm" style="color:#b91c1c;border-color:#fca5a5" onclick="pkRemovePlan('+i+')">ลบ</button>' +
        '<button class="pk-btn pk-btn-sm pk-btn-save" onclick="pkSavePlanRow('+i+')">บันทึก</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

window.pkUpdatePlanPreview = function(i) {
  var mult = Number(document.getElementById('pk-p-mult-'+i) ? document.getElementById('pk-p-mult-'+i).value : 1) || 1;
  var disc = Number(document.getElementById('pk-p-disc-'+i).value) || 0;
  var unit = document.getElementById('pk-p-unit-'+i) ? document.getElementById('pk-p-unit-'+i).value || '/เดือน' : '/เดือน';
  var el = document.getElementById('pk-p-fdisp-'+i);
  if (!el) return;
  // ตัวอย่าง: POS(299) × multiplier
  var example = Math.max(0, 299 * mult - disc);
  el.textContent = '฿' + example.toLocaleString() + ' ' + unit + ' (POS เดี่ยว)';
};
window.pkRemovePlan=function(i){
  if(!confirm('ลบแผน "'+_plans[i].name+'" ?')) return;
  _plans.splice(i,1); renderPlans();
};
window.pkAddPlan=function(){
  _plans.push({id:'plan_'+Date.now(),name:'แผนใหม่',badge:'',price:0,unit:'/เดือน',features:'',is_free:false,is_custom:false,discount:0});
  renderPlans();
  var g=document.getElementById('pk-plan-grid');
  if(g.lastElementChild) g.lastElementChild.scrollIntoView({behavior:'smooth'});
};
window.pkSavePlanRow=function(i){
  var type=document.getElementById('pk-p-type-'+i).value;
  _plans[i].name      =document.getElementById('pk-p-name-'+i).value.trim();
  _plans[i].badge     =document.getElementById('pk-p-badge-'+i).value.trim();
  _plans[i].multiplier=Number(document.getElementById('pk-p-mult-'+i).value)||1;
  _plans[i].discount  =Number(document.getElementById('pk-p-disc-'+i).value)||0;
  _plans[i].unit      =document.getElementById('pk-p-unit-'+i).value.trim();
  _plans[i].features  =document.getElementById('pk-p-feat-'+i).value.trim();
  _plans[i].is_free   =type==='free';
  _plans[i].is_custom =type==='custom';
  renderPlans();
  showToast('✅ อัปเดตแผนแล้ว','#16a34a');
};

// ── Save All ───────────────────────────────────────────────────
window.pkSaveAll=function(){
  _modules.forEach(function(m,i){
    var n=document.getElementById('pk-m-name-'+i);   if(n) m.name=n.value.trim();
    var d=document.getElementById('pk-m-desc-'+i);   if(d) m.description=d.value.trim();
    var ic=document.getElementById('pk-m-icon-'+i);  if(ic) m.icon=ic.value.trim()||'📦';
    var pr=document.getElementById('pk-m-price-'+i); if(pr) m.price=Number(pr.value)||0;
    var lk=document.getElementById('pk-m-locked-'+i);if(lk) m.locked=lk.value==='1';
  });
  _plans.forEach(function(p,i){
    var n=document.getElementById('pk-p-name-'+i);   if(n) p.name=n.value.trim();
    var b=document.getElementById('pk-p-badge-'+i);  if(b) p.badge=b.value.trim();
    var mu=document.getElementById('pk-p-mult-'+i);  if(mu) p.multiplier=Number(mu.value)||1;
    var di=document.getElementById('pk-p-disc-'+i);  if(di) p.discount=Number(di.value)||0;
    var u=document.getElementById('pk-p-unit-'+i);   if(u) p.unit=u.value.trim();
    var f=document.getElementById('pk-p-feat-'+i);   if(f) p.features=f.value.trim();
    var t=document.getElementById('pk-p-type-'+i);
    if(t){ p.is_free=t.value==='free'; p.is_custom=t.value==='custom'; }
  });
  fetch('/api/platform/pkg-config',{
    method:'POST',headers:hdr(),
    body:JSON.stringify({modules:_modules,plans:_plans}),
  })
  .then(function(r){
    if(r.ok) showToast('✅ บันทึกทั้งหมดสำเร็จ','#16a34a');
    else     showToast('❌ บันทึกไม่สำเร็จ ('+r.status+')','#b91c1c');
  })
  .catch(function(){showToast('❌ เชื่อมต่อ server ไม่ได้','#b91c1c');});
};

window.pkLoad=pkLoad;
pkLoad();
})();
</script>
</body></html>
