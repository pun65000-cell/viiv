<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VIIV — สร้างร้านออนไลน์ของคุณใน 5 นาที</title>
    <style>
      :root { --bg:#f7f7f7; --panel:#fff; --border:rgba(0,0,0,.08); --accent:#d4a017; --muted:rgba(0,0,0,.6); }
      *{ box-sizing:border-box; }
      body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:#111; min-height:100vh; display:flex; align-items:center; justify-content:center; }
      .wrap{ width:100%; padding:24px; }
      .hero{ max-width:980px; margin:0 auto; background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:clamp(20px,6vw,48px); display:grid; grid-template-columns:1fr; gap:20px; }
      .logo{ display:inline-flex; align-items:center; gap:10px; font-weight:900; font-size:22px; letter-spacing:.5px; }
      .logo-dot{ width:12px; height:12px; border-radius:999px; background:var(--accent); display:inline-block; }
      h1{ margin:0; font-size:clamp(28px,5vw,44px); line-height:1.15; }
      p.sub{ margin:6px 0 0 0; color:var(--muted); font-size:clamp(16px,2.5vw,18px); }
      .btn-row{ display:flex; flex-wrap:wrap; gap:12px; margin-top:18px; }
      .btn{ appearance:none; border:none; padding:12px 18px; border-radius:12px; cursor:pointer; font-weight:800; font-size:16px; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
      .btn-primary{ background:var(--accent); color:#111; }
      .btn-secondary{ background:rgba(0,0,0,.06); color:#111; }
      .footer-note{ text-align:center; margin-top:18px; color:var(--muted); font-size:14px; }
      @media (min-width:840px){ .hero{ grid-template-columns:1.1fr .9fr; align-items:center; } .art{ justify-self:end; } }
      .card{ background:#fffef5; border:1px solid rgba(212,160,23,.25); border-radius:12px; padding:16px; }
      .card h3{ margin:0 0 8px 0; }
      .list{ margin:0; padding-left:18px; color:var(--muted); }
    </style>
    <script>
      if (window.location.pathname === "/login") {
        window.location.href = "/login.html";
      }
      if (window.location.pathname === "/signup") {
        window.location.href = "/register.html";
      }
    </script>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <div>
          <div class="logo"><span class="logo-dot"></span> VIIV</div>
          <h1>สร้างร้านออนไลน์ของคุณใน 5 นาที</h1>
          <p class="sub">ขายสินค้า / Affiliate / Chat Commerce</p>
          <div class="btn-row">
            <a class="btn btn-secondary" href="/login.html">เข้าสู่ระบบ</a>
            <a class="btn btn-primary" href="/register.html">เริ่มต้นใช้งาน</a>
          </div>
        </div>
        <div class="art">
          <div class="card">
            <h3>เริ่มขายได้ทันที</h3>
            <ul class="list">
              <li>จัดการสินค้าและสต็อก</li>
              <li>ลิงก์ Affiliate และการนับคลิก</li>
              <li>ตะกร้า + Checkout พร้อม QR จ่ายเงิน</li>
            </ul>
          </div>
        </div>
      </section>
      <div class="footer-note">© VIIV — Make Commerce Simple</div>
    </div>
  </body>
</html>
