<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>กำลังเปิดใช้งานบัญชี | VIIV</title>
    <style>
      :root { --bg:#f7f7f7; --panel:#fff; --border:rgba(0,0,0,.08); --accent:#d4a017; --muted:rgba(0,0,0,.6); }
      *{ box-sizing:border-box; }
      body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:#111; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
      .card{ width:100%; max-width:460px; background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:22px; text-align:center; }
      .spinner{ width:42px; height:42px; border-radius:999px; border:4px solid rgba(0,0,0,.12); border-top-color:var(--accent); margin:0 auto 14px auto; animation:spin 1s linear infinite; }
      @keyframes spin{ to { transform:rotate(360deg); } }
      .muted{ color:var(--muted); margin-top:8px; }
      .btn{ display:inline-block; margin-top:14px; padding:12px 16px; border:none; border-radius:12px; cursor:pointer; font-weight:800; background:var(--accent); color:#111; text-decoration:none; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner"></div>
      <h1 style="margin:0; font-size:20px;">กำลังเปิดใช้งานบัญชี</h1>
      <div class="muted">กรุณาเพิ่มเพื่อน LINE เพื่อดำเนินการเปิดใช้งาน</div>
      <a class="btn" href="https://line.me/R/ti/p/@YOUR_LINE_OA" target="_blank" rel="noreferrer">เพิ่มเพื่อน LINE</a>
    </div>
  </body>
</html>
