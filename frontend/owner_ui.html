<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VIIV Owner</title>
    <script src="./navbar.js" defer></script>
    <style>
      :root { --bg:#f5f5f5; --panel:#fff; --border:rgba(0,0,0,.08); --muted:rgba(0,0,0,.6); --sidebar:#1a1a1a; --accent:#d4a017; }
      body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:#111; }
      .layout{ display:flex; min-height:100vh; }
      .sidebar{ position:fixed; top:0; left:0; bottom:0; width:240px; background:var(--sidebar); color:#fff; padding:18px 14px; box-sizing:border-box; }
      .brand{ font-weight:800; letter-spacing:.2px; margin-bottom:18px; display:flex; align-items:center; gap:10px; }
      .badge{ width:10px; height:10px; border-radius:999px; background:var(--accent); display:inline-block; }
      .nav{ display:flex; flex-direction:column; gap:6px; }
      .nav-item{ background:transparent; color:#fff; border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:10px 12px; text-align:left; cursor:pointer; }
      .nav-item.active{ background:rgba(212,160,23,.16); border-color:rgba(212,160,23,.55); }
      .main{ margin-left:240px; width:calc(100% - 240px); padding:22px; box-sizing:border-box; }
      .inner{ max-width:900px; margin:0 auto; }
      .title{ margin:0 0 14px 0; font-size:22px; font-weight:800; }
      .card{ border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:18px; background:var(--panel); }
      .btn{ padding:10px 16px; border:none; border-radius:10px; cursor:pointer; font-weight:800; background:var(--accent); color:#111; }
      .btn-secondary{ background:rgba(0,0,0,.06); color:#111; }
      .btn-row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
      .list{ display:grid; gap:10px; margin-top:10px; }
      .item{ border:1px solid var(--border); border-radius:12px; padding:12px; display:flex; justify-content:space-between; align-items:center; gap:10px; }
      .muted{ color:var(--muted); }
      @media (max-width:880px){ .sidebar{ position:static; width:100%; display:flex; align-items:center; gap:10px; } .nav{ flex-direction:row; flex-wrap:wrap; } .main{ margin-left:0; width:100%; padding:16px; } }
    </style>
    <script>
      const params = new URLSearchParams(window.location.search);
      const urlToken = params.get("token");
      if (urlToken) {
        localStorage.setItem("token", urlToken);
        window.history.replaceState({}, document.title, "/dashboard");
      }

      const token = localStorage.getItem("token");
      if (!token) {
        window.location.href = "https://viiv.me/login.html";
      }
    </script>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand"><span class="badge"></span><span>VIIV Owner</span></div>
        <nav class="nav" id="nav">
          <button class="nav-item active" data-view="dashboard">Dashboard</button>
          <button class="nav-item" data-view="shops">ร้านของฉัน</button>
          <button class="nav-item" data-view="pending">ลูกค้ารออนุมัติ</button>
        </nav>
      </aside>
      <main class="main">
        <div class="inner">
          <div class="title">แดชบอร์ดเจ้าของร้าน</div>

          <div id="view-dashboard" class="card view active">
            <div class="muted">ยินดีต้อนรับสู่ระบบจัดการร้าน VIIV</div>
            <div id="meInfo" class="muted" style="margin-top:10px"></div>
          </div>

          <div id="view-shops" class="view" style="display:none">
            <div class="card">
              <h2>ร้านของฉัน</h2>
              <div class="btn-row">
                <button id="refreshShops" class="btn btn-secondary">รีเฟรช</button>
              </div>
              <div id="shopsList" class="list"></div>
            </div>
          </div>

          <div id="view-pending" class="view" style="display:none">
            <div class="card">
              <h2>ลูกค้ารออนุมัติ</h2>
              <div class="btn-row">
                <button id="refreshPending" class="btn btn-secondary">รีเฟรช</button>
              </div>
              <div id="pendingList" class="list"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script>
      const API = "https://auth.viiv.me";
      const $ = (id) => document.getElementById(id);

      function getToken() {
        return localStorage.getItem("token") || "";
      }

      async function authFetch(path, options) {
        const token = getToken();
        const headers = { ...(options && options.headers ? options.headers : {}) };
        if (token) headers["Authorization"] = `Bearer ${token}`;
        return fetch(`${API}${path}`, { ...(options || {}), headers });
      }

      function setActive(view) {
        for (const el of document.querySelectorAll(".view")) el.style.display = "none";
        const target = document.getElementById(`view-${view}`);
        if (target) target.style.display = "";
        for (const n of document.querySelectorAll(".nav-item"))
          n.classList.toggle("active", n.getAttribute("data-view") === view);
      }

      document.getElementById("nav").addEventListener("click", (e) => {
        const btn = e.target.closest(".nav-item");
        if (!btn) return;
        const v = btn.getAttribute("data-view");
        setActive(v);
        if (v === "shops") loadShops();
        if (v === "pending") loadPending();
      });

      async function loadShops() {
        const el = $("shopsList");
        el.textContent = "กำลังโหลด...";
        try {
          const res = await authFetch("/api/my/shops");
          const data = await res.json().catch(() => null);
          if (!res.ok || !Array.isArray(data)) { el.textContent = "โหลดไม่สำเร็จ"; return; }
          el.textContent = "";
          if (data.length === 0) { el.textContent = "ยังไม่มีร้าน"; return; }
          for (const s of data) {
            const row = document.createElement("div");
            row.className = "item";
            const left = document.createElement("div");
            const t = document.createElement("div"); t.style.fontWeight = "800"; t.textContent = s.slug || "-";
            const sub = document.createElement("div"); sub.className = "muted"; sub.textContent = s.domain || (s.slug ? `${s.slug}.viiv.me` : "-");
            left.appendChild(t); left.appendChild(sub);
            const right = document.createElement("div");
            const btn = document.createElement("button");
            btn.className = "btn"; btn.textContent = "เข้าใช้งานร้าน";
            btn.addEventListener("click", () => { if (s.slug) window.location.href = `http://${s.slug}.viiv.me:8081/product_ui.html`; });
            right.appendChild(btn);
            row.appendChild(left); row.appendChild(right);
            el.appendChild(row);
          }
        } catch { el.textContent = "โหลดไม่สำเร็จ"; }
      }

      async function loadPending() {
        const el = $("pendingList");
        el.textContent = "กำลังโหลด...";
        try {
          const res = await authFetch("/api/admin/pending-users");
          const data = await res.json().catch(() => null);
          if (!res.ok || !Array.isArray(data)) { el.textContent = "โหลดไม่สำเร็จ"; return; }
          el.textContent = "";
          if (data.length === 0) { el.textContent = "ไม่มีผู้ใช้รออนุมัติ"; return; }
          for (const u of data) {
            const row = document.createElement("div");
            row.className = "item";
            const left = document.createElement("div");
            const t = document.createElement("div"); t.style.fontWeight = "800"; t.textContent = u.email || "-";
            const sub = document.createElement("div"); sub.className = "muted"; sub.textContent = u.created_at || "-";
            left.appendChild(t); left.appendChild(sub);
            const right = document.createElement("div");
            const btn = document.createElement("button"); btn.className = "btn"; btn.textContent = "Activate";
            btn.addEventListener("click", async () => {
              const r = await authFetch("/api/admin/activate-user", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: u.id }),
              });
              const j = await r.json().catch(() => null);
              if (!r.ok || !j || !j.success) { alert("ไม่สำเร็จ"); return; }
              await loadPending();
            });
            right.appendChild(btn);
            row.appendChild(left); row.appendChild(right);
            el.appendChild(row);
          }
        } catch { el.textContent = "โหลดไม่สำเร็จ"; }
      }

      async function loadMe() {
        const el = $("meInfo");
        if (!el) return;
        el.textContent = "กำลังโหลดข้อมูลผู้ใช้...";
        try {
          const res = await authFetch("/api/users/me");
          const data = await res.json().catch(() => null);
          if (!res.ok || !data) {
            el.textContent = "โหลดข้อมูลผู้ใช้ไม่สำเร็จ";
            return;
          }
          const email = data.email || "-";
          el.textContent = `เข้าสู่ระบบแล้ว: ${email}`;
        } catch (e) {
          el.textContent = "โหลดข้อมูลผู้ใช้ไม่สำเร็จ";
        }
      }

      document.getElementById("refreshShops").addEventListener("click", loadShops);
      document.getElementById("refreshPending").addEventListener("click", loadPending);
      loadMe();
    </script>
  </body>
</html>
