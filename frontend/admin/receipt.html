<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Receipt</title>
    <style>
      :root {
        --paper-width: 58mm;
      }

      body {
        margin: 0;
        background: #f3f4f6;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        color: #111827;
      }

      .page {
        padding: 12px;
        display: flex;
        justify-content: center;
      }

      .receipt {
        width: var(--paper-width);
        background: #fff;
        padding: 10px 10px 12px 10px;
        border: 1px solid #e5e7eb;
      }

      .row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .center {
        text-align: center;
      }

      .muted {
        color: #6b7280;
      }

      .hr {
        border-top: 1px dashed #9ca3af;
        margin: 8px 0;
      }

      .items {
        width: 100%;
        border-collapse: collapse;
      }

      .items td {
        padding: 3px 0;
        vertical-align: top;
      }

      .items .name {
        width: 100%;
        padding-right: 8px;
      }

      .items .qty,
      .items .price {
        white-space: nowrap;
        text-align: right;
      }

      .actions {
        width: var(--paper-width);
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-top: 10px;
      }

      button {
        flex: 1;
        border: none;
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 700;
        cursor: pointer;
        background: #111111;
        color: #ffffff;
      }

      button.secondary {
        background: #ffffff;
        color: #111111;
        border: 1px solid #e5e7eb;
      }

      @media print {
        body {
          background: #ffffff;
        }
        .page {
          padding: 0;
        }
        .receipt {
          border: none;
        }
        .actions {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div>
        <div class="receipt" id="receipt">
          <div class="center">
            <div style="font-weight: 800; font-size: 14px" id="shopName">My Store</div>
            <div class="muted" id="shopAddress"></div>
          </div>

          <div class="hr"></div>

          <div class="row">
            <div class="muted">Order</div>
            <div id="orderId">-</div>
          </div>
          <div class="row">
            <div class="muted">Date</div>
            <div id="orderDate">-</div>
          </div>

          <div class="hr"></div>

          <table class="items">
            <tbody id="itemsBody">
              <tr>
                <td class="muted">Loading...</td>
              </tr>
            </tbody>
          </table>

          <div class="hr"></div>

          <div class="row" style="font-weight: 800">
            <div>Total</div>
            <div id="total">0</div>
          </div>

          <div class="hr"></div>

          <div class="center muted">Thank you</div>
        </div>

        <div class="actions">
          <button type="button" id="btnPrint">Print Receipt</button>
          <button type="button" class="secondary" id="btnClose">Close</button>
        </div>
      </div>
    </div>

    <script>
      function formatMoney(n) {
        const num = Number(n || 0);
        return num.toFixed(2);
      }

      function formatDate(value) {
        if (!value) return new Date().toLocaleString();
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return new Date().toLocaleString();
        return d.toLocaleString();
      }

      function getParam(name) {
        const url = new URL(window.location.href);
        return url.searchParams.get(name);
      }

      async function loadReceipt() {
        const shopName = localStorage.getItem("shop_name") || "My Store";
        const shopAddress = localStorage.getItem("shop_address") || "";
        document.getElementById("shopName").textContent = shopName;
        document.getElementById("shopAddress").textContent = shopAddress;

        const orderId = getParam("order_id") || "";
        document.getElementById("orderId").textContent = orderId || "-";

        if (!orderId) {
          document.getElementById("itemsBody").innerHTML = `<tr><td class="muted">Missing order_id</td></tr>`;
          return;
        }

        let data = null;
        try {
          const res = await fetch(`/api/orders/receipt?order_id=${encodeURIComponent(orderId)}`);
          data = await res.json().catch(() => null);
        } catch (e) {
          data = null;
        }

        if (!data || data.error) {
          document.getElementById("itemsBody").innerHTML = `<tr><td class="muted">Receipt not found</td></tr>`;
          return;
        }

        document.getElementById("orderDate").textContent = formatDate(data.issued_at || data.date);

        const items = Array.isArray(data.items) ? data.items : [];
        if (!items.length) {
          document.getElementById("itemsBody").innerHTML = `<tr><td class="muted">No items</td></tr>`;
        } else {
          document.getElementById("itemsBody").innerHTML = items
            .map((it) => {
              const name = it.name || it.product_name || it.product_id || "-";
              const qty = Number(it.quantity || 1);
              const price = it.price != null ? Number(it.price) : null;
              const lineTotal = price != null ? price * qty : null;
              return `<tr>
                <td class="name">${name}</td>
                <td class="qty">${qty}x</td>
                <td class="price">${lineTotal != null ? formatMoney(lineTotal) : ""}</td>
              </tr>`;
            })
            .join("");
        }

        document.getElementById("total").textContent = formatMoney(data.total);
      }

      document.getElementById("btnPrint").addEventListener("click", () => {
        window.print();
      });
      document.getElementById("btnClose").addEventListener("click", () => {
        window.close();
      });

      loadReceipt();
    </script>
  </body>
</html>
