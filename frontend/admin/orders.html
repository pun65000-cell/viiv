<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ออเดอร์ (ADMIN) | VIIV</title>
    <style>
      :root {
        --bg-main: #f4f5f7;
        --bg-card: #ffffff;
        --bg-sidebar: #1f1f1f;
        --text-main: #111827;
        --text-muted: #6b7280;
        --border-color: #e5e7eb;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg-main); color: var(--text-main); }
      .layout { display: flex; min-height: 100vh; }
      .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 240px; background: var(--bg-sidebar); border-right: 1px solid #222; padding: 18px 14px; }
      .brand { font-weight: 800; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; color: #fff; }
      .brand-badge { width: 10px; height: 10px; border-radius: 999px; background: linear-gradient(90deg, #d4af37, #f1c40f); display: inline-block; }
      .nav { display: flex; flex-direction: column; gap: 6px; }
      .nav-item { display: block; text-decoration: none; background: transparent; color: #9ca3af; border: 1px solid #222; border-left: 3px solid transparent; border-radius: 10px; padding: 10px 12px; transition: all 0.2s ease; }
      .nav-item:hover { background: #1f2937; color: #fff; }
      .nav-item.active { background: #1f2937; color: #fff; border-left: 3px solid #f1c40f; }
      .main-content { margin-left: 240px; width: calc(100% - 240px); padding: 22px; background: var(--bg-main); }
      .main-inner { max-width: 980px; margin: 0 auto; position: relative; }
      .page-title { margin: 0 0 4px 0; font-size: 22px; }
      .subtitle { margin: 0 0 16px 0; font-size: 13px; color: var(--text-muted); }
      .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; }
      .profile-menu { position: absolute; top: 0; right: 0; display: flex; align-items: center; gap: 10px; cursor: pointer; }
      .profile-menu img { width: 36px; height: 36px; border-radius: 50%; }
      .profile-menu span { font-weight: 500; color: var(--text-main); }
      @media (max-width: 880px) { .sidebar { position: static; width: 100%; } .main-content { margin-left: 0; width: 100%; padding: 16px; } .profile-menu { top: 8px; right: 8px; } }
    </style>
  </head>
  <body>
    <script>
      window.location.replace("/admin/dashboard.html#orders");
    </script>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-badge"></span>
          <span>VIIV Admin</span>
        </div>
        <nav class="nav">
          <a class="nav-item" href="/admin/dashboard.html">Dashboard</a>
          <a class="nav-item" href="/admin/products.html">สินค้า</a>
          <a class="nav-item active" href="/admin/orders.html">ออเดอร์</a>
          <a class="nav-item" href="/admin/stock.html">สต๊อก</a>
          <a class="nav-item" href="/admin/staff.html">พนักงาน</a>
        </nav>
      </aside>

      <main class="main-content">
        <div class="main-inner">
          <div class="profile-menu">
            <img id="avatar" src="/assets/default-avatar.png" />
            <span id="username">Admin</span>
          </div>

          <h1 class="page-title">ออเดอร์</h1>
          <div class="subtitle">Store-level control panel</div>

          <div class="card">
            <div style="color:#6b7280;font-size:13px;">โหมดทดสอบ (ยังไม่เชื่อม API)</div>
          </div>
        </div>
      </main>
    </div>

    <script>
      const user = JSON.parse(localStorage.getItem("user") || "{}");
      document.getElementById("username").innerText = user.name || "Admin";
      document.getElementById("avatar").src = user.avatar || "/assets/default-avatar.png";
    </script>
  </body>
</html>
