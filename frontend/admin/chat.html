<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Affiliate Chat</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #d4af37;
        --accent-2: #f1c40f;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 18px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .title {
        font-weight: 900;
        font-size: 18px;
      }

      .btn {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 800;
        cursor: pointer;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        color: #000;
      }

      .btn-ghost {
        background: #fff;
        color: #111;
        border: 1px solid var(--border);
      }

      .grid {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 14px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }

      .muted { color: var(--muted); }

      .thumb {
        width: 100%;
        height: 160px;
        object-fit: cover;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #fff;
      }

      .chat {
        display: flex;
        flex-direction: column;
        gap: 10px;
        height: 520px;
      }

      .messages {
        flex: 1;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: #fff;
      }

      .msg {
        margin: 0 0 10px 0;
        padding: 10px 12px;
        border-radius: 12px;
        max-width: 92%;
        white-space: pre-wrap;
      }

      .msg.user {
        margin-left: auto;
        background: #111111;
        color: #ffffff;
      }

      .msg.ai {
        margin-right: auto;
        background: #f3f4f6;
        color: #111827;
        border: 1px solid var(--border);
      }

      .composer {
        display: flex;
        gap: 10px;
      }

      input[type="text"] {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
      }

      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
        .chat { height: auto; }
        .messages { height: 380px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="title">Affiliate Chat</div>
        <div style="display:flex; gap:10px;">
          <a class="btn btn-ghost" href="/admin/dashboard.html#affiliate" style="text-decoration:none; display:inline-block;">Back</a>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <img id="pImg" class="thumb" />
          <div style="margin-top:10px; font-weight:900;" id="pName">-</div>
          <div class="muted" style="margin-top:6px;">product_id: <span id="pId">-</span></div>
          <div class="muted" style="margin-top:6px; word-break:break-all;">affiliate_url: <span id="pUrl">-</span></div>
          <div style="margin-top:10px;">
            <a id="pTrack" class="btn" style="text-decoration:none; display:inline-block;" target="_blank">Open Link</a>
          </div>
        </div>

        <div class="card chat">
          <div class="messages" id="msgs"></div>
          <div class="composer">
            <input id="input" type="text" placeholder="พิมพ์คำถามเกี่ยวกับสินค้า affiliate..." />
            <button id="send" class="btn" type="button">Send</button>
          </div>
          <div class="muted">ระบบจะผูก context จาก product_id ใน URL และส่งกลับ product info + link ทุกครั้ง</div>
        </div>
      </div>
    </div>

    <script>
      function getParam(name) {
        const u = new URL(window.location.href);
        return u.searchParams.get(name);
      }

      function addMsg(role, text) {
        const el = document.createElement("div");
        el.className = "msg " + role;
        el.textContent = text;
        const box = document.getElementById("msgs");
        box.appendChild(el);
        box.scrollTop = box.scrollHeight;
      }

      async function start(product_id) {
        const res = await fetch(`/api/chat/start?product_id=${encodeURIComponent(product_id)}`);
        const json = await res.json().catch(() => null);
        return json;
      }

      async function sendMessage(message) {
        const res = await fetch("/api/chat/message", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        const json = await res.json().catch(() => null);
        return json;
      }

      async function init() {
        const product_id = getParam("product_id") || "";
        if (!product_id) {
          addMsg("ai", "missing product_id");
          return;
        }

        const started = await start(product_id);
        const p = started && started.product ? started.product : null;
        document.getElementById("pId").textContent = product_id;
        document.getElementById("pName").textContent = (p && p.name) || "-";
        document.getElementById("pUrl").textContent = (p && p.affiliate_url) || "-";
        document.getElementById("pImg").src = (p && p.image_url) || "";

        const trackUrl = `/api/track/click?product_id=${encodeURIComponent(product_id)}&source=chat`;
        const a = document.getElementById("pTrack");
        a.href = trackUrl;

        addMsg("ai", `เริ่มแชทด้วย product_id: ${product_id}`);
      }

      document.getElementById("send").addEventListener("click", async () => {
        const input = document.getElementById("input");
        const msg = (input.value || "").trim();
        if (!msg) return;
        input.value = "";
        addMsg("user", msg);
        const json = await sendMessage(msg);
        if (!json || json.error) {
          addMsg("ai", "error");
          return;
        }
        addMsg("ai", (json.reply && json.reply.text) || "ok");
      });

      document.getElementById("input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("send").click();
      });

      init();
    </script>
  </body>
</html>
