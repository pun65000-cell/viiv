<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>แดชบอร์ดร้านค้า (ADMIN) | VIIV</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #1a1d23;
        --panel-2: #111318;
        --border: #2a2f3a;
        --muted: rgba(229, 231, 235, 0.7);
        --text: #e5e7eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .layout {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 240px;
        background: var(--panel-2);
        border-right: 1px solid #222;
        padding: 18px 14px;
      }

      .brand {
        font-weight: 800;
        letter-spacing: 0.2px;
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-badge {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #3a4150;
        display: inline-block;
      }

      .nav {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .nav-item,
      .menu-item {
        display: block;
        text-decoration: none;
        background: transparent;
        color: #a3a3a3;
        border: 1px solid #222;
        border-left: 3px solid transparent;
        border-radius: 10px;
        padding: 10px 12px;
        text-align: left;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .nav-item:hover,
      .menu-item:hover {
        background: #1a1a1a;
        color: #ffffff;
      }

      .nav-item.active,
      .menu-item.active {
        background: #1a1a1a;
        border-left: 3px solid #3a4150;
        color: #ffffff;
      }

      .main {
        margin-left: 240px;
        width: calc(100% - 240px);
        padding: 22px;
      }

      .main-inner {
        max-width: 980px;
        margin: 0 auto;
      }

      .page-title {
        margin: 0 0 4px 0;
        font-size: 22px;
        color: #fafafa;
      }

      .subtitle {
        margin: 0 0 16px 0;
        font-size: 13px;
        color: #888;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 12px 0 18px 0;
      }

      .pill {
        background: #1a1d24;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 12px;
        border: 1px solid #222;
        color: #aaa;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 14px;
      }

      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .stat {
        flex: 1 1 220px;
      }

      .metric {
        font-size: 28px;
        font-weight: 800;
        margin: 0;
      }

      .muted {
        color: var(--muted);
        font-size: 13px;
      }

      button {
        background: #2a2f3a;
        color: #fff;
        border: none;
      }

      button:hover {
        background: #3a4150;
      }

      .btn-primary,
      .btn-secondary {
        background: #2a2f3a;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .nav-item,
      .menu-item {
        background: transparent;
      }

      .admin-user-menu {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }

      .menu {
        position: absolute;
        right: 0;
        top: 40px;
        background: #1a1d23;
        border: 1px solid #2a2f3a;
        padding: 10px;
      }

      .hidden {
        display: none;
      }

      .profile-menu {
        position: absolute;
        top: 20px;
        right: 30px;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }

      .profile-menu img {
        width: 36px;
        height: 36px;
        border-radius: 50%;
      }

      .profile-menu span {
        font-weight: 500;
      }

      @media (max-width: 880px) {
        .sidebar {
          position: static;
          width: 100%;
        }
        .main {
          margin-left: 0;
          width: 100%;
          padding: 16px;
        }
      }

      :root {
        --bg-main: #f5f6f8;
        --bg-sidebar: #111111;
        --bg-card: #ffffff;
        --border-color: #e5e7eb;
        --text-main: #111827;
        --text-muted: #6b7280;
      }

      body {
        background: var(--bg-main) !important;
        color: var(--text-main) !important;
      }

      * {
        box-shadow: none !important;
      }

      .sidebar {
        background: var(--bg-sidebar) !important;
        color: #ffffff !important;
        border-right: 1px solid #222 !important;
      }

      .sidebar a,
      .sidebar .nav-item,
      .sidebar .menu-item {
        color: #9ca3af !important;
      }

      .sidebar a.active,
      .sidebar .nav-item.active,
      .sidebar .menu-item.active {
        background: #1f2937 !important;
        color: #ffffff !important;
        border-left: 3px solid #ffffff !important;
      }

      .main {
        background: var(--bg-main) !important;
      }

      .card {
        background: var(--bg-card) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: 12px !important;
        color: var(--text-main) !important;
      }

      .muted,
      .subtitle,
      .pill {
        color: var(--text-muted) !important;
      }

      .pill {
        background: #ffffff !important;
        border: 1px solid var(--border-color) !important;
      }

      .brand-badge {
        background: #ffffff !important;
      }

      button,
      .btn-primary,
      .btn-secondary,
      .sidebar .nav-item,
      .sidebar .menu-item {
        background: #111111 !important;
        color: #ffffff !important;
        border-radius: 10px !important;
      }

      button:hover,
      .btn-primary:hover,
      .btn-secondary:hover,
      .sidebar .nav-item:hover,
      .sidebar .menu-item:hover {
        background: #1f2937 !important;
      }

      .menu {
        background: #ffffff !important;
        border: 1px solid var(--border-color) !important;
        color: var(--text-main) !important;
      }
    </style>
    <style>
      :root {
        --bg-main: #f4f5f7;
        --bg-card: #ffffff;
        --bg-sidebar: #111111;
        --text-main: #111827;
        --text-muted: #6b7280;
        --border-color: #e5e7eb;
        --accent: #d4af37;
        --accent-2: #f1c40f;
      }
      body {
        background: var(--bg-main) !important;
        color: var(--text-main) !important;
      }
      * {
        background-image: none !important;
      }
      .sidebar {
        background: var(--bg-sidebar) !important;
        color: #ffffff !important;
      }
      .main-content {
        background: var(--bg-main) !important;
      }
      .card {
        background: var(--bg-card) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: 12px !important;
        color: var(--text-main) !important;
      }
      button,
      .btn,
      .btn-primary {
        background: #111111 !important;
        color: #ffffff !important;
        border: none !important;
      }

      .btn-primary {
        background: linear-gradient(90deg, var(--accent), var(--accent-2)) !important;
        color: #000 !important;
      }

      .btn-ghost {
        background: transparent !important;
        color: var(--text-main) !important;
        border: 1px solid var(--border-color) !important;
      }

      input, select, textarea {
        background: #ffffff !important;
        color: var(--text-main) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: 10px;
        padding: 10px 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th, td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border-color);
        font-size: 13px;
      }

      th {
        color: var(--text-muted);
        font-weight: 700;
      }

      #topActions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin: 10px 0 14px 0;
      }

      .actions-left {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .actions-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .search-input {
        min-width: 260px;
      }

      .thumb {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        object-fit: cover;
        border: 1px solid var(--border-color);
        background: #fff;
      }

      .btn-sm {
        padding: 6px 10px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 12px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        font-weight: 800;
        font-size: 12px;
        border: 1px solid transparent;
        white-space: nowrap;
      }

      .badge-good {
        background: #dcfce7;
        color: #166534;
        border-color: #86efac;
      }

      .badge-normal {
        background: #fef9c3;
        color: #854d0e;
        border-color: #fde047;
      }

      .badge-bad {
        background: #fee2e2;
        color: #991b1b;
        border-color: #fecaca;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .form-field label {
        display: block;
        font-weight: 700;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 6px;
      }

      .form-field.full {
        grid-column: 1 / -1;
      }

      .inline {
        display: inline-flex;
        gap: 10px;
        align-items: center;
      }

      .switch {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-badge"></span>
          <span>VIIV Admin</span>
        </div>
        <nav class="nav" id="nav">
          <button class="nav-item active" data-view="dashboard" type="button">Dashboard</button>
          <button class="nav-item" data-view="products" type="button">สินค้า</button>
          <button class="nav-item" data-view="affiliate" type="button">Affiliate</button>
          <button class="nav-item" data-view="orders" type="button">ออเดอร์</button>
          <button class="nav-item" data-view="stock" type="button">คลังสินค้า</button>
          <button class="nav-item" data-view="staff" type="button">พนักงาน</button>
          <button class="nav-item" data-view="customers" type="button">ลูกค้า</button>
          <button class="nav-item" data-view="reports" type="button">รายงาน</button>
          <button class="nav-item" data-view="account" type="button">บัญชี</button>
          <button class="nav-item" data-view="settings" type="button">ตั้งค่าร้านค้า</button>
        </nav>
      </aside>

      <main class="main main-content">
        <div class="main-inner">
          <h1 class="page-title">แดชบอร์ดร้านค้า (ADMIN)</h1>
          <div class="subtitle">Store-level control panel</div>

          <div class="profile-menu">
            <img id="avatar" src="/assets/default-avatar.png" />
            <span id="username">Admin</span>
          </div>

          <div class="card">
            <div class="muted">Current Store: <b id="storeName">My Store</b> <span id="shopIdText"></span></div>
            <div style="color:#9ca3af;font-size:12px;">
              ADMIN PANEL (STORE LEVEL)
            </div>
          </div>

          <div id="topbar" class="topbar"></div>
          <div id="topActions"></div>
          <div id="contentArea"></div>
        </div>
      </main>
    </div>

    <script>
      const DEFAULT_SHOP_ID = "default_shop";

      async function apiGet(url) {
        try {
          const res = await fetch(url, { method: "GET" });
          return await res.json().catch(() => null);
        } catch (e) {
          console.log("API OFFLINE → SAFE MODE");
          return null;
        }
      }

      async function apiPost(url, payload) {
        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload || {}),
          });
          return await res.json().catch(() => null);
        } catch (e) {
          console.log("API OFFLINE → SAFE MODE");
          return null;
        }
      }

      function readShopSettings() {
        return {
          id: localStorage.getItem("shop_id") || DEFAULT_SHOP_ID,
          name: localStorage.getItem("shop_name") || "My Store",
          logo: localStorage.getItem("shop_logo") || "",
          address: localStorage.getItem("shop_address") || "",
          tax_id: localStorage.getItem("shop_tax_id") || "",
          phone: localStorage.getItem("shop_phone") || "",
          printer: localStorage.getItem("shop_printer") || "",
          vat_enabled: localStorage.getItem("shop_vat_enabled") === "true",
        };
      }

      function writeShopSettings(next) {
        if (typeof next.name !== "undefined") localStorage.setItem("shop_name", String(next.name || ""));
        if (typeof next.logo !== "undefined") localStorage.setItem("shop_logo", String(next.logo || ""));
        if (typeof next.address !== "undefined") localStorage.setItem("shop_address", String(next.address || ""));
        if (typeof next.tax_id !== "undefined") localStorage.setItem("shop_tax_id", String(next.tax_id || ""));
        if (typeof next.phone !== "undefined") localStorage.setItem("shop_phone", String(next.phone || ""));
        if (typeof next.printer !== "undefined") localStorage.setItem("shop_printer", String(next.printer || ""));
        if (typeof next.vat_enabled !== "undefined") localStorage.setItem("shop_vat_enabled", next.vat_enabled ? "true" : "false");
      }

      function setActive(view) {
        const nav = document.getElementById("nav");
        for (const b of nav.querySelectorAll(".nav-item")) {
          b.classList.toggle("active", b.getAttribute("data-view") === view);
        }
      }

      function setTopbar(leftHtml, rightHtml) {
        const topbar = document.getElementById("topbar");
        topbar.innerHTML = `
          <div class="pill">${leftHtml || ""}</div>
          <div>${rightHtml || ""}</div>
        `;
      }

      function setTopActions(leftHtml, rightHtml) {
        const el = document.getElementById("topActions");
        el.innerHTML = `
          <div class="actions-left">${leftHtml || ""}</div>
          <div class="actions-right">${rightHtml || ""}</div>
        `;
      }

      function renderComingSoon(title) {
        setTopbar(title, "");
        setTopActions("", "");
        const el = document.getElementById("contentArea");
        el.innerHTML = `<div class="card"><div class="muted">Coming soon</div></div>`;
      }

      async function renderDashboard() {
        const shop = readShopSettings();
        setTopbar("Dashboard", "");
        setTopActions("", "");
        const el = document.getElementById("contentArea");
        el.innerHTML = `
          <div class="row">
            <div class="card stat">
              <div class="metric" id="ordersCount">0</div>
              <div class="muted">Orders</div>
            </div>
            <div class="card stat">
              <div class="metric" id="productsCount">0</div>
              <div class="muted">Products</div>
            </div>
            <div class="card stat">
              <div class="metric" id="staffCount">0</div>
              <div class="muted">Staff</div>
            </div>
          </div>
          <div class="card">
            <div class="muted">Shop ID: <b>${shop.id}</b></div>
          </div>
        `;

        const orders = await apiGet("/api/orders/list");
        const products = await apiGet("/api/products/list");
        const staff = await apiGet(`/api/staff/list?shop_id=${encodeURIComponent(shop.id)}`);
        document.getElementById("ordersCount").textContent = String(Array.isArray(orders) ? orders.length : 0);
        document.getElementById("productsCount").textContent = String(Array.isArray(products) ? products.length : 0);
        document.getElementById("staffCount").textContent = String(Array.isArray(staff) ? staff.length : 0);
      }

      async function renderProducts() {
        setTopbar("สินค้า", "");
        setTopActions(
          `<input class="search-input" id="productSearch" placeholder="ค้นหาสินค้า..." />`,
          `<button type="button" class="btn-primary" id="btnAddProduct">+ เพิ่มสินค้า</button>`
        );

        const el = document.getElementById("contentArea");
        el.innerHTML = `
          <div class="card" id="productFormCard" style="display:none;">
            <div class="form-grid">
              <div class="form-field">
                <label>รูปภาพ (อัปโหลด)</label>
                <input id="pImageFile" type="file" accept="image/*" />
              </div>
              <div class="form-field full">
                <div class="inline">
                  <img id="pImagePreview" class="thumb" style="width:48px;height:48px;" />
                  <input id="pImageUrl" placeholder="image_url (จากระบบอัปโหลด หรือวาง URL)" />
                </div>
              </div>

              <div class="form-field">
                <label>ชื่อสินค้า</label>
                <input id="pName" placeholder="ชื่อสินค้า" />
              </div>
              <div class="form-field">
                <label>ราคา</label>
                <input id="pPrice" placeholder="ราคา" type="number" />
              </div>
              <div class="form-field">
                <label>สต๊อก</label>
                <input id="pStock" placeholder="สต๊อก" type="number" />
              </div>
              <div class="form-field full inline">
                <button type="button" class="btn-primary" id="btnSaveProduct">บันทึก</button>
                <button type="button" class="btn-ghost" id="btnCancelProduct">ยกเลิก</button>
              </div>
            </div>
          </div>
          <div class="card">
            <table>
              <thead>
                <tr>
                  <th></th>
                  <th>รหัส</th>
                  <th>ชื่อสินค้า</th>
                  <th>ราคา</th>
                  <th>สต๊อก</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="productRows">
                <tr><td colspan="6" class="muted">กำลังโหลด...</td></tr>
              </tbody>
            </table>
          </div>
        `;

        let allProducts = [];

        async function uploadImage(file) {
          const form = new FormData();
          form.append("file", file);
          try {
            const res = await fetch("/api/upload/image", { method: "POST", body: form });
            const json = await res.json().catch(() => null);
            if (!res.ok || !json || !json.image_url) {
              console.log("UPLOAD FAILED");
              return null;
            }
            return json.image_url;
          } catch (e) {
            console.log("UPLOAD FAILED");
            return null;
          }
        }

        function applyFilter() {
          const q = (document.getElementById("productSearch").value || "").toLowerCase().trim();
          const filtered = q
            ? allProducts.filter((p) => {
                const id = String(p["รหัสสินค้า"] || "").toLowerCase();
                const name = String(p["ชื่อสินค้า"] || "").toLowerCase();
                return id.includes(q) || name.includes(q);
              })
            : allProducts;
          renderProductsRows(filtered);
        }

        function renderProductsRows(data) {
          const rows = document.getElementById("productRows");
          if (!Array.isArray(data) || !data.length) {
            rows.innerHTML = `<tr><td colspan="6" class="muted">ไม่มีข้อมูล</td></tr>`;
            return;
          }
          rows.innerHTML = data
            .map((p) => {
              const img = p["รูปภาพ"] || "";
              return `<tr>
                <td>${img ? `<img class="thumb" src="${img}" />` : ""}</td>
                <td>${p["รหัสสินค้า"] || ""}</td>
                <td>${p["ชื่อสินค้า"] || ""}</td>
                <td>${p["ราคา"] ?? ""}</td>
                <td>${p["สต๊อก"] ?? ""}</td>
                <td>
                  <button type="button" class="btn-ghost btn-sm" data-action="edit" data-id="${p["รหัสสินค้า"] || ""}">Edit</button>
                  <button type="button" class="btn-ghost btn-sm" data-action="delete" data-id="${p["รหัสสินค้า"] || ""}">Delete</button>
                </td>
              </tr>`;
            })
            .join("");
        }

        async function loadProducts() {
          const data = await apiGet("/api/products/list");
          allProducts = Array.isArray(data) ? data.filter((p) => (p["ประเภท"] || "") === "normal") : [];
          applyFilter();
        }

        document.getElementById("productSearch").addEventListener("input", () => applyFilter());

        const formCard = document.getElementById("productFormCard");
        document.getElementById("btnAddProduct").addEventListener("click", () => {
          formCard.style.display = "block";
          document.getElementById("pName").focus();
        });

        document.getElementById("btnCancelProduct").addEventListener("click", () => {
          formCard.style.display = "none";
        });

        document.getElementById("pImageFile").addEventListener("change", async (e) => {
          const file = e.target.files && e.target.files[0] ? e.target.files[0] : null;
          if (!file) return;
          const url = await uploadImage(file);
          if (!url) return;
          document.getElementById("pImageUrl").value = url;
          document.getElementById("pImagePreview").src = url;
        });

        document.getElementById("pImageUrl").addEventListener("input", (e) => {
          const url = e.target.value || "";
          document.getElementById("pImagePreview").src = url;
        });

        document.getElementById("btnSaveProduct").addEventListener("click", async () => {
          const image_url = document.getElementById("pImageUrl").value || "";
          const name = document.getElementById("pName").value || "";
          const price = Number(document.getElementById("pPrice").value || 0);
          const stock = Number(document.getElementById("pStock").value || 0);
          await apiPost("/api/products/create", { type: "normal", name, price, stock, image_url });
          formCard.style.display = "none";
          await loadProducts();
        });

        document.getElementById("productRows").addEventListener("click", (e) => {
          const btn = e.target && e.target.closest ? e.target.closest("button[data-action]") : null;
          if (!btn) return;
          const action = btn.getAttribute("data-action");
          const id = btn.getAttribute("data-id");
          console.log("PRODUCT ACTION:", action, id);
        });

        await loadProducts();
      }

      async function renderAffiliate() {
        setTopbar("Affiliate", "");
        setTopActions(

        async function uploadImage(file) {
          const form = new FormData();
          form.append("file", file);
          try {
            const res = await fetch("/api/upload/image", { method: "POST", body: form });
            const json = await res.json().catch(() => null);
            if (!res.ok || !json || !json.image_url) return null;
            return json.image_url;
          } catch (e) {
            return null;
          }
        }

        async function fetchMeta(url) {
          if (!url) return {};
          const clean = url.trim();
          if (!/^https?:\/\//i.test(clean)) return {};
          const proxy = `https://r.jina.ai/${clean}`;
          try {
            const res = await fetch(proxy);
            const text = await res.text();
            const titleMatch = text.match(/<title[^>]*>([^<]*)<\/title>/i);
            const ogImageMatch = text.match(/property=[\"']og:image[\"'][^>]*content=[\"']([^\"']+)[\"']/i) || text.match(/content=[\"']([^\"']+)[\"'][^>]*property=[\"']og:image[\"']/i);
            const twImageMatch = text.match(/name=[\"']twitter:image[\"'][^>]*content=[\"']([^\"']+)[\"']/i) || text.match(/content=[\"']([^\"']+)[\"'][^>]*name=[\"']twitter:image[\"']/i);
            return {
              title: titleMatch ? String(titleMatch[1] || "").trim() : "",
              image: (ogImageMatch && ogImageMatch[1]) || (twImageMatch && twImageMatch[1]) || "",
            };
          } catch (e) {
            return {};
          }
        }

        function fmtDate(ts) {
          if (!ts) return "-";
          const d = new Date(ts);
          if (Number.isNaN(d.getTime())) return "-";
          return d.toLocaleString();
        }

        function computeScore(p) {
          const clicks = Number(p["จำนวนคลิก"] || 0);
          const created = p["created_at"];
          let ageDays = 0;
          if (created) {
            const t = new Date(created).getTime();
            if (!Number.isNaN(t)) {
              ageDays = Math.max(0, (Date.now() - t) / 86400000);
            }
          }
          const score = Math.round(clicks * 10 - ageDays);
          return { clicks, score };
        }

        function getStatus(clicks) {
          if (clicks >= 20) return "good";
          if (clicks >= 5) return "normal";
          return "bad";
        }

        function renderStatusBadge(status) {
          if (status === "good") return `<span class="badge badge-good">🔥 ดี</span>`;
          if (status === "normal") return `<span class="badge badge-normal">⚠ ปานกลาง</span>`;
          return `<span class="badge badge-bad">❌ ควรเปลี่ยน</span>`;
        }

        let all = [];

        function applySort() {
          const mode = document.getElementById("affSort").value || "click_desc";
          const sorted = [...all];
          if (mode === "click_desc") {
            sorted.sort((a, b) => Number(b["จำนวนคลิก"] || 0) - Number(a["จำนวนคลิก"] || 0));
          } else if (mode === "performance") {
            sorted.sort((a, b) => computeScore(b).score - computeScore(a).score);
          } else if (mode === "newest") {
            sorted.sort((a, b) => new Date(b["created_at"] || 0).getTime() - new Date(a["created_at"] || 0).getTime());
          } else if (mode === "oldest") {
            sorted.sort((a, b) => new Date(a["created_at"] || 0).getTime() - new Date(b["created_at"] || 0).getTime());
          }
          renderRows(sorted);
        }

        function renderRows(data) {
          const rows = document.getElementById("affRows");
          if (!Array.isArray(data) || !data.length) {
            rows.innerHTML = `<tr><td colspan="8" class="muted">ไม่มีข้อมูล</td></tr>`;
            return;
          }
          rows.innerHTML = data
            .map((p) => {
              const img = p["รูปภาพ"] || "";
              const pid = p["รหัสสินค้า"] || "";
              const url = p["ลิงก์พันธมิตร"] || "";
              const perf = computeScore(p);
              const status = getStatus(perf.clicks);
              const suggestion = status === "bad" ? `<div class="muted" style="margin-top:4px;">สินค้านี้ไม่ perform แนะนำเปลี่ยน</div>` : "";
              return `<tr>
                <td>${img ? `<img class="thumb" src="${img}" />` : ""}</td>
                <td>${p["ชื่อสินค้า"] || ""}</td>
                <td style="max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${url || ""}</td>
                <td>${perf.clicks}</td>
                <td><b>${perf.score}</b></td>
                <td>${renderStatusBadge(status)}${suggestion}</td>
                <td>${fmtDate(p["created_at"])}</td>
                <td>
                  <a class="btn-ghost btn-sm" style="text-decoration:none; display:inline-block;" href="/admin/chat.html?product_id=${encodeURIComponent(pid)}" target="_blank">Chat</a>
                  <a class="btn-ghost btn-sm" style="text-decoration:none; display:inline-block;" href="/api/track/click?product_id=${encodeURIComponent(pid)}" target="_blank">Open</a>
                </td>
              </tr>`;
            })
            .join("");
        }

      }

      document.addEventListener("DOMContentLoaded", () => {
        const shop = readShopSettings();
        document.getElementById("storeName").textContent = shop.name;
        document.getElementById("shopIdText").textContent = `(${shop.id})`;
        const user = JSON.parse(localStorage.getItem("user") || "{}");
        document.getElementById("username").innerText = user.name || "Admin";
        document.getElementById("avatar").src = user.avatar || "/assets/default-avatar.png";

        const loggedIn = localStorage.getItem("admin_logged_in") === "true";
        if (!loggedIn) {
          setTopbar("", "");
          setTopActions("", "");
          document.getElementById("contentArea").innerHTML = `
            <div class="card">
              <div class="metric" style="font-size:18px;">กรุณาเข้าสู่ระบบแอดมิน</div>
              <div class="muted" style="margin-top:8px;">ระบบจะไม่พาไปหน้า Home</div>
              <div style="margin-top:12px;">
                <a href="/admin_login.html" class="btn-primary" style="display:inline-block; text-decoration:none;">ไปหน้าเข้าสู่ระบบ</a>
              </div>
            </div>
          `;
          return;
        }

        const nav = document.getElementById("nav");
        nav.addEventListener("click", (e) => {
          const btn = e.target && e.target.closest ? e.target.closest(".nav-item") : null;
          if (!btn) return;
          const view = btn.getAttribute("data-view");
          if (!view) return;
          window.location.hash = view;
          loadSection(view);
        });

        window.addEventListener("hashchange", () => {
          const v = (window.location.hash || "#dashboard").replace("#", "");
          loadSection(v);
        });

        const initial = (window.location.hash || "#dashboard").replace("#", "");
        loadSection(initial);
      });
    </script>
  </body>
</html>
