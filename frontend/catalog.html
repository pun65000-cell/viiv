<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>แคตตาล็อกสินค้า</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Sarabun',sans-serif;}
body{background:#f5f4f0;min-height:100vh;}
.cat-header{background:#1a1200;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
.cat-logo{width:44px;height:44px;border-radius:10px;object-fit:cover;background:#e8b93e;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#1a1200;flex-shrink:0;}
.cat-store-name{font-size:16px;font-weight:700;color:#fff;}
.cat-store-count{font-size:11px;color:#e8b93e;margin-top:2px;}
.cat-search-wrap{padding:10px 14px;background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:72px;z-index:9;}
.cat-search{width:100%;padding:9px 14px;border:1.5px solid #e8b93e;border-radius:10px;font-size:14px;outline:none;background:#fffbf0;}
.cat-cats{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;background:#faf9f7;border-bottom:1px solid #e5e5e5;}
.cat-cats::-webkit-scrollbar{display:none;}
.cat-cat-btn{padding:5px 14px;border:1px solid #d1d5db;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#374151;white-space:nowrap;flex-shrink:0;}
.cat-cat-btn.active{background:#e8b93e;border-color:#e8b93e;color:#1a1200;}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px;max-width:800px;margin:0 auto;}
@media(min-width:600px){.cat-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.cat-grid{grid-template-columns:repeat(4,1fr);}}
.cat-card{background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.cat-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.12);}
.cat-card-img{width:100%;height:140px;object-fit:cover;display:block;background:#f0ede8;}
.cat-card-img-placeholder{width:100%;height:140px;background:#f0ede8;display:flex;align-items:center;justify-content:center;font-size:36px;}
.cat-card-body{padding:10px;}
.cat-card-name{font-size:13px;font-weight:700;color:#1f2937;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cat-card-price{font-size:14px;font-weight:700;color:#e8b93e;}
.cat-card-desc{font-size:11px;color:#6b7280;margin-top:3px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
/* detail popup */
.cat-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center;}
.cat-overlay.show{display:flex;}
.cat-detail{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:20px;}
.cat-detail-img{width:100%;height:200px;object-fit:cover;border-radius:12px;margin-bottom:14px;}
.cat-close{position:absolute;top:12px;right:14px;background:rgba(0,0,0,.3);border:none;border-radius:50%;width:28px;height:28px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cat-buy-btn{width:100%;padding:14px;background:#e8b93e;color:#1a1200;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px;}
.cat-buy-btn:hover{opacity:.85;}
.cat-empty{text-align:center;padding:60px 20px;color:#aaa;grid-column:1/-1;}
.cat-share-btn{margin-left:auto;padding:6px 12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;color:#fff;font-size:12px;cursor:pointer;}
</style>
</head>
<body>
<div class="cat-header">
  <div id="catLogoWrap" class="cat-logo">S</div>
  <div>
    <div class="cat-store-name" id="catStoreName">Loading...</div>
    <div class="cat-store-count" id="catStoreCount"></div>
  </div>
  <button class="cat-share-btn" onclick="shareStore()">แชร์</button>
</div>
<div class="cat-search-wrap">
  <input class="cat-search" id="catSearch" placeholder="ค้นหาสินค้า..." oninput="filterProducts()"/>
</div>
<div class="cat-cats" id="catCats"></div>
<div class="cat-grid" id="catGrid"></div>

<!-- detail popup -->
<div class="cat-overlay" id="catOverlay" onclick="closeDetail(event)">
  <div class="cat-detail" id="catDetail" style="position:relative;"></div>
</div>

<script>
var API='https://concore.viiv.me';
var allProducts=[],storeSettings={},selCat='',searchQ='';

function getTenant(){
  var params=new URLSearchParams(window.location.search);
  return params.get('tenant')||'';
}
function init(){
  var tenant=getTenant();
  var q=tenant?'?tenant='+tenant:'';
  Promise.all([
    fetch(API+'/api/pos/products/public/list'+q).then(function(r){return r.json();}),
    fetch(API+'/api/pos/products/public/store'+q).then(function(r){return r.json();})
  ]).then(function(r){
    allProducts=(r[0]||[]);
    storeSettings=r[1]||{};
    renderHeader();renderCats();filterProducts();
  }).catch(function(){
    document.getElementById('catGrid').innerHTML='<div class="cat-empty">ไม่สามารถโหลดสินค้าได้</div>';
  });
}

function getToken(){
  try{return localStorage.getItem('viiv_token')||'';}catch(e){return '';}
}

function renderHeader(){
  var el=document.getElementById('catStoreName');
  if(el&&storeSettings.store_name) el.textContent=storeSettings.store_name;
  document.title=(storeSettings.store_name||'แคตตาล็อก')+' - สินค้า';
  var logo=document.getElementById('catLogoWrap');
  if(logo&&storeSettings.logo_url){
    logo.innerHTML='<img src="'+API+storeSettings.logo_url+'" style="width:44px;height:44px;object-fit:cover;border-radius:10px;">';
  } else if(logo&&storeSettings.store_name){
    logo.textContent=storeSettings.store_name.charAt(0).toUpperCase();
  }
}

function renderCats(){
  var el=document.getElementById('catCats');if(!el)return;
  var cats=[...new Set(allProducts.map(function(p){return p.category;}).filter(Boolean))];
  if(!cats.length){el.style.display='none';return;}
  el.innerHTML='';
  function makeBtn(label,val){
    var btn=document.createElement('button');btn.textContent=label;btn.className='cat-cat-btn'+(selCat===val?' active':'');
    btn.addEventListener('click',function(){selCat=val;renderCats();filterProducts();});
    el.appendChild(btn);
  }
  makeBtn('ทั้งหมด','');
  cats.forEach(function(c){makeBtn(c,c);});
}

function filterProducts(){
  searchQ=((document.getElementById('catSearch')||{}).value||'').toLowerCase();
  var filtered=allProducts.filter(function(p){
    return(!selCat||p.category===selCat)&&
      (!searchQ||(p.name||'').toLowerCase().includes(searchQ)||(p.description||'').toLowerCase().includes(searchQ));
  });
  renderGrid(filtered);
  var cnt=document.getElementById('catStoreCount');
  if(cnt) cnt.textContent=filtered.length+' สินค้า';
}

function renderGrid(products){
  var el=document.getElementById('catGrid');if(!el)return;
  if(!products.length){el.innerHTML='<div class="cat-empty">ไม่พบสินค้า</div>';return;}
  el.innerHTML='';
  products.forEach(function(p){
    var card=document.createElement('div');card.className='cat-card';
    var imgHtml=p.image_url?'<img class="cat-card-img" src="'+API+p.image_url+'">':'<div class="cat-card-img-placeholder">&#x1F4E6;</div>';
    card.innerHTML=imgHtml+
      '<div class="cat-card-body">'+
        '<div class="cat-card-name">'+p.name+'</div>'+
        '<div class="cat-card-price">฿'+parseFloat(p.price||0).toLocaleString()+'</div>'+
        (p.description?'<div class="cat-card-desc">'+p.description+'</div>':'')+
      '</div>';
    card.addEventListener('click',function(){showDetail(p);});
    el.appendChild(card);
  });
}

function showDetail(p){
  var ov=document.getElementById('catOverlay');
  var dt=document.getElementById('catDetail');
  if(!ov||!dt)return;
  dt.innerHTML='';
  var closeBtn=document.createElement('button');
  closeBtn.className='cat-close';closeBtn.textContent='x';
  closeBtn.addEventListener('click',function(){ov.classList.remove('show');});
  dt.appendChild(closeBtn);
  if(p.image_url){var img=document.createElement('img');img.className='cat-detail-img';img.src=API+p.image_url;dt.appendChild(img);}
  var name=document.createElement('div');name.style.cssText='font-size:17px;font-weight:700;color:#1f2937;margin-bottom:6px;';name.textContent=p.name;dt.appendChild(name);
  var price=document.createElement('div');price.style.cssText='font-size:20px;font-weight:700;color:#e8b93e;margin-bottom:10px;';price.textContent='฿'+parseFloat(p.price||0).toLocaleString();dt.appendChild(price);
  if(p.description){var desc=document.createElement('div');desc.style.cssText='font-size:13px;color:#6b7280;line-height:1.6;margin-bottom:10px;';desc.textContent=p.description;dt.appendChild(desc);}
  var sku=document.createElement('div');sku.style.cssText='font-size:12px;color:#9ca3af;';sku.textContent='SKU: '+(p.sku||'—');dt.appendChild(sku);
  var buyBtn=document.createElement('button');buyBtn.className='cat-buy-btn';buyBtn.innerHTML='&#x1F6D2; สั่งซื้อ';
  buyBtn.addEventListener('click',function(){buyProduct(p.id,p.name);});
  dt.appendChild(buyBtn);
  ov.classList.add('show');
}

function closeDetail(e){
  if(e.target===document.getElementById('catOverlay'))
    document.getElementById('catOverlay').classList.remove('show');
}

function buyProduct(id,name){
  // redirect ไปหน้า DM หรือ LINE OA
  var msg='สนใจสินค้า: '+decodeURIComponent(name);
  if(navigator.share){navigator.share({title:decodeURIComponent(name),text:msg,url:window.location.href});}
  else{alert('ติดต่อเราเพื่อสั่งซื้อ: '+decodeURIComponent(name));}
}

function shareStore(){
  if(navigator.share){navigator.share({title:storeSettings.store_name||'Shop',url:window.location.href});}
  else{
    if(navigator.clipboard)navigator.clipboard.writeText(window.location.href);
    alert('คัดลอก URL แล้ว: '+window.location.href);
  }
}

init();
</script>
</body>
</html>
