<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>VIIV AutoPost</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Chakra+Petch:wght@400;600;700&display=swap');
:root{
  --gold:#c9a84c;--gold-d:#8a6820;--gold-a:rgba(201,168,76,.16);
  --bg:#f7f3eb;--bg2:#efe9d8;--card:#fffdf8;--bdr:rgba(201,168,76,.26);
  --txt:#231908;--muted:#8a7050;--green:#2aaa58;--blue:#3878cc;--orange:#d86820;
  --hh:48px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Sarabun',sans-serif;color:var(--txt);}
#hdr{position:fixed;inset:0 0 auto 0;height:var(--hh);background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100;}
.hlogo{font-family:'Chakra Petch',sans-serif;font-size:16px;font-weight:700;color:var(--gold);}
.hmod{font-size:13px;color:var(--muted);flex:1;}
#hclock{font-family:'Chakra Petch',sans-serif;font-size:13px;color:var(--txt);font-weight:600;}
#body{position:fixed;top:var(--hh);inset-inline:0;bottom:0;overflow-y:auto;padding:16px;}
.section{background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;padding:20px;margin-bottom:14px;}
.section h2{font-family:'Chakra Petch',sans-serif;font-size:13px;color:var(--gold-d);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.kb{background:var(--bg2);border-radius:8px;padding:10px 12px;}
.kl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.kv{font-family:'Chakra Petch',sans-serif;font-size:20px;font-weight:700;color:var(--txt);}
.kv.blue{color:var(--blue);}.kv.orange{color:var(--orange);}
.platforms{display:flex;gap:8px;margin-top:4px;}
.plat{flex:1;background:var(--bg2);border-radius:8px;padding:8px;text-align:center;}
.plat-icon{font-size:18px;margin-bottom:4px;}
.plat-name{font-size:9px;color:var(--muted);text-transform:uppercase;}
.plat-val{font-family:'Chakra Petch',sans-serif;font-size:15px;font-weight:700;color:var(--txt);}
.coming{text-align:center;padding:30px 20px;}
.coming-icon{font-size:40px;margin-bottom:12px;}
.coming h3{font-family:'Chakra Petch',sans-serif;color:var(--gold);font-size:16px;margin-bottom:6px;}
.coming p{color:var(--muted);font-size:13px;line-height:1.6;}
.badge{display:inline-block;background:var(--gold-a);color:var(--gold-d);border:1px solid var(--bdr);border-radius:20px;padding:3px 14px;font-size:11px;font-weight:600;margin-top:10px;}
</style>
</head>
<body>
<header id="hdr">
  <div class="hlogo">VIIV</div>
  <div class="hmod">📲 Auto Post Module</div>
  <div id="hclock">--:--:--</div>
</header>

<div id="body">
  <div class="section">
    <h2>📊 สรุปวันนี้</h2>
    <div class="kgrid">
      <div class="kb"><div class="kl">โพสวันนี้</div><div class="kv blue" id="k-today">—</div></div>
      <div class="kb"><div class="kl">วิว/เดือน</div><div class="kv" id="k-views">—</div></div>
      <div class="kb"><div class="kl">คิวรอ</div><div class="kv orange" id="k-queue">—</div></div>
      <div class="kb"><div class="kl">กำลังสร้าง</div><div class="kv" id="k-building">—</div></div>
    </div>
  </div>

  <div class="section">
    <h2>🌐 Platforms</h2>
    <div class="platforms">
      <div class="plat"><div class="plat-icon">🎵</div><div class="plat-name">TikTok</div><div class="plat-val" id="p-tk">0</div></div>
      <div class="plat"><div class="plat-icon">📸</div><div class="plat-name">IG</div><div class="plat-val" id="p-ig">0</div></div>
      <div class="plat"><div class="plat-icon">👤</div><div class="plat-name">FB</div><div class="plat-val" id="p-fb">0</div></div>
      <div class="plat"><div class="plat-icon">💚</div><div class="plat-name">LINE</div><div class="plat-val" id="p-line">0</div></div>
    </div>
  </div>

  <div class="section">
    <h2>📝 Hook ล่าสุด</h2>
    <div style="background:var(--bg2);border-radius:8px;padding:12px;font-size:13px;color:var(--txt);" id="k-hook">
      ยังไม่มีข้อมูล
    </div>
  </div>

  <div class="section">
    <div class="coming">
      <div class="coming-icon">🌐</div>
      <h3>post.viiv.me</h3>
      <p>AutoPost Module — Mobile Dashboard<br/>v1.0 Foundation</p>
      <div class="badge">● Coming Soon</div>
    </div>
  </div>
</div>

<script>
function tick(){
  const e=document.getElementById('hclock');
  if(e) e.textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
tick(); setInterval(tick,1000);

window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='viiv_token') fetchSummary(e.data.token);
});

async function fetchSummary(token){
  try{
    const r=await fetch('/api/post/summary',{headers:{Authorization:'Bearer '+token}});
    const d=await r.json();
    document.getElementById('k-today').textContent=d.posts_today||0;
    document.getElementById('k-views').textContent=(d.views_month||0).toLocaleString();
    document.getElementById('k-queue').textContent=d.queue||0;
    document.getElementById('k-building').textContent=d.building||0;
    if(d.hook_latest) document.getElementById('k-hook').textContent=d.hook_latest;
    if(d.platforms){
      document.getElementById('p-tk').textContent=d.platforms.tiktok||0;
      document.getElementById('p-ig').textContent=d.platforms.instagram||0;
      document.getElementById('p-fb').textContent=d.platforms.facebook||0;
      document.getElementById('p-line').textContent=d.platforms.line||0;
    }
  }catch(e){console.log('API not ready yet')}
}
</script>
</body>
</html>
