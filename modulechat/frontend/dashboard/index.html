<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>VIIV Chat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Chakra+Petch:wght@400;600;700&display=swap');
:root{
  --gold:#c9a84c;--gold-d:#8a6820;--gold-a:rgba(201,168,76,.16);
  --bg:#f7f3eb;--bg2:#efe9d8;--card:#fffdf8;--bdr:rgba(201,168,76,.26);
  --txt:#231908;--muted:#8a7050;--green:#2aaa58;--blue:#3878cc;
  --hh:48px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Sarabun',sans-serif;color:var(--txt);}

/* header */
#hdr{position:fixed;inset:0 0 auto 0;height:var(--hh);background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100;}
.hlogo{font-family:'Chakra Petch',sans-serif;font-size:16px;font-weight:700;color:var(--gold);}
.hmod{font-size:13px;color:var(--muted);flex:1;}
#hclock{font-family:'Chakra Petch',sans-serif;font-size:13px;color:var(--txt);font-weight:600;}

/* body */
#body{position:fixed;top:var(--hh);inset-inline:0;bottom:0;overflow-y:auto;padding:16px;}
.section{background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;padding:20px;margin-bottom:14px;}
.section h2{font-family:'Chakra Petch',sans-serif;font-size:13px;color:var(--gold-d);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;}

/* KPI grid */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.kb{background:var(--bg2);border-radius:8px;padding:10px 12px;}
.kl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.kv{font-family:'Chakra Petch',sans-serif;font-size:20px;font-weight:700;color:var(--txt);}
.kv.blue{color:var(--blue);}

/* feed */
.feed-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border-radius:8px;margin-bottom:6px;}
.feed-src{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.src-line{background:#06c755;}.src-fb{background:#1877f2;}.src-ig{background:linear-gradient(135deg,#f09040,#e02070,#a020c0);}
.feed-name{font-size:12px;font-weight:600;color:var(--gold-d);white-space:nowrap;}
.feed-msg{font-size:12px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.feed-time{font-size:10px;color:var(--muted);flex-shrink:0;}

/* coming soon overlay */
.coming{text-align:center;padding:30px 20px;}
.coming-icon{font-size:40px;margin-bottom:12px;}
.coming h3{font-family:'Chakra Petch',sans-serif;color:var(--gold);font-size:16px;margin-bottom:6px;}
.coming p{color:var(--muted);font-size:13px;line-height:1.6;}
.badge{display:inline-block;background:rgba(42,170,88,.12);color:#1a7a40;border:1px solid rgba(42,170,88,.28);border-radius:20px;padding:3px 14px;font-size:11px;font-weight:600;margin-top:10px;}
</style>
</head>
<body>
<header id="hdr">
  <div class="hlogo">VIIV</div>
  <div class="hmod">💬 Chat &amp; Showroom</div>
  <div id="hclock">--:--:--</div>
</header>

<div id="body">
  <!-- KPI -->
  <div class="section">
    <h2>📊 สรุปวันนี้</h2>
    <div class="kgrid">
      <div class="kb"><div class="kl">แชทวันนี้</div><div class="kv blue" id="k-today">—</div></div>
      <div class="kb"><div class="kl">ปิดขาย/เดือน</div><div class="kv" id="k-closed">—</div></div>
      <div class="kb"><div class="kl">Conversion</div><div class="kv" id="k-conv">—</div></div>
      <div class="kb"><div class="kl">AI ตอบ %</div><div class="kv" id="k-ai">—</div></div>
    </div>
  </div>

  <!-- Live Feed -->
  <div class="section">
    <h2>💬 Live Chat Feed</h2>
    <div id="feed-list">
      <div class="coming">
        <div class="coming-icon">💬</div>
        <h3>Chat Feed</h3>
        <p>เชื่อมต่อ LINE OA / Facebook<br/>เพื่อแสดงแชทแบบ realtime</p>
        <div class="badge">● Coming Soon</div>
      </div>
    </div>
  </div>

  <!-- Domain info -->
  <div class="section">
    <div class="coming">
      <div class="coming-icon">🌐</div>
      <h3>chat.viiv.me</h3>
      <p>Chat Module — Mobile Dashboard<br/>v1.0 Foundation</p>
    </div>
  </div>
</div>

<script>
function tick(){
  const e=document.getElementById('hclock');
  if(e) e.textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
tick(); setInterval(tick,1000);

// รับ token จาก Superboard
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='viiv_token'){
    fetchSummary(e.data.token);
  }
});

async function fetchSummary(token){
  try{
    const r=await fetch('/api/chat/summary',{headers:{Authorization:'Bearer '+token}});
    const d=await r.json();
    document.getElementById('k-today').textContent=d.today||0;
    document.getElementById('k-closed').textContent=d.closed_month||0;
    document.getElementById('k-conv').textContent=(d.conversion||0)+'%';
    document.getElementById('k-ai').textContent=(d.ai_reply_pct||0)+'%';
  }catch(e){console.log('API not ready yet')}
}
</script>
</body>
</html>
