<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>VIIV Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="chat.css?v=6959">
</head>
<body>
<div class="layout">
  <!-- LEFT PANEL -->
  <div class="panel-left" id="panel-left">
    <div class="panel-head">
      <div class="ch-title-row">
        <span class="app-title chakra ch-title">Chat AI·Auto</span>
        <div class="ch-ai-pills">
          <div class="ai-pill" id="ai-pill" data-state="loading"
               title="AI: loading..." aria-label="AI status">
            <span class="ai-pill-icon">✨</span>
          </div>
          <div class="ai-pill" id="bot-pill" data-state="loading"
               title="Bot: loading..." aria-label="Bot status">
            <span class="ai-pill-icon">🤖</span>
          </div>
        </div>
      </div>
      <span class="online-badge" id="online-count">● 0</span>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" id="tab-inbox" onclick="App.setTab('inbox',this)">📥 Inbox</button>
      <button class="tab-btn" id="tab-bot" onclick="App.setTab('bot',this)">⚙ Bot</button>
      <button class="tab-btn" id="tab-stats" onclick="App.setTab('stats',this)">↗ Stats</button>
    </div>
    <div class="ch-search-row">
      <input type="text" class="search-box ch-search" placeholder="ค้นหาชื่อ..." id="search-input" oninput="UI.filterConvs(this.value)">
      <div class="ch-platforms">
        <div class="platform-pill" data-platform="shopee" data-state="offline"
             title="Shopee — ยังไม่ได้เชื่อมต่อ" aria-label="Shopee status">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="16" cy="16" r="16" class="pill-bg-shopee"/>
            <path d="M 10 11 Q 10 7.5 16 7.5 Q 22 7.5 22 11 L 22 12.5 L 24 12.5 L 22.4 24.5 Q 22.2 25.5 21.4 25.5 L 10.6 25.5 Q 9.8 25.5 9.6 24.5 L 8 12.5 L 10 12.5 Z M 12 11 L 12 12.5 L 20 12.5 L 20 11 Q 20 8.8 16 8.8 Q 12 8.8 12 11 Z"
                  fill="#FFFFFF"/>
            <text x="16" y="20" text-anchor="middle" font-family="Georgia,serif"
                  font-size="9" font-weight="700" font-style="italic"
                  fill="#EE4D2D">S</text>
          </svg>
        </div>
        <div class="platform-pill" data-platform="lazada" data-state="offline"
             title="Lazada — ยังไม่ได้เชื่อมต่อ" aria-label="Lazada status">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="lz-pill-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0F146D"/>
                <stop offset="50%" stop-color="#5E2D8F"/>
                <stop offset="100%" stop-color="#F57224"/>
              </linearGradient>
            </defs>
            <circle cx="16" cy="16" r="16" fill="url(#lz-pill-grad)"
                    class="pill-bg-lazada"/>
            <text x="16" y="20" text-anchor="middle" font-size="8"
                  font-weight="800" fill="#FFFFFF"
                  font-family="Arial,Helvetica,sans-serif">Laz</text>
          </svg>
        </div>
      </div>
    </div>
    <!-- platform logos ย้ายขึ้น Superboard topbar (#sb-platforms) — ลบ block เดิมออก -->
    <div class="conv-list" id="conv-list">
      <div class="loading-state">กำลังโหลด...</div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right" id="panel-right">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">◌</div>
      <div class="empty-title chakra">เลือกการสนทนา</div>
      <div class="empty-sub">เลือกจากรายการทางซ้าย</div>
    </div>
    <div class="chat-window" id="chat-window" style="display:none;flex-direction:column;height:100%">
      <div class="chat-head" id="chat-head">
        <div class="chat-head-avatar" id="head-avatar">?</div>
        <div class="chat-head-info">
          <div class="chat-head-name" id="head-name">-</div>
          <div class="chat-head-sub"><span class="status-dot"></span><span id="head-platform">LINE</span> · <span id="head-time">-</span></div>
        </div>
        <div class="head-actions">
          <button type="button" class="action-btn" onclick="UI.createBill()">+ บิล</button>
          <button type="button" class="action-btn" onclick="App.reloadChat()" title="รีเฟรช">↺</button>
          <button type="button" class="action-btn danger" onclick="UI.closeConv()">✕</button>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="bot-bar" id="bot-bar">
        <span class="bot-status" id="bot-status-txt">
          <span class="bot-status-inner visible" id="bot-status-inner">🤖 Bot ทำงานอยู่</span>
        </span>
        <button class="bot-toggle" id="bot-toggle" onclick="UI.toggleBot()">หยุด Bot</button>
      </div>
      <div class="reply-box">
        <textarea class="reply-input" id="reply-input" placeholder="พิมพ์ข้อความ..." rows="1"
          oninput="UI.autoResize(this)" onkeydown="UI.handleKey(event)"></textarea>
        <button class="send-btn" onclick="UI.sendReply()">ส่ง</button>
      </div>
    </div>
    <div class="tab-panel" id="tab-bot-panel" style="display:none">
      <div class="settings-wrap">
        <div class="settings-card">
          <div class="settings-title chakra">Welcome Message</div>
          <div class="settings-sub">ข้อความต้อนรับเมื่อมีคนเพิ่มเพื่อน</div>
          <textarea class="settings-textarea" id="welcome-msg" rows="4" placeholder="สวัสดีครับ..."></textarea>
          <button class="settings-save" onclick="Bot.saveWelcome()">บันทึก</button>
        </div>
        <div class="settings-card">
          <div class="settings-title chakra">Quick Reply ลัด</div>
          <div class="settings-sub">ข้อความตอบด่วนที่ Bot ใช้บ่อย</div>
          <div id="quick-list"></div>
          <button class="settings-add" onclick="Bot.addQuickReply()">+ เพิ่ม</button>
        </div>
        <div class="settings-card">
          <div class="settings-title chakra">Bot Persona</div>
          <div class="settings-sub">บุคลิกของ Bot</div>
          <select class="settings-select" id="bot-persona">
            <option value="friendly-female">หญิง — เป็นมิตร</option>
            <option value="professional-female">หญิง — มืออาชีพ</option>
            <option value="casual-female">หญิง — สบายๆ</option>
            <option value="friendly-male">ชาย — เป็นมิตร</option>
            <option value="professional-male">ชาย — มืออาชีพ</option>
            <option value="casual-male">ชาย — สบายๆ</option>
          </select>
          <button class="settings-save" onclick="Bot.savePersona()">บันทึก</button>
        </div>
      </div>
    </div>
    <div class="tab-panel" id="tab-stats-panel" style="display:none">
      <div class="stats-wrap">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-label">แชทวันนี้</div><div class="stat-val" id="stat-today">-</div></div>
          <div class="stat-card"><div class="stat-label">แชทเดือนนี้</div><div class="stat-val" id="stat-month">-</div></div>
          <div class="stat-card"><div class="stat-label">Bot ตอบ</div><div class="stat-val" id="stat-bot">-</div></div>
          <div class="stat-card"><div class="stat-label">Conversion</div><div class="stat-val" id="stat-conv">-</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="chat-api.js?v=6959"></script>
<script src="chat-ui.js?v=6959"></script>
<script src="chat-bot.js?v=6959"></script>
<script>
(function(){
  var _initialized = false;
  function tryInit(){
    if(_initialized) return;
    _initialized = true;
    App.init();
  }
  if(localStorage.getItem('viiv_token')){
    tryInit();
  } else {
    window.addEventListener('message', function(e){
      if(e.data && e.data.type === 'init_staff' && e.data.token){
        localStorage.setItem('viiv_token', e.data.token);
        tryInit();
      }
    });
  }
})();
</script>
</body>
</html>
