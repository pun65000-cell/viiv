<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>VIIV Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="chat.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="topbar-logo chakra">VIIV</span>
  <div class="topbar-sep"></div>
  <span class="topbar-title">Chat Dashboard</span>
  <div class="topbar-tabs">
    <button class="tab-btn active" onclick="App.setTab('inbox')" id="tab-inbox">
      <span class="tab-dot"></span> Inbox
    </button>
    <button class="tab-btn" onclick="App.setTab('bot')" id="tab-bot">
      ⚙ Bot
    </button>
    <button class="tab-btn" onclick="App.setTab('stats')" id="tab-stats">
      ↗ Stats
    </button>
  </div>
  <div class="topbar-right">
    <span class="online-badge" id="online-count">● 0 online</span>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <!-- LEFT: Conversation List -->
  <div class="panel-left" id="panel-left">
    <div class="panel-left-head">
      <input class="search-box" placeholder="ค้นหาชื่อ..." id="search-input" oninput="UI.filterConvs(this.value)">
      <div class="filter-row">
        <button class="filter-chip active" onclick="UI.setFilter('all',this)">ทั้งหมด</button>
        <button class="filter-chip" onclick="UI.setFilter('line',this)">LINE</button>
        <button class="filter-chip" onclick="UI.setFilter('unread',this)">ยังไม่อ่าน</button>
        <button class="filter-chip" onclick="UI.setFilter('open',this)">เปิด</button>
      </div>
    </div>
    <div class="conv-list" id="conv-list">
      <div class="loading-state">กำลังโหลด...</div>
    </div>
  </div>

  <!-- RIGHT: Chat Window -->
  <div class="panel-right" id="panel-right">

    <!-- Empty state -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">◌</div>
      <div class="empty-title chakra">เลือกการสนทนา</div>
      <div class="empty-sub">เลือกจากรายการทางซ้าย</div>
    </div>

    <!-- Chat window (hidden by default) -->
    <div class="chat-window" id="chat-window" style="display:none">

      <!-- Chat Header -->
      <div class="chat-head" id="chat-head">
        <div class="chat-head-avatar" id="head-avatar">?</div>
        <div class="chat-head-info">
          <div class="chat-head-name" id="head-name">-</div>
          <div class="chat-head-sub">
            <span class="status-dot"></span>
            <span id="head-platform">LINE</span>
            <span id="head-time">-</span>
          </div>
        </div>
        <div class="head-actions">
          <button class="action-btn" onclick="UI.openLineProfile()">LINE Profile</button>
          <button class="action-btn" onclick="UI.createBill()">+ บิล</button>
          <button class="action-btn danger" onclick="UI.closeConv()">ปิด</button>
        </div>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="chat-messages"></div>

      <!-- Bot status bar -->
      <div class="bot-bar" id="bot-bar">
        <span class="bot-status" id="bot-status-txt">🤖 Bot ทำงานอยู่</span>
        <button class="bot-toggle" id="bot-toggle" onclick="UI.toggleBot()">หยุด Bot</button>
      </div>

      <!-- Reply box -->
      <div class="reply-box" id="reply-box">
        <div class="quick-replies" id="quick-replies"></div>
        <div class="reply-input-row">
          <textarea class="reply-input" id="reply-input" placeholder="พิมพ์ข้อความ..." rows="1"
            oninput="UI.autoResize(this)" onkeydown="UI.handleKey(event)"></textarea>
          <button class="send-btn" onclick="UI.sendReply()">ส่ง</button>
        </div>
      </div>

    </div>

    <!-- BOT SETTINGS TAB -->
    <div class="tab-panel" id="tab-bot-panel" style="display:none">
      <div class="settings-wrap">
        <div class="settings-card">
          <div class="settings-title chakra">Welcome Message</div>
          <div class="settings-sub">ข้อความต้อนรับเมื่อมีคนเพิ่มเพื่อน</div>
          <textarea class="settings-textarea" id="welcome-msg" rows="4"
            placeholder="สวัสดีครับ ยินดีต้อนรับ..."></textarea>
          <button class="settings-save" onclick="Bot.saveWelcome()">บันทึก</button>
        </div>
        <div class="settings-card">
          <div class="settings-title chakra">Quick Reply ลัด</div>
          <div class="settings-sub">ข้อความตอบด่วนที่ Bot ใช้บ่อย</div>
          <div id="quick-list"></div>
          <button class="settings-add" onclick="Bot.addQuickReply()">+ เพิ่ม</button>
        </div>
        <div class="settings-card">
          <div class="settings-title chakra">Bot Persona</div>
          <div class="settings-sub">บุคลิกของ Bot</div>
          <select class="settings-select" id="bot-persona">
            <option value="friendly-female">หญิง — เป็นมิตร (แนะนำ)</option>
            <option value="professional-female">หญิง — มืออาชีพ</option>
            <option value="casual-female">หญิง — สบายๆ</option>
            <option value="friendly-male">ชาย — เป็นมิตร</option>
            <option value="professional-male">ชาย — มืออาชีพ</option>
            <option value="casual-male">ชาย — สบายๆ</option>
          </select>
          <button class="settings-save" onclick="Bot.savePersona()">บันทึก</button>
        </div>
      </div>
    </div>

    <!-- STATS TAB -->
    <div class="tab-panel" id="tab-stats-panel" style="display:none">
      <div class="stats-wrap">
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card"><div class="stat-label">แชทวันนี้</div><div class="stat-val" id="stat-today">-</div></div>
          <div class="stat-card"><div class="stat-label">แชทเดือนนี้</div><div class="stat-val" id="stat-month">-</div></div>
          <div class="stat-card"><div class="stat-label">Bot ตอบ</div><div class="stat-val" id="stat-bot">-</div></div>
          <div class="stat-card"><div class="stat-label">Conversion</div><div class="stat-val" id="stat-conv">-%</div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="chat-api.js"></script>
<script src="chat-ui.js"></script>
<script src="chat-bot.js"></script>
<script>App.init()</script>
</body>
</html>
