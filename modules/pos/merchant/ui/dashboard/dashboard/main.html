<style>
:root{
  --g:#E8B93E;--gt:#1a1200;--bd:#d4b866;--bg:#fff;--tx:#1a1a1a;--mu:#888;
  --bl:#ede8d8;--gl:#fdf6e3;--gm:#f5e4a8;--red:#e53e3e;--grn:#38a169;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--tx);font-size:13px;}

.dash{padding:16px;}

/* KPI CARDS */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--bl);border-radius:var(--r);padding:28px 24px;min-height:130px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;}
.kpi::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--g);}
.kpi-lbl{font-size:13px;color:var(--mu);font-weight:600;margin-bottom:8px;}
.kpi-val{font-size:48px;font-weight:700;color:var(--g);line-height:1;}
.kpi-sub{font-size:13px;color:var(--mu);margin-top:6px;}
.kpi.green::after{background:var(--grn);}
.kpi.green .kpi-val{color:var(--grn);}
.kpi.red::after{background:var(--red);}
.kpi.red .kpi-val{color:var(--red);}
.kpi.blue::after{background:#3b82f6;}
.kpi.blue .kpi-val{color:#3b82f6;}

/* TARGET */
.target-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.target-card{background:#fff;border:1px solid var(--bl);border-radius:var(--r);padding:14px;}
.target-card h3{font-size:12px;font-weight:700;color:var(--mu);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px;}
.target-inp-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.target-inp-row label{font-size:11px;color:var(--mu);white-space:nowrap;}
.target-inp{height:28px;padding:0 8px;border:1px solid var(--bd);border-radius:6px;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;color:var(--tx);outline:none;width:120px;background:var(--gl);}
.target-inp:focus{border-color:var(--g);}
.prog-wrap{background:#f3f3f3;border-radius:20px;height:8px;overflow:hidden;margin-bottom:5px;}
.prog-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--g),#f5c842);transition:width .6s ease;}
.prog-bar.danger{background:linear-gradient(90deg,var(--red),#f87171);}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--mu);}
.prog-pct{font-weight:700;color:var(--g);}

/* CHART */
.chart-row{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:14px;}
.chart-card{background:#fff;border:1px solid var(--bl);border-radius:var(--r);padding:14px;}
.chart-card h3{font-size:12px;font-weight:700;color:var(--mu);margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px;display:flex;justify-content:space-between;align-items:center;}
.chart-wrap{height:150px;overflow:hidden;}
.chart-wrap svg{width:100%;height:100%;display:block;}

/* SOURCE */
.src-list{display:flex;flex-direction:column;gap:7px;}
.src-item{display:flex;align-items:center;gap:8px;}
.src-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.src-lbl{flex:1;font-size:12px;color:var(--tx);}
.src-val{font-size:12px;font-weight:700;}
.src-bar-wrap{width:80px;background:#f3f3f3;border-radius:4px;height:5px;overflow:hidden;}
.src-bar{height:100%;border-radius:4px;transition:width .5s;}

/* PERIOD */
.period-tabs{display:flex;gap:4px;margin-bottom:12px;}
.ptab{height:24px;padding:0 10px;border:1px solid var(--bd);border-radius:5px;font-family:'Sarabun',sans-serif;font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:var(--mu);transition:all .15s;}
.ptab.active{background:var(--g);color:var(--gt);border-color:var(--g);}

/* QUARTER */
.q-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.q-card{background:var(--gl);border:1px solid var(--bl);border-radius:8px;padding:8px 10px;text-align:center;}
.q-lbl{font-size:10px;color:var(--mu);font-weight:600;margin-bottom:3px;}
.q-val{font-size:14px;font-weight:700;color:var(--tx);}
.q-sub{font-size:10px;color:var(--mu);}
</style>

<div class="dash">

  <!-- KPI -->
  <div class="kpi-row" id="kpiRow">
    <div class="kpi"><div class="kpi-lbl">ยอดขายวันนี้</div><div class="kpi-val" id="kSaleToday">—</div><div class="kpi-sub">บาท</div></div>
    <div class="kpi green"><div class="kpi-lbl">ออเดอร์ใหม่</div><div class="kpi-val" id="kOrders">—</div><div class="kpi-sub">รายการ</div></div>
    <div class="kpi blue"><div class="kpi-lbl">สินค้าทั้งหมด</div><div class="kpi-val" id="kProducts">—</div><div class="kpi-sub">รายการ</div></div>
    <div class="kpi"><div class="kpi-lbl">สมาชิก</div><div class="kpi-val" id="kMembers">—</div><div class="kpi-sub">คน</div></div>
  </div>

  <!-- TARGET + QUARTER -->
  <div class="target-row">
    <div class="target-card">
      <h3>เป้าหมายยอดขาย</h3>
      <div class="target-inp-row">
        <label>เป้า/เดือน</label>
        <input type="number" class="target-inp" id="targetMonth" placeholder="0">
        <span style="font-size:11px;color:var(--mu)">฿</span>
        <button onclick="saveTarget()" style="height:28px;padding:0 10px;border:none;border-radius:6px;background:var(--g);color:var(--gt);font-family:'Sarabun',sans-serif;font-size:11.5px;font-weight:700;cursor:pointer;">บันทึก</button>
      </div>
      <div class="prog-wrap"><div class="prog-bar" id="progMonth" style="width:0%"></div></div>
      <div class="prog-label"><span id="progMonthLbl">฿0 / ฿0</span><span class="prog-pct" id="progMonthPct">0%</span></div>
    </div>
    <div class="target-card">
      <h3>รายไตรมาส / รายปี</h3>
      <div class="q-row" id="qRow">
        <div class="q-card"><div class="q-lbl">Q1</div><div class="q-val" id="q1">—</div></div>
        <div class="q-card"><div class="q-lbl">Q2</div><div class="q-val" id="q2">—</div></div>
        <div class="q-card"><div class="q-lbl">Q3</div><div class="q-val" id="q3">—</div></div>
        <div class="q-card"><div class="q-lbl">Q4</div><div class="q-val" id="q4">—</div></div>
      </div>
      <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:11px;color:var(--mu)">รวมปีนี้</span>
        <span style="font-size:15px;font-weight:700;color:var(--g)" id="yearTotal">฿0</span>
      </div>
    </div>
  </div>

  <!-- CHART + SOURCE -->
  <div class="chart-row">
    <div class="chart-card">
      <h3>
        <span>ยอดขาย 7 วัน</span>
        <div class="period-tabs">
          <button class="ptab active" onclick="setPeriod(7,this)">7วัน</button>
          <button class="ptab" onclick="setPeriod(30,this)">30วัน</button>
          <button class="ptab" onclick="setPeriod(90,this)">3เดือน</button>
        </div>
      </h3>
      <div class="chart-wrap" id="chartWrap"><svg id="saleChart"></svg></div>
    </div>
    <div class="chart-card">
      <h3>แหล่งรายได้</h3>
      <div class="src-list" id="srcList"></div>
    </div>
  </div>

</div>

<script>
var TOKEN='', API_BASE='', _period=7;
var SOURCES=[
  {k:'pos',   l:'POS',       c:'#E8B93E'},
  {k:'order', l:'Order',     c:'#38a169'},
  {k:'chat',  l:'Chat',      c:'#3b82f6'},
  {k:'auto',  l:'Auto Post', c:'#8b5cf6'},
];

function _tok_dash(e){if(e&&e.detail&&e.detail.token)TOKEN=e.detail.token;init();}
window.removeEventListener('viiv_token_ready',window._tok_dash);
window._tok_dash=_tok_dash;
window.addEventListener('viiv_token_ready',_tok_dash);
var _t=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
if(_t)_tok_dash({detail:{token:_t}});

function init(){
  API_BASE=window.API_BASE||'';
  var saved=localStorage.getItem('viiv_dash_target');
  if(saved){document.getElementById('targetMonth').value=saved;}
  loadKpi();
  loadSales();
}

async function loadKpi(){
  try{
    var r=await fetch(API_BASE+'/api/pos/bills/list?limit=1',{headers:{'Authorization':'Bearer '+TOKEN}});
    if(r.ok){var d=await r.json();setEl('kOrders',d.total||d.length||0);}
  }catch(e){}
  try{
    var r2=await fetch(API_BASE+'/api/pos/products/list?limit=1',{headers:{'Authorization':'Bearer '+TOKEN}});
    if(r2.ok){var d2=await r2.json();setEl('kProducts',d2.total||((d2.items||d2).length)||0);}
  }catch(e){}
  try{
    var r3=await fetch(API_BASE+'/api/pos/members/list?limit=1',{headers:{'Authorization':'Bearer '+TOKEN}});
    if(r3.ok){var d3=await r3.json();setEl('kMembers',d3.total||d3.length||0);}
  }catch(e){}
}

async function loadSales(){
  try{
    var r=await fetch(API_BASE+'/api/pos/bills/list?limit=200',{headers:{'Authorization':'Bearer '+TOKEN}});
    if(!r.ok)return;
    var d=await r.json();
    var bills=(d.items||d).filter(function(b){return b.status!=='voided'&&b.status!=='deleted';});
    processBills(bills);
  }catch(e){renderChart([],[]);renderSources({});renderQuarters([]);}
}

function processBills(bills){
  var now=new Date();
  var today=now.toISOString().slice(0,10);

  // KPI today
  var todaySales=bills.filter(function(b){
    return (b.created_at||b.date||'').slice(0,10)===today&&b.financial_status==='paid';
  }).reduce(function(s,b){return s+(+b.total||0);},0);
  setEl('kSaleToday','฿'+todaySales.toLocaleString());

  // Chart data
  var days=[];
  for(var i=_period-1;i>=0;i--){
    var d=new Date(now);d.setDate(d.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }
  var chartVals=days.map(function(day){
    return bills.filter(function(b){return (b.created_at||b.date||'').slice(0,10)===day&&b.financial_status==='paid';})
      .reduce(function(s,b){return s+(+b.total||0);},0);
  });
  var chartLabels=days.map(function(d){return d.slice(5);});
  renderChart(chartLabels,chartVals);

  // Sources (mock ratio — wire จาก field จริงเมื่อมี)
  var totalPaid=bills.filter(function(b){return b.financial_status==='paid';})
    .reduce(function(s,b){return s+(+b.total||0);},0);
  var srcData={
    pos:  bills.filter(function(b){return b.financial_status==='paid'&&(!b.source||b.source==='pos');}).reduce(function(s,b){return s+(+b.total||0);},0),
    order:bills.filter(function(b){return b.financial_status==='paid'&&b.source==='order';}).reduce(function(s,b){return s+(+b.total||0);},0),
    chat: bills.filter(function(b){return b.financial_status==='paid'&&b.source==='chat';}).reduce(function(s,b){return s+(+b.total||0);},0),
    auto: bills.filter(function(b){return b.financial_status==='paid'&&b.source==='auto';}).reduce(function(s,b){return s+(+b.total||0);},0),
  };
  // fallback: ถ้าไม่มี source field ให้แสดง POS ทั้งหมด
  if(!srcData.order&&!srcData.chat&&!srcData.auto) srcData.pos=totalPaid;
  renderSources(srcData);

  // Quarters
  renderQuarters(bills);
  updTarget(todaySales);
}

function renderChart(labels,vals){
  var wrap=document.getElementById('chartWrap');
  if(!wrap)return;
  var W=wrap.offsetWidth||600, H=150;
  var step=labels.length<=7?1:labels.length<=30?5:10;
  var max=Math.max.apply(null,vals.length?vals:[1])||1;
  var pad={t:10,b:22,l:8,r:8};
  var iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  var n=vals.length||1;
  var bw=iW/n, barW=Math.max(bw*0.5,4);
  var ns='http://www.w3.org/2000/svg';
  var svg=document.getElementById('saleChart');
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.innerHTML='';
  // grid lines
  [0.25,0.5,0.75,1].forEach(function(r){
    var y=pad.t+iH*(1-r);
    var line=document.createElementNS(ns,'line');
    line.setAttribute('x1',pad.l);line.setAttribute('x2',W-pad.r);
    line.setAttribute('y1',y);line.setAttribute('y2',y);
    line.setAttribute('stroke','#f0ece0');line.setAttribute('stroke-width','1');
    svg.appendChild(line);
  });
  // bars + labels
  vals.forEach(function(v,i){
    var x=pad.l+i*bw+(bw-barW)/2;
    var h=Math.max((v/max)*iH,1);
    var y=pad.t+iH-h;
    // gradient def
    var defs=svg.querySelector('defs');
    if(!defs){defs=document.createElementNS(ns,'defs');svg.insertBefore(defs,svg.firstChild);}
    var gid='bg'+i;
    var grad=document.createElementNS(ns,'linearGradient');
    grad.setAttribute('id',gid);grad.setAttribute('x1','0');grad.setAttribute('y1','0');grad.setAttribute('x2','0');grad.setAttribute('y2','1');
    var s1=document.createElementNS(ns,'stop');s1.setAttribute('offset','0%');s1.setAttribute('stop-color','#E8B93E');
    var s2=document.createElementNS(ns,'stop');s2.setAttribute('offset','100%');s2.setAttribute('stop-color','rgba(232,185,62,0.25)');
    grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);
    var rect=document.createElementNS(ns,'rect');
    rect.setAttribute('x',x);rect.setAttribute('y',y);
    rect.setAttribute('width',barW);rect.setAttribute('height',h);
    rect.setAttribute('rx','3');rect.setAttribute('fill','url(#'+gid+')');
    svg.appendChild(rect);
    if(labels[i]&&i%step===0){
      var txt=document.createElementNS(ns,'text');
      txt.setAttribute('x',x+barW/2);txt.setAttribute('y',H-5);
      txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','9');
      txt.setAttribute('fill','#aaa');txt.setAttribute('font-family','Sarabun,sans-serif');
      txt.textContent=labels[i];
      svg.appendChild(txt);
    }
  });
}

function renderSources(data){
  var el=document.getElementById('srcList');
  if(!el)return;
  var total=Object.values(data).reduce(function(s,v){return s+v;},0)||1;
  el.innerHTML=SOURCES.map(function(s){
    var v=data[s.k]||0;
    var pct=Math.round(v/total*100);
    return '<div class="src-item">'
      +'<div class="src-dot" style="background:'+s.c+'"></div>'
      +'<div class="src-lbl">'+s.l+'</div>'
      +'<div class="src-bar-wrap"><div class="src-bar" style="width:'+pct+'%;background:'+s.c+'"></div></div>'
      +'<div class="src-val" style="color:'+s.c+';min-width:50px;text-align:right">฿'+v.toLocaleString()+'</div>'
    +'</div>';
  }).join('');
}

function renderQuarters(bills){
  var year=new Date().getFullYear();
  var qs=[[1,3],[4,6],[7,9],[10,12]];
  var totals=qs.map(function(q){
    return bills.filter(function(b){
      var dt=new Date(b.created_at||b.date||0);
      var m=dt.getMonth()+1;
      return dt.getFullYear()===year&&m>=q[0]&&m<=q[1]&&b.financial_status==='paid';
    }).reduce(function(s,b){return s+(+b.total||0);},0);
  });
  var yearSum=totals.reduce(function(a,b){return a+b;},0);
  ['q1','q2','q3','q4'].forEach(function(id,i){
    setEl(id,'฿'+totals[i].toLocaleString());
  });
  setEl('yearTotal','฿'+yearSum.toLocaleString());
}

function saveTarget(){
  var target=parseFloat(document.getElementById('targetMonth').value)||0;
  localStorage.setItem('viiv_dash_target',target);
  loadSales();
  var btn=event.target;btn.textContent='✓ บันทึก';
  setTimeout(function(){btn.textContent='บันทึก';},1500);
}
function updTarget(todaySales){
  var target=parseFloat(localStorage.getItem('viiv_dash_target'))||0;
  if(document.getElementById('targetMonth').value==='')
    document.getElementById('targetMonth').value=target||'';
  // ใช้ยอดขายเดือนนี้ (mock จาก today ก่อน — wire จาก API เมื่อมี endpoint)
  var actual=todaySales||0;
  var pct=target>0?Math.min(Math.round(actual/target*100),100):0;
  var bar=document.getElementById('progMonth');
  bar.style.width=pct+'%';
  bar.className='prog-bar'+(pct<30?' danger':'');
  setEl('progMonthLbl','฿'+actual.toLocaleString()+' / ฿'+target.toLocaleString());
  setEl('progMonthPct',pct+'%');
  document.querySelector('.prog-pct').style.color=pct<30?'var(--red)':'var(--g)';
}

function setPeriod(p,btn){
  _period=p;
  document.querySelectorAll('.ptab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var titles={7:'ยอดขาย 7 วัน',30:'ยอดขาย 30 วัน',90:'ยอดขาย 3 เดือน'};
  var h3=btn.closest('.chart-card').querySelector('h3 span');
  if(h3)h3.textContent=titles[p]||'ยอดขาย';
  loadSales();
}

function setEl(id,val){var e=document.getElementById(id);if(e)e.textContent=val;}
</script>
