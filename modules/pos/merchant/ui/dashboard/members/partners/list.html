<body>
<div class="pt-wrap">
  <div class="pt-header">
    <div class="pt-search-row">
      <input id="ptSearch" class="pt-input" placeholder="ค้นหาชื่อ / เลขผู้เสียภาษี / เบอร์..." oninput="ptFilter()"/>
      <select id="ptType" class="pt-select" onchange="ptFilter()">
        <option value="">ประเภทคู่ค้าทั้งหมด</option>
        <option value="supplier">ซัพพลายเออร์</option>
        <option value="distributor">ตัวแทนจำหน่าย</option>
        <option value="manufacturer">ผู้ผลิต</option>
        <option value="service">บริการ</option>
        <option value="other">อื่นๆ</option>
      </select>
    </div>
    <button class="pt-btn-new" onclick="ptOpenForm(null)">+ สร้างคู่ค้า</button>
  </div>
  <div id="quota-bar-members-list"></div>
  <div id="ptList" class="pt-list"></div>
  <div id="ptPager"></div>
  <div id="ptOverlay" class="pt-overlay" style="display:none;" onclick="ptCloseForm()"></div>
  <div id="ptFormWrap" class="pt-form-wrap" style="display:none;"></div>
  <div id="ptDelModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;padding:24px;width:360px;max-width:94vw;font-family:Sarabun,sans-serif;">
      <div style="font-size:15px;font-weight:700;margin-bottom:10px;">ยืนยันการลบ</div>
      <div style="font-size:13px;color:#6b7280;margin-bottom:20px;">คุณต้องการลบคู่ค้ารายนี้ใช่หรือไม่? ไม่สามารถกู้คืนได้</div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button onclick="document.getElementById('ptDelModal').style.display='none'" style="height:34px;padding:0 16px;border:1px solid #d1d5db;border-radius:7px;background:#fff;font-size:13px;cursor:pointer;">ยกเลิก</button>
        <button id="ptDelBtn" style="height:34px;padding:0 16px;border:none;border-radius:7px;background:#ef4444;color:#fff;font-size:13px;font-weight:700;cursor:pointer;">ลบ</button>
      </div>
    </div>
  </div>
</div>
<style>
:root{--g:#E8B93E;--gt:#1a1200;--bd:#d4b866;--bl:#ede8d8;--gl:#fdf6e3;}
*{box-sizing:border-box;}
body{font-family:"Sarabun",sans-serif;font-size:13px;color:#1a1a1a;}
.pt-wrap{padding:4px 0;}
.pt-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.pt-search-row{display:flex;gap:8px;flex:1;flex-wrap:wrap;}
.pt-input{flex:1;min-width:160px;padding:7px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;outline:none;font-family:"Sarabun",sans-serif;}
.pt-input:focus{border-color:var(--g);}
.pt-select{padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff;outline:none;font-family:"Sarabun",sans-serif;}
.pt-btn-new{padding:8px 16px;background:var(--g);color:var(--gt);border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
.pt-list{display:flex;flex-direction:column;gap:6px;}
.pt-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border:1px solid #e5e5e5;border-radius:10px;cursor:pointer;transition:.15s;}
.pt-row:hover{border-color:var(--g);background:var(--gl);}
.pt-avatar{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;}
.pt-info{flex:1;min-width:0;}
.pt-name{font-size:13px;font-weight:700;color:#1f2937;}
.pt-meta{font-size:11px;color:#6b7280;margin-top:2px;}
.pt-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;background:#f0ede8;color:#374151;margin-top:3px;}
.pt-badge.supplier{background:#e7f0fd;color:#1d4ed8;}
.pt-badge.distributor{background:#fef3c7;color:#92400e;}
.pt-badge.manufacturer{background:#f0fdf4;color:#166534;}
.pt-badge.person{background:#fdf4ff;color:#7e22ce;}
.pt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;}
.pt-form-wrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(660px,96vw);max-height:92vh;overflow-y:auto;background:#fff;border-radius:14px;z-index:201;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.pt-form-wrap::-webkit-scrollbar{width:4px;}
.pt-form-wrap::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
.pf{padding:22px 24px;}
.pf-title{font-size:15px;font-weight:700;margin-bottom:16px;}
.pf-sec{font-size:11px;font-weight:700;color:var(--g);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bl);text-transform:uppercase;letter-spacing:.5px;}
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.pf-full{grid-column:1/-1;}
.pf-lbl{font-size:11px;font-weight:600;color:#6b7280;display:block;margin-bottom:3px;}.pf-lbl.req::after{content:" *";color:#ef4444;}
.pf-inp{width:100%;height:34px;padding:0 10px;border:1px solid #d1d5db;border-radius:7px;font-family:"Sarabun",sans-serif;font-size:13px;outline:none;background:#fff;transition:border-color .15s;color:#1a1a1a;}
.pf-inp:hover{border-color:#9ca3af;}.pf-inp:focus{border-color:var(--g);box-shadow:0 0 0 2px rgba(232,185,62,.15);}
.pf-sel{width:100%;height:34px;padding:0 8px;border:1px solid #d1d5db;border-radius:7px;font-family:"Sarabun",sans-serif;font-size:13px;outline:none;background:#fff;transition:border-color .15s;}
.pf-ta{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;font-family:"Sarabun",sans-serif;font-size:13px;outline:none;resize:vertical;min-height:70px;transition:border-color .15s;}
.pf-ta:hover,.pf-sel:hover{border-color:#9ca3af;}.pf-ta:focus,.pf-sel:focus{border-color:var(--g);box-shadow:0 0 0 2px rgba(232,185,62,.15);}
.et-row{display:flex;gap:6px;margin-bottom:14px;}
.et-btn{flex:1;height:32px;border:1.5px solid var(--bd);border-radius:7px;background:#fff;font-family:"Sarabun",sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;color:#6b7280;}
.et-btn.active{background:var(--g);color:var(--gt);border-color:var(--g);}
.av-circle{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0;cursor:pointer;border:3px solid var(--g);}
.pf-actions{display:flex;align-items:center;gap:10px;padding-top:14px;border-top:1px solid var(--bl);margin-top:4px;}
.btn-del{height:34px;padding:0 14px;border:1px solid #fca5a5;border-radius:7px;background:#fff;color:#ef4444;font-family:"Sarabun",sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;}
.btn-cancel{height:34px;padding:0 16px;border:1px solid var(--bd);border-radius:7px;background:#fff;font-family:"Sarabun",sans-serif;font-size:13px;cursor:pointer;}
.btn-save{height:34px;padding:0 20px;border:none;border-radius:7px;background:var(--g);color:var(--gt);font-family:"Sarabun",sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-save:disabled{background:#e5e7eb;color:#9ca3af;cursor:not-allowed;}
.doc-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.doc-chip{display:flex;align-items:center;gap:5px;padding:3px 8px;background:#f3f4f6;border-radius:6px;font-size:11px;}
.ac-wrap{position:relative;}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--bd);border-radius:7px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:9999;max-height:200px;overflow-y:auto;font-size:12.5px;}
.ac-item{padding:7px 10px;cursor:pointer;border-bottom:1px solid #f3f4f6;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover{background:var(--gl);}
.ac-item .ac-sub{font-size:10.5px;color:#9ca3af;}
</style>
<script src="../../_shared/quota.js?v=0657"></script>
<script>
(function(){
"use strict";
var API=window.API_BASE||"";
var TOKEN=window.VIIV_TOKEN||localStorage.getItem("viiv_token")||"";
var PAGE=20,page=1,all=[],filtered=[],editId=null,pendingDocs=[];
var COLORS=["#e8b93e","#38a169","#3b82f6","#8b5cf6","#ef4444","#f97316"];

function tok(e){if(e&&e.detail&&e.detail.token)TOKEN=e.detail.token;load();}
window.removeEventListener("viiv_token_ready",window._tok_pt);
window._tok_pt=tok;
window.addEventListener("viiv_token_ready",tok);
var _t=window.VIIV_TOKEN||localStorage.getItem("viiv_token")||"";
if(_t)tok({detail:{token:_t}});

function load(){
  fetch(API+"/api/pos/partners/list",{headers:{"Authorization":"Bearer "+TOKEN}})
  .then(function(r){return r.json();})
  .then(function(d){all=d||[];ptFilter();try{if(window.loadQuotaBar)window.loadQuotaBar('members-list');}catch(e){}})
  .catch(function(){all=[];ptFilter();});
}

window.ptFilter=function(reset){
  if(reset!==false)page=1;
  var q=document.getElementById("ptSearch").value.toLowerCase();
  var t=document.getElementById("ptType").value;
  filtered=all.filter(function(p){
    var mq=!q||(p.company_name||"").toLowerCase().includes(q)||(p.tax_id||"").includes(q)||(p.contact_phone||p.phone||"").includes(q);
    var mt=!t||p.partner_type===t;
    return mq&&mt;
  });
  render();
};

function aColor(n){return COLORS[(n||"").charCodeAt(0)%COLORS.length];}

function render(){
  var el=document.getElementById("ptList");
  var n=filtered.length;
  if(!n){
    el.innerHTML="<div style=\"color:#aaa;padding:40px;text-align:center;\">\u0e44\u0e21\u0e48\u0e1e\u0e1a\u0e1a\u0e23\u0e34\u0e29\u0e31\u0e17\u0e04\u0e39\u0e48\u0e04\u0e49\u0e32</div>";
    document.getElementById("ptPager").innerHTML="";
    return;
  }
  var tp=Math.ceil(n/PAGE);
  var pg=filtered.slice((page-1)*PAGE,page*PAGE);
  var tmap={supplier:"\u0e0b\u0e31\u0e1e\u0e1e\u0e25\u0e32\u0e22\u0e40\u0e2d\u0e2d\u0e23\u0e4c",distributor:"\u0e15\u0e31\u0e27\u0e41\u0e17\u0e19",manufacturer:"\u0e1c\u0e39\u0e49\u0e1c\u0e25\u0e34\u0e15",service:"\u0e1a\u0e23\u0e34\u0e01\u0e32\u0e23",other:"\u0e2d\u0e37\u0e48\u0e19\u0e46"};
  var rows=pg.map(function(p){
    var init=(p.company_name||"?").charAt(0).toUpperCase();
    var av=p.avatar_url?"<img src=\""+p.avatar_url+"\" style=\"width:100%;height:100%;object-fit:cover;\">":"<span>"+init+"</span>";
    var eB=p.entity_type==="person"?"<span class=\"pt-badge person\">\u0e1a\u0e38\u0e04\u0e04\u0e25</span>":"<span class=\"pt-badge\">\u0e19\u0e34\u0e15\u0e34\u0e1a\u0e38\u0e04\u0e04\u0e25</span>";
    return "<div class=\"pt-row\" onclick=\"ptOpenForm('"+p.id+"')\">"+
      "<div class=\"pt-avatar\" style=\"background:"+aColor(p.company_name)+"\">"+av+"</div>"+
      "<div class=\"pt-info\">"+
        "<div class=\"pt-name\">"+(p.company_name||"?")+"</div>"+
        "<div class=\"pt-meta\"><span style=\"font-weight:600;color:var(--g);\">"+( p.partner_code||"")+"</span>"+(p.partner_code?" · ":"")+(p.tax_id?"\u0e40\u0e25\u0e02: "+p.tax_id+" | ":"")+(p.contact_phone||p.phone||"-")+"</div>"+
        eB+" <span class=\"pt-badge "+(p.partner_type||"other")+"\">"+( tmap[p.partner_type]||"\u0e2d\u0e37\u0e48\u0e19\u0e46")+"</span>"+
      "</div>"+
      "<div style=\"text-align:right;flex-shrink:0;\">"+
        "<div style=\"font-size:12px;font-weight:700;color:var(--g);\">\u0e3f"+(p.credit_limit||0).toLocaleString()+"</div>"+
        "<div style=\"font-size:10px;color:#6b7280;\">\u0e27\u0e07\u0e40\u0e07\u0e34\u0e19</div>"+
      "</div>"+
    "</div>";
  }).join("");
  el.innerHTML=rows;
  var pager=document.getElementById("ptPager");
  if(tp>1){
    pager.innerHTML="<div style=\"display:flex;justify-content:center;gap:8px;margin-top:12px;\">"+
      "<button onclick=\"ptPage("+(page-1)+")\""+(page<=1?" disabled":"")+
      " style=\"padding:5px 12px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;\">&#9664;</button>"+
      "<span style=\"font-size:12px;color:#6b7280;align-self:center;\">"+page+"/"+tp+" ("+n+" \u0e23\u0e32\u0e22\u0e01\u0e32\u0e23)</span>"+
      "<button onclick=\"ptPage("+(page+1)+")\""+(page>=tp?" disabled":"")+
      " style=\"padding:5px 12px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;\">&#9654;</button>"+
    "</div>";
  } else {pager.innerHTML="";}
}

window.ptPage=function(p){if(p<1||p>Math.ceil(filtered.length/PAGE))return;page=p;render();};

window.ptOpenForm=function(id){
  editId=id;pendingDocs=[];
  var p=id?all.find(function(x){return x.id===id;}):null;
  p=p||{};
  document.getElementById("ptOverlay").style.display="block";
  var fw=document.getElementById("ptFormWrap");
  fw.style.display="block";
  fw.innerHTML=buildForm(p,!!id);
  setTimeout(function(){
    chkReq();
    initAddrAC();
  },100);
};

window.ptCloseForm=function(){
  document.getElementById("ptOverlay").style.display="none";
  document.getElementById("ptFormWrap").style.display="none";
  editId=null;pendingDocs=[];
};

function fi(id,def){var e=document.getElementById(id);return e?e.value.trim():def||"";}
function fmtNum(el){
  var raw=el.value.replace(/,/g,"");
  if(isNaN(raw)||raw==="")return;
  el.value=Number(raw).toLocaleString("th-TH");
}
window.fmtNum=fmtNum;
var _codeTimer=null;
function debounceCheckCode(){
  clearTimeout(_codeTimer);
  var el=document.getElementById("pfCodeStatus");
  if(el)el.innerHTML="";
  _codeTimer=setTimeout(function(){
    var code=document.getElementById("pfCode").value.trim();
    if(!code)return;
    fetch(API+"/api/pos/partners/check-code?code="+encodeURIComponent(code)+(editId?"&pid="+editId:""),
      {headers:{"Authorization":"Bearer "+TOKEN}})
    .then(function(r){return r.json();})
    .then(function(d){
      var el=document.getElementById("pfCodeStatus");
      if(!el)return;
      if(d.available){
        el.innerHTML="<span style=\"color:#38a169;\">✓ ใช้ได้</span>";
      } else {
        el.innerHTML="<span style=\"color:#ef4444;\">✗ ซ้ำ</span>";
        var b=document.getElementById("pfSB");
        if(b)b.disabled=true;
      }
    }).catch(function(){});
  },600);
}
window.debounceCheckCode=debounceCheckCode;

function buildForm(p,isEdit){
  var et=p.entity_type||"company";
  var init=(p.company_name||"A").charAt(0).toUpperCase();
  var avC=aColor(p.company_name||"A");
  var avHtml=p.avatar_url?"<img id=\"pfAI\" src=\""+p.avatar_url+"\" style=\"width:100%;height:100%;object-fit:cover;\">"
    :"<span id=\"pfAT\">"+init+"</span>";

  var tOpts=["supplier:ซัพพลายเออร์","distributor:ตัวแทนจำหน่าย","manufacturer:ผู้ผลิต","service:บริการ","other:อื่นๆ"];
  var tSel=tOpts.map(function(o){var s=o.split(":");return "<option value=\""+s[0]+"\">"+(s[1])+"</option>";}).join("");

  function isReq(lbl){return lbl.indexOf("*")!==-1;}
  function row(lbl,id,type,val,ph){
    var rq=isReq(lbl);
    var lblHtml="<label class=\"pf-lbl"+(rq?" req":"")+"\">"+(rq?lbl.replace(" *",""):lbl)+"</label>";
    if(type==="select") return "<div>"+lblHtml+"<select class=\"pf-sel\" id=\""+id+"\" onchange=\"chkReq()\">"+tSel+"</select></div>";
    if(type==="ta") return "<div class=\"pf-full\">"+lblHtml+"<textarea class=\"pf-ta\" id=\""+id+"\">"+val+"</textarea></div>";
    return "<div>"+lblHtml+"<input class=\"pf-inp\" id=\""+id+"\" type=\""+type+"\" value=\""+val+"\""+
      (ph?" placeholder=\""+ph+"\"":"")+
      (type==="number"?" min=\"0\"":"")+
      " oninput=\"chkReq()\"></div>";
  }

  var h="<div class=\"pf\">"+
    "<div class=\"pf-title\">"+(isEdit?"\u2702\ufe0f \u0e08\u0e31\u0e14\u0e01\u0e32\u0e23\u0e04\u0e39\u0e48\u0e04\u0e49\u0e32":"\u2795 \u0e2a\u0e23\u0e49\u0e32\u0e07\u0e04\u0e39\u0e48\u0e04\u0e49\u0e32\u0e43\u0e2b\u0e21\u0e48")+"</div>"+
    "<div class=\"et-row\">"+
      "<button class=\"et-btn"+(et==="company"?" active":"")+"\" onclick=\"setEt('company')\">\u{1F3E2} \u0e19\u0e34\u0e15\u0e34\u0e1a\u0e38\u0e04\u0e04\u0e25</button>"+
      "<button class=\"et-btn"+(et==="person"?" active":"")+"\" onclick=\"setEt('person')\">\u{1F464} \u0e1a\u0e38\u0e04\u0e04\u0e25</button>"+
    "</div>"+
    "<input type=\"hidden\" id=\"pfET\" value=\""+et+"\">"+
    "<div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:8px 12px;background:var(--gl);border-radius:8px;border:1px solid var(--bl);\">"+      "<div style=\"flex:1;\"><label class=\"pf-lbl\">รหัสคู่ค้า <span style=\"font-size:10px;color:#aaa;\">(ถ้าว่างระบบสร้างให้อัตโนมัติ)</span></label>"+      "<input class=\"pf-inp\" id=\"pfCode\" type=\"text\" value=\""+( p.partner_code||"")+"\" placeholder=\"เช่น P00001\" oninput=\"debounceCheckCode()\" style=\"background:#fff;\"></div>"+      "<div id=\"pfCodeStatus\" style=\"font-size:11px;min-width:80px;text-align:right;\"></div>"+    "</div>"+
    "<div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px;\">"+
      "<div class=\"av-circle\" style=\"background:"+avC+"\" onclick=\"document.getElementById('pfAvatarInp').click()\">"+avHtml+"</div>"+
      "<input type=\"file\" id=\"pfAvatarInp\" accept=\"image/*\" style=\"display:none;\" onchange=\"prevAv(this)\">"+
      "<div style=\"font-size:11px;color:#9ca3af;\">\u0e01\u0e14\u0e17\u0e35\u0e48\u0e23\u0e39\u0e1b\u0e40\u0e1e\u0e37\u0e48\u0e2d\u0e40\u0e1b\u0e25\u0e35\u0e48\u0e22\u0e19</div>"+
    "</div>"+
    "<div class=\"pf-sec\">\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25\u0e1a\u0e23\u0e34\u0e29\u0e31\u0e17</div>"+
    "<div class=\"pf-grid\">"+
      row("\u0e0a\u0e37\u0e48\u0e2d\u0e1a\u0e23\u0e34\u0e29\u0e31\u0e17 / \u0e23\u0e49\u0e32\u0e19\u0e04\u0e49\u0e32 *","pfCN","text",p.company_name||"")+
      row("\u0e40\u0e25\u0e02\u0e1c\u0e39\u0e49\u0e40\u0e2a\u0e35\u0e22\u0e20\u0e32\u0e29\u0e35 *","pfTX","text",p.tax_id||"","\u0e1a\u0e38\u0e04\u0e04\u0e25: \u0e40\u0e25\u0e02\u0e1a\u0e31\u0e15\u0e23\u0e1b\u0e23\u0e30\u0e0a\u0e32\u0e0a\u0e19")+
      row("\u0e1b\u0e23\u0e30\u0e40\u0e20\u0e17\u0e04\u0e39\u0e48\u0e04\u0e49\u0e32 *","pfPT","select",p.partner_type||"supplier")+
      row("\u0e40\u0e27\u0e47\u0e1a / Social","pfSO","text",p.social_url||"")+
      row("\u0e40\u0e1a\u0e2d\u0e23\u0e4c\u0e42\u0e17\u0e23 *","pfPH","tel",p.phone||"")+
      "<div class=\"pf-full\">"+row("\u0e17\u0e35\u0e48\u0e2d\u0e22\u0e39\u0e48","pfAD","text",p.address||"")+"</div>"+
      "<div><label class=\"pf-lbl\">\u0e15\u0e33\u0e1a\u0e25/\u0e41\u0e02\u0e27\u0e07</label><input class=\"pf-inp\" id=\"pfSBD\" type=\"text\" value=\""+( p.subdistrict||"")+"\"></div>"+

window.setEt=function(v){
  document.getElementById("pfET").value=v;
  document.querySelectorAll(".et-btn").forEach(function(b){
    var oc=b.getAttribute("onclick")||"";
    b.classList.toggle("active",(v==="company"&&oc.includes("company"))||(v==="person"&&oc.includes("person")));

};

window.prevAv=function(inp){
  if(!inp.files||!inp.files[0])return;
  var r=new FileReader();
  r.onload=function(e){
    var av=document.getElementById("pfAvatarInp").previousElementSibling;
    av.innerHTML="<img id=\"pfAI\" src=\""+e.target.result+"\" style=\"width:100%;height:100%;object-fit:cover;\">";
  };
  r.readAsDataURL(inp.files[0]);
};

window.prevDocs=function(inp){
  if(!inp.files)return;
  Array.from(inp.files).forEach(function(f){pendingDocs.push(f);});
  var dl=document.getElementById("pfDL");
  if(dl) dl.innerHTML=pendingDocs.map(function(f,i){
    return "<div class=\"doc-chip\">\ud83d\udcce "+f.name+" <span onclick=\"pendingDocs.splice("+i+",1);\" style=\"cursor:pointer;color:#ef4444;\">\u2715</span></div>";
  }).join("");
};

function chkReq(){
  var req=["pfCN","pfTX","pfPH","pfPV","pfCTN","pfCPH","pfCL","pfCTM"];
  var ok=req.every(function(id){
    var e=document.getElementById(id);
    var val=e?e.value.toString().replace(/,/g,"").trim():"";var filled=val&&val!=="0"||id==="pfCTM";
    if(e) e.style.borderColor=filled?"":"#ef4444";
    return filled;
  });
  var b=document.getElementById("pfSB");
  if(b)b.disabled=!ok;
}
window.chkReq=chkReq;

window.ptSave=function(){
  var b=document.getElementById("pfSB");
  if(b&&b.disabled){
    chkReq();
    var t=document.createElement("div");
    t.textContent="\u0e01\u0e23\u0e38\u0e13\u0e32\u0e01\u0e23\u0e2d\u0e01\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25\u0e17\u0e35\u0e48\u0e08\u0e33\u0e40\u0e1b\u0e47\u0e19\u0e43\u0e2b\u0e49\u0e04\u0e23\u0e1a";
    t.style.cssText="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:99999;font-family:Sarabun,sans-serif;";
    document.body.appendChild(t);setTimeout(function(){t.remove();},2500);
    return;
  }
  var avImg=document.querySelector("#pfAI");
  var payload={
    partner_code:fi("pfCode"),entity_type:fi("pfET","company"),company_name:fi("pfCN"),tax_id:fi("pfTX"),
    partner_type:fi("pfPT","supplier"),social_url:fi("pfSO"),phone:fi("pfPH"),
    address:fi("pfAD"),subdistrict:fi("pfSBD"),district:fi("pfDI"),
    province:fi("pfPV"),postal_code:fi("pfPC"),country:fi("pfCO","ไทย"),
    contact_name:fi("pfCTN"),contact_position:fi("pfCTP"),contact_phone:fi("pfCPH"),
    contact_line:fi("pfCLN"),contact_email:fi("pfCEM"),
    credit_limit:parseFloat((document.getElementById("pfCL").value||"0").replace(/,/g,""))||0,
    credit_term:parseInt(document.getElementById("pfCTM").value)||30,
    discount:parseFloat(document.getElementById("pfDC").value)||0,
    bank:fi("pfBK"),bank_account:fi("pfBA"),bank_account_name:fi("pfBN"),
    note:fi("pfNT"),avatar_url:avImg?avImg.src:""
  };
  var url=API+(editId?"/api/pos/partners/update/"+editId:"/api/pos/partners/create");
  var method=editId?"PUT":"POST";
  if(b){b.textContent="\u0e01\u0e33\u0e25\u0e31\u0e07\u0e1a\u0e31\u0e19\u0e17\u0e36\u0e01...";b.disabled=true;}
  fetch(url,{method:method,headers:{"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"},body:JSON.stringify(payload)})
  .then(function(r){return r.json();})
  .then(function(){ptCloseForm();load();})
  .catch(function(){if(b){b.textContent="\u0e1a\u0e31\u0e19\u0e17\u0e36\u0e01";b.disabled=false;}});
};

window.ptDel=function(id){
  var dm=document.getElementById("ptDelModal");

    dm.style.display="none";
    fetch(API+"/api/pos/partners/delete/"+id,{method:"DELETE",headers:{"Authorization":"Bearer "+TOKEN}})

};

function initAddrAC(){
  var inp=document.getElementById("pfSBD");
  if(!inp)return;
  // ตำบล — ปกติ input ไม่ autocomplete
  inp.removeAttribute("readonly");

  // จังหวัด — datalist + search
  var pvInp=document.getElementById("pfPV");
  if(!pvInp)return;
  pvInp.removeAttribute("readonly");

  // สร้าง ac dropdown สำหรับจังหวัด
  var wrap=pvInp.parentNode;
  wrap.style.position="relative";
  var list=document.createElement("div");
  list.className="ac-list";
  list.style.display="none";
  wrap.appendChild(list);

  pvInp.addEventListener("input",function(){
    var q=this.value.trim();
    if(!q){list.style.display="none";return;}
    var results=PROVINCES.filter(function(p){return p.indexOf(q)!==-1;});
    if(!results.length){list.style.display="none";return;}
    list.innerHTML=results.map(function(p){
      return "<div class=\"ac-item\" data-v=\""+p+"\">"+p+"</div>";
    }).join("");
    list.style.display="block";
    list.querySelectorAll(".ac-item").forEach(function(el){
      el.addEventListener("mousedown",function(e){
        e.preventDefault();
        pvInp.value=this.getAttribute("data-v");
        list.style.display="none";
        chkReq();
      });
    });
  });
  pvInp.addEventListener("blur",function(){setTimeout(function(){list.style.display="none";},150);});
  pvInp.addEventListener("focus",function(){
    if(this.value){this.dispatchEvent(new Event("input"));}
  });

  // อำเภอ — unlock
  var diInp=document.getElementById("pfDI");
  if(diInp)diInp.removeAttribute("readonly");
  var pcInp=document.getElementById("pfPC");
  if(pcInp)pcInp.removeAttribute("readonly");
}

})();
