<body>
<div class="sa-wrap">
  <div class="sa-filters">
    <select id="saStatus" class="sa-select" onchange="saFilter()">
      <option value="reserve">ใบจอง (ล่วงหน้า)</option>
      <option value="">ทั้งหมด</option>
    </select>
    <input id="saFrom" type="date" class="sa-select" onchange="saFilter()"/>
    <input id="saTo" type="date" class="sa-select" onchange="saFilter()"/>
    <span id="saCount" style="font-size:12px;color:#6b7280;align-self:center;"></span>
  </div>
  <div id="saList"></div>
</div>
<style>
.sa-wrap{padding:4px 0;}
.sa-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.sa-select{padding:6px 8px;border:1px solid #d1d5db;border-radius:8px;font-size:12px;background:#fff;outline:none;}
.sa-row{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:10px 14px;margin-bottom:6px;}
.sa-row:hover{border-color:#e8b93e;}
.sa-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.sa-row-detail{font-size:11px;color:#6b7280;display:flex;gap:16px;flex-wrap:wrap;}
.sa-badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:6px;background:#fef3c7;color:#92400e;}
</style>
<script>
(function(){
var API=(location.hostname==='merchant.viiv.me')?'':'https://concore.viiv.me';
var TOKEN=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
var allBills=[];
function fmt(n){return '฿'+(parseFloat(n)||0).toLocaleString('th',{minimumFractionDigits:2});}

async function load(){
  var r=await fetch(API+'/api/pos/bills/list',{headers:{'Authorization':'Bearer '+TOKEN}});
  var data=await r.json();
  allBills=data.filter(function(b){
    return b.doc_type==='reserve'||b.shipping_status==='scheduled'||b.scheduled_at;
  });
  saFilter();
}

window.saFilter=function(){
  var status=document.getElementById('saStatus').value;
  var from=document.getElementById('saFrom').value;
  var to=document.getElementById('saTo').value;
  var filtered=allBills.filter(function(b){
    var mS=!status||b.doc_type===status||b.status===status;
    var mFrom=!from||(b.scheduled_at||b.created_at)>=from;
    var mTo=!to||(b.scheduled_at||b.created_at)<=(to+'T23:59:59');
    return mS&&mFrom&&mTo;
  });
  // sort by scheduled_at
  filtered.sort(function(a,b){
    return new Date(a.scheduled_at||a.created_at)-new Date(b.scheduled_at||b.created_at);
  });
  document.getElementById('saCount').textContent='พบ '+filtered.length+' รายการ';
  var el=document.getElementById('saList');
  if(!filtered.length){el.innerHTML='<div style="color:#aaa;padding:20px;text-align:center;">ไม่พบข้อมูล</div>';return;}
  el.innerHTML=filtered.map(function(b){
    var sched=b.scheduled_at?new Date(b.scheduled_at).toLocaleString('th'):'-';
    var created=new Date(b.created_at).toLocaleDateString('th');
    var itemCount=(b.items?JSON.parse(typeof b.items==='string'?b.items:JSON.stringify(b.items)):[]).length;
    return '<div class="sa-row">'+
      '<div class="sa-row-top">'+
        '<div>'+
          '<span style="font-size:12px;font-weight:700;">'+(b.bill_no||b.id)+'</span>'+
          (b.source==='pwa'?'<span style="background:#dbeafe;color:#1d4ed8;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:5px">M</span>':'')+
          '<span style="color:#9ca3af;font-size:11px;margin-left:8px;">'+(b.customer_name||'')+'</span>'+
          '<span class="sa-badge" style="margin-left:6px;">'+(b.doc_type==='reserve'?'ใบจอง':'กำหนดส่ง')+'</span>'+
        '</div>'+
        '<span style="font-size:14px;font-weight:700;color:#e8b93e;">'+fmt(b.total)+'</span>'+
      '</div>'+
      '<div class="sa-row-detail">'+
        '<span>📅 กำหนดส่ง: <strong>'+sched+'</strong></span>'+
        '<span>📋 สร้างวันที่: '+created+'</span>'+
        '<span>📦 '+itemCount+' รายการ</span>'+
        (b.shipping_status?'<span>🚚 '+(b.shipping_status)+'</span>':'')+
      '</div>'+
    '</div>';
  }).join('');
};

(function(){
  function _tok_advance(e){
  if(e.detail&&e.detail.token)TOKEN=e.detail.token;
  load();
}
  window.removeEventListener('viiv_token_ready',window._tok_advance);
  window._tok_advance=_tok_advance;
  window.addEventListener('viiv_token_ready',_tok_advance);
  var _t=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
  if(_t){ _tok_advance({detail:{token:_t}}); }
})();
if(TOKEN)load();
})();
</script>
</body>
