<!doctype html>

<html lang="th">
  <head>
<link rel="stylesheet" href="./style.css">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Shop Name</title>
    
  </head>
  <body>
    <div class="sidebar">
      <div class="brand">
        <div class="brand-title"><span class="viiv">My</span> <span class="platform">Shop Name</span></div>
        <div class="brand-accent"></div>
      </div>
       
<div class="menu"> 
  <a class="active" href="#">Dashboard</a> 
  <a href="#">Affiliate</a> 
  <a href="#">EasySale</a> 
  <a href="#">สินค้า/สโตร์</a> 
  <a href="#">คำสั่งซื้อ</a> 
  <a href="#">6</a> 
  <a href="#">7</a> 
  <a href="#">8</a> 
  <a href="#">9</a> 
</div> 

      <div class="sidebar-footer">
        My Shop Name v0.1.0
      </div>
    </div>

    <div class="main">
      <div class="pagebar">
        <div id="pageTitle" class="pagebar-title">Dashboard</div>
        <div class="profile">
          <div class="profile-name">Admin</div>
          <button id="profileBtn" class="btn" type="button">▼</button>
          <div id="profileDropdown" class="dropdown">
            <button id="profileMenuBtn" type="button">โปรไฟล์</button>
            <button id="logoutBtn" type="button">ออกจากระบบ</button>
          </div>
        </div>
      </div>
      <div class="topmenu" id="topMenu"></div>

      <div class="content">
        <h1 id="title">Dashboard</h1>
        <div id="subtitle">ภาพรวมระบบ</div>
        <div id="spa"></div>
<!-- CTO_NEW_SPA -->
      </div>
    </div>

    <script>
      (function () {
        const dropdown = document.getElementById("profileDropdown");
        const profileBtn = document.getElementById("profileBtn");
        const profileMenuBtn = document.getElementById("profileMenuBtn");
        const logoutBtn = document.getElementById("logoutBtn");

        if (profileBtn && dropdown) {
          profileBtn.addEventListener("click", () => {
            dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
          });
          document.addEventListener("click", (e) => {
            if (!dropdown.contains(e.target) && e.target !== profileBtn) {
              dropdown.style.display = "none";
            }
          });
        }

        if (profileMenuBtn) {
          profileMenuBtn.addEventListener("click", () => {
            alert("ยังไม่รองรับโปรไฟล์");
          });
        }

        if (logoutBtn) {
          logoutBtn.addEventListener("click", () => {
            alert("ยังไม่รองรับระบบออกจากระบบ");
          });
        }
      })();
    </script>

    <!-- CTO_DISABLE_MAIN_JS disabled external SPA -->
  
<script>
// ===== CTO_NEW_SPA =====

const spa = document.getElementById('spa')

// bind sidebar
document.querySelectorAll('.menu a').forEach((el, index) => {
  el.addEventListener('click', function(e){
    e.preventDefault()

    // active menu
    document.querySelectorAll('.menu a').forEach(a => a.classList.remove('active'))
    this.classList.add('active')

    // render หน้าเปล่า
    if(spa){
      spa.innerHTML = ''
    }
  })
})

</script>


<script>
// ===== CTO_FINAL_BIND =====

document.querySelectorAll('.menu a').forEach(el=>{
  el.onclick = function(e){
    e.preventDefault()

    const spa = document.getElementById('spa')
    if(spa){
      spa.innerHTML = '<div style="padding:20px;">PAGE: ' + this.innerText + '</div>'
    }
  }
})

</script>

</body>
</html>
