<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
.od-wrap{padding:0;font-family:'Sarabun',sans-serif}
.od-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.od-input{flex:1;min-width:160px;padding:7px 12px;border:1px solid var(--viiv-border,#d4b866);border-radius:8px;font-size:13px;outline:none;font-family:'Sarabun',sans-serif;background:var(--viiv-bg,#fff);color:var(--viiv-text,#1a1a1a)}
.od-input:focus{border-color:#E8B93E}
.od-sel{padding:7px 10px;border:1px solid var(--viiv-border,#d4b866);border-radius:8px;font-size:13px;background:var(--viiv-bg,#fff);color:var(--viiv-text,#1a1a1a);font-family:'Sarabun',sans-serif;outline:none}
.od-sel:focus{border-color:#E8B93E}
.od-count{font-size:12px;color:var(--viiv-text-muted,#888);margin-left:auto}
.od-list{display:flex;flex-direction:column;gap:8px}
.od-card{background:var(--viiv-bg,#fff);border:1px solid var(--viiv-border-light,#ede8d8);border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color .15s}
.od-card:hover{border-color:#E8B93E}
.od-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.od-bill-no{font-size:13px;font-weight:600;color:var(--viiv-text,#1a1a1a)}
.od-doc-type{font-size:11px;color:var(--viiv-text-muted,#888);margin-left:6px}
.od-price{font-size:14px;font-weight:700;color:#E8B93E}
.od-card-meta{font-size:12px;color:var(--viiv-text-muted,#888);margin-top:4px}
.od-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;align-items:center}
.od-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
/* financial status */
.ob-paid{background:#d1fae5;color:#065f46}.ob-pending{background:#fef9c3;color:#713f12}
.ob-credit{background:#dbeafe;color:#1e40af}.ob-partial{background:#ede9fe;color:#4c1d95}
.ob-voided{background:#fee2e2;color:#991b1b}
/* shipping status */
.os-scheduled{background:#fef9c3;color:#713f12}.os-shipped_no_recipient{background:#ffedd5;color:#7c2d12}
.os-shipped_cod{background:#dbeafe;color:#1e40af}.os-shipped_collect{background:#d1fae5;color:#065f46}
.os-bill_check{background:#ede9fe;color:#4c1d95}.os-chargeback{background:#fee2e2;color:#991b1b}
.os-received_payment{background:#d1fae5;color:#064e3b;font-weight:700}.os-debt{background:#fee2e2;color:#7f1d1d;font-weight:700}
.od-empty{text-align:center;padding:40px;color:var(--viiv-text-muted,#aaa);font-size:13px}
/* popup overlay */
.od-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200}
.od-modal{background:var(--viiv-bg,#fff);border-radius:12px;border:1px solid #E8B93E;padding:20px;width:min(520px,95vw);max-height:88vh;overflow-y:auto;font-family:'Sarabun',sans-serif}
.od-modal h3{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--viiv-text,#1a1a1a)}
.od-modal-meta{font-size:12px;color:var(--viiv-text-muted,#888);margin-bottom:12px;line-height:1.8}
.od-status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.od-status-btn{padding:8px 6px;font-size:12px;font-family:'Sarabun',sans-serif;border:1px solid #d1d5db;border-radius:8px;cursor:pointer;background:#fff;text-align:center;transition:all .12s}
.od-status-btn:hover{border-color:#E8B93E;background:rgba(232,185,62,.08)}
.od-status-btn.active{background:#E8B93E;color:#1a1200;border-color:#E8B93E;font-weight:600}
.od-log{margin-top:12px;padding-top:12px;border-top:1px solid #ede8d8}
.od-log-item{font-size:11px;color:var(--viiv-text-muted,#888);padding:4px 0;border-bottom:1px solid #f5f3ee}
.od-btn-gold{padding:7px 16px;background:#E8B93E;color:#1a1200;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:'Sarabun',sans-serif;cursor:pointer}
.od-btn-cancel{padding:7px 14px;background:transparent;color:#888;border:1px solid #ede8d8;border-radius:8px;font-size:13px;font-family:'Sarabun',sans-serif;cursor:pointer}
.od-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid #ede8d8}
.os-delivery{background:#e0f2fe;color:#0369a1}
.od-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px}
.od-sum-card{border-radius:8px;padding:10px;text-align:center}
.od-tracking{font-size:11px;color:#0369a1;font-weight:600;margin-top:4px;background:#e0f2fe;padding:2px 8px;border-radius:12px;display:inline-block}
</style>
<div class="od-wrap">
  <div class="od-toolbar">
    <input class="od-input" id="pv-q" placeholder="เลขบิล / ลูกค้า..." oninput="pvFilter()">
    <select class="od-sel" id="pv-status" onchange="pvFilter()">
      <option value="">สถานะทั้งหมด</option>
      <option value="pending">รอชำระ</option>
      <option value="credit">เครดิต</option>
      <option value="partial">บางส่วน</option>
      <option value="paid">จ่ายแล้ว</option>
    </select>
    <span class="od-count" id="pv-count"></span>
  </div>
  <!-- summary cards -->
  <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px">
    <div style="background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:11px;color:#713f12">รอชำระ</div>
      <div style="font-size:18px;font-weight:700;color:#713f12" id="pv-cnt-pending">0</div>
    </div>
    <div style="background:#dbeafe;border:1px solid #93c5fd;border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:11px;color:#1e40af">เครดิต</div>
      <div style="font-size:18px;font-weight:700;color:#1e40af" id="pv-cnt-credit">0</div>
    </div>
    <div style="background:#d1fae5;border:1px solid #6ee7b7;border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:11px;color:#065f46">จ่ายแล้ว (วันนี้)</div>
      <div style="font-size:18px;font-weight:700;color:#065f46" id="pv-cnt-paid">0</div>
    </div>
  </div>
  <div class="od-list" id="pv-list"></div>
</div>
<div id="od-overlay" class="od-ov" style="display:none" onclick="if(event.target===this)odCloseModal()"></div>
<script>
(function(){

var API=(location.hostname==='merchant.viiv.me')?'':'https://concore.viiv.me';
var TOKEN=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
var _bills=[];var _editBid=null;

var FIN_LABEL={'paid':'จ่ายแล้ว','pending':'รอชำระ','credit':'เครดิต','partial':'บางส่วน','voided':'ยกเลิก'};
var SHIP_LABEL={'scheduled':'กำหนดส่ง','shipped_no_recipient':'ส่งไม่มีผู้รับ','shipped_cod':'ส่ง+วางบิล',
  'shipped_collect':'ส่ง+เก็บเงิน','bill_check':'วางบิลเช็ค','chargeback':'ชะลอจ่าย',
  'delivery':'จัดส่ง Delivery','received_payment':'รับชำระแล้ว','debt':'หนี้ค้าง'};
var FIN_COLOR={'paid':'ob-paid','pending':'ob-pending','credit':'ob-credit','partial':'ob-partial','voided':'ob-voided'};
var SHIP_COLOR={'scheduled':'os-scheduled','shipped_no_recipient':'os-shipped_no_recipient',
  'shipped_cod':'os-shipped_cod','shipped_collect':'os-shipped_collect','bill_check':'os-bill_check',
  'chargeback':'os-chargeback','delivery':'os-delivery','received_payment':'os-received_payment','debt':'os-debt'};

function authH(){return {'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'};}
function fm(n){return '฿'+(parseFloat(n)||0).toLocaleString('th-TH',{minimumFractionDigits:2});}
function fd(s){if(!s)return'-';var d=new Date(s);return d.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});}
function finBadge(s){return s?'<span class="od-badge '+( FIN_COLOR[s]||'')+'">'+( FIN_LABEL[s]||s)+'</span>':'';}
function shipBadge(s){return s?'<span class="od-badge '+( SHIP_COLOR[s]||'')+'">'+( SHIP_LABEL[s]||s)+'</span>':'';}

function loadBills(params,cb){
  var url=API+'/api/pos/bills/list?limit=100&'+( params||'');
  fetch(url,{headers:authH()}).then(function(r){return r.json();}).then(function(d){_bills=d.bills||d||[];cb(_bills);}).catch(function(){cb([]);});
}

function renderCards(bills,containerId){
  var el=document.getElementById(containerId);
  if(!el)return;
  if(!bills.length){el.innerHTML='<div class="od-empty">ไม่พบรายการ</div>';return;}
  el.innerHTML=bills.map(function(b){
    return '<div class="od-card" data-bid="'+b.id+'" onclick="odGoSearch(this.dataset.bid)">'
      +'<div class="od-card-head">'
        +'<div><span class="od-bill-no">'+b.bill_no+'</span><span class="od-doc-type">'+( b.doc_type||'')+'</span></div>'
        +'<div class="od-price">'+fm(b.total)+'</div>'
      +'</div>'
      +'<div class="od-card-meta">'+( b.customer_name||'ไม่ระบุ')+' · '+fd(b.created_at)+' · '+( b.items_count||0)+' รายการ · '+( b.pay_method||'')+( b.source==='pos'?' · POS':'')+' </div>'
      +'<div class="od-badges">'+finBadge(b.status)+(b.scheduled_at?'<span class="od-badge" style="background:#fef9c3;color:#713f12">กำหนดส่ง '+fd(b.scheduled_at)+'</span>':'')+'</div>'
    +'</div>';
  }).join('');
}

function odOpenModal(bid){
  _editBid=bid;
  var b=_bills.find(function(x){return x.id===bid;});
  if(!b){fetch(API+'/api/pos/bills/detail/'+bid,{headers:authH()}).then(function(r){return r.json();}).then(function(d){_showModal(d);});return;}
  _showModal(b);
}

function _showModal(b){
  var LOCK_SHIP=['received_payment','debt'];
  var canEditFin=b.status!=='voided';
  var canEditShip=LOCK_SHIP.indexOf(b.shipping_status)<0&&b.source!=='pos';
  var finBtns=['paid','pending','credit','partial'].map(function(s){
    return '<button class="od-status-btn'+(b.status===s?' active':'')+'" data-s="" onclick="odSetFin(this.dataset.s)">'+FIN_LABEL[s]+'</button>';
  }).join('');
  var shipBtns=Object.keys(SHIP_LABEL).map(function(s){
    return '<button class="od-status-btn'+(b.shipping_status===s?' active':'')+'" data-s="" onclick="odSetShip(this.dataset.s)">'+SHIP_LABEL[s]+'</button>';
  }).join('');
  var logs=(b.activity_log||[]).slice().reverse().slice(0,8).map(function(l){
    return '<div class="od-log-item">'+fd(l.at)+' — '+(l.status||'')+(l.shipping?' | '+l.shipping:'')+(l.note?' | '+l.note:'')+'</div>';
  }).join('');
  var html='<div class="od-modal">'
    +'<h3>'+b.bill_no+' <span style="font-size:12px;font-weight:400;color:#888">'+( b.doc_type||'')+'</span></h3>'
    +'<div class="od-modal-meta">'
      +'ลูกค้า: <b>'+( b.customer_name||'-')+'</b><br>'
      +'วันที่: '+fd(b.created_at)+' | ยอด: <b style="color:#E8B93E">'+fm(b.total)+'</b><br>'
      +(b.scheduled_at?'กำหนดส่ง: '+fd(b.scheduled_at)+'<br>':'')
    +'</div>'
    +(canEditFin?'<div style="font-size:12px;font-weight:600;margin-bottom:6px;color:#374151">สถานะการชำระเงิน</div><div class="od-status-grid">'+finBtns+'</div>':'')
    +(canEditShip?'<div style="font-size:12px;font-weight:600;margin-bottom:6px;color:#374151">สถานะการจัดส่ง</div><div class="od-status-grid">'+shipBtns+'</div>':'')
    +(logs?'<div class="od-log"><div style="font-size:12px;font-weight:600;margin-bottom:6px;">ประวัติ</div>'+logs+'</div>':'')
    +'<div class="od-actions">'
      +'<button class="od-btn-cancel" onclick="odCloseModal()">ปิด</button>'
      +'<button class="od-btn-gold" onclick="odSaveStatus()">บันทึกสถานะ</button>'
    +'</div>'
  +'</div>';
  var ov=document.getElementById('od-overlay');
  if(ov){ov.innerHTML=html;ov.style.display='flex';}
}

var _newFin=null;var _newShip=null;
function odSetFin(s){_newFin=s;document.querySelectorAll('.od-status-grid .od-status-btn').forEach(function(b){if(['paid','pending','credit','partial'].indexOf(b.textContent.trim())>=0||Object.values(FIN_LABEL).indexOf(b.textContent.trim())>=0){b.classList.remove('active');}});event.target.classList.add('active');}
function odSetShip(s){_newShip=s;var btns=document.querySelectorAll('.od-status-grid .od-status-btn');btns.forEach(function(b){if(Object.values(SHIP_LABEL).indexOf(b.textContent.trim())>=0)b.classList.remove('active');});event.target.classList.add('active');}
function odCloseModal(){var ov=document.getElementById('od-overlay');if(ov)ov.style.display='none';_newFin=null;_newShip=null;}
function odSaveStatus(){
  if(!_editBid||(!_newFin&&!_newShip)){odCloseModal();return;}
  var payload={};
  if(_newFin)payload.status=_newFin;
  if(_newShip)payload.shipping_status=_newShip;
  fetch(API+'/api/pos/bills/update-status/'+_editBid,{method:'POST',headers:authH(),body:JSON.stringify(payload)})
  .then(function(r){return r.json();})
  .then(function(){odCloseModal();if(typeof odReload==='function')odReload();})
  .catch(function(){alert('บันทึกไม่สำเร็จ');});
}
var _all=[];
window.odReload=function(){
  loadBills('',function(bills){
    _all=bills;
    pvFilter();
    var today=new Date().toDateString();
    var pend=bills.filter(function(b){return b.status==='pending';}).length;
    var cred=bills.filter(function(b){return b.status==='credit';}).length;
    var paid=bills.filter(function(b){return b.status==='paid'&&new Date(b.created_at).toDateString()===today;}).length;
    var s=function(id,v){var e=document.getElementById(id);if(e)e.textContent=v;};
    s('pv-cnt-pending',pend);s('pv-cnt-credit',cred);s('pv-cnt-paid',paid);
  });
};
window.pvFilter=function(){
  var q=(document.getElementById('pv-q').value||'').toLowerCase();
  var st=document.getElementById('pv-status').value;
  var filtered=_all.filter(function(b){
    var mq=!q||(b.bill_no||'').toLowerCase().includes(q)||(b.customer_name||'').toLowerCase().includes(q);
    var ms=!st||b.status===st;
    return mq&&ms;
  });
  var cnt=document.getElementById('pv-count');
  if(cnt)cnt.textContent='พบ '+filtered.length+' รายการ';
  renderCards(filtered,'pv-list');
};


window.odOpenModal=odOpenModal;
window.odCloseModal=odCloseModal;
window.odSetFin=odSetFin;
window.odSetShip=odSetShip;
window.odSaveStatus=odSaveStatus;
window.odGoSearch=function(bid){
  var b=_bills.find(function(x){return x.id===bid;});
  if(!b)return;
  var isShip=b.source!=='pos';
  var html='<div class="od-modal">'
    +'<h3 style="margin-bottom:4px">'+b.bill_no+'</h3>'
    +'<div style="font-size:12px;color:#888;margin-bottom:12px">'+( b.customer_name||'-')+' · ฿'+(parseFloat(b.total)||0).toLocaleString('th-TH')+'</div>'
    +(isShip?'<div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">สถานะการจัดส่ง</div>'
      +'<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px">'
      +Object.keys(SHIP_LABEL).map(function(s){
        var locked=b.shipping_status==='received_payment'||b.shipping_status==='debt';
        var isCur=b.shipping_status===s;
        return '<button data-s="'+s+'" data-bid="'+bid+'" onclick="odQuickShip(this,this.dataset.bid)" style="padding:8px 6px;font-size:11px;font-family:Sarabun,sans-serif;border:1.5px solid '+(isCur?'#1a1200':'#d1d5db')+';border-radius:8px;cursor:'+(locked&&!isCur?'not-allowed':'pointer')+';background:'+(isCur?'#E8B93E':'#fff')+';color:'+(isCur?'#1a1200':'#374151')+';opacity:'+(locked&&!isCur?'0.4':'1')+'" '+(locked&&!isCur?'disabled':'')+'>'+SHIP_LABEL[s]+'</button>';
      }).join('')
      +'</div>'
      +'<div style="margin-bottom:10px">'
        +'<label style="font-size:11px;color:#888;display:block;margin-bottom:3px">เลขพัสดุ / หมายเหตุ</label>'
        +'<input id="od-quick-note" value="'+(b.ship_note||'')+'" placeholder="เลขพัสดุ หรือ หมายเหตุ..." style="width:100%;padding:7px 10px;font-size:13px;border:1px solid #d4b866;border-radius:6px;box-sizing:border-box;font-family:Sarabun,sans-serif">'
      +'</div>'
      :'')
    +'<div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">สถานะการเงิน</div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">'
    +['paid','pending','credit','partial'].map(function(s){
      var isCur=b.status===s;
      var locked=b.status==='paid'&&(s==='pending'||s==='credit');
      return '<button data-s="'+s+'" data-bid="'+bid+'" onclick="odQuickFin(this,this.dataset.bid)" style="padding:6px 12px;font-size:12px;font-family:Sarabun,sans-serif;border:1.5px solid '+(isCur?'#1a1200':'#d1d5db')+';border-radius:20px;cursor:'+(locked?'not-allowed':'pointer')+';background:'+(isCur?'#E8B93E':'#fff')+';color:'+(isCur?'#1a1200':'#374151')+';opacity:'+(locked?'0.4':'1')+'" '+(locked?'disabled':'')+'>'+FIN_LABEL[s]+'</button>';
    }).join('')
    +'</div>'
    +'<div id="od-quick-log" style="max-height:120px;overflow-y:auto;font-size:11px;color:#888;margin-bottom:12px">'
    +(b.activity_log&&b.activity_log.length
      ?b.activity_log.slice().reverse().slice(0,5).map(function(l){
        var d=new Date(l.at).toLocaleString('th-TH',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
        return '<div style="padding:3px 0;border-bottom:1px solid #f5f3ee">'+d+(l.status?' 💰 '+l.status:'')+(l.shipping?' 🚚 '+l.shipping:'')+(l.note?' 📝 '+l.note:'')+'</div>';
      }).join('')
      :'<div style="color:#ccc">ไม่มีประวัติ</div>')
    +'</div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end">'
      +'<button onclick="odCloseQuick()" style="padding:7px 14px;font-size:13px;font-family:Sarabun,sans-serif;background:transparent;color:#888;border:1px solid #ede8d8;border-radius:6px;cursor:pointer">ปิด</button>'
      +'<button data-bid="'+bid+'" onclick="odSaveQuick(this.dataset.bid)" style="padding:7px 16px;font-size:13px;font-family:Sarabun,sans-serif;background:#E8B93E;color:#1a1200;border:none;border-radius:6px;cursor:pointer;font-weight:600">บันทึก</button>'
    +'</div>'
  +'</div>';
  var ov=document.getElementById('od-overlay');
  if(ov){ov.innerHTML=html;ov.style.display='flex';}
  window._odQuickBid=bid;
  window._odQuickFin=null;
  window._odQuickShip=null;
};

window.odCloseQuick=function(){
  var ov=document.getElementById('od-overlay');
  if(ov)ov.style.display='none';
  window._odQuickBid=null;window._odQuickFin=null;window._odQuickShip=null;
};

window.odQuickFin=function(btn,bid){
  window._odQuickFin=btn.dataset.s;
  btn.closest('div').querySelectorAll('button').forEach(function(b){
    b.style.background=b===btn?'#E8B93E':'#fff';
    b.style.color=b===btn?'#1a1200':'#374151';
    b.style.border=b===btn?'1.5px solid #1a1200':'1.5px solid #d1d5db';
  });
};

window.odQuickShip=function(btn,bid){
  window._odQuickShip=btn.dataset.s;
  btn.closest('div').querySelectorAll('button').forEach(function(b){
    b.style.background=b===btn?'#E8B93E':'#fff';
    b.style.color=b===btn?'#1a1200':'#374151';
    b.style.border=b===btn?'1.5px solid #1a1200':'1.5px solid #d1d5db';
  });
};

window.odSaveQuick=function(bid){
  var payload={};
  if(window._odQuickFin) payload.status=window._odQuickFin;
  if(window._odQuickShip) payload.shipping_status=window._odQuickShip;
  var noteEl=document.getElementById('od-quick-note');
  if(noteEl&&noteEl.value.trim()) payload.ship_note=noteEl.value.trim();
  if(!Object.keys(payload).length){odCloseQuick();return;}
  fetch(API+'/api/pos/bills/update-status/'+bid,{method:'POST',headers:authH(),body:JSON.stringify(payload)})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.detail){alert('ไม่สำเร็จ: '+d.detail);return;}
    odCloseQuick();
    if(typeof odReload==='function')odReload();
  })
  .catch(function(){alert('บันทึกไม่สำเร็จ');});
};
function _tok(e){if(e.detail&&e.detail.token)TOKEN=e.detail.token;odReload();}
window.removeEventListener('viiv_token_ready',window._tok_odpay);
window._tok_odpay=_tok;
