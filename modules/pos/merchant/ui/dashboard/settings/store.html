<body>
<div class="st-wrap">
  <div class="st-tabs">
    <button class="st-tab active" data-tab="store">ร้านค้า</button>
    <button class="st-tab" data-tab="receipt">ตั้งค่าใบเสร็จ</button>
    <button class="st-tab" data-tab="payment">การชำระเงิน</button>
  </div>
  <div id="stTabStore" class="st-panel">
    <div class="st-card">
      <div class="st-section-title">โลโก้ร้านค้า</div>
      <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;">
        <div id="stLogoPreview" style="width:88px;height:88px;border:2px dashed #d1d5db;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#faf9f7;flex-shrink:0;cursor:pointer;">
          <span style="font-size:28px;opacity:.3;">&#x1F3EA;</span>
        </div>
        <div>
          <button id="stLogoBtn" class="st-btn-outline">เลือกโลโก้</button>
          <div style="font-size:11px;color:#9ca3af;margin-top:6px;line-height:1.5;">JPG, PNG, WEBP ไม่เกิน 5MB<br>แนะนำ 200x200px</div>
          <div id="stLogoName" style="font-size:11px;color:#e8b93e;margin-top:4px;"></div>
        </div>
        <input type="file" id="stLogoInput" accept="image/*" style="display:none;"/>
      </div>
      <div class="st-grid">
        <div class="st-field full">
          <label>ชื่อร้านค้า <span class="st-req">*</span></label>
          <input id="stStoreName" type="text" class="st-input" placeholder="ชื่อร้านค้าของคุณ"/>
        </div>
        <div class="st-field full">
          <label>เลขประจำตัวผู้เสียภาษี</label>
          <input id="stTaxId" type="text" class="st-input" placeholder="0000000000000"/>
        </div>
        <div class="st-field full">
          <label>เบอร์โทร <span class="st-req">*</span></label>
          <input id="stPhone" type="tel" class="st-input" placeholder="0812345678"/>
        </div>
        <div class="st-field full">
          <label>รหัสสาขา (แสดงในใบเสร็จ)</label>
          <input id="stBranchCode" type="text" class="st-input" placeholder="เช่น HQ, สาขา1, BKK001 (ถ้าว่างจะไม่แสดง)"/>
        </div>
        <div class="st-field full">
          <label>ที่อยู่ <span class="st-req">*</span></label>
          <input id="stAddress" type="text" class="st-input" placeholder="บ้านเลขที่ / หมู่บ้าน / ซอย"/>
        </div>
        <div class="st-field full">
          <label>ถนน</label>
          <input id="stRoad" type="text" class="st-input" placeholder="ถนน"/>
        </div>
        <div class="st-field">
          <label>ตำบล/แขวง</label>
          <input id="stSubdistrict" type="text" class="st-input" placeholder="ตำบล"/>
        </div>
        <div class="st-field">
          <label>อำเภอ/เขต</label>
          <input id="stDistrict" type="text" class="st-input" placeholder="อำเภอ"/>
        </div>
        <div class="st-field">
          <label>จังหวัด <span class="st-req">*</span></label>
          <input id="stProvince" type="text" class="st-input" placeholder="จังหวัด"/>
        </div>
        <div class="st-field">
          <label>รหัสไปรษณีย์</label>
          <input id="stPostal" type="text" class="st-input" placeholder="10000"/>
        </div>
      </div>
      <div style="border-top:1px solid #f0ede8;margin:16px 0 14px;padding-top:14px;">
        <div class="st-section-title">ตั้งค่าการขาย</div>
        <div class="st-grid">
          <div class="st-field">
            <label>สแกนหน้าร้าน</label>
            <select id="stScanMode" class="st-input">
              <option value="combine">รวม (รวมรายการเดิม)</option>
              <option value="split">แยก (แยกเป็นรายการใหม่)</option>
            </select>
          </div>
          <div class="st-field">
            <label>VAT</label>
            <select id="stVatMode" class="st-input">
              <option value="included">included (รวม VAT แล้ว)</option>
              <option value="excluded">excluded (ยังไม่รวม VAT)</option>
            </select>
          </div>
          <div class="st-field">
            <label>สต็อกหมด</label>
            <select id="stStockEmptySell" class="st-input">
              <option value="true">ขายได้ (คลังติดลบได้)</option>
              <option value="false">ขายไม่ได้ (บล็อกเมื่อสต็อก 0)</option>
            </select>
          </div>
          <div class="st-field">
            <label>แคตตาล็อคออนไลน์</label>
            <select id="stCatalogOnline" class="st-input">
              <option value="true">แสดง</option>
              <option value="false">ไม่แสดง</option>
            </select>
          </div>
        </div>
      </div>
      <div class="st-actions">
        <button class="st-btn-cancel" id="stStoreCancelBtn">ยกเลิก</button>
        <button class="st-btn-save" id="stStoreSaveBtn">บันทึก</button>
      </div>
      <div id="stStoreMsg" style="display:none;font-size:12px;text-align:right;margin-top:6px;"></div>
    </div>
  </div>
  <div id="stTabReceipt" class="st-panel" style="display:none;">
    <div class="st-card">
      <div class="st-section-title">รูปแบบเลขบิล</div>
      <div class="st-grid">
        <div class="st-field">
          <label>รูปแบบบิล</label>
          <select id="stBillFormat" class="st-input">
            <option value="BILL-YYYY-NNNNNN">BILL-2026-000001</option>
            <option value="PREFIX-NNNNNN">PREFIX-000001</option>
          </select>
        </div>
        <div class="st-field">
          <label>อักษรนำหน้าบิล</label>
          <input id="stBillPrefix" type="text" class="st-input" placeholder="BILL" maxlength="10"/>
        </div>
        <div class="st-field">
          <label>อักษรนำหน้า Invoice</label>
          <input id="stInvPrefix" type="text" class="st-input" placeholder="INV" maxlength="10"/>
        </div>
        <div class="st-field">
          <label>เลขเริ่มต้น (สำหรับย้ายมาจากระบบเดิม)</label>
          <input id="stBillStartSeq" type="number" class="st-input" placeholder="1" min="1"/>
        </div>
      </div>
      <div class="st-preview" id="stBillPreview"></div>
      <div class="st-section-title" style="margin-top:16px;">แสดงในใบเสร็จ</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;">
          <input type="checkbox" id="stShowTaxId" style="width:16px;height:16px;accent-color:#e8b93e;"/>
          แสดงเลขประจำตัวผู้เสียภาษีในใบเสร็จ
        </label>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;">
          <input type="checkbox" id="stShowAddress" style="width:16px;height:16px;accent-color:#e8b93e;"/>
          แสดงที่อยู่ในใบเสร็จ
        </label>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;">
          <input type="checkbox" id="stShowBankInReceipt" style="width:16px;height:16px;accent-color:#e8b93e;"/>
          แสดงบัญชีธนาคาร / QR ในใบเสร็จ
        </label>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;">
          <input type="checkbox" id="stShowFooterText" style="width:16px;height:16px;accent-color:#e8b93e;"/>
          แสดงข้อความท้ายใบเสร็จ
        </label>
        <div id="stFooterTextWrap" style="display:none;margin-top:4px;">
          <textarea id="stFooterText" rows="2" placeholder="เช่น ขอบคุณที่ใช้บริการ / เงื่อนไขการคืนสินค้า" style="width:100%;padding:8px 10px;border:1px solid #d4b866;border-radius:7px;font-family:'Sarabun',sans-serif;font-size:13px;resize:vertical;outline:none;"></textarea>
        </div>
      </div>
      <div class="st-actions">
        <button class="st-btn-cancel" id="stReceiptCancelBtn">ยกเลิก</button>
        <button class="st-btn-save" id="stReceiptSaveBtn">บันทึก</button>
      </div>
      <div id="stReceiptMsg" style="display:none;font-size:12px;text-align:right;margin-top:6px;"></div>
    </div>
  </div>
  <div id="stTabPayment" class="st-panel" style="display:none;">
    <div class="st-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div class="st-section-title" style="margin:0;">บัญชีรับชำระเงิน</div>
        <button id="stAddBankBtn" class="st-btn-save" style="font-size:12px;padding:6px 14px;">+ เพิ่มบัญชี</button>
      </div>
      <div id="stBankList"></div>
      <div id="stBankMsg" style="display:none;font-size:12px;margin-top:8px;"></div>
    </div>
    <!-- form เพิ่ม/แก้ไขบัญชี -->
    <div id="stBankFormWrap" style="display:none;margin-top:12px;">
      <div class="st-card">
        <div class="st-section-title" id="stBankFormTitle">เพิ่มบัญชีใหม่</div>
        <div class="st-grid">
          <div class="st-field">
            <label>ธนาคาร <span class="st-req">*</span></label>
            <select id="stBankName" class="st-input">
              <option value="">เลือกธนาคาร</option>
              <option value="กสิกรไทย">ธนาคารกสิกรไทย (KBank)</option>
              <option value="ไทยพาณิชย์">ธนาคารไทยพาณิชย์ (SCB)</option>
              <option value="กรุงเทพ">ธนาคารกรุงเทพ (BBL)</option>
              <option value="กรุงไทย">ธนาคารกรุงไทย (KTB)</option>
              <option value="กรุงศรีอยุธยา">ธนาคารกรุงศรีอยุธยา (BAY)</option>
              <option value="ทหารไทยธนชาต">ธนาคารทหารไทยธนชาต (TTB)</option>
              <option value="ออมสิน">ธนาคารออมสิน (GSB)</option>
              <option value="ธ.ก.ส.">ธนาคารเพื่อการเกษตร (ธ.ก.ส.)</option>
              <option value="อิสลาม">ธนาคารอิสลามแห่งประเทศไทย</option>
              <option value="ซีไอเอ็มบี">ธนาคารซีไอเอ็มบีไทย (CIMB)</option>
              <option value="ยูโอบี">ธนาคารยูโอบี (UOB)</option>
              <option value="แลนด์แอนด์เฮ้าส์">ธนาคารแลนด์แอนด์เฮ้าส์ (LH Bank)</option>
            </select>
          </div>
          <div class="st-field">
            <label>ประเภทบัญชี</label>
            <select id="stBankType" class="st-input">
              <option value="ออมทรัพย์">ออมทรัพย์</option>
              <option value="กระแสรายวัน">กระแสรายวัน</option>
              <option value="ฝากประจำ">ฝากประจำ</option>
            </select>
          </div>
          <div class="st-field">
            <label>ชื่อบัญชี <span class="st-req">*</span></label>
            <input id="stBankAccName" type="text" class="st-input" placeholder="ชื่อ-นามสกุลเจ้าของบัญชี"/>
          </div>
          <div class="st-field">
            <label>เลขบัญชี <span class="st-req">*</span></label>
            <input id="stBankAccNo" type="text" class="st-input" placeholder="000-0-00000-0"/>
          </div>
          <div class="st-field">
            <label>สาขา</label>
            <input id="stBankBranch" type="text" class="st-input" placeholder="สาขา"/>
          </div>
          <div class="st-field">
            <label>
              <input type="checkbox" id="stBankDefault" style="accent-color:#e8b93e;margin-right:6px;"/>
              ตั้งเป็นค่าเริ่มต้น
            </label>
          </div>
          <div class="st-field" style="background:#fdf6e3;border:1px solid #ede8d8;border-radius:8px;padding:10px;grid-column:1/-1;">
            <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;display:block;">My Bank Shop (ไม่บังคับ)</label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              <div>
                <label style="font-size:11px;color:#888;">ชื่อร้าน</label>
                <input type="text" id="stBankShopName" class="st-input" placeholder="เช่น iAM-Food Shop" style="margin-top:3px;">
              </div>
              <div>
                <label style="font-size:11px;color:#888;">รหัสร้านค้า</label>
                <input type="text" id="stBankShopId" class="st-input" placeholder="เช่น 01400007725997" style="margin-top:3px;">
              </div>
            </div>
          </div>
          <div class="st-field full">
            <label>QR รับเงิน (ไม่บังคับ)</label>
            <div style="display:flex;align-items:center;gap:12px;">
              <div id="stQrPreview" style="width:80px;height:80px;border:2px dashed #d1d5db;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:#faf9f7;flex-shrink:0;">
                <span style="font-size:24px;opacity:.3;">&#x25A6;</span>
              </div>
              <div>
                <button id="stQrBtn" class="st-btn-outline">อัพโหลด QR</button>
                <div id="stQrName" style="font-size:11px;color:#e8b93e;margin-top:4px;"></div>
                <div style="font-size:11px;color:#9ca3af;margin-top:2px;">PNG, JPG ไม่เกิน 2MB</div>
              </div>
              <input type="file" id="stQrInput" accept="image/*" style="display:none;"/>
            </div>
          </div>
        </div>
        <div class="st-actions">
          <button class="st-btn-cancel" id="stBankCancelBtn">ยกเลิก</button>
          <button class="st-btn-save" id="stBankSaveBtn">บันทึก</button>
        </div>
      </div>
    </div>
  </div>
</div>
<style>
.st-wrap{padding:4px 0;box-sizing:border-box;width:100%;max-width:900px;margin:0 auto;}
.st-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.st-tab{padding:7px 14px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:#f0ede8;color:var(--text,#1f2937);transition:.15s;}
.st-tab.active{background:var(--accent,#e8b93e);color:#1a1200;}
.st-panel{}
.st-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:20px;}
.st-section-title{font-size:11px;font-weight:700;color:#6b7280;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px;}
.st-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.st-field{display:flex;flex-direction:column;gap:4px;}
.st-field.full{grid-column:1/-1;}
.st-field label{font-size:12px;font-weight:600;color:#374151;}
.st-req{color:#ef4444;}
.st-input{padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;outline:none;width:100%;box-sizing:border-box;background:#faf9f7;}
.st-input:focus{border-color:#e8b93e;}
.st-input.error{border-color:#ef4444;}
.st-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
.st-btn-cancel{padding:8px 16px;background:#f3f4f6;color:#374151;border:1px solid #d1d5db;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.st-btn-save{padding:8px 20px;background:#e8b93e;color:#1a1200;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
.st-btn-save:hover{opacity:.85;}
.st-btn-outline{padding:7px 14px;background:transparent;border:1px solid #d1d5db;border-radius:7px;font-size:12px;cursor:pointer;color:#374151;}
.st-preview{margin-top:12px;padding:10px 14px;background:#f8f6f2;border-radius:8px;font-size:12px;color:#6b7280;}
</style>
<script>
'use strict';
var API=(location.hostname==='merchant.viiv.me')?'':'https://concore.viiv.me';
var TOKEN=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
var _origData={};
var _logoFile=null;

function showMsg(id,msg,color){
  var el=document.getElementById(id);
  if(!el)return;
  el.textContent=msg;el.style.color=color||'#16a34a';el.style.display='block';
  setTimeout(function(){el.style.display='none';},3500);
}

function updatePreview(){
  var fmt=document.getElementById('stBillFormat').value;
  var prefix=document.getElementById('stBillPrefix').value||'BILL';
  var invPrefix=document.getElementById('stInvPrefix').value||'INV';
  var start=document.getElementById('stBillStartSeq').value||'1';
  var year=new Date().getFullYear();
  var seq=String(parseInt(start)||1).padStart(6,'0');
  var bill_no=fmt==='BILL-YYYY-NNNNNN'?prefix+'-'+year+'-'+seq:prefix+'-'+seq;
  var inv_no=invPrefix+'-'+seq;
  var el=document.getElementById('stBillPreview');
  if(el) el.textContent='ตัวอย่าง: '+bill_no+' / '+inv_no;
}

function loadSettings(){
  fetch(API+'/api/pos/store/settings',{headers:{'Authorization':'Bearer '+TOKEN}})
  .then(function(r){return r.json();})
  .then(function(d){
    _origData=d;
    // store tab
    document.getElementById('stStoreName').value=d.store_name||'';
    document.getElementById('stTaxId').value=d.tax_id||'';
    document.getElementById('stPhone').value=d.phone||'';
  var bc=document.getElementById('stBranchCode');if(bc)bc.value=d.branch_code||'';
    var sm=document.getElementById('stScanMode');if(sm)sm.value=d.scan_mode||'combine';
    var vm=document.getElementById('stVatMode');if(vm)vm.value=d.vat_mode||'included';
    var ses=document.getElementById('stStockEmptySell');if(ses)ses.value=d.stock_empty_sell===false?'false':'true';
    var co=document.getElementById('stCatalogOnline');if(co)co.value=(d.catalog_online===false)?'false':'true';
    document.getElementById('stAddress').value=d.address||'';
    document.getElementById('stRoad').value=d.road||'';
    document.getElementById('stSubdistrict').value=d.subdistrict||'';
    document.getElementById('stDistrict').value=d.district||'';
    document.getElementById('stProvince').value=d.province||'';
    document.getElementById('stPostal').value=d.postal_code||'';
    if(d.logo_url){
      var img=document.createElement('img');
      img.src=API+d.logo_url;
      img.style.cssText='width:88px;height:88px;object-fit:cover;border-radius:10px;';
      document.getElementById('stLogoPreview').innerHTML='';
      document.getElementById('stLogoPreview').appendChild(img);
    }
    // receipt tab
    document.getElementById('stBillFormat').value=d.bill_format||'BILL-YYYY-NNNNNN';
    document.getElementById('stBillPrefix').value=d.bill_prefix||'BILL';
    document.getElementById('stInvPrefix').value=d.inv_prefix||'INV';
    document.getElementById('stBillStartSeq').value=d.bill_start_seq||1;
    document.getElementById('stShowTaxId').checked=d.show_tax_id!==false;
    document.getElementById('stShowAddress').checked=d.show_address!==false;
    var sbi=document.getElementById('stShowBankInReceipt');
    if(sbi)sbi.checked=d.show_bank_in_receipt===true;
    var sft=document.getElementById('stShowFooterText');
    if(sft){sft.checked=d.show_footer_text===true;document.getElementById('stFooterTextWrap').style.display=d.show_footer_text?'block':'none';}
    var ftxt=document.getElementById('stFooterText');
    if(ftxt)ftxt.value=d.footer_text||'';
    var bsn=document.getElementById('stBankShopName');
    if(bsn)bsn.value=d.bank_shop_name||'';
    var bsi=document.getElementById('stBankShopId');
    if(bsi)bsi.value=d.bank_shop_id||'';
    updatePreview();
  })
  .catch(function(){});
}

document.addEventListener('change',function(e){
  if(e.target.id==='stShowFooterText'){
    document.getElementById('stFooterTextWrap').style.display=e.target.checked?'block':'none';
  }
});
function saveBankShop(){
  var name=document.getElementById('stBankShopName').value.trim();
  var id=document.getElementById('stBankShopId').value.trim();
  localStorage.setItem('viiv_bank_shop',JSON.stringify({name:name,id:id}));
  var btn=event.target;btn.textContent='✓ บันทึก';
  setTimeout(function(){btn.textContent='บันทึก';},1500);
}
function resetStore(){
  var d=_origData;
  document.getElementById('stStoreName').value=d.store_name||'';
  document.getElementById('stTaxId').value=d.tax_id||'';
  document.getElementById('stPhone').value=d.phone||'';
  var bc=document.getElementById('stBranchCode');if(bc)bc.value=d.branch_code||'';
    var sm=document.getElementById('stScanMode');if(sm)sm.value=d.scan_mode||'combine';
    var vm=document.getElementById('stVatMode');if(vm)vm.value=d.vat_mode||'included';
    var ses=document.getElementById('stStockEmptySell');if(ses)ses.value=d.stock_empty_sell===false?'false':'true';
    var co=document.getElementById('stCatalogOnline');if(co)co.value=(d.catalog_online===false)?'false':'true';
  document.getElementById('stAddress').value=d.address||'';
  document.getElementById('stRoad').value=d.road||'';
  document.getElementById('stSubdistrict').value=d.subdistrict||'';
  document.getElementById('stDistrict').value=d.district||'';
  document.getElementById('stProvince').value=d.province||'';
  document.getElementById('stPostal').value=d.postal_code||'';
  ['stStoreName','stPhone','stAddress','stProvince'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.classList.remove('error');
  });
}

function saveStore(){
  var errors=[];
  ['stStoreName','stPhone','stAddress','stProvince'].forEach(function(id){
    var el=document.getElementById(id);
    if(!el.value.trim()){el.classList.add('error');errors.push(el.id);}
    else el.classList.remove('error');
  });
  if(errors.length){showMsg('stStoreMsg','กรุณากรอกข้อมูลที่จำเป็น','#ef4444');return;}
  var btn=document.getElementById('stStoreSaveBtn');
  btn.textContent='กำลังบันทึก...';btn.disabled=true;

  function doSave(logoUrl){
    var payload={
      store_name:document.getElementById('stStoreName').value.trim(),
      logo_url:logoUrl||_origData.logo_url||'',
      tax_id:document.getElementById('stTaxId').value.trim(),
      phone:document.getElementById('stPhone').value.trim(),
      address:document.getElementById('stAddress').value.trim(),
      road:document.getElementById('stRoad').value.trim(),
      subdistrict:document.getElementById('stSubdistrict').value.trim(),
      district:document.getElementById('stDistrict').value.trim(),
      province:document.getElementById('stProvince').value.trim(),
      postal_code:document.getElementById('stPostal').value.trim(),
      branch_code:(document.getElementById('stBranchCode')||{value:''}).value.trim(),
      bill_prefix:_origData.bill_prefix||'BILL',
      inv_prefix:_origData.inv_prefix||'INV',
      bill_start_seq:_origData.bill_start_seq||1,
      inv_start_seq:_origData.inv_start_seq||1,
      bill_format:_origData.bill_format||'BILL-YYYY-NNNNNN',
      show_tax_id:_origData.show_tax_id!==false,
      show_address:_origData.show_address!==false,
      scan_mode:(document.getElementById('stScanMode')||{value:'combine'}).value,
      vat_mode:(document.getElementById('stVatMode')||{value:'included'}).value,
      stock_empty_sell:(document.getElementById('stStockEmptySell')||{value:'true'}).value!=='false',
      catalog_online:(document.getElementById('stCatalogOnline')||{value:'false'}).value==='true'
    };
    fetch(API+'/api/pos/store/settings',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify(payload)})
    .then(function(r){return r.json();})
    .then(function(d){
      showMsg('stStoreMsg',d.message||'บันทึกสำเร็จ','#16a34a');
      _origData=Object.assign(_origData,payload);
    })
    .catch(function(){showMsg('stStoreMsg','เกิดข้อผิดพลาด','#ef4444');})
    .finally(function(){btn.textContent='บันทึก';btn.disabled=false;});
  }

  if(_logoFile){
    var fd=new FormData();fd.append('file',_logoFile);
    fetch(API+'/api/pos/store/upload-logo',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN},body:fd})
    .then(function(r){return r.json();})
    .then(function(d){doSave(d.url||'');})
    .catch(function(){doSave('');});
  } else { doSave(''); }
}

function saveReceipt(){
  var btn=document.getElementById('stReceiptSaveBtn');
  btn.textContent='กำลังบันทึก...';btn.disabled=true;
  var payload=Object.assign({},_origData,{
    bill_format:document.getElementById('stBillFormat').value,
    bill_prefix:document.getElementById('stBillPrefix').value||'BILL',
    inv_prefix:document.getElementById('stInvPrefix').value||'INV',
    bill_start_seq:parseInt(document.getElementById('stBillStartSeq').value)||1,
    show_tax_id:document.getElementById('stShowTaxId').checked,
    show_address:document.getElementById('stShowAddress').checked,
    show_bank_in_receipt:(document.getElementById('stShowBankInReceipt')||{}).checked||false,
    show_footer_text:(document.getElementById('stShowFooterText')||{}).checked||false,
    footer_text:(document.getElementById('stFooterText')||{value:''}).value.trim()
  });
  if(!payload.store_name){payload.store_name='ร้านค้า';}
  if(!payload.phone){payload.phone='-';}
  if(!payload.address){payload.address='-';}
  if(!payload.province){payload.province='-';}
  fetch(API+'/api/pos/store/settings',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify(payload)})
  .then(function(r){return r.json();})
  .then(function(d){
    showMsg('stReceiptMsg',d.message||'บันทึกสำเร็จ','#16a34a');
    _origData=payload;updatePreview();
  })
  .catch(function(){showMsg('stReceiptMsg','เกิดข้อผิดพลาด','#ef4444');})
  .finally(function(){btn.textContent='บันทึก';btn.disabled=false;});
}


(function(){
  var _banks=JSON.parse(localStorage.getItem('viiv_bank_accounts')||'[]');
  var _editBankIdx=-1;
  var _qrFile=null;

  var _banks=JSON.parse(localStorage.getItem('viiv_bank_accounts')||'[]');
  var _editBankIdx=-1;
  var _qrFile=null;

  function renderBankList(){
    var el=document.getElementById('stBankList');
    if(!el) return;
    if(!_banks.length){
      el.innerHTML='<div style="color:#aaa;padding:20px;text-align:center;font-size:13px;">ยังไม่มีบัญชี กด "+ เพิ่มบัญชี"</div>';
      return;
    }
    el.innerHTML='';
    _banks.forEach(function(b,i){
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:12px;padding:12px 14px;background:#f8f6f2;border-radius:10px;margin-bottom:8px;';
      var qrHtml=b.qr_url
  ?'<img src="'+b.qr_url+'" style="width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid #e5e5e5;">'
  :'<div style="width:44px;height:44px;background:#e5e5e5;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;opacity:.4;">&#x25A6;</div>';
      row.innerHTML=
        '<div style="flex-shrink:0;">'+qrHtml+'</div>'+
        '<div style="flex:1;min-width:0;">'+
          '<div style="font-size:13px;font-weight:700;">'+b.bank_name+'</div>'+
          '<div style="font-size:12px;color:#6b7280;">'+b.acc_name+' | '+b.acc_no+(b.branch?' | '+b.branch:'')+'</div>'+
          '<div style="font-size:11px;color:#9ca3af;">'+b.acc_type+(b.is_default?' &nbsp;<span style="background:#e8b93e;color:#1a1200;padding:1px 7px;border-radius:10px;font-size:10px;">ค่าเริ่มต้น</span>':'')+(b.bank_shop_name?' &nbsp;<span style="background:#ebf8ff;color:#2b6cb0;padding:1px 7px;border-radius:10px;font-size:10px;">&#x1F3EA; '+b.bank_shop_name+'</span>':'')+'</div>'+
        '</div>'+
        '<div style="display:flex;gap:6px;flex-shrink:0;">'+
          '<button data-idx="'+i+'" class="stBankEditBtn" style="padding:5px 10px;background:#f0ede8;border:1px solid #d1d5db;border-radius:7px;font-size:11px;cursor:pointer;">แก้ไข</button>'+
          '<button data-idx="'+i+'" class="stBankDelBtn" style="padding:5px 10px;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:7px;font-size:11px;cursor:pointer;">ลบ</button>'+
        '</div>';
      el.appendChild(row);
    });
    el.querySelectorAll('.stBankEditBtn').forEach(function(btn){
      btn.addEventListener('click',function(){ openBankForm(parseInt(this.dataset.idx)); });
    });
    el.querySelectorAll('.stBankDelBtn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var idx=parseInt(this.dataset.idx);
        if(!confirm('ลบบัญชี "'+_banks[idx].bank_name+'" ?')) return;
        _banks.splice(idx,1);
        localStorage.setItem('viiv_bank_accounts',JSON.stringify(_banks));
        renderBankList();
      });
    });
  }

  function openBankForm(idx){
    _editBankIdx=idx;
    _qrFile=null;
    var b=idx>=0?_banks[idx]:{};
    document.getElementById('stBankFormTitle').textContent=idx>=0?'แก้ไขบัญชี':'เพิ่มบัญชีใหม่';
    document.getElementById('stBankName').value=b.bank_name||'';
    document.getElementById('stBankType').value=b.acc_type||'ออมทรัพย์';
    document.getElementById('stBankAccName').value=b.acc_name||'';
    document.getElementById('stBankAccNo').value=b.acc_no||'';
    document.getElementById('stBankBranch').value=b.branch||'';
      var bsn=document.getElementById('stBankShopName');if(bsn)bsn.value=b.bank_shop_name||'';
      var bsi=document.getElementById('stBankShopId');if(bsi)bsi.value=b.bank_shop_id||'';
    document.getElementById('stBankDefault').checked=b.is_default||false;
    document.getElementById('stQrName').textContent='';
    var qrPrev=document.getElementById('stQrPreview');
    qrPrev.innerHTML=b.qr_url?'<img src="'+b.qr_url+'" style="width:80px;height:80px;object-fit:cover;border-radius:6px;">':'<span style="font-size:24px;opacity:.3;">&#x25A6;</span>';
    document.getElementById('stBankFormWrap').style.display='block';
  }

  function saveBankForm(){
    var bank=document.getElementById('stBankName').value;
    var accName=document.getElementById('stBankAccName').value.trim();
    var accNo=document.getElementById('stBankAccNo').value.trim();
    if(!bank||!accName||!accNo){
      showMsg('stBankMsg','กรุณากรอกข้อมูลที่จำเป็น (ธนาคาร / ชื่อบัญชี / เลขบัญชี)','#ef4444');
      return;
    }
    if(_banks.length>=3&&_editBankIdx<0){
      showMsg('stBankMsg','สร้างได้สูงสุด 3 บัญชี','#ef4444');
      return;
    }
    function doSave(qrUrl){
      var obj={
        bank_name:bank,
        acc_type:document.getElementById('stBankType').value,
        acc_name:accName,
        acc_no:accNo,
        branch:document.getElementById('stBankBranch').value.trim(),
        bank_shop_name:(document.getElementById('stBankShopName')||{value:''}).value.trim(),
        bank_shop_id:(document.getElementById('stBankShopId')||{value:''}).value.trim(),
        is_default:document.getElementById('stBankDefault').checked,
        qr_url:qrUrl||(_editBankIdx>=0?_banks[_editBankIdx].qr_url:'')
      };
      if(obj.is_default) _banks.forEach(function(b){b.is_default=false;});
      if(_editBankIdx>=0) _banks[_editBankIdx]=obj;
      else _banks.push(obj);
      localStorage.setItem('viiv_bank_accounts',JSON.stringify(_banks));
      document.getElementById('stBankFormWrap').style.display='none';
      renderBankList();
      showMsg('stBankMsg','บันทึกสำเร็จ','#16a34a');
    }
    if(_qrFile){
      var fd=new FormData();fd.append('file',_qrFile);
      fetch(API+'/api/pos/store/upload-qr',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN},body:fd})
      .then(function(r){return r.json();})
      .then(function(d){doSave(d.url||'');})
      .catch(function(){doSave('');});
    } else { doSave(''); }
  }

  // payment bindings moved to lazy init on tab click
  // logo
  var logoInput=document.getElementById('stLogoInput');
  var logoPrev=document.getElementById('stLogoPreview');
  var logoBtn=document.getElementById('stLogoBtn');
  if(logoBtn) logoBtn.addEventListener('click',function(){if(logoInput)logoInput.click();});
  if(logoPrev) logoPrev.addEventListener('click',function(){if(logoInput)logoInput.click();});
  if(logoInput) logoInput.addEventListener('change',function(){
    if(!this.files||!this.files[0])return;
    _logoFile=this.files[0];
    document.getElementById('stLogoName').textContent=_logoFile.name;
    var r=new FileReader();
    r.onload=function(e){
      logoPrev.innerHTML='';
      var img=document.createElement('img');img.src=e.target.result;
      img.style.cssText='width:88px;height:88px;object-fit:cover;border-radius:10px;';
      logoPrev.appendChild(img);
    };
    r.readAsDataURL(_logoFile);
  });
  // store buttons
  var sCancelBtn=document.getElementById('stStoreCancelBtn');
  var sSaveBtn=document.getElementById('stStoreSaveBtn');
  var rCancelBtn=document.getElementById('stReceiptCancelBtn');
  var rSaveBtn=document.getElementById('stReceiptSaveBtn');
  if(sCancelBtn) sCancelBtn.addEventListener('click',resetStore);
  if(sSaveBtn) sSaveBtn.addEventListener('click',saveStore);
  if(rCancelBtn) rCancelBtn.addEventListener('click',loadSettings);
  if(rSaveBtn) rSaveBtn.addEventListener('click',saveReceipt);
  // preview
  ['stBillFormat','stBillPrefix','stInvPrefix','stBillStartSeq'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('input',updatePreview);
  });
  window.saveBankForm=saveBankForm;
  window.openBankForm=openBankForm;
  window.renderBankList=renderBankList;


  function _initTabs(){
    document.querySelectorAll('.st-tab').forEach(function(btn){
      btn.addEventListener('click',function(){
        document.querySelectorAll('.st-tab').forEach(function(b){b.classList.remove('active');});
        btn.classList.add('active');
        var tab=btn.dataset.tab;
        document.getElementById('stTabStore').style.display=tab==='store'?'block':'none';
        document.getElementById('stTabReceipt').style.display=tab==='receipt'?'block':'none';
        document.getElementById('stTabPayment').style.display=tab==='payment'?'block':'none';
        if(tab==='payment'){
          if(!window._paymentBound){
            window._paymentBound=true;
            document.getElementById('stAddBankBtn').addEventListener('click',function(){
              if(_banks.length>=3){showMsg('stBankMsg','สร้างได้สูงสุด 3 บัญชี','#ef4444');return;}
              openBankForm(-1);
            });
            document.getElementById('stBankCancelBtn').addEventListener('click',function(){
              document.getElementById('stBankFormWrap').style.display='none';
            });
            document.getElementById('stBankSaveBtn').addEventListener('click',saveBankForm);
            var qrInput=document.getElementById('stQrInput');
            document.getElementById('stQrBtn').addEventListener('click',function(){qrInput.click();});
            document.getElementById('stQrPreview').addEventListener('click',function(){qrInput.click();});
            qrInput.addEventListener('change',function(){
              if(!this.files||!this.files[0]) return;
              _qrFile=this.files[0];
              document.getElementById('stQrName').textContent=_qrFile.name;
              var r=new FileReader();
              r.onload=function(e){
                var prev=document.getElementById('stQrPreview');
                prev.innerHTML='<img src="'+e.target.result+'" style="width:80px;height:80px;object-fit:cover;border-radius:6px;">';
              };
              r.readAsDataURL(_qrFile);
            });
          }
          renderBankList();
        }
      });
    });
  }

  function _tok_store(e){
    if(e.detail&&e.detail.token)TOKEN=e.detail.token;
    loadSettings();
    _initTabs();
  }
  window.removeEventListener('viiv_token_ready',window._tok_store);
  window._tok_store=_tok_store;
  window.addEventListener('viiv_token_ready',_tok_store);
  // fire ทันทีถ้า token พร้อมแล้ว
  var _t=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
  if(_t){ _tok_store({detail:{token:_t}}); }
})();
</script>
