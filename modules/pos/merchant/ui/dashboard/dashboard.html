<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Shop POS</title>
  <style>
    :root {
      font-size: 16px;
      --accent:        #e8b93e;
      --accent-hover:  #d4a52c;
      --accent-active: #bf941e;
      --accent-dim:    rgba(232,185,62,0.12);
      --accent-border: rgba(232,185,62,0.6);
      --bg-main:       #1a1a1a;
      --sidebar-bg:    #0e0e0e;
      --sidebar-border:#222222;
      --content-bg:    #f0ede8;
      --card-bg:       #ffffff;
      --card-border:   #e0ddd6;
      --text:          #1f2937;
      --muted:         #6b7280;
      --nav-text:      #c8c8c8;
      --nav-label:     #888888;
      --nav-hover:     #1a1a1a;
      --border:        rgba(0,0,0,0.10);
      --r-md: 9px; --r-lg: 12px; --r-xl: 14px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font); font-size: 14px;
      background: var(--bg-main); color: var(--text);
      display: flex; height: 100vh; overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 210px; min-width: 210px; height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .brand {
      display: flex; align-items: center; gap: 8px;
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--sidebar-border);
    }
    .brand-title { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
    .brand-title .viiv { color: var(--accent); }
    .brand-title .platform { color: #ffffff; }
    .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-left: 2px; }

    .nav { flex: 1; padding: 10px 0; overflow-y: auto; }
    .nav-group-label {
      font-size: 10px; font-weight: 600; color: var(--nav-label);
      padding: 10px 16px 4px; letter-spacing: 0.8px; text-transform: uppercase;
    }
    .menu a {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px 9px 16px;
      color: var(--nav-text); text-decoration: none; font-size: 15px;
      border-left: 3px solid transparent;
      transition: background 0.12s, color 0.12s; white-space: nowrap;
    }
    .menu a .nav-icon { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; opacity: 0.7; }
    /* sub-page content font scale */
    #sbContent { font-size: 15px; }
    #sbContent input,
    #sbContent select,
    #sbContent textarea,
    #sbContent button:not(.pos-tab):not(.pos-sub-tab) {
      font-size: 14px;
    }
    #sbContent label { font-size: 13px; }
    #sbContent td, #sbContent th { font-size: 13px; }
    .menu a:hover { background: var(--nav-hover); color: #d0d0d0; }
    .menu a.active {
      background: var(--accent-dim); color: var(--accent);
      border-left-color: var(--accent); font-weight: 600;
    }
    .menu a.active .nav-icon { opacity: 1; }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--sidebar-border);
      font-size: 11px; color: var(--accent); text-align: center;
      text-decoration: none; display: block;
      transition: opacity 0.12s;
    }
    .sidebar-footer:hover { opacity: 0.8; }

    /* ── MAIN ── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      background: var(--content-bg); min-width: 0; height: 100vh; overflow: hidden;
    }
    .badge-shop {
      font-size: 11px; font-weight: 600;
      background: var(--accent); color: #1a1200;
      padding: 3px 12px; border-radius: 20px;
    }
    .profile-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); cursor: pointer;
      padding: 4px 8px; border-radius: 8px;
      border: 1px solid var(--border); background: #fff; position: relative;
    }
    .profile-btn:hover { border-color: rgba(0,0,0,0.18); }
    .dropdown {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: #fff; border: 1px solid var(--border);
      border-radius: 10px; padding: 6px; min-width: 160px;
      display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.10); z-index: 100;
    }
    .dropdown.open { display: block; }
    .dropdown button {
      width: 100%; text-align: left; padding: 8px 10px;
      border-radius: 8px; border: 0; background: transparent;
      color: var(--text); cursor: pointer; font-size: 13px;
    }
    .dropdown button:hover { background: #f5f3ef; }

    /* actionbar */
    .actionbar {
      background: #fff; border: 1px solid var(--card-border);
      border-radius: var(--r-lg); padding: 8px 14px;
      margin: 16px 20px 0;
      display: flex; align-items: center; gap: 10px;
    }
    .actionbar.hidden { display: none; }
    .actionbar input {
      flex: 1; padding: 7px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: #faf9f7;
      color: var(--text); font-size: 13px; outline: none;
    }
    .actionbar input:focus { border-color: var(--accent); }

    /* buttons */
    .btn {
      padding: 7px 14px; border-radius: var(--r-md);
      border: 1px solid var(--border); background: #fff;
      color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500;
    }
    .btn:hover { background: #f5f3ef; }
    .btn-accent {
      background: var(--accent); border-color: var(--accent-active);
      color: #1a1200; font-weight: 700;
    }
    .btn-accent:hover { background: var(--accent-hover); }

    /* content */
    .content-wrap { flex: 1; padding: 16px 20px 20px; overflow-y: auto; min-height: 0; }
    .card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: var(--r-lg); padding: 22px 24px; min-height: 60vh;
    }
    .card-heading { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .card-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

    /* placeholder */
    .page-placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; color: var(--muted); gap: 10px;
    }
    .ph-icon { font-size: 32px; opacity: 0.2; }
    .ph-text { font-size: 14px; }

    /* stats */
    .stats-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat {
      flex: 1; min-width: 100px; background: #f8f6f2;
      border: 1px solid #eae8e2; border-radius: var(--r-md); padding: 12px 16px;
    }
    .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .stat-val   { font-size: 22px; font-weight: 600; color: var(--text); }
    .stat-val.gold { color: #a07820; }
  
    /* === CONTENT FONT SCALE === */
    #cardBody, #cardBody * { font-size: 15px !important; }
    #cardBody th, #cardBody .bill-table th { font-size: 13px !important; }
    </style>
    <script src="/modules/pos/merchant/ui/dashboard/_shared/quota.js?v=4766"></script>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<div class="sidebar">
  <div class="brand">
    <div class="brand-title">
      <span class="viiv" id="storeNameDisplay">My Shop</span> <span class="platform">POS</span>
    </div>
    <div class="brand-dot"></div>
  </div>

  <nav class="nav">
    <div class="menu" id="navMenu">
      <a href="#" data-page="dashboard" class="active">
        <span class="nav-icon">▣</span> Dashboard
      </a>
      <a href="#" data-page="affiliate">
        <span class="nav-icon">◈</span> Affiliate
      </a>
      <a href="#" data-page="easysale">
        <span class="nav-icon">⚡</span> EasySale
      </a>
      <a href="#" data-page="products">
        <span class="nav-icon">⊞</span> สินค้า
      </a>
      <a href="#" data-page="store">
        <span class="nav-icon">🏪</span> สโตร์
      </a>
      <a href="#" data-page="orders">
        <span class="nav-icon">≡</span> คำสั่งซื้อ
      </a>
      <a href="#" data-page="members">
        <span class="nav-icon">◎</span> สมาชิกร้านค้า
      </a>
      <a href="#" data-page="finance">
        <span class="nav-icon">◉</span> บัญชีการเงิน
      </a>
      <a href="#" data-page="sales">
        <span class="nav-icon">↑</span> ยอดขาย
      </a>
      <a href="#" data-page="billing">
        <span class="nav-icon">🧾</span> บิลใบเสร็จ
      </a>
      <a href="#" data-page="settings">
        <span class="nav-icon">⚙</span> จัดการร้านค้า
      </a>
    </div>
  </nav>

  <a class="sidebar-footer" href="https://viiv.me" target="_blank">
    VIIV POS v0.1.0
  </a>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main"><div class="content-wrap">
    <div class="card">
      <div id="cardBody"></div>
    </div>
  </div>
</div>

<script type="module">
// ── TOKEN BOOTSTRAP ──────────────────────────────────────────────────────────
(function(){
  // 1. URL param override (bookmarklet / link with ?token=)
  var p = new URLSearchParams(location.search);
  var t = p.get('token');
  if(t) { localStorage.setItem('viiv_token', t); window.VIIV_TOKEN = t; return; }
  // 2. localStorage
  var stored = localStorage.getItem('viiv_token');
  if(stored) { window.VIIV_TOKEN = stored; return; }
  // 3. ไม่มี token → redirect ไปหน้า login ของ shop (viiv.me ส่ง token กลับผ่าน SSO)
  window.location.href = 'https://viiv.me/login';
})();

// รับ token จาก Superboard parent ผ่าน postMessage
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'viiv_token' && e.data.token) {
    localStorage.setItem('viiv_token', e.data.token);
    window.VIIV_TOKEN = e.data.token;
  }
});

const PAGES = {
  dashboard: { title:'Dashboard', tabs: null, render: renderDashboard },
  affiliate:  { title:'Affiliate', tabs: null, render: function(el) {
    loadSubPage(el, 'affiliate/all.html');
  }},
  easysale:   { title:'EasySale', tabs:[
    { label:'POS ขายสินค้า',   file:'easysale/pos.html' },
    { label:'เว็บแคตตาล็อก', file:'easysale/catalog.html' },
  ]},
  products:  { title:'สินค้า', tabs:[
    { label:'ทั้งหมด',      file:'products/all.html' },
    { label:'สร้างสินค้า',  file:'products/create.html' },
    { label:'รับสินค้า',    file:'products/receive.html' },
    { label:'หมวดหมู่',     file:'products/category.html' },
    { label:'จัดการสินค้า', file:'products/manage.html' },
  ]},
  store:     { title:'สโตร์', tabs:[
    { label:'ทั้งหมด',        file:'products/warehouse/all.html' },
    { label:'สร้างชุดสินค้า', file:'products/warehouse/bundle.html' },
    { label:'ตัด/ย้าย',       file:'products/warehouse/adjust.html' },
    { label:'พิมพ์สต็อก',    file:'products/warehouse/print.html' },
    { label:'พิมพ์ป้าย',     file:'products/warehouse/label.html' },
    { label:'นำเข้า/ส่งออก', file:'products/warehouse/importexport.html' },
  ]},
  orders:    { title:'คำสั่งซื้อ', tabs:[
    { label:'ติดตามคำสั่งซื้อ',  file:'orders/all.html' },
    { label:'ติดตามการชำระเงิน',file:'orders/payment.html' },
    { label:'ติดตามการจัดส่ง',  file:'orders/shipping.html' },
  ]},
  members:   { title:'สมาชิกร้านค้า', tabs: null, render: function(el) {
    loadSubPage(el, 'members/all.html');
  }},
  sales: { title:'ยอดขาย', tabs:[
    { label:'ยอดขายวันนี้',    file:'sales/today.html' },
    { label:'ค้นหายอดขาย',    file:'sales/search.html' },
    { label:'ยอดขายล่วงหน้า', file:'sales/advance.html' },
  ]},
  billing: { title:'บิลใบเสร็จ', tabs:[
    { label:'ค้นหาบิล',    file:'billing/search.html' },
    { label:'สร้างบิล',     file:'billing/create.html' },
    { label:'ใบจอง',        file:'billing/reserve.html' },
    { label:'ใบส่งของ',    file:'billing/delivery.html' },
    { label:'ใบเสร็จ',     file:'billing/receipt.html' },
    { label:'ใบวางบิล',    file:'billing/statement.html' },
    { label:'ใบลดหนี้',    file:'billing/creditnote.html' },
  ]},
  finance:   { title:'บัญชีการเงิน', tabs:[
    { label:'ภาพรวม',  file:'finance/overview.html' },
    { label:'รายรับ',  file:'finance/income.html'   },
    { label:'รายจ่าย', file:'finance/expense.html'  },
  ]},
  connections: { title:'การเชื่อมต่อ', tabs: null, render: function(el) {
    loadSubPage(el, 'connections/main.html');
  }},
  settings:  { title:'จัดการร้านค้า', tabs: null, render: function(el) {
    loadSubPage(el, 'settings/store.html');
  }},
};

function renderDashboard(el) {
  loadSubPage(el,'dashboard/main.html');
}

let _loadAbort = null;
let _loadToken = 0;

function loadSubPage(el, file) {
  // abort request เก่า
  if (_loadAbort) { _loadAbort.abort(); }
  _loadAbort = new AbortController();
  const _myToken = ++_loadToken;

  el.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">กำลังโหลด...</div>';
  // inject global CSS ถ้ายังไม่มี
  if(!document.getElementById('viiv-global-css')){
    var gl=document.createElement('link');
    gl.id='viiv-global-css';gl.rel='stylesheet';
    gl.href='/merchant/global.css?v='+Date.now();
    document.head.appendChild(gl);
  }
  fetch(file + '?v=' + Date.now(), { signal: _loadAbort.signal })
    .then(function(r){ return r.text(); })
    .then(function(html){
      if (_myToken !== _loadToken) return;
      // parse HTML ด้วย DOMParser เพื่อรักษา script tags
      // cleanup named token handlers จากหน้าก่อน ก่อน inject HTML ใหม่
      Object.keys(window).forEach(function(k){
        if((k.startsWith('_tok_')||k.endsWith('TokenHandler'))&&typeof window[k]==='function'){
          window.removeEventListener('viiv_token_ready',window[k]);
          try{window[k]=undefined;}catch(e){}
        }
      });
      var _parser = new DOMParser();
      var _doc = _parser.parseFromString(html, 'text/html');
      var _scripts_raw = Array.from(_doc.querySelectorAll('script'));
      var body = _doc.querySelector('body');
      el.innerHTML = body ? body.innerHTML : html;
      // inject <style> และ <link> จาก <head> ด้วย
      _doc.querySelectorAll('head style, head link[rel="stylesheet"]').forEach(function(node){
        var clone = node.cloneNode(true);
        document.head.appendChild(clone);
      });
      // inject VIIV_TOKEN ให้ sub-page script เห็นก่อนรัน
      // ถ้า localStorage ว่างให้ใช้ window.VIIV_TOKEN ที่รับจาก postMessage (ถ้ามี)
      var _storedTok = localStorage.getItem('viiv_token') || window.VIIV_TOKEN || '';
      if (_storedTok && !localStorage.getItem('viiv_token')) {
        localStorage.setItem('viiv_token', _storedTok);
      }
      window.VIIV_TOKEN = _storedTok;
      window._tokenReadyFired = false;
      // โหลดชื่อร้านทันทีที่มี token
      if(window.VIIV_TOKEN && !window._storeLoaded){
        window._storeLoaded=true;
        var _api=(location.hostname==='merchant.viiv.me')?'':'https://concore.viiv.me';
        fetch(_api+'/api/pos/store/settings',{headers:{'Authorization':'Bearer '+window.VIIV_TOKEN}})
        .then(function(r){return r.json();})
        .then(function(d){
          if(d&&d.store_name){
            var el=document.getElementById('storeNameDisplay');
            if(el) el.textContent=d.store_name;
            document.title=d.store_name+' POS';
            window._storeSettings=d;
          }
        }).catch(function(){});
      }
      var _scripts = _scripts_raw;
      var _total = _scripts.length;
      var _done = 0;
      function _onScriptDone(){
        _done++;
        if(_done >= _total){
          // รอให้ DOM settle ก่อน fire token_ready
          setTimeout(function(){
            if(!window._tokenReadyFired){
              window._tokenReadyFired=true;
              // cleanup named handlers จากหน้าก่อน
              var _tkKeys=Object.keys(window).filter(function(k){return k.startsWith('_tok_')||k.endsWith('TokenHandler');});
              _tkKeys.forEach(function(k){
                if(typeof window[k]==='function'){
                  window.removeEventListener('viiv_token_ready',window[k]);
                  try{ delete window[k]; } catch(e){ window[k]=undefined; }
                }
              });
              window.dispatchEvent(new CustomEvent('viiv_token_ready',{
                detail:{token: window.VIIV_TOKEN}
              }));
            }
          },50);
        }
      }
      _scripts.forEach(function(scr){
        try{
          var blob = new Blob([scr.textContent], {type:'application/javascript'});
          var url = URL.createObjectURL(blob);
          var s = document.createElement('script');
          s.src = url;
          s.onload = function(){ URL.revokeObjectURL(url); _onScriptDone(); };
          s.onerror = function(){ _onScriptDone(); };
          document.head.appendChild(s);
        }catch(e){ console.warn('script inject:', e); _onScriptDone(); }
      });
      if(_total === 0){
        requestAnimationFrame(function(){
          if(!window._tokenReadyFired){
            window._tokenReadyFired=true;
            window.dispatchEvent(new CustomEvent('viiv_token_ready',{
              detail:{token: window.VIIV_TOKEN}
            }));
          }
        });
      }
    })
    .catch(function(e){
      if (e && e.name === 'AbortError') return;
      el.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa;">โหลดหน้าไม่ได้</div>';
    });
}

function renderPlaceholder(el, page) {
  el.innerHTML = `
    <div class="page-placeholder">
      <div class="ph-icon">◈</div>
      <div class="ph-text">${page.title} — coming soon</div>
    </div>`;
}

function renderTabs(page, key, activeIdx) {
  if (activeIdx === undefined) activeIdx = 0;
  const body = document.getElementById('cardBody');
  if (!page.tabs || !page.tabs.length) {
    if (page.render) page.render(body, page);
    else body.innerHTML = '<div style="text-align:center;padding:60px;color:#aaa;">Coming soon</div>';
    return;
  }
  const startIdx = (activeIdx >= 0 && activeIdx < page.tabs.length) ? activeIdx : 0;
  const tabBar = document.createElement('div');
  tabBar.style.cssText = 'display:flex;gap:4px;padding:0 0 12px 0;border-bottom:1px solid var(--border,#e5e5e5);margin-bottom:0;flex-wrap:wrap;';
  const contentEl = document.createElement('div');
  body.innerHTML = '';
  body.appendChild(tabBar);
  body.appendChild(contentEl);
  page.tabs.forEach(function(tab, i) {
    const btn = document.createElement('button');
    btn.textContent = tab.label;
    btn.className = 'pos-tab' + (i === startIdx ? ' active' : '');
    btn.style.cssText = 'padding:5px 10px;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;background:'+(i===startIdx?'var(--accent,#e8b93e)':'#f0ede8')+';color:'+(i===startIdx?'#1a1200':'var(--text,#1f2937)')+';transition:.15s;';
    btn.addEventListener('click', function() {
      navigate(key, i);
    });
    tabBar.appendChild(btn);
    if (i === startIdx) loadSubPage(contentEl, tab.file);
  });
}
function navigate(key, tabIndex) {
  if (tabIndex === undefined) tabIndex = 0;
  const page = PAGES[key];
  if (!page) return;
  location.hash = key + (tabIndex > 0 ? '/' + tabIndex : '');
  document.querySelectorAll('#navMenu a').forEach(a => {
    a.classList.toggle('active', a.dataset.page === key);
  });
  renderTabs(page, key, tabIndex);
}

function goViiv()    { window.open('https://viiv.me', '_blank'); }
function doLogout()  {
  if (confirm('ออกจากระบบ?')) {
    localStorage.removeItem('viiv_token');
    window.location.href = 'https://viiv.me/login';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('#navMenu a[data-page]').forEach(a => {
    a.addEventListener('click', e => { e.preventDefault(); navigate(a.dataset.page, 0); });
  });
  // restore page + sub-tab จาก hash
  window.addEventListener('hashchange', () => {
    const hash = location.hash.replace('#', '') || 'dashboard';
    const [key, tabStr] = hash.split('/');
    const tabIndex = parseInt(tabStr) || 0;
    if (PAGES[key]) navigate(key, tabIndex);
  });

  // restore จาก hash หรือเริ่มที่ dashboard
  const hash = location.hash.replace('#', '') || 'dashboard';
  const [initKey, initTabStr] = hash.split('/');
  const initTab = parseInt(initTabStr) || 0;
  navigate(PAGES[initKey] ? initKey : 'dashboard', initTab);
});

window.goViiv   = goViiv;
window.doLogout = doLogout;
window.navigate  = navigate;
</script>

</body>
</html>
