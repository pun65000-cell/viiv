<div class="menu">

<!-- CTO_MENU_9_DONE -->
 
      <div class="sidebar-footer">

      </div>
    </div>

    <div class="main">

      <!-- ❌ pagebar ยังอยู่แต่ถูก disable ด้วย CSS (ไม่ลบโครง) -->

      <!-- ❌ topmenu ยังอยู่แต่ไม่แสดง -->

      <div class="content">
        <!-- ❌ ลบ title/subtitle -->

      </div>
    </div>

    <!-- ❌ ปิด script profile (ไม่ลบ แต่ disable) -->
    <script>
    // CTO_PROFILE_DISABLED
    </script>

    <!-- ❌ ปิด SPA ตัวเก่า -->
    <script>
    // CTO_OLD_SPA_DISABLED
    </script>

    <!-- ✅ SPA ตัวเดียว -->
    <script>
    // ===== CTO_SINGLE_SPA =====

    document.addEventListener('DOMContentLoaded', function(){

      const spa = document.getElementById('spa')

      function render(name){
        if(!spa) return
        spa.innerHTML = '<div style="padding:20px;">PAGE: ' + name + '</div>'
      }

      document.querySelectorAll('.menu a').forEach(el=>{
        el.addEventListener('click', function(e){
          e.preventDefault()

          document.querySelectorAll('.menu a').forEach(a=>a.classList.remove('active'))
          this.classList.add('active')

          render(this.innerText)
        })
      })

      render('dashboard')

    })
    </script>

</body>
