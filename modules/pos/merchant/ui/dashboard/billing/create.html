<body>
<div class="bill-wrap">
  <div class="bill-doctype-bar">
    <select id="billDocType" class="bill-select-doc" onchange="uiDocType()">
      <option value="receipt">ใบเสร็จรับเงิน</option>
      <option value="delivery">ใบส่งของ</option>
      <option value="quotation">ใบเสนอราคา</option>
      <option value="reserve">ใบจอง</option>
    </select>
    <div id="billDocExtra" class="bill-doc-extra"></div>
  </div>
  <div class="bill-search-row">
    <div class="bill-search-wrap">
      <input id="billSearchInput" class="bill-search-input" placeholder="ค้นหาสินค้า (ชื่อ / SKU) หรือสแกน..." autocomplete="off"/>
      <div id="billSearchDrop" class="bill-search-drop" style="display:none;"></div>
    </div>
    <input id="billAddQty" type="number" min="1" value="1" class="bill-qty-bar" title="จำนวน"/>
    <button class="bill-btn-scan" id="billScanToggle" title="สแกน QR/บาร์โค้ด">scan</button>
  </div>
  <div id="billScanArea" style="display:none;margin-bottom:8px;background:#f8f6f2;border:2px dashed #e8b93e;border-radius:8px;padding:12px;text-align:center;">
    <div style="font-size:12px;color:#6b7280;margin-bottom:6px;">พร้อมรับการสแกน QR / บาร์โค้ด</div>
    <input id="billScanInput" class="bill-search-input" placeholder="สแกนหรือพิมพ์บาร์โค้ด..." style="max-width:320px;margin:0 auto;display:block;"/>
  </div>
  <div class="bill-table-wrap">
    <table class="bill-table">
      <thead><tr>
        <th style="width:85px;">SKU</th>
        <th>ชื่อสินค้า</th>
        <th style="width:90px;">จำนวน</th>
        <th style="width:140px;">ราคา/หน่วย</th>
        <th style="width:100px;">รวม</th>
        <th style="width:40px;"></th>
      </tr></thead>
      <tbody id="billItems"></tbody>
    </table>
    <div id="billEmpty" style="text-align:center;padding:24px;color:#aaa;font-size:13px;">ยังไม่มีสินค้า</div>
  </div>
  <div class="bill-meta-row">
    <div class="bill-field" style="flex:1;">
      <label>ลูกค้า <span style="color:#ef4444;">*</span></label>
      <div style="position:relative;">
        <input id="billCustomer" type="text" placeholder="ชื่อลูกค้า / รหัสสมาชิก" class="bill-input" autocomplete="off"/>
        <div id="billMemberDrop" class="bill-search-drop" style="display:none;"></div>
      </div>
    </div>
    <div class="bill-field" style="flex:1;">
      <label>กำหนดการส่ง</label>
      <input id="billScheduledAt" type="datetime-local" class="bill-input" style="font-size:12px;"/>
    </div>
  </div>
  <div class="bill-meta-row" style="margin-top:6px;">
    <div class="bill-field" style="flex:1;">
      <label>หมายเหตุ</label>
      <input id="billNote" type="text" placeholder="หมายเหตุในบันทึกการขาย" class="bill-input"/>
    </div>
  </div>
  <div class="bill-summary">
    <div class="bill-summary-right">
      <div class="bill-sum-row"><span>ราคารวม</span><span id="billSubtotal">฿0.00</span></div>
      <div class="bill-sum-row">
        <span>ส่วนลด</span>
        <div style="display:flex;gap:6px;align-items:center;">
          <input id="billDiscount" type="number" min="0" value="0" class="bill-input-sm"/>
          <select id="billDiscountType" class="bill-select-sm">
            <option value="amount">บาท</option>
            <option value="percent">%</option>
          </select>
        </div>
      </div>
      <div class="bill-sum-row">
        <span>VAT</span>
        <select id="billVatType" class="bill-select-sm" style="margin-right:4px;">
          <option value="included">included</option>
          <option value="excluded">excluded</option>
        </select>
        <select id="billVat" class="bill-select-sm">
          <option value="0">ไม่มี VAT</option>
          <option value="7">7%</option>
        </select>
      </div>
      <div class="bill-sum-row total"><span>ยอดสุทธิ</span><span id="billTotal" style="color:#e8b93e;font-size:18px;font-weight:700;">฿0.00</span></div>
      <div class="bill-sum-row">
        <span>จ่ายแบบ</span>
        <select id="billPayMethod" class="bill-select-sm" onchange="onPayMethodChange()">
          <option value="cash">เงินสด (จ่ายแล้ว)</option>
          <option value="cash_waiting">เงินสด-รอส่ง</option>
          <option value="transfer">โอน/QR (จ่ายแล้ว)</option>
          <option value="transfer_waiting">โอน/QR-รอส่ง</option>
          <option value="deposit">ชำระมัดจำ</option>
          <option value="credit">เครดิต-ชำระทาง</option>
          <option value="pending">รอชำระ</option>
        </select>
      </div>
      <div class="bill-sum-row">
        <span>รับเงิน</span>
        <input id="billPaid" type="number" min="0" value="0" class="bill-input-sm" style="width:110px;"/>
      </div>
      <div id="billWaitingRow" style="display:none;" class="bill-sum-row">
        <span>กำหนดวันส่ง</span>
        <input id="billWaitingAt" type="datetime-local" style="width:160px;padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;"/>
      </div>
      <div class="bill-sum-row"><span>เงินทอน</span><span id="billChange" style="font-weight:700;color:#16a34a;">฿0.00</span></div>
    </div>
  </div>
  <div class="bill-actions">
    <button class="bill-btn-cancel" id="billClearBtn">ล้างบิล</button>
    <div style="display:flex;gap:8px;">
      <button class="bill-btn-save" id="billDraftBtn">บันทึกร่าง</button>
      <button class="bill-btn-print" id="billSubmitBtn">จบการขาย / พิมพ์</button>
    </div>
  </div>
  <div id="billMsg" style="display:none;font-size:12px;text-align:right;margin-top:4px;"></div>
</div>
<style>
.bill-wrap{padding:4px 0;box-sizing:border-box;width:100%;}
.bill-doctype-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.bill-select-doc{padding:7px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;font-weight:600;background:#fff;outline:none;}
.bill-select-doc:focus{border-color:#e8b93e;}
.bill-doc-extra{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:12px;color:#6b7280;}
.bill-doc-extra input,.bill-doc-extra select{padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;outline:none;}
.bill-search-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.bill-search-wrap{flex:1;position:relative;}
.bill-search-input{width:100%;padding:8px 14px;border:1.5px solid #e8b93e;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box;background:#fffbf0;}
.bill-search-drop{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e5e5e5;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:100;max-height:220px;overflow-y:auto;}
.bill-search-item{padding:8px 14px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;}
.bill-search-item:hover{background:#fffbf0;}
.bill-qty-bar{width:65px;padding:7px 8px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;text-align:center;outline:none;}
.bill-btn-scan{padding:7px 12px;background:#f0ede8;border:1px solid #d1d5db;border-radius:8px;font-size:12px;cursor:pointer;}
.bill-table-wrap{background:#fff;border:1px solid #e5e5e5;border-radius:10px;overflow:hidden;margin-bottom:10px;min-height:80px;}
.bill-table{width:100%;border-collapse:collapse;font-size:13px;}
.bill-table th{background:#f8f6f2;padding:7px 10px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e5e5;}
.bill-table td{padding:6px 10px;border-bottom:1px solid #f0ede8;vertical-align:middle;}
.bill-table tr:last-child td{border-bottom:none;}
.bill-qty-input{width:60px;padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;text-align:center;outline:none;}
.bill-price-select{padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;outline:none;background:#fff;max-width:140px;}
.bill-remove-btn{padding:3px 8px;background:#fee2e2;color:#991b1b;border:none;border-radius:5px;font-size:11px;cursor:pointer;}
.bill-meta-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.bill-field{display:flex;flex-direction:column;gap:4px;}
.bill-field label{font-size:11px;font-weight:600;color:#374151;}
.bill-input{padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;outline:none;width:100%;box-sizing:border-box;}
.bill-input:focus{border-color:#e8b93e;}
.bill-input.error{border-color:#ef4444;}
.bill-input-sm{padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;outline:none;width:70px;}
.bill-select-sm{padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;outline:none;background:#fff;}
.bill-summary{margin-bottom:10px;}
.bill-summary-right{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;max-width:340px;margin-left:auto;}
.bill-sum-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;}
.bill-sum-row.total{padding-top:8px;border-top:1px solid #f0ede8;font-weight:700;font-size:14px;}
.bill-actions{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.bill-btn-cancel{padding:8px 14px;background:#f3f4f6;color:#374151;border:1px solid #d1d5db;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.bill-btn-save{padding:8px 16px;background:#f0ede8;color:#374151;border:1px solid #d1d5db;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.bill-btn-print{padding:8px 20px;background:#e8b93e;color:#1a1200;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
.bill-btn-print:hover{opacity:.85;}
</style>
<script>
(function(){
'use strict';
var API=(location.hostname==='merchant.viiv.me')?'':'https://concore.viiv.me';
var TOKEN=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
var allProducts=[],allMembers=[],billItems=[],_total=0,_selectedMember=null;

function fmt(n){ return '฿'+(n||0).toLocaleString('th',{minimumFractionDigits:2}); }
function reloadMembers(){
  if(!TOKEN) return;
  fetch(API+'/api/pos/members/list?limit=100',{headers:{'Authorization':'Bearer '+TOKEN}})
  .then(function(r){return r.json();})
  .then(function(d){allMembers=d.members||[];});
}
// autosave draft ทุก 30 วินาที
var _draftId=null;
var _autosaveTimer=null;
function autosaveDraft(){
  if(!TOKEN||!billItems.length) return;
  clearTimeout(_autosaveTimer);
  _autosaveTimer=setTimeout(function(){
    var payload={
      draft_id:_draftId||undefined,
      items:billItems,
      customer:(_selectedMember&&_selectedMember.name)||document.getElementById('billCustomer').value||'',
      customer_code:(_selectedMember&&_selectedMember.code)||'',
      customer_data:_selectedMember||null,
      doc_type:(document.getElementById('billDocType')||{}).value||'receipt',
      discount:parseFloat((document.getElementById('billDiscount')||{}).value)||0,
      discount_type:(document.getElementById('billDiscountType')||{}).value||'amount',
      vat:parseInt((document.getElementById('billVat')||{}).value)||0,
      vat_type:(document.getElementById('billVatType')||{value:'included'}).value,
      pay_method:(document.getElementById('billPayMethod')||{}).value||'cash',
      note:(document.getElementById('billNote')||{}).value||'',
      scheduled_at:(document.getElementById('billScheduledAt')||{}).value||null,
    };
    fetch(API+'/api/pos/bills/save-draft',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
      body:JSON.stringify(payload)
    }).then(function(r){return r.json();})
    .then(function(d){if(d.draft_id)_draftId=d.draft_id;});
  },30000);
}
function loadData(){
  fetch(API+'/api/pos/products/list',{headers:{'Authorization':'Bearer '+TOKEN}})
  .then(function(r){return r.json();})
  .then(function(d){ allProducts=d.products||d||[]; });
  reloadMembers();
}
function uiDocType(){
  var dtEl=document.getElementById('billDocType');
  var ex=document.getElementById('billDocExtra');
  if(!dtEl||!ex) return;
  var t=dtEl.value;
  var map={
    delivery:'วันเวลารับสินค้า: <input type="datetime-local" id="billDeliveryDate">',
    quotation:'มีผล <input type="number" id="billQtDays" value="30" min="1" style="width:55px;"> วัน',
    reserve:'วันรับสินค้า: <input type="datetime-local" id="billReserveDate">'
  };
  ex.innerHTML=map[t]||'';
}
function addProduct(id){
  var p=allProducts.find(function(x){return x.id===id;});
  if(!p) return;
  var qtyEl=document.getElementById('billAddQty');
  var qty=parseInt(qtyEl?qtyEl.value:1)||1;
  var ex=billItems.find(function(i){return i.id===id;});
  if(ex){ex.qty+=qty;}
  else{
    var p1=parseFloat(p.price)||0,pl=parseFloat(p.price_min)||0;
    function fo(n){return n.toLocaleString('th',{minimumFractionDigits:2});}
    var opts=[{l:fo(p1),v:p1}];
    if(pl>0&&pl<p1){
      var diff=p1-pl,step=diff>200?10:diff>50?5:1;
      for(var r=Math.round((p1-step)*100)/100;r>=pl;r=Math.round((r-step)*100)/100)
        opts.push({l:fo(r),v:r});
      if(opts[opts.length-1].v!==pl) opts.push({l:fo(pl)+'(min)',v:pl});
    } else { opts.push({l:'0.00(free)',v:0}); }
    billItems.push({id:p.id,sku:p.sku||'',name:p.name,qty:qty,price:p1,opts:opts});
  }
  var si=document.getElementById('billSearchInput');
  var sd=document.getElementById('billSearchDrop');
  if(si) si.value='';
  if(sd) sd.style.display='none';
  if(qtyEl) qtyEl.value=1;
  renderItems();
}
function renderItems(){autosaveDraft();
  var tbody=document.getElementById('billItems');
  var empty=document.getElementById('billEmpty');
  if(!billItems.length){if(tbody)tbody.innerHTML='';if(empty)empty.style.display='block';calc();return;}
  if(empty)empty.style.display='none';
  if(!tbody)return;
  tbody.innerHTML='';
  billItems.forEach(function(item,i){
    var tr=document.createElement('tr');
    var sel=document.createElement('select');
    sel.className='bill-price-select';
    item.opts.forEach(function(o){
      var op=document.createElement('option');
      op.value=o.v;op.textContent=o.l;
      if(o.v===item.price)op.selected=true;
      sel.appendChild(op);
    });
    sel.addEventListener('change',function(){
      item.price=parseFloat(this.value)||0;
      tr.querySelectorAll('td')[4].textContent=fmt(item.qty*item.price);
      calc();
    });
    var qIn=document.createElement('input');
    qIn.type='number';qIn.min=1;qIn.value=item.qty;qIn.className='bill-qty-input';
    qIn.addEventListener('change',function(){
      var n=parseInt(this.value);if(n<1){this.value=1;n=1;}
      item.qty=n;
      tr.querySelectorAll('td')[4].textContent=fmt(item.qty*item.price);
      calc();
    });
    var rm=document.createElement('button');
    rm.className='bill-remove-btn';rm.textContent='X';
    rm.addEventListener('click',function(){billItems.splice(i,1);renderItems();});
    [item.sku,item.name,'','',fmt(item.qty*item.price),''].forEach(function(txt,ci){
      var td=document.createElement('td');
      if(ci===2)td.appendChild(qIn);
      else if(ci===3)td.appendChild(sel);
      else if(ci===5)td.appendChild(rm);
      else td.textContent=txt;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  calc();
}
function calc(){
  var sub=billItems.reduce(function(s,i){return s+(i.qty*i.price);},0);
  var dv=parseFloat((document.getElementById('billDiscount')||{}).value)||0;
  var dt=((document.getElementById('billDiscountType')||{}).value)||'amount';
  var disc=dt==='percent'?sub*dv/100:dv;
  var after=Math.max(0,sub-disc);
  var vr=parseInt(((document.getElementById('billVat')||{}).value)||0);
  _total=after+after*vr/100;
  var se=document.getElementById('billSubtotal');
  var te=document.getElementById('billTotal');
  if(se)se.textContent=fmt(sub);
  if(te)te.textContent=fmt(_total);
  calcChange();
}
function calcChange(){
  var paid=parseFloat(((document.getElementById('billPaid')||{}).value)||0);
  var el=document.getElementById('billChange');
  if(!el)return;
  var ch=paid-_total;
  el.textContent=fmt(Math.max(0,ch));
  el.style.color=ch>=0?'#16a34a':'#ef4444';
}
function showMsg(msg,color){
  var el=document.getElementById('billMsg');if(!el)return;
  el.textContent=msg;el.style.color=color||'#ef4444';el.style.display='block';
  clearTimeout(showMsg._t);showMsg._t=setTimeout(hideMsg,4000);
}
function hideMsg(){var el=document.getElementById('billMsg');if(el)el.style.display='none';}
function clearBillSilent(){
  billItems=[]; _selectedMember=null;
  var fields={'billCustomer':'','billNote':'','billPaid':'0','billDiscount':'0','billAddQty':'1','billWaitingAt':''};
  Object.keys(fields).forEach(function(id){var el=document.getElementById(id);if(el)el.value=fields[id];});
  var pm=document.getElementById('billPayMethod');if(pm)pm.value='cash';
  onPayMethodChange();
  var wr=document.getElementById('billWaitingRow');if(wr)wr.style.display='none';
  renderItems();
  ['billDiscount','billPaid'].forEach(function(id){var e=document.getElementById(id);if(e)e.value=0;});
  ['billCustomer','billNote','billMemberCode'].forEach(function(id){
    var e=document.getElementById(id);if(e){e.value='';e.classList.remove('error');}
  });
  hideMsg();
}
function clearBill(){
  if(billItems.length&&!confirm('ล้างบิลทั้งหมด?'))return;
  clearBillSilent();
}
function onPayMethodChange(){
  var pm=document.getElementById('billPayMethod').value;
  var statusMap={
    cash:             {status:'paid',    shipping:'received_payment', delay:0},
    cash_waiting:     {status:'paid',    shipping:'paid_waiting',     delay:15},
    transfer:         {status:'paid',    shipping:'received_payment', delay:0},
    transfer_waiting: {status:'paid',    shipping:'paid_waiting',     delay:15},
    deposit:          {status:'partial', shipping:'deposit_waiting',  delay:30},
    credit:           {status:'credit',  shipping:'scheduled',        delay:45},
    pending:          {status:'pending', shipping:null,               delay:0},
  };
  window._payStatusMap=statusMap[pm]||{status:'pending',shipping:null,delay:0};
  var needDt=['cash_waiting','transfer_waiting','deposit','credit'];
  var dtRow=document.getElementById('billWaitingRow');
  if(dtRow) dtRow.style.display=needDt.includes(pm)?'block':'none';
  var needAmt=['cash','cash_waiting','transfer','transfer_waiting','deposit'];
  var amtRow=document.getElementById('billPaidAmtRow');
  if(amtRow) amtRow.style.display=needAmt.includes(pm)?'':'none';
}
function save(status){
  calc();
  var errors=[];
  if(!billItems.length)errors.push('กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการ');
  if(!_selectedMember){
    errors.push('กรุณาเลือกลูกค้าจากสมาชิก');
    var cel=document.getElementById('billCustomer');if(cel)cel.classList.add('error');
  }
  if(status==='paid'){
    var paid=parseFloat((document.getElementById('billPaid')||{}).value)||0;
    var pm=(document.getElementById('billPayMethod')||{}).value;
    if(pm==='cash'&&paid<_total)errors.push('รับเงินไม่ครบ (ยอด '+fmt(_total)+')');
  }
  if(errors.length){showMsg(errors.join(' | '),'#ef4444');return;}
  var cel=document.getElementById('billCustomer');if(cel)cel.classList.remove('error');

  var d=document.getElementById('billDeliveryDate');
  var q=document.getElementById('billQtDays');
  var rv=document.getElementById('billReserveDate');
  var payload={
    doc_type:(document.getElementById('billDocType')||{}).value||'receipt',
    items:billItems.slice(),
    customer:(document.getElementById('billCustomer')||{}).value||'',
    customer_code:_selectedMember?(_selectedMember.code||_selectedMember.id||''):'',
    member_id:_selectedMember?(_selectedMember.id||''):'',
    note:(document.getElementById('billNote')||{}).value||'',
    scheduled_at:(function(){
      var el=document.getElementById('billScheduledAt');
      if(el&&el.value) return new Date(el.value).toISOString();
      var map=window._payStatusMap||{delay:45};
      var dd=new Date();
      dd.setMinutes(dd.getMinutes()+(map.delay||45));
      return dd.toISOString();
    })(),
    total:_total,
    pay_method:(document.getElementById('billPayMethod')||{}).value||'cash',
    paid:parseFloat((document.getElementById('billPaid')||{}).value)||0,
    discount:parseFloat((document.getElementById('billDiscount')||{}).value)||0,
    discount_type:(document.getElementById('billDiscountType')||{}).value||'amount',
    vat:parseInt((document.getElementById('billVat')||{}).value)||0,
    vat_type:(document.getElementById('billVatType')||{value:'included'}).value,
    status:(function(){
      if(status==='draft') return 'draft';
      var map=window._payStatusMap||{status:'pending',shipping:null};
      return map.status;
    })(),
  };
  var _map=window._payStatusMap||{status:'pending',shipping:null};
  if(status!=='draft'&&_map.shipping) payload.shipping_status=_map.shipping;
  if(d)payload.delivery_date=d.value;
  if(q)payload.quotation_days=q.value;
  if(rv)payload.reserve_date=rv.value;

  var submitBtn=document.getElementById('billSubmitBtn');
  var draftBtn=document.getElementById('billDraftBtn');
  if(submitBtn)submitBtn.disabled=true;
  if(draftBtn)draftBtn.disabled=true;
  showMsg('กำลังบันทึก...','#e8b93e');

  fetch((window.API_BASE||'')+'/api/pos/bills/create',{
    method:'POST',
    headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  })
  .then(function(r){return r.json();})
  .then(function(res){
    if(submitBtn)submitBtn.disabled=false;
    if(draftBtn)draftBtn.disabled=false;
    if(res.id||res.message||res.success){
      var billId=res.id||res.bill_id||'';
      showMsg(status==='draft'?'บันทึกร่าง '+billId:'จบการขาย '+billId+' '+fmt(_total),'#16a34a');
      // LINE push — ถ้า member มี line_user_id
      var lineUid=_selectedMember&&_selectedMember.line_user_id;
      if(lineUid && status==='paid'){
        fetch((window.API_BASE||'')+'/api/line/push-bill',{
          method:'POST',
          headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
          body:JSON.stringify({bill_id:billId,line_user_id:lineUid})
        }).catch(function(){});
      }
      if(status==='paid'){
        setTimeout(function(){
          clearBillSilent();
          if(typeof navigate==='function')navigate('billing_search');
          else if(window.parent&&window.parent.navigate)window.parent.navigate('billing_search');
        },1200);
      }
      if(status==='draft'){
        setTimeout(function(){
          if(typeof navigate==='function')navigate('billing_search');
          else if(window.parent&&window.parent.navigate)window.parent.navigate('billing_search');
        },900);
      }
    } else {
      showMsg(res.detail||res.error||'เกิดข้อผิดพลาด','#ef4444');
    }
  })
  .catch(function(err){
    if(submitBtn)submitBtn.disabled=false;
    if(draftBtn)draftBtn.disabled=false;
    showMsg('เชื่อมต่อ server ไม่ได้','#ef4444');
  });
}
function mfField(label,id,type,val,ph){
  return '<div style="display:flex;flex-direction:column;gap:4px;">'+
    '<label style="font-size:12px;font-weight:600;color:#374151;">'+label+'</label>'+
    '<input id="'+id+'" type="'+type+'" value="'+(val||'')+'" placeholder="'+(ph||'')+
    '" style="padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;outline:none;width:100%;box-sizing:border-box;"/>'+
  '</div>';
}

      mfField('Tax ID','nm-taxid','text','')+
      mfField('อีเมล','nm-email','email','')+
      mfField('Credit','nm-credit','number','0')+
      '<div style="grid-column:1/-1;">'+mfField('ที่อยู่','nm-address','text','')+'</div>'+
      '<div style="grid-column:1/-1;display:flex;flex-direction:column;gap:6px;">'+
        '<label style="font-size:12px;font-weight:600;color:#374151;">แพลตฟอร์ม</label>'+
        '<div style="display:flex;gap:6px;flex-wrap:wrap;">'+
          pfs.map(function(p){return '<label id="nmlbl-'+p+'" style="font-size:12px;padding:4px 10px;background:#f0ede8;border-radius:20px;cursor:pointer;color:#374151;">'+
            '<input type="checkbox" name="nm-platform" value="'+p+'" style="display:none;"/>'+p+'</label>';}).join('')+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div id="nm-code-err" style="color:#ef4444;font-size:11px;margin-top:4px;display:none;"></div>'+
    '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">'+
      '<button id="nm-cancel" style="padding:8px 16px;background:#f3f4f6;border:1px solid #d1d5db;border-radius:8px;font-size:13px;cursor:pointer;">ยกเลิก</button>'+
      '<button id="nm-save" style="padding:8px 20px;background:#e8b93e;color:#1a1200;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">บันทึก + เลือก</button>'+

    var nm={id:'MEM_'+Date.now(),code:code||'C'+Date.now().toString().slice(-6),name:name,

  });
}
window.addEventListener('viiv_load_draft',function(e){
  var bill=e.detail&&e.detail.bill;if(!bill)return;
  if(!allProducts.length){setTimeout(function(){window.dispatchEvent(new CustomEvent('viiv_load_draft',{detail:{bill:bill}}));},500);return;}
  billItems=(bill.items||[]).map(function(i){
    var pd=allProducts.find(function(x){return x.id===i.id;})||{};
    var p1=parseFloat(pd.price||i.price)||0,pl=parseFloat(pd.price_min)||0;
    function fo(n){return n.toLocaleString('th',{minimumFractionDigits:2});}
    var opts=[{l:fo(p1),v:p1}];
    if(pl>0&&pl<p1){var diff=p1-pl,step=diff>200?10:diff>50?5:1;
      for(var r=Math.round((p1-step)*100)/100;r>=pl;r=Math.round((r-step)*100)/100)opts.push({l:fo(r),v:r});
      if(opts[opts.length-1].v!==pl)opts.push({l:fo(pl)+'(min)',v:pl});
    }
    return {id:i.id,sku:i.sku,name:i.name,qty:i.qty,price:i.price,opts:opts};
  });
  _selectedMember=bill.customer_data||null;
  var ci=document.getElementById('billCustomer');if(ci)ci.value=bill.customer||'';
  var mc=document.getElementById('billMemberCode');if(mc)mc.value=bill.customer_code||'';
  var ni=document.getElementById('billNote');if(ni)ni.value=bill.note||'';
  document.getElementById('billDocType').value=bill.doc_type||'receipt';
  document.getElementById('billDiscount').value=bill.discount||0;
  document.getElementById('billDiscountType').value=bill.discount_type||'amount';
  document.getElementById('billVat').value=bill.vat||0;
  var vtEl=document.getElementById('billVatType');
  if(vtEl) vtEl.value=bill.vat_type||(window._storeSettings&&window._storeSettings.vat_mode)||'included';
  document.getElementById('billPaid').value=bill.paid||0;
  document.getElementById('billPayMethod').value=bill.pay_method||'cash';
  var bills=JSON.parse(localStorage.getItem('viiv_bills')||'[]');
  localStorage.setItem('viiv_bills',JSON.stringify(bills.filter(function(b){return b.id!==bill.id;})));
  uiDocType();renderItems();
  showMsg('โหลดบิลร่าง #'+bill.id+' แล้ว','#e8b93e');
});

(function(){
  var _inited=false;
  var sd=document.getElementById('billSearchDrop');
  var md=document.getElementById('billMemberDrop');
  function doInit(tok){
    if(_inited) return;
    _inited=true;
    if(tok) TOKEN=tok;
    if(!TOKEN) return;
    if(!window._storeSettings){
      fetch((window.API_BASE||'')+'/api/pos/store/settings',{headers:{'Authorization':'Bearer '+TOKEN}})
      .then(function(r){return r.json();})
      .then(function(d){
        window._storeSettings=d;
        var vtEl=document.getElementById('billVatType');
        if(vtEl) vtEl.value=d.vat_mode||'included';
      }).catch(function(){});
    }
    loadData();
    reloadMembers();
    uiDocType();
    calc();
    var si=document.getElementById('billSearchInput');
    if(si){
      var _ime=false;
      si.addEventListener('compositionstart',function(){_ime=true;});
      si.addEventListener('compositionend',function(){_ime=false;});
      si.addEventListener('input',function(){
        var q=this.value.toLowerCase();
        if(!q){sd.style.display='none';return;}
        var found=allProducts.filter(function(p){
          return p.status!=='inactive'&&((p.name||'').toLowerCase().includes(q)||(p.sku||'').toLowerCase().includes(q));
        }).slice(0,8);
        if(!found.length){sd.style.display='none';return;}
        sd.innerHTML='';
        found.forEach(function(p){
          var div=document.createElement('div');div.className='bill-search-item';
          div.innerHTML='<span>'+p.name+' <span style="color:#9ca3af;font-size:11px;">('+p.sku+')</span></span><span style="color:#e8b93e;font-weight:600;">'+fmt(p.price)+'</span>';
          div.addEventListener('click',function(){addProduct(p.id);});
          sd.appendChild(div);
        });
        sd.style.display='block';
      });
      si.addEventListener('keydown',function(e){
        if(e.key!=='Enter'||_ime)return;
        e.preventDefault();
        var q=this.value.trim().toLowerCase();if(!q)return;
        var p=allProducts.find(function(x){return x.status!=='inactive'&&(x.sku||'').toLowerCase()===q;});
        if(!p){showMsg('ไม่พบรหัสสินค้า "'+this.value+'" กรุณาตรวจสอบ SKU','#ef4444');this.select();return;}
        addProduct(p.id);this.value='';sd.style.display='none';
      });
    }
    var scanTog=document.getElementById('billScanToggle');
    var scanIn=document.getElementById('billScanInput');
    var scanAr=document.getElementById('billScanArea');
    if(scanTog)scanTog.addEventListener('click',function(){
      if(!scanAr)return;
      scanAr.style.display=scanAr.style.display==='none'?'block':'none';
      if(scanAr.style.display==='block'&&scanIn)scanIn.focus();
    });
    if(scanIn)scanIn.addEventListener('keydown',function(e){
      if(e.key!=='Enter')return;
      var code=this.value.trim();
      var p=allProducts.find(function(x){return x.sku===code||x.id===code;});
      if(p){addProduct(p.id);showMsg('เพิ่ม '+p.name,'#16a34a');}
      else showMsg('ไม่พบสินค้า: '+code,'#ef4444');
      this.value='';
    });
    var ci=document.getElementById('billCustomer');
    if(ci){
      ci.addEventListener('input',function(){
        _selectedMember=null;ci.classList.remove('error');
        reloadMembers();
        var q=this.value.toLowerCase();
        if(!q){md.style.display='none';return;}
        var found=allMembers.filter(function(m){
          return (m.name||'').toLowerCase().includes(q)||(m.phone||'').includes(q)||(m.code||'').toLowerCase().includes(q);
        }).slice(0,8);
        md.innerHTML='';
        if(!found.length){
          var no=document.createElement('div');no.style.cssText='padding:8px 14px;font-size:12px;color:#aaa;';
          no.textContent='ไม่พบสมาชิก';md.appendChild(no);
        } else {
          found.forEach(function(m){
            var div=document.createElement('div');div.className='bill-search-item';
            var s1=document.createElement('span');s1.textContent=m.name;
            var s2=document.createElement('span');s2.style.cssText='color:#9ca3af;font-size:11px;';s2.textContent=m.code||m.phone||'';
            div.appendChild(s1);div.appendChild(s2);
            div.addEventListener('mousedown',function(e){
              e.preventDefault();
              _selectedMember=m;
              ci.value=m.name+(m.phone?' ('+m.phone+')':'');ci.classList.remove('error');
              var mc=document.getElementById('billMemberCode');if(mc)mc.value=m.code||m.id||'—';
              md.style.display='none';
            });
            md.appendChild(div);
          });
        }
        var ab=document.createElement('div');
        ab.style.cssText='padding:8px 14px;font-size:12px;color:#e8b93e;font-weight:600;cursor:pointer;border-top:1px solid #f0ede8;';
        ab.textContent='+ สร้างสมาชิกใหม่';
        ab.addEventListener('mousedown',function(e){e.preventDefault();md.style.display='none';showNewMemberPopup(ci.value);});
        md.appendChild(ab);md.style.display='block';
      });
      ci.addEventListener('blur',function(){
        setTimeout(function(){
          md.style.display='none';
          if(ci.value&&!_selectedMember){
            _selectedMember={name:ci.value,phone:'',code:'',id:''};
          }
        },250);
      });
    }
    var els={billDiscount:'input',billDiscountType:'change',billVat:'change',billPaid:'input'};
    var fns={billDiscount:calc,billDiscountType:calc,billVat:calc,billPaid:calcChange};
    Object.keys(els).forEach(function(id){var e=document.getElementById(id);if(e)e.addEventListener(els[id],fns[id]);});
    var bc=document.getElementById('billClearBtn');if(bc)bc.addEventListener('click',clearBill);
    var bd=document.getElementById('billDraftBtn');if(bd)bd.addEventListener('click',function(){save('draft');});
    var bs=document.getElementById('billSubmitBtn');if(bs)bs.addEventListener('click',function(){save('paid');});
    var bdt=document.getElementById('billDocType');if(bdt)bdt.addEventListener('change',uiDocType);
    document.addEventListener('click',function(e){
      if(sd&&!e.target.closest('.bill-search-wrap'))sd.style.display='none';
      if(md&&!e.target.closest('.bill-meta-row'))md.style.display='none';
    });
  }
  // Try immediately — token อาจมีอยู่แล้วก่อน event ส่ง
  doInit(window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'');
  // Listen สำหรับกรณี token มาทีหลัง
  window.addEventListener('viiv_token_ready',function(e){
    var tok=e.detail&&e.detail.token?e.detail.token:'';
    if(tok) TOKEN=tok;
    if(_inited){loadData();return;}
    doInit(tok||TOKEN);
  });
  // Poll fallback: ถ้า token ยังไม่พร้อม poll ทุก 100ms สูงสุด 3 วินาที
  var _pc=0,_poll=setInterval(function(){
    _pc++;
    if(_inited||_pc>30){clearInterval(_poll);return;}
    var tok=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
    if(tok){clearInterval(_poll);doInit(tok);}
  },100);
})();
})();
</script>
