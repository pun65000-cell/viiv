<body>
<div class="rc-wrap">
  <div class="rc-header">
    <div class="rc-filters">
      <input id="rcQ" class="rc-input" placeholder="ค้นหา เลขบิล / ชื่อลูกค้า..." oninput="rcFilter()"/>
      <select id="rcStatus" class="rc-select" onchange="rcFilter()">
        <option value="paid">จ่ายแล้ว</option>
        <option value="draft">ร่าง (พักไว้)</option>
        <option value="voided">ยกเลิกแล้ว</option>
        <option value="">ทั้งหมด</option>
      </select>
    </div>
    <div id="rcCount" style="font-size:12px;color:#6b7280;align-self:center;white-space:nowrap;"></div>
  </div>
  <div id="rcList" class="rc-list"></div>
</div>
<style>
.rc-wrap{padding:4px 0;box-sizing:border-box;width:100%;}
.rc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.rc-filters{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
.rc-input{flex:1;min-width:160px;padding:7px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;outline:none;}
.rc-input:focus{border-color:#e8b93e;}
.rc-select{padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff;outline:none;}
.rc-select:focus{border-color:#e8b93e;}
.rc-list{display:flex;flex-direction:column;gap:6px;}
.rc-row{padding:10px 14px;background:#fff;border:1px solid #e5e5e5;border-radius:10px;transition:.15s;cursor:pointer;}
.rc-row:hover{border-color:#e8b93e;background:#fffbf0;}
.rc-row-top{display:flex;justify-content:space-between;align-items:center;}
.rc-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:6px;}
.rc-badge.paid{background:#dcfce7;color:#166534;}
.rc-badge.draft{background:#fef3c7;color:#92400e;}
.rc-amount{font-size:14px;font-weight:700;color:#e8b93e;}
.rc-sub{font-size:11px;color:#6b7280;margin-top:3px;}
.rc-items{font-size:11px;color:#374151;margin-top:4px;padding-top:4px;border-top:1px solid #f0ede8;}
</style>
<script>
(function(){
var API=(location.hostname==='merchant.viiv.me')?'':'https://concore.viiv.me';
var TOKEN=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
var allBills=[];

function loadBills(){
  fetch(API+'/api/pos/bills/list?doc_type=receipt',{headers:{'Authorization':'Bearer '+TOKEN}})
  .then(function(r){return r.json();})
  .then(function(dbBills){
    var local=JSON.parse(localStorage.getItem('viiv_bills')||'[]');
    var drafts=local.filter(function(b){return b.status==='draft'&&b.doc_type==='receipt';});
    var normalized=dbBills.map(function(b){
      return {
        id:b.bill_no||b.id,db_id:b.id,
        doc_type:b.doc_type,status:b.status,
        customer:b.customer_name||b.customer||'',
        customer_code:b.customer_code||'',
        items:typeof b.items==='string'?JSON.parse(b.items):b.items||[],
        total:parseFloat(b.total)||0,
        pay_method:b.pay_method||'cash',
        paid:parseFloat(b.paid_amount)||0,
        discount:parseFloat(b.discount)||0,
        discount_type:b.discount_type||'amount',
        vat:b.vat_rate||0,
        note:b.note||'',
        created_at:b.created_at
      };
    });
    allBills=normalized.concat(drafts);
    rcFilter();
  })
  .catch(function(){
    allBills=JSON.parse(localStorage.getItem('viiv_bills')||'[]');
    rcFilter();
  });
}


function fmt(n){ return '฿'+(n||0).toLocaleString('th',{minimumFractionDigits:2}); }
var payLabel={cash:'เงินสด',transfer:'โอนเงิน',credit:'เครดิต',qr:'QR Code'};
function waPrintBill(b){
  var typeLabel={receipt:'ใบเสร็จรับเงิน',delivery:'ใบส่งของ',quotation:'ใบเสนอราคา',reserve:'ใบจอง'};
  var rows=(b.items||[]).map(function(i){
    return '<tr><td style="padding:4px 8px;border-bottom:1px solid #f0ede8;">'+i.sku+'</td>'+
      '<td style="padding:4px 8px;border-bottom:1px solid #f0ede8;">'+i.name+'</td>'+
      '<td style="padding:4px 8px;border-bottom:1px solid #f0ede8;text-align:center;">'+i.qty+'</td>'+
      '<td style="padding:4px 8px;border-bottom:1px solid #f0ede8;text-align:right;">'+fmt(i.price)+'</td>'+
      '<td style="padding:4px 8px;border-bottom:1px solid #f0ede8;text-align:right;font-weight:600;">'+fmt(i.qty*i.price)+'</td></tr>';
  }).join('');
  var html='<!DOCTYPE html><html><head><meta charset="utf-8"><title>'+b.bill_no+'</title>'+
    '<style>body{font-family:sans-serif;font-size:13px;margin:0;padding:20px;}h2{font-size:16px;margin:0 0 4px;}.meta{font-size:11px;color:#6b7280;margin-bottom:12px;}table{width:100%;border-collapse:collapse;}th{background:#f8f6f2;padding:6px 8px;text-align:left;font-size:11px;}@media print{body{padding:10px;}}</style></head><body>'+
    '<h2>ใบเสร็จรับเงิน</h2>'+
    '<div class="meta">'+(typeLabel[b.doc_type]||b.doc_type)+' #'+(b.bill_no||b.id)+'<br>'+
    'วันที่: '+new Date(b.created_at).toLocaleString('th')+'<br>'+
    'ลูกค้า: '+(b.customer||b.customer_name||'ไม่ระบุ')+'</div>'+
    '<table><thead><tr><th>SKU</th><th>สินค้า</th><th>จำนวน</th><th style="text-align:right;">ราคา</th><th style="text-align:right;">รวม</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div style="margin-top:12px;text-align:right;max-width:200px;margin-left:auto;">'+
    '<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:700;border-top:2px solid #e8b93e;padding-top:6px;"><span>ยอดสุทธิ</span><span>'+fmt(b.total)+'</span></div>'+
    '<div style="font-size:12px;color:#6b7280;margin-top:4px;">วิธีชำระ: '+(payLabel[b.pay_method]||'—')+'</div></div>'+
    (b.note?'<div style="margin-top:10px;font-size:11px;color:#9ca3af;">หมายเหตุ: '+b.note+'</div>':'')+
    '<div style="margin-top:16px;font-size:10px;color:#9ca3af;text-align:center;">ขอบคุณที่ใช้บริการ</div></body></html>';
  var w=window.open('','_blank','width=400,height=600');
  if(w){w.document.write(html);w.document.close();setTimeout(function(){w.print();},500);}
}
window.rcFilter=function(){
  var q=(document.getElementById('rcQ').value||'').toLowerCase();
  var st=document.getElementById('rcStatus').value;
  var filtered=allBills.filter(function(b){
    var matchQ=!q||(b.id||'').toLowerCase().includes(q)||(b.customer||'').toLowerCase().includes(q);
    var matchSt=!st||b.status===st;
    return matchQ&&matchSt&&b.doc_type==='receipt';
  });
  document.getElementById('rcCount').textContent='พบ '+filtered.length+' รายการ';
  render(filtered);
};

function fmt(n){ return '\u0e3f'+(n||0).toLocaleString('th',{minimumFractionDigits:2}); }

function render(bills){
  var el=document.getElementById('rcList');
  if(!bills.length){
    el.innerHTML='<div style="color:#aaa;padding:30px;text-align:center;">ไม่พบใบเสร็จ</div>';
    return;
  }
  el.innerHTML='';
  bills.forEach(function(b){
    var date=new Date(b.created_at).toLocaleString('th');
    var badge='<span class="rc-badge '+(b.status||'draft')+'">'+(b.status==='paid'?'จ่ายแล้ว':'ร่าง')+'</span>';
    var itemsList=(b.items||[]).map(function(i){
      return i.name+' x'+i.qty+' = '+fmt(i.qty*i.price);
    }).join(' | ');
    var row=document.createElement('div');
    row.className='rc-row';
    row.innerHTML=
      '<div class="rc-row-top">'+
        '<div><span style="font-size:12px;font-weight:700;">#'+b.id.slice(-10)+'</span>'+badge+'</div>'+
        '<div class="rc-amount">'+fmt(b.total)+'</div>'+
      '</div>'+
      '<div class="rc-sub">'+(b.customer||'ไม่ระบุลูกค้า')+' - '+date+' - '+
        (b.pay_method||'cash')+'</div>'+
      '<div class="rc-items">'+itemsList+'</div>';
    // ถ้าเป็น draft กดแล้วไปสร้างบิลต่อ
    if(b.status==='draft'){
      row.title='คลิกเพื่อเปิดบิลนี้ต่อ';
      row.addEventListener('click',function(){
        alert('บิลร่าง #'+b.id.slice(-10)+' ยอด '+fmt(b.total)+' (กำลังพัฒนาระบบเปิดบิลต่อ)');
      });
    }
    el.appendChild(row);
  });
}

window.addEventListener('viiv_token_ready',function(e){
  if(e.detail&&e.detail.token) TOKEN=e.detail.token;
  loadBills();
});
if(TOKEN) loadBills(); else rcFilter();
})();
</script>
</body>
