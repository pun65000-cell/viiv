<body>
<div id="bsOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;overflow-y:auto;padding:40px 0;box-sizing:border-box;"></div>
<div class="bs-wrap">
  <div class="bs-header">
    <div class="bs-filters">
      <input id="bsQ" class="bs-input" placeholder="ค้นหา เลขบิล / ชื่อลูกค้า..." oninput="bsFilter()"/>
      <select id="bsStatus" class="bs-select" onchange="bsFilter()">
        <option value="">สถานะทั้งหมด</option>
        <option value="paid">จ่ายแล้ว</option>
        <option value="draft">ร่าง</option>
        <option value="voided">ยกเลิกแล้ว</option>
        <option value="deleted">ลบแล้ว</option>
      </select>
      <select id="bsType" class="bs-select" onchange="bsFilter()">
        <option value="">ประเภททั้งหมด</option>
        <option value="receipt">ใบเสร็จ</option>
        <option value="delivery">ใบส่งของ</option>
        <option value="quotation">ใบเสนอราคา</option>
        <option value="reserve">ใบจอง</option>
      </select>
    </div>
    <div id="bsCount" style="font-size:12px;color:#6b7280;align-self:center;"></div>
  </div>
  <div id="bsList" class="bs-list"></div>
</div>

<style>
.bs-wrap{padding:4px 0;box-sizing:border-box;width:100%;}
.bs-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.bs-filters{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
.bs-input{flex:1;min-width:160px;padding:7px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;outline:none;}
.bs-input:focus{border-color:#e8b93e;}
.bs-select{padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff;outline:none;}
.bs-list{display:flex;flex-direction:column;gap:6px;}
.bs-row{padding:10px 14px;background:#fff;border:1px solid #e5e5e5;border-radius:10px;cursor:pointer;transition:.15s;}
.bs-row:hover{border-color:#e8b93e;}
.bs-row-top{display:flex;justify-content:space-between;align-items:center;}
.bs-bill-id{font-size:12px;font-weight:700;color:#1f2937;}
.bs-amount{font-size:14px;font-weight:700;color:#e8b93e;}
.bs-row-sub{font-size:11px;color:#6b7280;margin-top:3px;}
.bs-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:6px;}
.bs-badge.paid{background:#dcfce7;color:#166534;}
.bs-badge.draft{background:#fef3c7;color:#92400e;}
.bs-badge.voided{background:#fee2e2;color:#991b1b;}
.bs-badge.deleted{background:#f3f4f6;color:#6b7280;text-decoration:line-through;}
</style>

<script>
(function(){
'use strict';
var allBills = JSON.parse(localStorage.getItem('viiv_bills')||'[]');
var typeMap = {receipt:'ใบเสร็จ',delivery:'ใบส่งของ',quotation:'ใบเสนอราคา',reserve:'ใบจอง'};

function fmt(n){ return '฿'+(n||0).toLocaleString('th',{minimumFractionDigits:2}); }
var payLabel={cash:'เงินสด',transfer:'โอนเงิน',credit:'เครดิต',qr:'QR Code'};

function waPrintBill(b){
  var typeLabel={receipt:'ใบเสร็จรับเงิน',delivery:'ใบส่งของ',quotation:'ใบเสนอราคา',reserve:'ใบจอง'};
  var rows=(b.items||[]).map(function(i){
    return '<tr><td style="padding:4px 8px;border-bottom:1px solid #f0ede8;">'+i.sku+'</td>'+
      '<td style="padding:4px 8px;border-bottom:1px solid #f0ede8;">'+i.name+'</td>'+
      '<td style="padding:4px 8px;border-bottom:1px solid #f0ede8;text-align:center;">'+i.qty+'</td>'+
      '<td style="padding:4px 8px;border-bottom:1px solid #f0ede8;text-align:right;">'+fmt(i.price)+'</td>'+
      '<td style="padding:4px 8px;border-bottom:1px solid #f0ede8;text-align:right;font-weight:600;">'+fmt(i.qty*i.price)+'</td></tr>';
  }).join('');
  var storeName=window._storeSettings?window._storeSettings.store_name:'';
  var storeAddr=window._storeSettings?(window._storeSettings.address||''):'';
  var storeTax=window._storeSettings?(window._storeSettings.tax_id||''):'';
  var html='<!DOCTYPE html><html><head><meta charset="utf-8"><title>'+b.bill_no+'</title>'+
    '<style>body{font-family:sans-serif;font-size:13px;margin:0;padding:20px;}'+
    'h2{font-size:16px;margin:0 0 4px;}'+
    '.meta{font-size:11px;color:#6b7280;margin-bottom:12px;}'+
    'table{width:100%;border-collapse:collapse;}'+
    'th{background:#f8f6f2;padding:6px 8px;text-align:left;font-size:11px;}'+
    '.total-row{font-size:15px;font-weight:700;color:#e8b93e;}'+
    '@media print{body{padding:10px;}}</style></head><body>'+
    (storeName?'<h2>'+storeName+'</h2>':'<h2>ใบเสร็จรับเงิน</h2>')+
    (storeAddr?'<div style="font-size:11px;color:#6b7280;">'+storeAddr+'</div>':'')+
    (storeTax?'<div style="font-size:11px;color:#6b7280;">เลขผู้เสียภาษี: '+storeTax+'</div>':'')+
    '<div class="meta">'+
      (typeLabel[b.doc_type]||b.doc_type)+' #'+(b.bill_no||b.id)+'<br>'+
      'วันที่: '+new Date(b.created_at).toLocaleString('th')+'<br>'+
      'ลูกค้า: '+(b.customer||b.customer_name||'ไม่ระบุ')+(b.customer_code?' ('+b.customer_code+')':'')+
    '</div>'+
    '<table><thead><tr>'+
      '<th>SKU</th><th>สินค้า</th><th style="text-align:center;">จำนวน</th>'+
      '<th style="text-align:right;">ราคา/หน่วย</th><th style="text-align:right;">รวม</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div style="margin-top:12px;text-align:right;max-width:240px;margin-left:auto;">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>ส่วนลด</span><span>'+
        (b.discount_type==='percent'?(b.discount||0)+'%':fmt(b.discount||0))+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>VAT</span><span>'+
        (b.vat_rate||b.vat?((b.vat_rate||b.vat)+'%'):'ไม่มี')+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;font-size:16px;font-weight:700;border-top:2px solid #e8b93e;padding-top:6px;"><span>ยอดสุทธิ</span><span>'+fmt(b.total)+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;margin-top:4px;font-size:12px;color:#6b7280;"><span>วิธีชำระ</span><span>'+(payLabel[b.pay_method]||b.pay_method||'—')+'</span></div>'+
    '</div>'+
    (b.note?'<div style="margin-top:10px;font-size:11px;color:#6b7280;border-top:1px solid #f0ede8;padding-top:8px;">หมายเหตุ: '+b.note+'</div>':'')+
    '<div style="margin-top:16px;font-size:10px;color:#9ca3af;text-align:center;">ขอบคุณที่ใช้บริการ</div>'+
    '</body></html>';
  var w=window.open('','_blank','width=400,height=600');
  if(w){w.document.write(html);w.document.close();setTimeout(function(){w.print();},500);}
}
var payLabel={cash:'เงินสด',transfer:'โอนเงิน',credit:'เครดิต',qr:'QR Code'};

function showBillDetail(b){
  var isDraft=b.status==='draft';
  var rows=(b.items||[]).map(function(i){
    return '<tr>'+
      '<td style="padding:5px 8px;font-size:12px;">'+i.sku+'</td>'+
      '<td style="padding:5px 8px;font-size:12px;">'+i.name+'</td>'+
      '<td style="padding:5px 8px;font-size:12px;text-align:center;">'+i.qty+'</td>'+
      '<td style="padding:5px 8px;font-size:12px;text-align:right;">'+fmt(i.price)+'</td>'+
      '<td style="padding:5px 8px;font-size:12px;text-align:right;font-weight:600;">'+fmt(i.qty*i.price)+'</td>'+
    '</tr>';
  }).join('');
  var draftBtnHtml=isDraft
    ? '<button id="bsReopenBtn" style="padding:7px 16px;background:#e8b93e;color:#1a1200;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">เปิดแก้บิลต่อ</button>'
    : '';
  var box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:14px;padding:20px;width:min(540px,95vw);position:relative;margin:auto;';
  box.innerHTML=
    '<button id="bsCloseBtn" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280;line-height:1;">x</button>'+
    '<div style="font-size:14px;font-weight:700;margin-bottom:2px;">'+(typeMap[b.doc_type]||b.doc_type)+'</div>'+
    '<div style="font-size:11px;color:#9ca3af;margin-bottom:12px;">#'+b.id+' | '+new Date(b.created_at).toLocaleString('th')+'</div>'+
    '<table style="width:100%;border-collapse:collapse;margin-bottom:12px;">'+
      '<thead><tr style="background:#f8f6f2;">'+
        '<th style="padding:5px 8px;text-align:left;font-size:11px;">SKU</th>'+
        '<th style="padding:5px 8px;text-align:left;font-size:11px;">สินค้า</th>'+
        '<th style="padding:5px 8px;text-align:center;font-size:11px;">จำนวน</th>'+
        '<th style="padding:5px 8px;text-align:right;font-size:11px;">ราคา/หน่วย</th>'+
        '<th style="padding:5px 8px;text-align:right;font-size:11px;">รวม</th>'+
      '</tr></thead>'+
      '<tbody>'+rows+'</tbody>'+
    '</table>'+
    '<div style="display:flex;flex-direction:column;gap:4px;max-width:280px;margin-left:auto;font-size:12px;">'+
      '<div style="display:flex;justify-content:space-between;"><span>ลูกค้า</span><span style="font-weight:600;">'+(b.customer||'ไม่ระบุ')+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;"><span>ส่วนลด</span><span>'+(b.discount_type==='percent'?(b.discount||0)+'%':fmt(b.discount||0))+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;"><span>VAT</span><span>'+(b.vat?b.vat+'%':'ไม่มี')+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;padding-top:6px;border-top:1px solid #f0ede8;font-size:14px;font-weight:700;"><span>ยอดสุทธิ</span><span style="color:#e8b93e;">'+fmt(b.total)+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;"><span>วิธีชำระ</span><span>'+(payLabel[b.pay_method]||b.pay_method||'—')+'</span></div>'+
      (b.note?'<div style="color:#6b7280;margin-top:4px;">หมายเหตุ: '+b.note+'</div>':'')+
    '</div>'+
    '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">'+
      draftBtnHtml+
      '<button id="bsPrintBtn" style="padding:7px 14px;background:#1f2937;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;">พิมพ์ใบเสร็จ</button>'+
    '<button id="bsDismissBtn" style="padding:7px 14px;background:#f3f4f6;border:1px solid #d1d5db;border-radius:8px;font-size:13px;cursor:pointer;">ปิด</button>'+
    '</div>';
  var ov=document.getElementById('bsOverlay');
  ov.innerHTML='';
  ov.appendChild(box);
  ov.style.display='flex';
  document.getElementById('bsCloseBtn').addEventListener('click',function(){ ov.style.display='none'; });
  document.getElementById('bsDismissBtn').addEventListener('click',function(){ ov.style.display='none'; });
  document.getElementById('bsPrintBtn').addEventListener('click',function(){ waPrintBill(b); });
  if(isDraft){
    document.getElementById('bsReopenBtn').addEventListener('click',function(){
      ov.style.display='none';
      if(typeof navigate==='function') navigate('billing_create');
      else if(window.parent&&window.parent.navigate) window.parent.navigate('billing_create');
      setTimeout(function(){
        var ev=new CustomEvent('viiv_load_draft',{detail:{bill:b}});
        window.dispatchEvent(ev);
        try{
          var frames=window.parent.document.querySelectorAll('iframe');
          frames.forEach(function(fr){ try{fr.contentWindow.dispatchEvent(new CustomEvent('viiv_load_draft',{detail:{bill:b}}));}catch(e){} });
        }catch(e){}
      },700);
    });
  }
}

window.bsFilter = function(){
  var q = (document.getElementById('bsQ').value||'').toLowerCase();
  var st = document.getElementById('bsStatus').value;
  var tp = document.getElementById('bsType').value;
  var filtered = allBills.filter(function(b){
    var matchQ = !q || (b.id||'').toLowerCase().includes(q) || (b.customer||'').toLowerCase().includes(q);
    var matchSt = !st || b.status === st;
    var matchTp = !tp || b.doc_type === tp;
    return matchQ && matchSt && matchTp;
  });
  document.getElementById('bsCount').textContent = 'พบ '+filtered.length+' รายการ';
  render(filtered);
};

function render(bills){
  var el = document.getElementById('bsList');
  if(!bills.length){
    el.innerHTML='<div style="color:#aaa;padding:30px;text-align:center;">ไม่พบบิล</div>';
    return;
  }
  el.innerHTML='';
  bills.forEach(function(b){
    var date=new Date(b.created_at).toLocaleString('th');
    var badge='<span class="bs-badge '+(b.status||'draft')+'">'+(b.status==='paid'?'จ่ายแล้ว':'ร่าง')+'</span>';
    var row=document.createElement('div');
    row.className='bs-row';
    row.innerHTML=
      '<div class="bs-row-top">'+
        '<div><span class="bs-bill-id">'+(b.id.length>10?b.id.slice(-10):b.id)+'</span>'+
          '<span style="margin-left:8px;font-size:11px;color:#6b7280;">'+(typeMap[b.doc_type]||b.doc_type)+'</span>'+
          badge+'</div>'+
        '<div class="bs-amount">'+fmt(b.total)+'</div>'+
      '</div>'+
      '<div class="bs-row-sub">'+(b.customer||'ไม่ระบุลูกค้า')+' · '+date+' · '+
        (b.items||[]).length+' รายการ · '+(payLabel[b.pay_method]||b.pay_method||'—')+'</div>';
    row.addEventListener('click',function(){ showBillDetail(b); });
    el.appendChild(row);
  });
}

bsFilter();
})();
</script>
</body>
