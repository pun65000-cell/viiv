<body>
<div id="bsOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;overflow-y:auto;padding:40px 0;box-sizing:border-box;"></div>
<div class="bs-wrap">
  <div class="bs-header">
    <div class="bs-filters">
      <input id="bsQ" class="bs-input" placeholder="เลขบิล / ลูกค้า..." oninput="bsFilter()" style="min-width:120px;max-width:220px;"/>
      <select id="bsStatus" class="bs-select" onchange="bsFilter()">
        <option value="">สถานะจ่าย</option>
        <option value="paid">จ่ายแล้ว</option>
        <option value="pending">รอชำระ</option>
        <option value="credit">เครดิต</option>
        <option value="partial">ชำระบางส่วน</option>
        <option value="draft">ร่าง</option>
        <option value="voided">ยกเลิกแล้ว</option>
        <option value="deleted">ลบแล้ว</option>
      </select>
      <select id="bsType" class="bs-select" onchange="bsFilter()">
        <option value="">ประเภทบิล</option>
        <option value="receipt">ใบเสร็จ</option>
        <option value="delivery">ใบส่งของ</option>
        <option value="quotation">ใบเสนอราคา</option>
        <option value="reserve">ใบจอง</option>
      </select>
      <select id="bsShipStatus" class="bs-select" onchange="bsFilter()">
        <option value="">สถานะจัดส่ง</option>
        <option value="__none__">ยังไม่ส่ง</option>
        <option value="pending">กำลังดำเนินการ</option>
        <option value="scheduled">รอนัดส่ง</option>
        <option value="packing_in">เตรียมส่ง-เข้า</option>
        <option value="packing_out">เตรียมส่ง-ออก</option>
        <option value="shipped_no_recipient">ส่งแล้ว(ไม่มีผู้รับ)</option>
        <option value="shipped_cod">ส่งแล้ว+วางบิล</option>
        <option value="shipped_collect">ส่งแล้ว+เก็บเงิน</option>
        <option value="chargeback">ชะลอจ่าย</option>
        <option value="bill_check">วางบิล/เช็ค</option>
        <option value="overdue">เลยกำหนด</option>
        <option value="received_payment">รับชำระแล้ว</option>
        <option value="pending_payment">รอชำระ</option>
        <option value="cod">จ่ายปลายทาง</option>
      </select>
    </div>
    <div id="bsCount" style="font-size:12px;color:#6b7280;align-self:center;"></div>
  </div>
  <div id="bsList" class="bs-list"></div>
</div>

<style>
.bs-wrap{padding:4px 0;box-sizing:border-box;width:100%;}
.bs-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.bs-filters{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
.bs-input{flex:1;min-width:160px;padding:7px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;outline:none;}
.bs-input:focus{border-color:#e8b93e;}
.bs-select{padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff;outline:none;}
.bs-list{display:flex;flex-direction:column;gap:6px;}
.bs-row{padding:10px 14px;background:#fff;border:1px solid #e5e5e5;border-radius:10px;cursor:pointer;transition:.15s;}
.bs-row:hover{border-color:#e8b93e;}
.bs-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.bs-row-left{display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex:1;min-width:0;}
.bs-row-right{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.bs-bill-id{font-size:12px;font-weight:700;color:#1f2937;}
.bs-amount{font-size:13px;font-weight:700;color:#e8b93e;white-space:nowrap;}
.bs-row-sub{font-size:11px;color:#6b7280;margin-top:4px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.bs-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;}
.bs-badge.paid{background:#dcfce7;color:#166534;}
.bs-badge.pending{background:#fef3c7;color:#92400e;}
.bs-badge.credit{background:#dbeafe;color:#1e40af;}
.bs-badge.partial{background:#ede9fe;color:#5b21b6;}
.bs-badge.draft{background:#fef3c7;color:#92400e;}
.bs-badge.voided{background:#fee2e2;color:#991b1b;}
.bs-badge.deleted{background:#f3f4f6;color:#6b7280;text-decoration:line-through;}
.bs-badge.ship{background:#e0f2fe;color:#0369a1;}
.bs-badge.pos{background:#f1f5f9;color:#94a3b8;font-size:9px;}
.bs-action-btn{border:none;cursor:pointer;font-size:11px;padding:3px 8px;border-radius:6px;font-weight:600;transition:.15s;}
.bs-action-btn{font-size:10px;padding:2px 6px;border-radius:6px;border:0.5px solid;cursor:pointer;font-weight:500;transition:.15s;width:60px;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex-shrink:0;line-height:1.4;}
.bs-action-btn.fin-paid{background:#f0fdf4;color:#166534;border-color:#d1fae5;}
.bs-action-btn.fin-paid:hover{background:#dcfce7;}
.bs-action-btn.fin-pending{background:#fffbeb;color:#92400e;border-color:#fde68a;}
.bs-action-btn.fin-pending:hover{background:#fef3c7;}
.bs-action-btn.fin-credit{background:#eff6ff;color:#1e40af;border-color:#bfdbfe;}
.bs-action-btn.fin-credit:hover{background:#dbeafe;}
.bs-action-btn.fin-partial{background:#f5f3ff;color:#5b21b6;border-color:#ddd6fe;}
.bs-action-btn.fin-partial:hover{background:#ede9fe;}
.bs-action-btn.fin-voided{background:#fef2f2;color:#991b1b;border-color:#fecaca;}
.bs-action-btn.fin-voided:hover{background:#fee2e2;}
.bs-action-btn.ship-none{background:#f8fafc;color:#64748b;border-color:#e2e8f0;}
.bs-action-btn.ship-none:hover{background:#f1f5f9;}
.bs-action-btn.ship-active{background:#f0f9ff;color:#0369a1;border-color:#bae6fd;}
.bs-action-btn.ship-active:hover{background:#e0f2fe;}
.bs-action-btn.ship-done{background:#f0fdf4;color:#166534;border-color:#d1fae5;}
.bs-action-btn.ship-done:hover{background:#dcfce7;}
.bs-action-btn.ship-warn{background:#fff7ed;color:#9a3412;border-color:#fed7aa;}
.bs-action-btn.ship-warn:hover{background:#ffedd5;}
</style>

<script>
(function(){
'use strict';
var API=(location.hostname==='merchant.viiv.me')?'':'https://concore.viiv.me';
var TOKEN=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
var allBills=[];
var typeMap={receipt:'ใบเสร็จ',delivery:'ใบส่งของ',quotation:'ใบเสนอราคา',reserve:'ใบจอง'};
var payLabel={cash:'เงินสด',transfer:'โอนเงิน',credit:'เครดิต',qr:'QR Code'};
var stMap={paid:'จ่ายแล้ว',pending:'รอชำระ',credit:'เครดิต',draft:'ร่าง',voided:'ยกเลิก',deleted:'ลบแล้ว',partial:'ชำระบางส่วน'};
var shipMap={pending:'รอดำเนินการ',scheduled:'รอนัดส่ง',packing_in:'เตรียมส่ง-เข้า',packing_out:'เตรียมส่ง-ออก',shipped_no_recipient:'ส่งแล้ว(ไม่มีผู้รับ)',shipped_cod:'ส่งแล้ว+วางบิล',shipped_collect:'ส่งแล้ว+เก็บเงิน',chargeback:'ชะลอจ่าย',bill_check:'วางบิล/เช็ค',overdue:'เลยกำหนด',received_payment:'รับชำระแล้ว',pending_payment:'รอชำระ',cod:'จ่ายปลายทาง'};

function fmt(n){ return '฿'+(n||0).toLocaleString('th',{minimumFractionDigits:2}); }

function loadBills(){
  fetch(API+'/api/pos/bills/list',{headers:{'Authorization':'Bearer '+TOKEN}})
  .then(function(r){return r.json();})
  .then(function(dbBills){
    var local=JSON.parse(localStorage.getItem('viiv_bills')||'[]');
    var drafts=local.filter(function(b){return b.status==='draft';});
    var normalized=dbBills.map(function(b){
      return {
        id:b.bill_no||b.id, db_id:b.id,
        doc_type:b.doc_type, status:b.status,
        shipping_status:b.shipping_status||null,
        source:b.source||'billing',
        customer:b.customer_name||b.customer||'',
        items:typeof b.items==='string'?JSON.parse(b.items):b.items||[],
        total:parseFloat(b.total)||0,
        pay_method:b.pay_method||'cash',
        discount:parseFloat(b.discount)||0,
        discount_type:b.discount_type||'amount',
        vat:b.vat_rate||0,
        note:b.note||'',
        created_at:b.created_at
      };
    });
    allBills=normalized.concat(drafts);
    bsFilter();
    document.getElementById('bsCount').textContent='พบ '+allBills.length+' รายการ';
  })
  .catch(function(){
    allBills=JSON.parse(localStorage.getItem('viiv_bills')||'[]');
    bsFilter();
  });
}

window.bsFilter=function(){
  var qEl=document.getElementById('bsQ');
  var stEl=document.getElementById('bsStatus');
  var tpEl=document.getElementById('bsType');
  if(!qEl||!stEl||!tpEl) return;
  var q=(qEl.value||'').toLowerCase();
  var st=stEl.value;
  var tp=tpEl.value;
  var shipEl=document.getElementById('bsShipStatus');
  var ship=shipEl?shipEl.value:'';
  var filtered=allBills.filter(function(b){
    var matchQ=!q||(b.id||'').toLowerCase().includes(q)||(b.customer||'').toLowerCase().includes(q);
    var matchSt=!st||b.status===st;
    var matchTp=!tp||b.doc_type===tp;
    var matchShip=!ship||(ship==='__none__'?!b.shipping_status:b.shipping_status===ship);
    return matchQ&&matchSt&&matchTp&&matchShip;
  });
  document.getElementById('bsCount').textContent='พบ '+filtered.length+' รายการ';
  render(filtered);
};

function render(bills){
  var el=document.getElementById('bsList');
  if(!bills.length){
    el.innerHTML='<div style="color:#aaa;padding:30px;text-align:center;">ไม่พบบิล</div>';
    return;
  }
  el.innerHTML='';
  bills.forEach(function(b){
    var date=new Date(b.created_at).toLocaleString('th');
    var isPOS=b.source==='pos';
    var isActive=b.status!=='voided'&&b.status!=='deleted';
    var row=document.createElement('div');
    row.className='bs-row';

    // top row
    var top=document.createElement('div');
    top.className='bs-row-top';

    // left
    var left=document.createElement('div');
    left.className='bs-row-left';

    var idEl=document.createElement('span');
    idEl.className='bs-bill-id';
    idEl.textContent=b.id.length>10?b.id.slice(-10):b.id;
    left.appendChild(idEl);

    var typeEl=document.createElement('span');
    typeEl.style.cssText='font-size:11px;color:#6b7280;';
    typeEl.textContent=typeMap[b.doc_type]||b.doc_type||'';
    left.appendChild(typeEl);



    if(isPOS){
      var posBadge=document.createElement('span');
      posBadge.className='bs-badge pos';
      posBadge.textContent='POS';
      left.appendChild(posBadge);
    }

    // right
    var right=document.createElement('div');
    right.className='bs-row-right';

    if(isActive){
      var finCls={paid:'fin-paid',pending:'fin-pending',credit:'fin-credit',partial:'fin-partial',voided:'fin-voided',draft:'fin-pending'};
      var finIcon={paid:'✓',pending:'○',credit:'◷',partial:'◑',voided:'✕',draft:'○'};
      var finBtn=document.createElement('button');
      finBtn.className='bs-action-btn '+(finCls[b.status]||'fin-pending');
      finBtn.title=(stMap[b.status]||b.status||'ร่าง');
      finBtn.textContent=(finIcon[b.status]||'○')+' '+(stMap[b.status]||b.status||'ร่าง');
      finBtn.setAttribute('data-id',b.db_id||b.id);
      finBtn.addEventListener('click',function(e){
        e.stopPropagation();
        window.openFinPopup(this.getAttribute('data-id'));
      });
      right.appendChild(finBtn);
    }

    if(isActive&&!isPOS){
      var shipDoneList=['shipped_no_recipient','shipped_cod','shipped_collect','received_payment'];
      var shipWarnList=['chargeback','overdue'];
      var shipCls=b.shipping_status
        ?(shipDoneList.includes(b.shipping_status)?'ship-done'
          :(shipWarnList.includes(b.shipping_status)?'ship-warn':'ship-active'))
        :'ship-none';
      var shipIcon=b.shipping_status?'⬆':'–';
      var shipLabel=b.shipping_status?(shipMap[b.shipping_status]||b.shipping_status):'จัดส่ง';
      var shipBtn=document.createElement('button');
      shipBtn.className='bs-action-btn '+shipCls;
      shipBtn.title=shipLabel;
      shipBtn.textContent=shipIcon+' '+shipLabel;
      shipBtn.setAttribute('data-id',b.db_id||b.id);
      shipBtn.addEventListener('click',function(e){
        e.stopPropagation();
        window.openShipPopup(this.getAttribute('data-id'));
      });
      right.appendChild(shipBtn);
    }

    var amtEl=document.createElement('span');
    amtEl.className='bs-amount';
    amtEl.textContent=fmt(b.total);
    right.appendChild(amtEl);

    top.appendChild(left);
    top.appendChild(right);

    var sub=document.createElement('div');
    sub.className='bs-row-sub';
    // badge สถานะการเงิน
    var sBadge=document.createElement('span');
    var finCls2={paid:'paid',pending:'pending',credit:'credit',partial:'partial',draft:'draft',voided:'voided',deleted:'deleted'};
    sBadge.className='bs-badge '+(finCls2[b.status]||'draft');
    sBadge.textContent=stMap[b.status]||b.status||'ร่าง';
    sub.appendChild(sBadge);
    // badge จัดส่ง (ถ้ามี)
    if(b.shipping_status){
      var shBadge=document.createElement('span');
      shBadge.className='bs-badge ship';
      shBadge.textContent='🚚 '+(shipMap[b.shipping_status]||b.shipping_status);
      sub.appendChild(shBadge);
    }
    // ข้อมูลย่อย
    var infoSpan=document.createElement('span');
    infoSpan.textContent=(b.customer||'ไม่ระบุลูกค้า')+' · '+date+' · '+(b.items||[]).length+' รายการ · '+(payLabel[b.pay_method]||b.pay_method||'—');
    sub.appendChild(infoSpan);

    row.appendChild(top);
    row.appendChild(sub);
    row.addEventListener('click',function(){ showBillDetail(b); });
    el.appendChild(row);
  });
}

function waPrintBill(b){
  var rows=(b.items||[]).map(function(i){
    return '<tr><td style="padding:4px 8px;border-bottom:1px solid #f0ede8;">'+i.sku+'</td>'+
      '<td style="padding:4px 8px;border-bottom:1px solid #f0ede8;">'+i.name+'</td>'+
      '<td style="padding:4px 8px;border-bottom:1px solid #f0ede8;text-align:center;">'+i.qty+'</td>'+
      '<td style="padding:4px 8px;border-bottom:1px solid #f0ede8;text-align:right;">'+fmt(i.price)+'</td>'+
      '<td style="padding:4px 8px;border-bottom:1px solid #f0ede8;text-align:right;font-weight:600;">'+fmt(i.qty*i.price)+'</td></tr>';
  }).join('');
  var sn=window._storeSettings?window._storeSettings.store_name:'';
  var html='<!DOCTYPE html><html><head><meta charset="utf-8">'+
    '<style>body{font-family:sans-serif;font-size:13px;margin:0;padding:20px;}table{width:100%;border-collapse:collapse;}th{background:#f8f6f2;padding:6px 8px;text-align:left;font-size:11px;}@media print{body{padding:10px;}}</style></head><body>'+
    (sn?'<h2>'+sn+'</h2>':'<h2>ใบเสร็จรับเงิน</h2>')+
    '<div style="font-size:11px;color:#6b7280;margin-bottom:12px;">#'+(b.id||b.bill_no)+'<br>วันที่: '+new Date(b.created_at).toLocaleString('th')+'<br>ลูกค้า: '+(b.customer||'ไม่ระบุ')+'</div>'+
    '<table><thead><tr><th>SKU</th><th>สินค้า</th><th>จำนวน</th><th style="text-align:right;">ราคา</th><th style="text-align:right;">รวม</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div style="margin-top:12px;text-align:right;max-width:200px;margin-left:auto;font-size:14px;font-weight:700;border-top:2px solid #e8b93e;padding-top:6px;">ยอดสุทธิ '+fmt(b.total)+'</div>'+
    '<div style="margin-top:16px;font-size:10px;color:#9ca3af;text-align:center;">ขอบคุณที่ใช้บริการ</div></body></html>';
  var w=window.open('','_blank','width=400,height=600');
  if(w){w.document.write(html);w.document.close();setTimeout(function(){w.print();},500);}
}

function showBillDetail(b){
  var isDraft=b.status==='draft';
  var rows=(b.items||[]).map(function(i){
    return '<tr>'+
      '<td style="padding:5px 8px;font-size:12px;">'+i.sku+'</td>'+
      '<td style="padding:5px 8px;font-size:12px;">'+i.name+'</td>'+
      '<td style="padding:5px 8px;font-size:12px;text-align:center;">'+i.qty+'</td>'+
      '<td style="padding:5px 8px;font-size:12px;text-align:right;">'+fmt(i.price)+'</td>'+
      '<td style="padding:5px 8px;font-size:12px;text-align:right;font-weight:600;">'+fmt(i.qty*i.price)+'</td>'+
    '</tr>';
  }).join('');
  var box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:14px;padding:20px;width:min(540px,95vw);position:relative;margin:auto;';
  box.innerHTML=
    '<button id="bsCloseBtn" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280;">✕</button>'+
    '<div style="font-size:14px;font-weight:700;margin-bottom:2px;">'+(typeMap[b.doc_type]||b.doc_type)+'</div>'+
    '<div style="font-size:11px;color:#9ca3af;margin-bottom:12px;">#'+b.id+' | '+new Date(b.created_at).toLocaleString('th')+'</div>'+
    '<table style="width:100%;border-collapse:collapse;margin-bottom:12px;">'+
      '<thead><tr style="background:#f8f6f2;">'+
        '<th style="padding:5px 8px;font-size:11px;">SKU</th>'+
        '<th style="padding:5px 8px;font-size:11px;">สินค้า</th>'+
        '<th style="padding:5px 8px;text-align:center;font-size:11px;">จำนวน</th>'+
        '<th style="padding:5px 8px;text-align:right;font-size:11px;">ราคา/หน่วย</th>'+
        '<th style="padding:5px 8px;text-align:right;font-size:11px;">รวม</th>'+
      '</tr></thead>'+
      '<tbody>'+rows+'</tbody>'+
    '</table>'+
    '<div style="display:flex;flex-direction:column;gap:4px;max-width:280px;margin-left:auto;font-size:12px;">'+
      '<div style="display:flex;justify-content:space-between;"><span>ลูกค้า</span><span style="font-weight:600;">'+(b.customer||'ไม่ระบุ')+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;padding-top:6px;border-top:1px solid #f0ede8;font-size:14px;font-weight:700;"><span>ยอดสุทธิ</span><span style="color:#e8b93e;">'+fmt(b.total)+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;"><span>วิธีชำระ</span><span>'+(payLabel[b.pay_method]||b.pay_method||'—')+'</span></div>'+
      (b.note?'<div style="color:#6b7280;margin-top:4px;">หมายเหตุ: '+b.note+'</div>':'')+
    '</div>'+
    '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">'+
      (isDraft?'<button id="bsReopenBtn" style="padding:7px 16px;background:#e8b93e;color:#1a1200;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">เปิดแก้บิลต่อ</button>':'')+
      '<button id="bsPrintBtn" style="padding:7px 14px;background:#1f2937;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;">พิมพ์ใบเสร็จ</button>'+
      '<button id="bsDismissBtn" style="padding:7px 14px;background:#f3f4f6;border:1px solid #d1d5db;border-radius:8px;font-size:13px;cursor:pointer;">ปิด</button>'+
    '</div>';
  var ov=document.getElementById('bsOverlay');
  ov.innerHTML='';
  ov.appendChild(box);
  ov.style.display='flex';
  document.getElementById('bsCloseBtn').addEventListener('click',function(){ ov.style.display='none'; });
  document.getElementById('bsDismissBtn').addEventListener('click',function(){ ov.style.display='none'; });
  document.getElementById('bsPrintBtn').addEventListener('click',function(){ waPrintBill(b); });
  if(isDraft&&document.getElementById('bsReopenBtn')){
    document.getElementById('bsReopenBtn').addEventListener('click',function(){
      ov.style.display='none';
      if(typeof navigate==='function') navigate('billing_create');
      else if(window.parent&&window.parent.navigate) window.parent.navigate('billing_create');
    });
  }
}

// ============ FIN POPUP ============
var _spBill=null;
var _shipOptions=[
  ['pending','กำลังดำเนินการ'],['scheduled','รอเวลานัดส่ง'],
  ['packing_in','จัดสินค้าเตรียมส่ง-เข้า'],['packing_out','จัดสินค้าเตรียมส่ง-ออก'],
  ['shipped_no_recipient','จัดส่งแล้ว (ไม่มีผู้รับ)'],['shipped_cod','จัดส่งแล้ว + วางบิล'],
  ['shipped_collect','จัดส่งแล้ว + เก็บเงิน'],['chargeback','ชะลอจ่าย (รอเคลมสินค้า)'],
  ['bill_check','วางบิล/เก็บเช็ค'],['overdue','ชำระเลยกำหนดเวลา'],
  ['received_payment','รับชำระเงินแล้ว'],['pending_payment','รอการชำระ'],['cod','จ่ายปลายทาง']
];

function getPopup(){
  var p=document.getElementById('spPopup');
  if(!p){ buildPopup(); p=document.getElementById('spPopup'); }
  return p;
}

function buildPopup(){
  var opts=_shipOptions.map(function(o){ return '<option value="'+o[0]+'">'+o[1]+'</option>'; }).join('');
  var div=document.createElement('div');
  div.id='spPopup';
  div.style.cssText='display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;';
  div.innerHTML=
    '<div style="background:#fff;border-radius:14px;padding:24px;width:min(400px,92vw);">'+
      '<div id="spTitle" style="font-size:15px;font-weight:700;margin-bottom:4px;"></div>'+
      '<div id="spLabel" style="font-size:11px;color:#9ca3af;margin-bottom:16px;"></div>'+
      '<div id="spFinRow" style="margin-bottom:14px;">'+
        '<label style="font-size:12px;font-weight:600;display:block;margin-bottom:5px;">สถานะการเงิน</label>'+
        '<select id="spFinancial" style="width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;outline:none;">'+
          '<option value="pending">รอชำระเงิน</option>'+
          '<option value="paid">จ่ายแล้ว</option>'+
          '<option value="partial">ชำระบางส่วน</option>'+
          '<option value="credit">เครดิต</option>'+
          '<option value="voided">ยกเลิก</option>'+
        '</select>'+
      '</div>'+
      '<div id="spShipRow" style="display:none;margin-bottom:14px;">'+
        '<label style="font-size:12px;font-weight:600;display:block;margin-bottom:5px;">สถานะการจัดส่ง</label>'+
        '<select id="spShipping" style="width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;outline:none;">'+opts+'</select>'+
      '</div>'+
      '<div id="spSlipRow" style="display:none;margin-bottom:14px;">'+
        '<label style="font-size:12px;font-weight:600;color:#dc2626;display:block;margin-bottom:5px;">⚠️ ต้องแนบสลิป/หลักฐานการโอน</label>'+
        '<input type="file" id="spSlipFile" accept="image/*" style="width:100%;padding:6px;border:1px solid #fca5a5;border-radius:8px;font-size:12px;">'+
      '</div>'+
      '<div style="display:flex;gap:8px;">'+
        '<button id="spCancelBtn" style="flex:1;padding:9px;background:#f3f4f6;border:1px solid #d1d5db;border-radius:8px;font-size:13px;cursor:pointer;">ยกเลิก</button>'+
        '<button id="spSaveBtn" style="flex:1;padding:9px;background:#e8b93e;color:#1a1200;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">บันทึก</button>'+
      '</div>'+
    '</div>';
  document.body.appendChild(div);
  document.getElementById('spCancelBtn').addEventListener('click',function(){ div.style.display='none'; });
  document.getElementById('spSaveBtn').addEventListener('click',doSave);
  document.getElementById('spShipping').addEventListener('change',function(){
    document.getElementById('spSlipRow').style.display=(this.value==='received_payment'?'block':'none');
  });
}

window.openFinPopup=function(dbId){
  var b=allBills.find(function(x){return x.db_id===dbId||x.id===dbId;});
  if(!b) return;
  _spBill=b;
  var popup=getPopup();
  document.getElementById('spTitle').textContent='ปรับสถานะการเงิน';
  document.getElementById('spLabel').textContent='บิล: '+(b.id||dbId);
  document.getElementById('spFinRow').style.display='block';
  document.getElementById('spShipRow').style.display='none';
  document.getElementById('spSlipRow').style.display='none';
  // set current value
  document.getElementById('spFinancial').value=b.status||'pending';
  // lock: ถ้า paid แล้วห้ามถอยหลัง
  var backList=['pending','draft','credit'];
  Array.from(document.getElementById('spFinancial').options).forEach(function(opt){
    opt.disabled=(b.status==='paid'&&backList.includes(opt.value));
  });
  popup.style.display='flex';
};

window.openShipPopup=function(dbId){
  var b=allBills.find(function(x){return x.db_id===dbId||x.id===dbId;});
  if(!b) return;
  _spBill=b;
  var popup=getPopup();
  document.getElementById('spTitle').textContent='ปรับสถานะการจัดส่ง';
  document.getElementById('spLabel').textContent='บิล: '+(b.id||dbId);
  document.getElementById('spFinRow').style.display='none';
  document.getElementById('spShipRow').style.display='block';
  document.getElementById('spSlipRow').style.display='none';
  document.getElementById('spShipping').value=b.shipping_status||'pending';
  popup.style.display='flex';
};

function doSave(){
  if(!_spBill) return;
  var isShipMode=document.getElementById('spShipRow').style.display!=='none';
  var payload={};
  if(isShipMode){
    var sv=document.getElementById('spShipping').value;
    if(sv==='received_payment'&&!document.getElementById('spSlipFile').files[0]){
      alert('กรุณาแนบสลิป/หลักฐานการโอนก่อนบันทึก'); return;
    }
    payload.shipping_status=sv;
  } else {
    payload.status=document.getElementById('spFinancial').value;
  }
  var btn=document.getElementById('spSaveBtn');
  btn.textContent='กำลังบันทึก...'; btn.disabled=true;
  fetch(API+'/api/pos/bills/update-status/'+(_spBill.db_id||_spBill.id),{
    method:'POST',
    headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.ok){
      document.getElementById('spPopup').style.display='none';
      var b=allBills.find(function(x){return x.db_id===_spBill.db_id||x.id===_spBill.id;});
      if(b){
        if(payload.status) b.status=payload.status;
        if(payload.shipping_status) b.shipping_status=payload.shipping_status;
      }
      bsFilter(); // re-render ปุ่มสถานะใหม่
    } else { alert('บันทึกไม่สำเร็จ: '+(d.detail||'error')); }
  })
  .catch(function(e){ alert('Error: '+e.message); })
  .finally(function(){ btn.textContent='บันทึก'; btn.disabled=false; });
}
// ============ END POPUP ============

window.addEventListener('viiv_token_ready',function(e){
  if(e.detail&&e.detail.token) TOKEN=e.detail.token;
  loadBills();
});
if(TOKEN) loadBills(); else bsFilter();
})();
</script>
</body>
