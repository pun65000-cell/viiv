<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<title>statement</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fef9ee;font-family:'Sarabun',sans-serif;font-size:13px;color:#1f2937;}
.st-wrap{display:flex;height:100vh;overflow:hidden;}
.st-list-panel{width:38%;border-right:1px solid #e8d9b0;display:flex;flex-direction:column;background:#fef9ee;}
.st-toolbar{padding:8px 10px;border-bottom:1px solid #e8d9b0;display:flex;flex-direction:column;gap:6px;}
.st-toolbar-title{font-size:13px;font-weight:700;color:#92400e;}
.st-search{width:100%;padding:5px 10px;border:1.5px solid #e8b93e;border-radius:6px;font-size:12px;background:#fffbf0;outline:none;}
.st-actions{display:flex;gap:5px;}
.st-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;}
.st-btn-primary{background:#e8b93e;color:#1a1200;}
.st-btn-ghost{background:#f3f4f6;color:#374151;border:1px solid #d1d5db;}
.st-btn:disabled{opacity:.5;cursor:not-allowed;}
.st-count{font-size:10px;color:#9ca3af;padding:3px 10px;}
.st-list{flex:1;overflow-y:auto;padding:6px;}
.st-empty{text-align:center;padding:30px;color:#9ca3af;font-size:12px;}
.st-card{background:#fff;border:1px solid #e8d9b0;border-left:3px solid #d97706;border-radius:8px;padding:8px 12px;margin-bottom:6px;cursor:pointer;transition:box-shadow .15s;}
.st-card:hover{box-shadow:0 2px 8px rgba(232,185,62,.2);}
.st-card.active{border-color:#e8b93e;box-shadow:0 0 0 2px rgba(232,185,62,.3);}
.st-card.st-paid{border-left-color:#16a34a;}
.st-card.st-partial{border-left-color:#0284c7;}
.st-card.st-cancelled{border-left-color:#9ca3af;opacity:.6;}
.st-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.st-card-run{font-size:12px;font-weight:700;color:#1f2937;}
.st-card-amt{font-size:12px;font-weight:700;color:#e8b93e;}
.st-card-meta{font-size:10px;color:#6b7280;margin-bottom:3px;}
.st-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;}
.st-badge.pending{background:#fef9c3;color:#713f12;}
.st-badge.partial{background:#dbeafe;color:#1e40af;}
.st-badge.paid{background:#d1fae5;color:#065f46;}
.st-badge.cancelled{background:#f3f4f6;color:#6b7280;}
.st-form-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.st-form-header{padding:10px 14px;border-bottom:1px solid #e8d9b0;background:#fff;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.st-form-title{font-size:13px;font-weight:700;color:#92400e;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.st-form-body{flex:1;overflow-y:auto;padding:12px;}
.st-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#9ca3af;gap:6px;}
.st-placeholder-icon{font-size:32px;}
.st-section{background:#fff;border:1px solid #e8d9b0;border-radius:8px;padding:12px;margin-bottom:10px;}
.st-section-title{font-size:11px;font-weight:700;color:#374151;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #f0ede8;}
.st-field{margin-bottom:8px;}
.st-field label{display:block;font-size:10px;font-weight:600;color:#374151;margin-bottom:3px;}
.st-input{width:100%;padding:6px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;outline:none;font-family:'Sarabun',sans-serif;}
.st-input:focus{border-color:#e8b93e;}
.st-row{display:flex;gap:8px;}
.st-row .st-field{flex:1;}
.st-summary{background:#fffbf0;border:1px solid #e8d9b0;border-radius:6px;padding:10px;margin-bottom:10px;}
.st-summary-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;}
.st-summary-row.total{font-weight:700;font-size:13px;color:#e8b93e;border-top:1px solid #e8d9b0;margin-top:5px;padding-top:5px;}
.status-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;}
.st-mode-btn{padding:6px 4px;font-size:11px;border:1.5px solid #d1d5db;border-radius:6px;cursor:pointer;background:#fff;text-align:center;font-family:'Sarabun',sans-serif;}
.st-mode-btn.active{background:var(--accent,#e8b93e);color:#1a1200;border-color:#c9a130;font-weight:700;}
.st-partner-info{background:#fffbf0;border:1px solid #e8d9b0;border-radius:8px;padding:10px 12px;margin-bottom:10px;}
.st-partner-name{font-size:14px;font-weight:700;color:#1f2937;margin-bottom:2px;}
.st-partner-meta{font-size:11px;color:#6b7280;margin-bottom:2px;}
.st-partner-addr{font-size:11px;color:#374151;margin-bottom:2px;}
.st-partner-phone{font-size:11px;color:#374151;}
.st-action-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid #e8d9b0;background:#fff;gap:6px;flex-shrink:0;}
.st-action-left{display:flex;gap:5px;flex-wrap:wrap;}
.st-action-right{display:flex;gap:5px;}
.btn-blue{background:#0284c7;color:#fff;border:none;}
.btn-green{background:#16a34a;color:#fff;border:none;}
.btn-red{background:#ef4444;color:#fff;border:none;}
.btn-gray{background:#f3f4f6;color:#374151;border:1px solid #d1d5db;}
.btn-gold{background:#e8b93e;color:#1a1200;border:none;}
.st-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;}
.st-modal{background:#fff;border-radius:12px;width:min(600px,100%);max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.st-modal-hd{padding:12px 16px;border-bottom:1px solid #e8d9b0;display:flex;justify-content:space-between;align-items:center;}
.st-modal-title{font-size:13px;font-weight:700;}
.st-modal-body{flex:1;overflow-y:auto;padding:10px;}
.st-modal-ft{padding:10px 16px;border-top:1px solid #e8d9b0;display:flex;justify-content:space-between;align-items:center;}
.st-bill-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid #e8d9b0;border-radius:7px;margin-bottom:5px;cursor:pointer;}
.st-bill-row:hover{background:#fffbf0;}
.st-bill-row.selected{background:#fef9c3;border-color:#e8b93e;}
.st-bill-check{width:14px;height:14px;accent-color:#e8b93e;}
.st-bill-info{flex:1;}
.st-bill-no{font-size:12px;font-weight:600;}
.st-bill-sub{font-size:10px;color:#6b7280;}
.st-bill-amt{font-size:12px;font-weight:700;color:#e8b93e;}
@media(max-width:768px){
  .st-wrap{flex-direction:column;height:auto;}
  .st-list-panel{width:100%;height:45vh;border-right:none;border-bottom:1px solid #e8d9b0;}
}
</style>
</head>
<body>
<div class="st-wrap">
  <div class="st-list-panel">
    <div class="st-toolbar">
      <div class="st-toolbar-title">&#x1F4CB; ใบวางบิล</div>
      <input id="stSearch" class="st-search" placeholder="ค้นหา run_id / คู่ค้า / รหัส..." oninput="window.stRender&&stRender()"/>
      <div class="st-actions">
        <button class="st-btn st-btn-primary" onclick="window.stOpenSelector&&stOpenSelector()">+ สร้างใหม่</button>
        <button class="st-btn st-btn-ghost" onclick="window.stLoad&&stLoad()">&#x21BB; รีเฟรช</button>
      </div>
    </div>
    <div id="stCount" class="st-count"></div>
    <div id="stList" class="st-list"><div class="st-empty">กำลังโหลด...</div></div>
  </div>
  <div class="st-form-panel">
    <div class="st-form-header">
      <div id="stFormTitle" class="st-form-title">เลือกใบวางบิลจากรายการ</div>
      <button id="stPrintBtn" class="st-btn st-btn-ghost" style="display:none;font-size:11px;" onclick="window.stPrint&&stPrint()">&#x1F5A8; พิมพ์</button>
    </div>
    <div id="stFormBody" class="st-form-body">
      <div class="st-placeholder">
        <div class="st-placeholder-icon">&#x1F4C4;</div>
        <div>เลือกรายการจากซ้าย หรือสร้างใหม่</div>
      </div>
    </div>
    <div id="stActionBar" class="st-action-bar" style="display:none;">
      <div class="st-action-left">
        <button class="st-btn st-btn-ghost" style="border-color:#e8b93e;color:#92400e;" onclick="window.stShowHistory&&stShowHistory()">&#x1F4DC; ประวัติ</button>
        <button id="stPartialBtn" class="st-btn btn-blue" style="display:none;" onclick="window.stOpenPartial&&stOpenPartial()">&#x1F4B0; ชำระบางส่วน</button>
        <button id="stPaidBtn" class="st-btn btn-green" style="display:none;" onclick="window.stOpenPaid&&stOpenPaid()">&#x2713; ชำระแล้ว</button>
      </div>
      <div class="st-action-right">
        <button id="btn-delete" class="st-btn btn-red" style="display:none;" onclick="window.stDelete&&stDelete()">&#x1F5D1; ลบ</button>
        <button class="st-btn btn-gray" onclick="window.stCancelForm&&stCancelForm()">ยกเลิก</button>
        <button id="stSaveBtn" class="st-btn btn-gold" onclick="window.stSave&&stSave()">บันทึก</button>
      </div>
    </div>
  </div>
</div>
<!-- Selector Modal -->
<div id="stSelectorModal" class="st-ov" style="display:none;" onclick="if(event.target===this&&window.stCloseSelector)stCloseSelector()">
  <div class="st-modal">
    <div class="st-modal-hd">
      <div class="st-modal-title">เลือกบิลค้างชำระ</div>
      <button onclick="window.stCloseSelector&&stCloseSelector()" style="background:none;border:none;font-size:16px;cursor:pointer;color:#6b7280;">&#x2715;</button>
    </div>
    <div class="st-modal-body">
      <input id="stBillSearch" class="st-search" placeholder="ค้นหา..." oninput="window.stFilterBills&&stFilterBills()" style="margin-bottom:8px;"/>
      <div id="stBillList"><div class="st-empty">กำลังโหลด...</div></div>
    </div>
    <div class="st-modal-ft">
      <div id="stSelectedCount" style="font-size:12px;color:#6b7280;">เลือก 0 รายการ</div>
      <button class="st-btn st-btn-primary" onclick="window.stConfirmBills&&stConfirmBills()">ยืนยัน &#x2192;</button>
    </div>
  </div>
</div>
<!-- Toast -->
<div id="stToast" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:8px 18px;border-radius:18px;font-size:12px;font-weight:600;z-index:99999;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.18);"></div>
<!-- History Modal -->
<div id="stHistoryModal" class="st-ov" style="display:none;" onclick="if(event.target===this&&window.stCloseHistory)stCloseHistory()">
  <div class="st-modal">
    <div class="st-modal-hd">
      <div class="st-modal-title">&#x1F4DC; ประวัติใบวางบิลรอชำระ</div>
      <button onclick="window.stCloseHistory&&stCloseHistory()" style="background:none;border:none;font-size:16px;cursor:pointer;color:#6b7280;">&#x2715;</button>
    </div>
    <div class="st-modal-body">
      <input id="stHistorySearch" class="st-search" placeholder="ค้นหา run_id / คู่ค้า..." oninput="window.stFilterHistory&&stFilterHistory()" style="margin-bottom:8px;"/>
      <div id="stHistoryList"><div class="st-empty">กำลังโหลด...</div></div>
    </div>
    <div class="st-modal-ft" style="justify-content:flex-end;">
      <button class="st-btn st-btn-ghost" onclick="window.stCloseHistory&&stCloseHistory()">ปิด</button>
    </div>
  </div>
</div>
<!-- Partial Payment Modal -->
<div id="stPartialModal" class="st-ov" style="display:none;" onclick="if(event.target===this){this.style.display='none';}">
  <div class="st-modal" style="max-width:400px;" onclick="event.stopPropagation()">
    <div class="st-modal-hd">
      <div class="st-modal-title">&#x1F4B0; ชำระบางส่วน</div>
      <button onclick="document.getElementById('stPartialModal').style.display='none'" style="background:none;border:none;font-size:16px;cursor:pointer;color:#6b7280;">&#x2715;</button>
    </div>
    <div class="st-modal-body">
      <div class="st-field">
        <label>ยอดที่ชำระ (บาท) *</label>
        <input id="stPartialAmt" class="st-input" type="number" min="0.01" step="0.01" placeholder="0.00" required/>
      </div>
      <div class="st-field">
        <label>แนบสลิป *</label>
        <input id="stPartialSlip" class="st-input" type="file" accept="image/*,.pdf" required style="padding:4px;"/>
      </div>
    </div>
    <div class="st-modal-ft" style="justify-content:flex-end;gap:8px;">
      <button class="st-btn btn-gray" onclick="document.getElementById('stPartialModal').style.display='none'">ยกเลิก</button>
      <button id="stPartialConfirmBtn" class="st-btn btn-blue" onclick="window.stConfirmPartial&&stConfirmPartial()">ยืนยันการชำระ</button>
    </div>
  </div>
</div>
<!-- Paid Modal -->
<div id="stPaidModal" class="st-ov" style="display:none;" onclick="if(event.target===this){this.style.display='none';}">
  <div class="st-modal" style="max-width:400px;" onclick="event.stopPropagation()">
    <div class="st-modal-hd">
      <div class="st-modal-title">&#x2713; ชำระเงินแล้ว</div>
      <button onclick="document.getElementById('stPaidModal').style.display='none'" style="background:none;border:none;font-size:16px;cursor:pointer;color:#6b7280;">&#x2715;</button>
    </div>
    <div class="st-modal-body">
      <div class="st-field">
        <label>แนบสลิป *</label>
        <input id="stPaidSlip" class="st-input" type="file" accept="image/*,.pdf" required style="padding:4px;"/>
      </div>
    </div>
    <div class="st-modal-ft" style="justify-content:flex-end;gap:8px;">
      <button class="st-btn btn-gray" onclick="document.getElementById('stPaidModal').style.display='none'">ยกเลิก</button>
      <button id="stPaidConfirmBtn" class="st-btn btn-green" onclick="window.stConfirmPaid&&stConfirmPaid()">ยืนยันการชำระ</button>
    </div>
  </div>
</div>
<script>
window.stLoad=function(){};
window.stRender=function(){};
(function(){
'use strict';
var API=(location.hostname==='merchant.viiv.me')?'':'https://concore.viiv.me';
var TOKEN=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
var _statements=[],_unpaidBills=[],_partners=[],_selectedBills=[],_activeId=null,_mode=null,_activeStmt=null,_currentMode='delivered';
var _stTotal=0,_stSelectedIds=[],_stNet=0,_stVat=0,_stDisc=0;
var SL={pending:'รอชำระ',partial:'ชำระบางส่วน',paid:'ชำระแล้ว',cancelled:'ยกเลิก'};
function authH(){return {'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'};}
function fmt(n){return '฿'+(parseFloat(n)||0).toLocaleString('th',{minimumFractionDigits:2});}
function fmtDt(s){if(!s)return'-';var d=new Date(s);if(isNaN(d))return s;return d.toLocaleDateString('th',{day:'2-digit',month:'short',year:'2-digit'});}
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,color){var el=document.getElementById('stToast');if(!el)return;el.textContent=msg;el.style.background=color||'#1f2937';el.style.color='#fff';el.style.display='block';setTimeout(function(){el.style.display='none';},2500);}
var _BANKS=['กรุงเทพ','กสิกรไทย','ไทยพาณิชย์','กรุงไทย','ทหารไทยธนชาต','ออมสิน','อาคารสงเคราะห์','เกียรตินาคินภัทร','ซีไอเอ็มบีไทย','ยูโอบี','แลนด์แอนด์เฮ้าส์','ทิสโก้','อิสลาม','ไทยเครดิต','ซูมิโตโม มิตซุย'];
function _chequeHtml(cd){cd=cd||{};return '<div class="st-field"><label>ธนาคาร</label><select id="stChequeBank" class="st-input"><option value="">-- เลือกธนาคาร --</option>'+_BANKS.map(function(b){return '<option value="'+h(b)+'"'+(cd.bank===b?' selected':'')+'>'+h(b)+'</option>';}).join('')+'</select></div><div class="st-row"><div class="st-field"><label>ชื่อผู้รับเช็ค</label><input id="stChequePayee" class="st-input" value="'+h(cd.payee||'')+'" placeholder="ชื่อผู้รับเช็ค"/></div><div class="st-field"><label>ชื่อผู้จ่ายเช็ค</label><input id="stChequePayer" class="st-input" value="'+h(cd.payer||'')+'" placeholder="ชื่อผู้จ่ายเช็ค"/></div></div><div class="st-row"><div class="st-field"><label>เลขที่เช็ค</label><input id="stChequeNo" class="st-input" value="'+h(cd.cheque_no||'')+'" placeholder="XXXXXXXXXX"/></div><div class="st-field"><label>วันที่บนเช็ค</label><input id="stChequeDue" class="st-input" type="date" value="'+h(cd.due_date||'')+'"/></div></div><div style="text-align:right;margin-top:4px;"><button type="button" onclick="clearChequeFields()" style="font-size:11px;padding:3px 10px;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:5px;cursor:pointer;">&#x1F5D1; ล้างข้อมูลเช็ค</button></div>';}
function _buildModeHtml(mode,s){
  s=s||{};
  if(mode==='cheque'){var cd={};try{cd=typeof s.cheque_detail==='string'?JSON.parse(s.cheque_detail):(s.cheque_detail||{});}catch(e){}return _chequeHtml(cd);}
  if(mode==='appointment'){
    return '<div class="st-field"><label>วันนัดชำระ</label><input type="datetime-local" id="appointment_dt" class="st-input" value="'+(s.appointment_dt?String(s.appointment_dt).replace(' ','T').slice(0,16):'')+'"/></div>'+
      '<div class="st-field"><label>หมายเหตุ</label><textarea id="appointment_note" class="st-input" rows="2" placeholder="หมายเหตุ...">'+h(s.appointment_note||'')+'</textarea></div>'+
      '<div class="st-field"><label>รีพอร์ทการเจรจา</label><textarea id="negotiation_note" class="st-input" rows="3" placeholder="บันทึกการเจรจา...">'+h(s.negotiation_note||'')+'</textarea></div>';
  }
  return '<div class="st-field"><label>วันชำระ</label><input id="stDueSingle" class="st-input" type="date" value="'+(s.due_single?String(s.due_single).slice(0,10):'')+'"/></div>';
}
window.stLoad=function(){
  fetch(API+'/api/pos/statements/list',{headers:authH()})
  .then(function(r){return r.json();}).then(function(d){_statements=Array.isArray(d)?d:[];stRender();})
  .catch(function(){var el=document.getElementById('stList');if(el)el.innerHTML='<div class="st-empty">โหลดไม่สำเร็จ</div>';});
};
window.stRender=function(){
  var q=(document.getElementById('stSearch').value||'').toLowerCase();
  var list=_statements.filter(function(s){
    return !q||(s.run_id||'').toLowerCase().includes(q)||(s.partner_name||'').toLowerCase().includes(q)||(s.contact_name||'').toLowerCase().includes(q)||(s.partner_code||'').toLowerCase().includes(q);
  });
  var cnt=document.getElementById('stCount');if(cnt)cnt.textContent='พบ '+list.length+' รายการ';
  var el=document.getElementById('stList');
  if(!list.length){el.innerHTML='<div class="st-empty">ไม่มีรายการ</div>';return;}
  el.innerHTML=list.map(function(s){
    var sc=s.status==='paid'?'st-paid':s.status==='partial'?'st-partial':s.status==='cancelled'?'st-cancelled':'';
    var ac=s.id===_activeId?' active':'';
    var bills=Array.isArray(s.bill_ids)?s.bill_ids:JSON.parse(s.bill_ids||'[]');
    return '<div class="st-card '+sc+ac+'" data-sid="'+s.id+'" onclick="stOpen(this.dataset.sid)">'+
      '<div class="st-card-top"><div class="st-card-run">'+h(s.run_id)+'</div><div class="st-card-amt">'+fmt(s.net_amt)+'</div></div>'+
      '<div class="st-card-meta">'+h(s.partner_name||'-')+' &middot; '+h(s.contact_name||'-')+'</div>'+
      '<div class="st-card-meta">'+fmtDt(s.created_at)+' &middot; '+bills.length+' บิล'+(s.partner_code?' &middot; '+h(s.partner_code):'')+'</div>'+
      '<span class="st-badge '+h(s.status)+'">'+(SL[s.status]||s.status)+'</span></div>';
  }).join('');
};
window.stSetMode=function(mode){
  _currentMode=mode;
  document.querySelectorAll('.st-mode-btn').forEach(function(b){b.classList.toggle('active',b.dataset.mode===mode);});
  var ex=document.getElementById('stModeExtra');if(ex)ex.innerHTML=_buildModeHtml(mode,_activeStmt);
};
window.clearChequeFields=function(){['stChequeBank','stChequePayee','stChequePayer','stChequeNo','stChequeDue'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});};
window.stOpen=function(id){
  id=parseInt(id);_activeId=id;_mode='record';
  var s=_statements.find(function(x){return x.id===id;});if(!s)return;
  _activeStmt=s;
  if(s.payment_method==='cheque')_currentMode='cheque';

      (s.partner_address?'<div class="st-partner-addr">'+h(s.partner_address)+'</div>':'')+

    '</div>';

  var initMode=_currentMode;

    partnerHtml+
    '<div class="st-section"><div class="st-section-title">ข้อมูลใบวางบิล</div>'+

window.stSave=function(){
  if(!_activeId)return;
  if(_stNet!==undefined&&_mode==='new'&&_stNet<=0){toast('ยอดสุทธิต้องมากกว่า 0','#ef4444');return;}
  var btn=document.getElementById('stSaveBtn');if(btn)btn.disabled=true;
  var payload={};
  var st=document.getElementById('stStatus');if(st)payload.status=st.value;
  if(_currentMode==='cheque'){
    payload.payment_method='cheque';
    var bank=document.getElementById('stChequeBank');var payee=document.getElementById('stChequePayee');
    var payer=document.getElementById('stChequePayer');var cno=document.getElementById('stChequeNo');var cdue=document.getElementById('stChequeDue');
    payload.cheque_detail={bank:bank?bank.value:'',payee:payee?payee.value.trim():'',payer:payer?payer.value.trim():'',cheque_no:cno?cno.value.trim():'',due_date:cdue?cdue.value:''};
  } else if(_currentMode==='appointment'){
    payload.payment_method='appointment';
    var apptDt=document.getElementById('appointment_dt');if(apptDt&&apptDt.value)payload.appointment_dt=apptDt.value;
    var apptNote=document.getElementById('appointment_note');if(apptNote&&apptNote.value.trim())payload.appointment_note=apptNote.value.trim();
    var negNote=document.getElementById('negotiation_note');if(negNote&&negNote.value.trim())payload.negotiation_note=negNote.value.trim();
  } else {
    payload.payment_method='cash';
    var due=document.getElementById('stDueSingle');if(due&&due.value)payload.due_single=due.value;
  }
  fetch(API+'/api/pos/statements/record/'+_activeId,{method:'PATCH',headers:authH(),body:JSON.stringify(payload)})
  .then(function(r){return r.json();}).then(function(d){if(btn)btn.disabled=false;if(d.detail){toast('ไม่สำเร็จ: '+d.detail,'#ef4444');return;}toast('บันทึกแล้ว','#16a34a');stLoad();})
  .catch(function(){if(btn)btn.disabled=false;toast('เชื่อมต่อไม่ได้','#ef4444');});
};
window.stDelete=function(){
  if(!_activeId||!_activeStmt)return;

  fetch(API+'/api/pos/statements/'+_activeId,{method:'DELETE',headers:authH()})
  .then(function(r){return r.json();}).then(function(d){
    if(d.detail){toast('ไม่สำเร็จ: '+d.detail,'#ef4444');return;}

window.stPrint=function(){
  if(!_activeId||!_activeStmt)return;
  var s=_activeStmt;
  Promise.all([
    fetch(API+'/api/pos/bank/list',{headers:authH()}).then(function(r){return r.json();}),
    fetch(API+'/api/pos/statements/'+_activeId+'/bills',{headers:authH()}).then(function(r){return r.json();})
  ]).then(function(res){
    var banks=Array.isArray(res[0])?res[0]:[];
    var bills=Array.isArray(res[1])?res[1]:[];
    var storeName=(window._storeSettings&&window._storeSettings.store_name)||'';
    var w=window.open('','_blank','width=820,height=960');
    if(!w)return;
    w.document.write(_buildPrintHtml(s,bills,banks,storeName));
    w.document.close();w.focus();setTimeout(function(){w.print();},600);
  }).catch(function(){toast('โหลดข้อมูลพิมพ์ไม่สำเร็จ','#ef4444');});
};
function _buildPrintHtml(s,bills,banks,storeName){
  var fmtP=function(n){return (parseFloat(n)||0).toLocaleString('th',{minimumFractionDigits:2});};
  var hp=function(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
  var fmtDp=function(ds){if(!ds)return'-';var d=new Date(ds);return isNaN(d)?ds:d.toLocaleDateString('th',{day:'2-digit',month:'short',year:'numeric'});};
  var billRows=bills.map(function(b){return '<tr><td>'+hp(b.bill_no)+'</td><td>'+fmtDp(b.created_at)+'</td><td>'+hp(b.customer_name||'-')+'</td><td style="text-align:right;">฿'+fmtP(b.total)+'</td></tr>';}).join('');
  var bankRows=banks.map(function(bk){return '<div>&#x1F3E6; <b>'+hp(bk.bank_name)+'</b> เลขที่ '+hp(bk.acc_no)+' ชื่อบัญชี: '+hp(bk.acc_name)+'</div>';}).join('');
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ใบวางบิล '+hp(s.run_id)+'</title>'+
    '<style>body{font-family:\'Sarabun\',sans-serif;font-size:13px;margin:24px;color:#1f2937;}'+
    'h2{margin:0 0 4px;font-size:18px;}'+
    'table{width:100%;border-collapse:collapse;margin:12px 0;}th,td{border:1px solid #ccc;padding:6px 10px;font-size:12px;}th{background:#f5f5f5;text-align:left;}'+
    '.hdr{display:flex;justify-content:space-between;border-bottom:2px solid #e8b93e;padding-bottom:10px;margin-bottom:14px;}'+
    '.section{margin:12px 0;font-size:12px;}'+
    '.totals{text-align:right;font-size:13px;margin:8px 0;}'+
    '.total-final{font-weight:700;font-size:15px;color:#e8b93e;}'+
    '.sig{display:flex;justify-content:space-around;margin-top:50px;}'+
    '.sig-box{text-align:center;border-top:1px solid #333;width:200px;padding-top:6px;font-size:12px;}'+
    '@media print{@page{margin:15mm}}</style></head><body>'+
    '<div class="hdr"><div><h2>ใบวางบิล / Statement</h2><div>เลขที่: <b>'+hp(s.run_id)+'</b></div><div>วันที่: '+fmtDp(s.created_at)+'</div><div>กำหนดชำระ: '+fmtDp(s.due_single)+'</div></div>'+
    '<div style="text-align:right;"><div style="font-size:16px;font-weight:700;">'+hp(storeName)+'</div></div></div>'+
    '<div class="section"><b>ผู้รับใบวางบิล:</b> '+hp(s.partner_name||'-')+'<br>'+
    'ที่อยู่: '+hp(s.partner_address||'-')+'<br>เบอร์: '+hp(s.contact_phone||'-')+'<br>รหัสผู้เสียภาษี: '+hp(s.partner_tax_id||'-')+'</div>'+
    '<table><thead><tr><th>เลขบิล</th><th>วันที่</th><th>ลูกค้า</th><th>ยอด</th></tr></thead><tbody>'+billRows+'</tbody></table>'+
    '<div class="totals"><div>ยอดรวม: ฿'+fmtP(s.total_amt)+'</div><div>ส่วนลด: -฿'+fmtP(s.discount)+'</div><div>VAT: ฿'+fmtP(s.vat_amt)+'</div><div class="total-final">ยอดสุทธิ: ฿'+fmtP(s.net_amt)+'</div></div>'+
    (bankRows?'<div class="section"><b>ชำระเงินได้ที่:</b><br>'+bankRows+'</div>':'')+
    '<div class="sig"><div class="sig-box">ผู้วางบิล</div><div class="sig-box">ผู้รับ</div></div>'+
    '</body></html>';
}

function stRenderBills(){
  var q=(document.getElementById('stBillSearch').value||'').toLowerCase();
  var list=_unpaidBills.filter(function(b){return !q||(b.bill_no||'').toLowerCase().includes(q)||(b.customer_name||'').toLowerCase().includes(q);});
  var el=document.getElementById('stBillList');
  if(!list.length){el.innerHTML='<div class="st-empty">ไม่มีบิลค้างชำระ</div>';return;}
  el.innerHTML=list.map(function(b){
    var sel=_selectedBills.indexOf(String(b.id))>=0;
    return '<div class="st-bill-row'+(sel?' selected':'')+'" data-bid="'+h(b.id)+'" onclick="stToggleBill(this)">'+
      '<input type="checkbox" class="st-bill-check" '+(sel?'checked':'')+' onclick="event.stopPropagation();stToggleBill(this.parentElement)">'+
      '<div class="st-bill-info"><div class="st-bill-no">'+h(b.bill_no)+'</div><div class="st-bill-sub">'+h(b.customer_name||'-')+' &middot; '+fmtDt(b.created_at)+'</div></div>'+
      '<div class="st-bill-amt">'+fmt(b.total)+'</div></div>';
  }).join('');
}
window.stToggleBill=function(el){
  var bid=String(el.dataset.bid);var idx=_selectedBills.indexOf(bid);
  if(idx>=0)_selectedBills.splice(idx,1);else _selectedBills.push(bid);
  document.getElementById('stSelectedCount').textContent='เลือก '+_selectedBills.length+' รายการ';
  stRenderBills();
};

  var total=selected.reduce(function(s,b){return s+parseFloat(b.total||0);},0);
  _stTotal=total;_stSelectedIds=_selectedBills.slice();_mode='new';_activeId=null;
  document.getElementById('stFormTitle').textContent='สร้างใบวางบิลใหม่';
  var partnerOpts='<option value="">-- ไม่ระบุคู่ค้า --</option>'+_partners.map(function(p){
    return '<option value="'+h(p.id)+'">'+h(p.company_name+(p.partner_code?' ('+p.partner_code+')':''))+'</option>';
  }).join('');
  document.getElementById('stFormBody').innerHTML=
    '<div class="st-section"><div class="st-section-title">คู่ค้า</div>'+
      '<div class="st-field"><select id="stPartnerId" class="st-input">'+partnerOpts+'</select></div>'+
    '</div>'+
    '<div class="st-section"><div class="st-section-title">บิลที่เลือก ('+selected.length+' รายการ)</div>'+
      selected.map(function(b){return '<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #f0ede8;"><span>'+h(b.bill_no)+' &middot; '+h(b.customer_name||'-')+'</span><span style="font-weight:600;">'+fmt(b.total)+'</span></div>';}).join('')+
    '</div>'+
    '<div class="st-section"><div class="st-section-title">สรุปยอด</div>'+
      '<div class="st-row"><div class="st-field"><label>ส่วนลด (บาท)</label><input id="stDiscount" class="st-input" type="number" value="0" oninput="stCalc()"/></div>'+
      '<div class="st-field"><label>VAT (%)</label><input id="stVatRate" class="st-input" type="number" value="0" oninput="stCalc()"/></div></div>'+
      '<div class="st-field"><label>ประเภท VAT</label><select id="stVatType" class="st-input" onchange="stCalc()"><option value="none">ไม่มี VAT</option><option value="included">รวมในราคา</option><option value="excluded">แยกจากราคา</option></select></div>'+
      '<div class="st-summary"><div class="st-summary-row"><span>ยอดรวม</span><span>'+fmt(total)+'</span></div><div class="st-summary-row"><span>ส่วนลด</span><span id="sDisc">-'+fmt(0)+'</span></div><div class="st-summary-row"><span>VAT</span><span id="sVat">'+fmt(0)+'</span></div><div class="st-summary-row total"><span>ยอดสุทธิ</span><span id="sNet">'+fmt(total)+'</span></div></div>'+
    '</div>'+
    '<div class="st-section"><div class="st-section-title">กำหนดชำระ</div>'+
      '<div class="st-field"><label>วันกำหนดชำระ</label><input id="stDueSingle" class="st-input" type="date"/></div>'+
    '</div>';
  var ab=document.getElementById('stActionBar');if(ab)ab.style.display='flex';
  var pb=document.getElementById('stPrintBtn');if(pb)pb.style.display='none';
  var db=document.getElementById('btn-delete');if(db)db.style.display='none';
  var pBtn=document.getElementById('stPartialBtn');if(pBtn)pBtn.style.display='none';
  var pdBtn=document.getElementById('stPaidBtn');if(pdBtn)pdBtn.style.display='none';
  document.getElementById('stSaveBtn').onclick=stCreate;
  _stNet=total;
};
window.stCalc=function(){
  var total=_stTotal||0;
  var disc=parseFloat((document.getElementById('stDiscount')||{}).value)||0;
  var vr=parseFloat((document.getElementById('stVatRate')||{}).value)||0;
  var vt=(document.getElementById('stVatType')||{}).value||'none';
  var after=Math.max(0,total-disc);var vat=0,net=after;
  if(vr>0&&vt==='included'){vat=Math.round((after-after/(1+vr/100))*100)/100;}
  else if(vr>0&&vt==='excluded'){vat=Math.round(after*vr/100*100)/100;net=after+vat;}
  var sD=document.getElementById('sDisc');if(sD)sD.textContent='-'+fmt(disc);
  var sV=document.getElementById('sVat');if(sV)sV.textContent=fmt(vat);
  var sN=document.getElementById('sNet');if(sN)sN.textContent=fmt(net);
  _stNet=net;_stVat=vat;_stDisc=disc;
};
window.stCreate=function(){
  var btn=document.getElementById('stSaveBtn');if(btn)btn.disabled=true;
  if(_stNet<=0){toast('ยอดสุทธิต้องมากกว่า 0','#ef4444');if(btn)btn.disabled=false;return;}
  var partnerEl=document.getElementById('stPartnerId');
  var partner_id=(partnerEl&&partnerEl.value)||null;
  var payload={
    bill_ids:_stSelectedIds,total_amt:_stTotal,discount:_stDisc,vat_amt:_stVat,
    vat_type:(document.getElementById('stVatType')||{}).value||'none',
    vat_rate:parseFloat((document.getElementById('stVatRate')||{}).value)||0,
    net_amt:_stNet||_stTotal,
    due_single:(document.getElementById('stDueSingle')||{}).value||null,
    partner_id:partner_id||undefined
  };
  if(!payload.bill_ids.length){toast('ไม่มีบิลที่เลือก','#ef4444');if(btn)btn.disabled=false;return;}
  fetch(API+'/api/pos/statements/create',{method:'POST',headers:authH(),body:JSON.stringify(payload)})
  .then(function(r){return r.json();}).then(function(d){
    if(btn)btn.disabled=false;
    if(d.detail){toast('ไม่สำเร็จ: '+d.detail,'#ef4444');return;}
    toast('สร้างใบวางบิล '+d.run_id+' แล้ว','#16a34a');stCancelForm();stLoad();
  }).catch(function(){if(btn)btn.disabled=false;toast('เชื่อมต่อไม่ได้','#ef4444');});
};
window.stCloseSelector=function(){document.getElementById('stSelectorModal').style.display='none';};
(function init(){
  window.removeEventListener('viiv_token_ready',window._st_tok);
  window._st_tok=function(e){if(e.detail&&e.detail.token)TOKEN=e.detail.token;stLoad();};
  window.addEventListener('viiv_token_ready',window._st_tok);
  var t=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
  if(t)window._st_tok({detail:{token:t}});
})();
})();
</script>
</body>
</html>
