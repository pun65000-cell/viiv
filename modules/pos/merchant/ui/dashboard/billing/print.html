<body>
<div id="printWrap">
  <div id="printToolbar" class="no-print" style="background:#1f2937;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <span style="color:#fff;font-size:13px;font-weight:600;">พิมพ์ใบเสร็จ</span>
    <select id="formSelector" style="padding:6px 10px;border-radius:6px;font-size:12px;border:none;outline:none;">
      <option value="1">1. ใบกำกับภาษี/ใบแจ้งหนี้/ใบส่งของ</option>
      <option value="2">2. ใบแจ้งหนี้/ใบส่งของ</option>
      <option value="3">3. ใบกำกับภาษีเต็มรูป (มี VAT แยก)</option>
      <option value="4">4. ใบเสร็จรับเงิน/ใบกำกับภาษี</option>
      <option value="5">5. ใบส่งของชั่วคราว</option>
      <option value="6">6. ใบเสร็จรับเงิน (แบบสั้น)</option>
      <option value="7">7. ใบส่งสินค้า (จำนวนเท่านั้น)</option>
      <option value="8">8. ใบปะหน้าจัดส่ง</option>
    </select>
    <button id="printBtn" style="padding:6px 16px;background:#e8b93e;color:#1a1200;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;">🖨 พิมพ์</button>
    <button id="closeBtn" style="padding:6px 12px;background:#6b7280;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;">✕ ปิด</button>
    <span id="printStatus" style="color:#9ca3af;font-size:11px;"></span>
  </div>
  <div id="printPreview" style="background:#e5e7eb;padding:20px;min-height:calc(100vh - 50px);display:flex;justify-content:center;">
    <div id="printPage" style="background:#fff;width:210mm;padding:12mm 14mm;box-sizing:border-box;font-family:sans-serif;font-size:13px;position:relative;">
      <div style="text-align:center;padding:60px;color:#aaa;"><div style="font-size:32px;margin-bottom:12px;">⏳</div><div style="font-size:14px;">กำลังโหลดข้อมูลบิล...</div></div>
    </div>
  </div>
</div>

<style>
body{margin:0;padding:0;}
@media print {
  .no-print{display:none!important;}
  #printPreview{background:none!important;padding:0!important;}
  #printPage{width:100%!important;box-shadow:none!important;padding:10mm!important;}
  body{-webkit-print-color-adjust:exact;}
}
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');
#printPage{font-family:'Sarabun',sans-serif!important;font-size:13px;}
.doc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.doc-logo{width:70px;height:70px;object-fit:contain;border-radius:10px;}
.doc-store-info{font-size:11px;line-height:1.5;}
.doc-store-name{font-size:15px;font-weight:700;color:#e8b93e;}
.doc-title{text-align:right;font-size:12px;line-height:1.6;}
.doc-title-main{font-size:14px;font-weight:700;}
.doc-divider{border:none;border-top:1px solid #000;margin:8px 0;}
.doc-meta{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px;margin-bottom:10px;}
.doc-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px;}
.doc-table th{background:#f3f4f6;padding:5px 6px;border:1px solid #d1d5db;text-align:center;}
.doc-table td{padding:4px 6px;border:none;}
.doc-table td.num{text-align:right;}
.doc-table td.ctr{text-align:center;}
.doc-table tbody{min-height:200px;}
.doc-items-wrap{min-height:160px;}
.doc-summary{display:flex;justify-content:flex-end;margin-bottom:10px;}
.doc-summary-box{width:240px;font-size:11px;}
.doc-summary-row{display:flex;justify-content:space-between;padding:2px 0;}
.doc-summary-total{font-size:16px;font-weight:700;color:#e8b93e;border-top:2px solid #000;padding-top:4px;}
.doc-sign-box{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;border:1px solid #000;padding:10px;font-size:10px;margin-top:8px;}
.doc-sign-item{text-align:center;display:flex;flex-direction:column;justify-content:flex-end;}
.doc-sign-line{border-bottom:1px dotted #000;margin:33px 4px 2px;}
.doc-footer{text-align:center;font-size:10px;color:#6b7280;margin-top:10px;}
.doc-customer{font-size:11px;margin-bottom:8px;line-height:1.6;}
.doc-label{font-weight:700;}
</style>

<script>
(function(){
var API=(location.hostname==='merchant.viiv.me')?'':'https://concore.viiv.me';
var TOKEN=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
if(!TOKEN){ setTimeout(function(){ TOKEN=localStorage.getItem('viiv_token')||''; },300); }
var _bill=null, _store=null, _form=1, _banks=[];
var _logoDataUrl=null; // cache logo as base64 — ไม่ต้อง fetch ซ้ำเมื่อเปลี่ยน form
var _loadingBid=null; // guard: ป้องกัน loadData ถูกเรียกซ้ำ

function fmt(n){ return (parseFloat(n)||0).toLocaleString('th',{minimumFractionDigits:2}); }
function buildBankBlock(store, banks){
  if(!store.show_bank_in_receipt) return '';
  banks=banks||[];
  if(!banks.length) return '';
  var def=banks.find(function(b){return b.is_default;})||banks[0];
  if(!def) return '';
  var html='<div style="display:flex;align-items:center;gap:12px;margin-top:8px;padding:8px 12px;border:1px solid #e5e5e5;border-radius:8px;font-size:10px;">';
  if(def.qr_url){
    html+='<img src="'+def.qr_url+'" style="width:52px;height:52px;object-fit:contain;flex-shrink:0;">';
  }
  html+='<div>';
  html+='<div style="font-weight:700;font-size:11px;">'+def.bank_name+'</div>';
  html+='<div>'+def.acc_name+' | '+def.acc_no+(def.branch?' สาขา '+def.branch:'')+'</div>';
  if(def.bank_shop_name||def.bank_shop_id){
    html+='<div style="color:#6b7280;">'+[def.bank_shop_name,def.bank_shop_id].filter(Boolean).join(' | ')+'</div>';
  }
  html+='</div></div>';
  return html;
}
function fmtDate(d){ return d?new Date(d).toLocaleDateString('th-TH',{year:'numeric',month:'2-digit',day:'2-digit'}):''; }
function fmtDateTime(d){ return d?new Date(d).toLocaleString('th-TH'):''; }

window.loadData = async function loadData(bid){
  if(_loadingBid===bid) return; // กัน duplicate call
  _loadingBid=bid;
  var status=document.getElementById('printStatus');
  if(status) status.textContent='กำลังโหลด...';
  try{
    var [bRes,sRes,bankRes]=await Promise.all([
      fetch(API+'/api/pos/bills/detail/'+bid,{headers:{'Authorization':'Bearer '+TOKEN}}),
      fetch(API+'/api/pos/store/settings',{headers:{'Authorization':'Bearer '+TOKEN}}),
      fetch(API+'/api/pos/bank/list',{headers:{'Authorization':'Bearer '+TOKEN}})
    ]);
    _bill=await bRes.json();
    _store=await sRes.json();
    _banks=(await bankRes.json()).banks||[];
    if(_bill.items && typeof _bill.items==='string') _bill.items=JSON.parse(_bill.items);

    // preload logo → base64 data URL (ไม่ต้อง fetch ซ้ำเมื่อเปลี่ยน form)
    _logoDataUrl=null;
    if(_store.logo_url){
      var logoSrc=_store.logo_url.startsWith('http')?_store.logo_url:API+_store.logo_url;
      try{
        var logoRes=await fetch(logoSrc,{cache:'force-cache'});
        if(logoRes.ok){
          var blob=await logoRes.blob();
          _logoDataUrl=await new Promise(function(res){
            var r=new FileReader(); r.onload=function(e){res(e.target.result);}; r.readAsDataURL(blob);
          });
        }
      }catch(e2){ _logoDataUrl=logoSrc; } // fallback: ใช้ URL ตรง
    }

    if(status) status.textContent='';
    renderForm(_form);
  }catch(e){
    _loadingBid=null; // reset guard ถ้า error (ให้ retry ได้)
    if(status) status.textContent='โหลดไม่สำเร็จ: '+e.message;
  }
}

function storeHeader(){
  var logoUrl=_logoDataUrl||'';
  var addr=[_store.address,_store.road,_store.subdistrict,_store.district,_store.province,_store.postal_code].filter(Boolean).join(' ');
  return '<div class="doc-header">'+
    '<div style="display:flex;gap:10px;align-items:flex-start;">'+
      (logoUrl?'<img src="'+logoUrl+'" class="doc-logo"/>':'')+
      '<div class="doc-store-info">'+
        '<div class="doc-store-name">'+(_store.store_name||'')+'</div>'+
        '<div>'+addr+'</div>'+
        (_store.tax_id?'<div>เลขประจำตัวผู้เสียภาษี: '+_store.tax_id+'</div>':'')+
        (_store.phone?'<div>โทร: '+_store.phone+'</div>':'')+
      '</div>'+
    '</div>';
}

function customerBlock(){
  var cd=null;
  try{ cd=_bill.customer_data?JSON.parse(typeof _bill.customer_data==='string'?_bill.customer_data:JSON.stringify(_bill.customer_data)):null; }catch(e){}
  var name=_bill.customer_name||_bill.customer||'';
  var phone=cd?cd.phone||'':'';
  var taxid=cd?cd.tax_id||cd.taxid||'':'';
  var road=cd?cd.road||'':'';
  var sub=cd?cd.subdistrict||cd.sub||'':'';
  var dist=cd?cd.district||cd.dist||'':'';
  var prov=cd?cd.province||cd.prov||'':'';
  var zip=cd?cd.postal_code||cd.zip||'':'';
  var addr=cd?cd.address||'':'';
  var gps=cd?cd.gps||'':'';
  var fullAddr=[addr,road,sub,dist,prov,zip].filter(Boolean).join(' ');
  var sched=_bill.scheduled_at?new Date(_bill.scheduled_at).toLocaleString('th-TH'):'-';
  var created=_bill.created_at?new Date(_bill.created_at).toLocaleDateString('th-TH'):'-';
  var staff=_bill.staff_name||_bill.created_by||'-';
  var credit=cd?cd.credit||'-':'-';
  var branch=_store&&_store.branch_code?_store.branch_code:cd?cd.branch||'-':'-';
  var dueDate=_bill.scheduled_at?new Date(_bill.scheduled_at).toLocaleDateString('th-TH'):'-';

  function row(label,val,req){
    if(!req&&(!val||val==='-'||val==='- วัน')) return '';
    return '<tr>'+
      '<td style="padding:2px 8px 2px 0;color:#374151;white-space:nowrap;font-size:12px;">'+label+'</td>'+
      '<td style="padding:2px 0;font-size:12px;">'+val+'</td>'+
    '</tr>';
  }

  function rowAlways(label,val){
    var v=val&&val!=='-'&&!val.startsWith('usr_')?val:'';
    return '<tr>'+
      '<td style="padding:1px 6px 1px 0;color:#000;white-space:nowrap;font-size:12px;width:72px;">'+label+'</td>'+
      '<td style="padding:1px 0;font-size:12px;color:#000;">'+v+'</td>'+
    '</tr>';
  }

  return '<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;border-bottom:1.5px solid #000;padding-bottom:6px;">'+
    '<div style="flex:1;padding-right:20px;">'+
      '<table style="border-collapse:collapse;">'+
        '<tr>'+
          '<td style="font-size:12px;color:#000;padding:1px 6px 1px 0;white-space:nowrap;width:72px;">ชื่อ</td>'+
          '<td style="font-size:12px;font-weight:600;color:#000;padding:1px 0;">'+name+'</td>'+
        '</tr>'+
        '<tr>'+
          '<td style="font-size:12px;color:#000;padding:1px 6px 1px 0;vertical-align:top;width:72px;">ที่อยู่</td>'+
          '<td style="font-size:12px;color:#000;padding:1px 0;line-height:1.5;">'+
            (fullAddr||'')+
            '<br>&nbsp;'+
          '</td>'+
        '</tr>'+
        rowAlways('เบอร์โทร',phone)+
        rowAlways('พิกัด (GPS)',gps)+
        '<tr><td style="font-size:12px;color:#000;padding:1px 0;" colspan="2">เลขประจำตัวผู้เสียภาษี : '+(taxid||'')+'</td></tr>'+
        '<tr><td colspan="2" style="height:3px;"></td></tr>'+
      '</table>'+
    '</div>'+
    '<div style="min-width:200px;">'+
      '<table style="border-collapse:collapse;">'+
        rowAlways('วันที่',created)+
        rowAlways('วันที่ส่ง',sched)+
        rowAlways('เครดิต',credit&&credit!=='-'?credit+' วัน':'')+
        rowAlways('กำหนดชำระ',dueDate)+
        rowAlways('รหัสสาขา',branch)+
        rowAlways('พนักงานขาย',staff)+
      '</table>'+
    '</div>'+
  '</div>';
}

function itemsTable(showSku,showPrice){
  var MIN_ROWS=13;
  var rows=(_bill.items||[]).map(function(it,i){
    var amount=parseFloat(it.qty)*parseFloat(it.price);
    return '<tr>'+
      '<td class="ctr">'+(i+1)+'</td>'+
      (showSku?'<td>'+it.sku+'</td>':'')+'<td>'+it.name+'</td>'+
      '<td class="num">'+fmt(it.qty)+'</td>'+
      (showPrice?'<td class="num">'+fmt(it.price)+'</td><td class="num">'+fmt(amount)+'</td>':'')+
    '</tr>';
  }).join('');
  var colCount=2+(showSku?1:0)+(showPrice?2:0);
  var emptyRows='';
  var itemCount=(_bill.items||[]).length;
  var padCount=Math.max(0, MIN_ROWS-itemCount);
  for(var ei=0;ei<padCount;ei++){
    emptyRows+='<tr style="height:22px;border-bottom:none;">';
    for(var ec=0;ec<colCount;ec++) emptyRows+='<td>&nbsp;</td>';
    emptyRows+='</tr>';
  }
  return '<table class="doc-table">'+
    '<thead><tr>'+
      '<th style="width:35px;">ลำดับ</th>'+
      (showSku?'<th style="width:70px;">รหัส</th>':'')+
      '<th>รายละเอียด</th>'+
      '<th style="width:60px;">จำนวน</th>'+
      (showPrice?'<th style="width:80px;">ราคา/หน่วย</th><th style="width:80px;">จำนวนเงิน</th>':'')+
    '</tr></thead><tbody>'+rows+emptyRows+'</tbody></table>';
}

function summaryBlock(showVat){
  var sub=parseFloat(_bill.subtotal)||0;
  var disc=parseFloat(_bill.discount)||0;
  var vat=parseFloat(_bill.vat_amount)||0;
  var total=parseFloat(_bill.total)||0;
  var vatRate=parseInt(_bill.vat_rate)||0;
  var vatType=_bill.vat_type||'included';
  var rows='';
  if(showVat){
    // แสดงครบ 6 บรรทัดเสมอ ไม่ว่า vat จะมีหรือไม่
    var basePrice=vatType==='excluded'?sub:(vat>0?total-vat+disc:sub);
    var afterDisc=basePrice-disc;
    var vatLabel=vatRate>0?'ภาษีมูลค่าเพิ่ม '+vatRate+'%':'ภาษีมูลค่าเพิ่ม 7%';
    var vatDisplay=vatType==='included'?'( '+fmt(vat)+' )':fmt(vat);
    rows+=
      '<div class="doc-summary-row"><span>รวมเป็นเงิน</span><span>'+fmt(sub)+'</span></div>'+
      '<div class="doc-summary-row"><span>ราคาปกติ</span><span>'+fmt(sub)+'</span></div>'+
      '<div class="doc-summary-row"><span>หักส่วนลด</span><span>'+fmt(disc)+'</span></div>'+
      '<div class="doc-summary-row"><span>ยอดคำนวณภาษี</span><span>'+fmt(afterDisc)+'</span></div>'+
      '<div class="doc-summary-row"><span>'+vatLabel+'</span><span>'+vatDisplay+'</span></div>'+
      '<div class="doc-summary-row doc-summary-total"><span>ราคาสินค้า</span><span>'+fmt(total)+'</span></div>';
  } else {
    rows+=
      (disc>0?'<div class="doc-summary-row"><span>ส่วนลด</span><span>-'+fmt(disc)+'</span></div>':'')+
      '<div class="doc-summary-row doc-summary-total"><span>ยอดสุทธิ</span><span>'+fmt(total)+'</span></div>';
  }
  return '<div class="doc-summary"><div class="doc-summary-box">'+rows+'</div></div>';
}

function signBlock(cols){
  var items=cols||['ผู้ส่งสินค้า/Delivered By','ผู้รับสินค้า/Received By','ผู้จัดทำ/Prepared By','ผู้อนุมัติ/Authorized'];
  return '<div class="doc-sign-box" style="grid-template-columns:repeat('+items.length+',1fr);">'+
    items.map(function(label){
      return '<div class="doc-sign-item"><div class="doc-sign-line"></div><div>'+label+'</div><div>วันที่......./......./.......</div></div>';
    }).join('')+
  '</div>';
}

window.renderForm = function renderForm(f){
  if(!_bill||!_store) return;
  var page=document.getElementById('printPage');
  var items=_bill.items||[];
  var sub=parseFloat(_bill.subtotal)||0;
  var total=parseFloat(_bill.total)||0;
  var vat=parseFloat(_bill.vat_amount)||0;
  var vatRate=parseInt(_bill.vat_rate)||0;
  var sched=_bill.scheduled_at?fmtDateTime(_bill.scheduled_at):'';
  var billNo=_bill.bill_no||_bill.id;
  var invNo=_bill.inv_no||billNo;
  var created=fmtDate(_bill.created_at);
  var html='';

  if(f==1||f==2||f==3){
    // ใบกำกับภาษี/ใบแจ้งหนี้/ใบส่งของ
    var titles={1:'ใบกำกับภาษี/ใบแจ้งหนี้/ใบส่งของ<br><small>Tax Invoice/Invoice/Delivery Order</small>',
                2:'ใบแจ้งหนี้/ใบส่งของ<br><small>Invoice/Delivery Order</small>',
                3:'ใบกำกับภาษีเต็มรูป<br><small>Tax Invoice</small>'};
    html+=storeHeader()+
      '<div class="doc-title">'+
        '<div class="doc-title-main">'+titles[f]+'</div>'+
        '<div>เลขอ้างอิง '+invNo+'</div>'+
        '<div>เลขประจำตัวผู้เสียภาษีผู้ออก: '+(_store.tax_id||'')+'</div>'+
      '</div></div>'+
      '<hr class="doc-divider"/>'+
      customerBlock()+

      itemsTable(false,true)+
      summaryBlock(f==1||f==3||f==4)+
      (f==1?'<div style="font-size:10px;margin-bottom:6px;">หมายเหตุ: '+(_bill.note||'แก้ไขใบส่งของกรุณาติดต่อภายใน 7 วัน')+'</div>':'')+
      signBlock(f==1?['ผู้รับสินค้า/Received By','ผู้ส่งสินค้า/Delivered By','ผู้จัดทำ/Prepared By','ผู้อนุมัติ/Authorized']:null)+
      
      (_store.show_footer_text&&_store.footer_text?'<div style="text-align:center;font-size:10px;color:#374151;margin-top:4px;padding-top:4px;border-top:1px dashed #e5e5e5;">'+_store.footer_text+'</div>':'')+
      buildBankBlock(_store, _banks);
  }
  else if(f==4||f==5){
    var title4={4:'ใบเสร็จรับเงิน/ใบกำกับภาษี',5:'ใบส่งของชั่วคราว/ใบกำกับภาษี'};
    var addr=[_store.address,_store.road,_store.subdistrict,_store.district,_store.province,_store.postal_code].filter(Boolean).join(' ');
    var logoUrl=_logoDataUrl||'';
    html+='<div style="text-align:center;font-size:14px;font-weight:700;margin-bottom:12px;">'+title4[f]+'</div>'+
      '<div style="display:flex;gap:10px;margin-bottom:10px;">'+
        (logoUrl?'<img src="'+logoUrl+'" style="width:60px;height:60px;object-fit:contain;"/>':'')+
        '<div style="flex:1;font-size:11px;">'+
          '<div style="font-weight:700;font-size:13px;">'+(_store.store_name||'')+'</div>'+
          '<div>เลขประจำตัวผู้เสียภาษี '+(_store.tax_id||'')+'</div>'+
          '<div>'+addr+'</div>'+
        '</div>'+
        '<div style="text-align:right;font-size:11px;">'+
          '<div>เลขที่</div><div style="font-size:14px;font-weight:700;">'+invNo+'</div>'+
          '<div>วันที่ '+created+'</div>'+
        '</div>'+
      '</div>'+
      customerBlock()+
      itemsTable(true,true)+
      '<div style="font-size:10px;margin-bottom:8px;">'+
        '<div>หมายเหตุ:</div>'+
        '<div>1.ได้รับสินค้าตามรายการถูกต้องแล้ว</div>'+
        '<div>2.บริษัทฯ จะออกใบเสร็จชำระเงิน เมื่อมีการชำระเงินเรียบร้อยแล้ว</div>'+
      '</div>'+
      summaryBlock(true)+
      signBlock(['ผู้ส่งสินค้า/ผู้รับเงิน','ผู้รับสินค้า'])+
      (_store.show_footer_text&&_store.footer_text?'<div style="text-align:center;font-size:10px;color:#374151;margin-top:4px;padding-top:4px;border-top:1px dashed #e5e5e5;">'+_store.footer_text+'</div>':'')+
      buildBankBlock(_store, _banks);
  }
  else if(f==6){
    var logoUrl=_logoDataUrl||'';
    var addr=[_store.address,_store.road,_store.subdistrict,_store.district,_store.province,_store.postal_code].filter(Boolean).join(' ');
    html+=
      '<div style="text-align:center;margin-bottom:12px;">'+
        (logoUrl?'<img src="'+logoUrl+'" style="width:70px;height:70px;object-fit:contain;display:block;margin:0 auto 6px;"/>':'')+
        '<div style="font-size:15px;font-weight:700;">'+(_store.store_name||'')+'</div>'+
        '<div style="font-size:10px;">'+addr+'</div>'+
        '<div style="font-size:10px;">No. '+invNo+'</div>'+
        '<div style="font-size:10px;text-align:right;">วันที่ '+created+'</div>'+
      '</div>'+
      customerBlock()+
      itemsTable(true,true)+
      summaryBlock(false)+
      '<div style="font-size:10px;margin-top:8px;">บันทึก/หมายเหตุ: '+(_bill.note||'')+'</div>'+
      '<div class="doc-footer">ขอบคุณที่ใช้บริการ</div>';
  }
  else if(f==7){
    var logoUrl=_logoDataUrl||'';
    var addr=[_store.address,_store.road,_store.subdistrict,_store.district,_store.province,_store.postal_code].filter(Boolean).join(' ');
    html+=
      '<div style="text-align:center;margin-bottom:12px;">'+
        (logoUrl?'<img src="'+logoUrl+'" style="width:70px;height:70px;object-fit:contain;display:block;margin:0 auto 6px;"/>':'')+
        '<div style="font-size:14px;font-weight:700;">'+(_store.store_name||'')+'</div>'+
        '<div style="font-size:10px;">'+addr+'</div>'+
        '<div style="font-size:10px;">No. '+invNo+'</div>'+
        '<div style="font-size:10px;text-align:right;">วันที่ '+created+'</div>'+
      '</div>'+
      customerBlock()+
      '<table class="doc-table"><thead><tr>'+
        '<th style="width:35px;">ลำดับ</th><th>รายการ</th><th style="width:70px;">จำนวน</th>'+
      '</tr></thead><tbody>'+
      (_bill.items||[]).map(function(it,i){
        return '<tr><td class="ctr">'+(i+1)+'</td><td>'+it.name+'</td><td class="num">'+fmt(it.qty)+'</td></tr>';
      }).join('')+
      '</tbody></table>'+
      '<div style="font-size:10px;margin-top:8px;">หมายเหตุ: '+(_bill.note||'')+'</div>';
  }
  else if(f==8){
    // ใบปะหน้าจัดส่ง
    var cd=_bill.customer_data?JSON.parse(typeof _bill.customer_data==='string'?_bill.customer_data:JSON.stringify(_bill.customer_data)):null;
    var cusName=_bill.customer_name||'';
    var cusPhone=cd?cd.phone||'':'';
    var cusAddr=cd?cd.address||'':'';
    var logoUrl=_logoDataUrl||'';
    var storeAddr=[_store.address,_store.road,_store.subdistrict,_store.district,_store.province,_store.postal_code].filter(Boolean).join(' ');
    html+=
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">'+
        '<div style="border:1px solid #000;padding:10px;font-size:11px;">'+
          '<div style="font-size:10px;color:#6b7280;margin-bottom:4px;">ผู้ส่ง&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;เบอร์โทร '+(_store.phone||'')+'</div>'+
          (logoUrl?'<img src="'+logoUrl+'" style="width:50px;float:left;margin-right:8px;"/>':'')+
          '<div style="font-weight:700;">'+(_store.store_name||'')+'</div>'+
          '<div>'+storeAddr+'</div>'+
        '</div>'+
        '<div style="border:1px solid #000;padding:10px;font-size:11px;">'+
          '<div style="font-size:10px;color:#6b7280;margin-bottom:4px;">ผู้รับ&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;เบอร์โทร '+cusPhone+'</div>'+
          '<div style="font-weight:700;">'+cusName+'</div>'+
          '<div>'+cusAddr+'</div>'+
          '<div style="margin-top:6px;font-size:10px;">หมายเหตุคำสั่งซื้อ: '+invNo+'</div>'+
          '<div style="font-size:10px;">ชำระเงิน: '+((_bill.pay_method==='cod'||!_bill.pay_method)?'เก็บเงินปลายทาง':'ชำระแล้ว')+'</div>'+
          (sched?'<div style="font-size:10px;">จัดส่งโดย: '+sched+'</div>':'')+
        '</div>'+
      '</div>'+
      '<div style="font-size:13px;font-weight:700;margin-bottom:8px;">รายการที่จัดส่ง</div>'+
      '<div style="font-size:10px;color:#6b7280;margin-bottom:6px;">พิมพ์โดย '+(_store.store_name||'')+' &nbsp;&nbsp; เวลาพิมพ์ '+new Date().toLocaleString('th')+'</div>'+
      '<table class="doc-table"><thead><tr>'+
        '<th style="width:35px;">ลำดับ</th><th style="width:70px;">รหัส</th><th>ชื่อสินค้า</th><th style="width:60px;">จำนวน</th>'+
      '</tr></thead><tbody>'+
      (_bill.items||[]).map(function(it,i){
        return '<tr><td class="ctr">'+(i+1)+'</td><td>'+it.sku+'</td><td>'+it.name+'</td><td class="num">'+fmt(it.qty)+'</td></tr>';
      }).join('')+
      '</tbody></table>'+
      '<div style="display:flex;justify-content:flex-end;margin-top:10px;">'+
        '<div style="width:200px;font-size:11px;">'+
          '<div class="doc-summary-row"><span>หมายเหตุการจัดส่ง:</span></div>'+
          '<div style="font-size:10px;">'+(_bill.note||'-')+'</div>'+
          '<div class="doc-summary-row" style="margin-top:8px;"><span>ยอดรวม</span><span>'+fmt(total)+'</span></div>'+
          '<div class="doc-summary-row doc-summary-total"><span>รวมทั้งสิ้น</span><span>'+fmt(total)+'</span></div>'+
        '</div>'+
      '</div>'+
      '<div style="margin-top:12px;font-size:10px;">'+
        'ผู้รับสินค้า ...........................<br>วันที่........./........./........'+
      '</div>';
  }

  page.innerHTML=html;
}

window.addEventListener('viiv_token_ready',function(e){
  if(e.detail&&e.detail.token) TOKEN=e.detail.token;
  _bindUI();
});
})();

// init เดียว — ผ่าน setTimeout รอ token จาก localStorage
setTimeout(function(){
  TOKEN=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
  _bindUI();
},200);

function _bindUI(){
  var bid=new URLSearchParams(location.search).get('bid');
  if(!bid){
    var hash=location.hash.replace('#','');
    if(hash.startsWith('bid=')) bid=hash.slice(4);
  }
  if(!bid){
    document.getElementById('printPage').innerHTML='<div style="text-align:center;padding:40px;color:#aaa;">ไม่พบเลขบิล กรุณาส่ง ?bid=BILL_ID</div>';
    return;
  }
  if(!TOKEN){ return; } // ยังไม่มี token — รอ event
  loadData(bid); // _loadingBid guard ป้องกัน call ซ้ำ

  var fs=document.getElementById('formSelector');
  if(fs&&!fs._bound){ fs._bound=true; fs.addEventListener('change',function(){ _form=parseInt(this.value); renderForm(_form); }); }
  var pb=document.getElementById('printBtn');
  if(pb&&!pb._bound){ pb._bound=true; pb.addEventListener('click',function(){ window.print(); }); }
  var cb=document.getElementById('closeBtn');
  if(cb&&!cb._bound){ cb._bound=true; cb.addEventListener('click',function(){
    if(window.parent&&window.parent.closePrintPopup) window.parent.closePrintPopup();
    else window.close();
  }); }
}
</script>
</body>
