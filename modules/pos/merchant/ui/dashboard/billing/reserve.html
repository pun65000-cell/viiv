<body>
<div class="rv-wrap">
  <div class="rv-toolbar">
    <input id="rvSearch" class="rv-search" placeholder="ค้นหา เลขบิล / ชื่อลูกค้า..." oninput="filterRender()"/>
    <div class="rv-filters">
      <button class="rv-fbtn active" data-s="" onclick="setFilter(this,'')">ทั้งหมด</button>
      <button class="rv-fbtn" data-s="pending" onclick="setFilter(this,'pending')">รอรับสินค้า</button>
      <button class="rv-fbtn" data-s="paid" onclick="setFilter(this,'paid')">เสร็จแล้ว</button>
      <button class="rv-fbtn" data-s="voided" onclick="setFilter(this,'voided')">ยกเลิก</button>
    </div>
  </div>
  <div id="rvList" class="rv-list"><div class="rv-empty">กำลังโหลด...</div></div>
</div>

<!-- Detail Modal -->
<div id="rvModal" class="rv-ov" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="rv-modal">
    <div class="rv-modal-hd">
      <div id="rvMTitle" style="font-size:15px;font-weight:700;"></div>
      <button onclick="closeModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#6b7280;line-height:1;">✕</button>
    </div>
    <div id="rvMBody" class="rv-modal-body"></div>
  </div>
</div>

<div id="rvToast" class="rv-toast" style="display:none;"></div>

<style>
.rv-wrap{padding:4px 0;box-sizing:border-box;}
.rv-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.rv-search{flex:1;min-width:180px;padding:8px 14px;border:1.5px solid var(--border,#e8b93e);border-radius:8px;font-size:13px;outline:none;background:#fffbf0;box-sizing:border-box;}
.rv-filters{display:flex;gap:6px;flex-wrap:wrap;}
.rv-fbtn{padding:6px 12px;border:1px solid var(--border,#e5e5e5);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:#f3f4f6;color:#374151;transition:all .15s;}
.rv-fbtn.active{background:var(--accent,#e8b93e);color:#1a1200;border-color:var(--accent,#e8b93e);}
.rv-list{display:flex;flex-direction:column;gap:8px;}
.rv-empty{text-align:center;padding:40px;color:#9ca3af;font-size:13px;}
.rv-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:14px 16px;cursor:pointer;transition:box-shadow .15s;}
.rv-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);}
.rv-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.rv-card-no{font-size:13px;font-weight:700;color:#1f2937;}
.rv-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.rv-badge.pending{background:#fef3c7;color:#92400e;}
.rv-badge.paid{background:#d1fae5;color:#065f46;}
.rv-badge.voided,.rv-badge.deleted{background:#fee2e2;color:#991b1b;}
.rv-card-info{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:#6b7280;}
.rv-card-total{font-size:15px;font-weight:700;color:var(--accent,#e8b93e);}
.rv-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:20px;box-sizing:border-box;overflow-y:auto;}
.rv-modal{background:#fff;border-radius:14px;width:min(560px,100%);box-shadow:0 8px 32px rgba(0,0,0,.18);margin:auto;}
.rv-modal-hd{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #f0ede8;}
.rv-modal-body{padding:20px;}
.rv-field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.rv-field label{font-size:11px;font-weight:600;color:#374151;}
.rv-input{padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;outline:none;width:100%;box-sizing:border-box;}
.rv-input:focus{border-color:var(--accent,#e8b93e);}
.rv-items-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px;}
.rv-items-table th{background:#f8f6f2;padding:6px 10px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e5e5;}
.rv-items-table td{padding:6px 10px;border-bottom:1px solid #f0ede8;}
.rv-items-table tr:last-child td{border-bottom:none;}
.rv-sum{text-align:right;font-size:13px;font-weight:700;color:var(--accent,#e8b93e);padding:6px 0;}
.rv-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid #f0ede8;}
.rv-btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;}
.rv-btn-primary{background:var(--accent,#e8b93e);color:#1a1200;}
.rv-btn-danger{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.rv-btn-ghost{background:#f3f4f6;color:#374151;border:1px solid #d1d5db;}
.rv-btn:disabled{opacity:.5;cursor:not-allowed;}
.rv-select{padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;outline:none;width:100%;background:#fff;box-sizing:border-box;}
.rv-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:99999;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.18);}
</style>

<script>
(function(){
'use strict';
var API=(location.hostname==='merchant.viiv.me')?'':'https://concore.viiv.me';
var TOKEN=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
var allBills=[],filterStatus='',_allProducts=[];

function fmt(n){return '฿'+(n||0).toLocaleString('th',{minimumFractionDigits:2});}
function fmtDt(s){if(!s)return '-';var d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('th',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'});}
function toast(msg,color){
  var t=document.getElementById('rvToast');if(!t)return;
  t.textContent=msg;t.style.background=color||'#1f2937';t.style.color='#fff';t.style.display='block';
  clearTimeout(toast._t);toast._t=setTimeout(function(){t.style.display='none';},3000);
}
function badgeHtml(status){
  var map={pending:'รอรับสินค้า',paid:'เสร็จแล้ว',voided:'ยกเลิก',deleted:'ลบแล้ว'};
  return '<span class="rv-badge '+(status||'')+'">'+(map[status]||status)+'</span>';
}
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function loadBills(){
  if(!TOKEN)return;
  fetch(API+'/api/pos/bills/list?doc_type=reserve',{headers:{'Authorization':'Bearer '+TOKEN}})
  .then(function(r){return r.json();})
  .then(function(d){allBills=Array.isArray(d)?d:[];filterRender();})
  .catch(function(){document.getElementById('rvList').innerHTML='<div class="rv-empty">โหลดข้อมูลไม่สำเร็จ</div>';});
}
function loadProducts(){
  if(!TOKEN)return;
  fetch(API+'/api/pos/products/list',{headers:{'Authorization':'Bearer '+TOKEN}})
  .then(function(r){return r.json();})
  .then(function(d){_allProducts=d.products||d||[];});
}

window.setFilter=function(btn,s){
  document.querySelectorAll('.rv-fbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');filterStatus=s;filterRender();
};
window.filterRender=function(){
  var q=(document.getElementById('rvSearch').value||'').toLowerCase();
  var list=allBills.filter(function(b){
    if(filterStatus&&b.status!==filterStatus)return false;
    if(q&&!(b.bill_no||'').toLowerCase().includes(q)&&!(b.customer_name||'').toLowerCase().includes(q))return false;
    return true;
  });
  var el=document.getElementById('rvList');
  if(!list.length){el.innerHTML='<div class="rv-empty">ไม่มีใบจอง</div>';return;}
  el.innerHTML=list.map(function(b){
    var items=typeof b.items==='string'?JSON.parse(b.items||'[]'):b.items||[];
    var itemCount=items.length;
    return '<div class="rv-card" onclick="openModal(\''+h(b.id)+'\')">'+
      '<div class="rv-card-top">'+
        '<div>'+
          '<div class="rv-card-no">'+h(b.bill_no)+'</div>'+
          '<div style="font-size:12px;color:#6b7280;margin-top:2px;">'+h(b.customer_name||'-')+'</div>'+
        '</div>'+
        '<div style="text-align:right;">'+badgeHtml(b.status)+'<div class="rv-card-total" style="margin-top:4px;">'+fmt(b.total)+'</div></div>'+
      '</div>'+
      '<div class="rv-card-info">'+
        '<span>วันจอง: '+fmtDt(b.created_at)+'</span>'+
        '<span>วันรับ: '+fmtDt(b.scheduled_at)+'</span>'+
        '<span>'+itemCount+' รายการ</span>'+
      '</div>'+
    '</div>';
  }).join('');
};

window.openModal=function(bid){
  var b=allBills.find(function(x){return x.id===bid;});
  if(!b)return;
  var items=typeof b.items==='string'?JSON.parse(b.items||'[]'):b.items||[];
  var isPending=b.status==='pending';

  document.getElementById('rvMTitle').innerHTML='ใบจอง '+h(b.bill_no)+' '+badgeHtml(b.status);

  var bodyHtml=
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'+
      '<div class="rv-field">'+
        '<label>ชื่อลูกค้า</label>'+
        (isPending?'<input id="eCustomer" class="rv-input" value="'+h(b.customer_name||'')+'"/>':'<div style="font-size:13px;padding:4px 0;">'+h(b.customer_name||'-')+'</div>')+
      '</div>'+
      '<div class="rv-field">'+
        '<label>วันรับสินค้า</label>'+
        (isPending?'<input id="ePickup" type="datetime-local" class="rv-input" value="'+(b.scheduled_at||'').slice(0,16)+'"/>':'<div style="font-size:13px;padding:4px 0;">'+fmtDt(b.scheduled_at)+'</div>')+
      '</div>'+
    '</div>'+
    '<div class="rv-field">'+
      '<label>หมายเหตุ</label>'+
      (isPending?'<input id="eNote" class="rv-input" value="'+h(b.note||'')+'"/>':'<div style="font-size:13px;padding:4px 0;">'+(b.note||'-')+'</div>')+
    '</div>'+
    '<table class="rv-items-table">'+
      '<thead><tr><th>SKU</th><th>สินค้า</th><th style="text-align:right;">จำนวน</th><th style="text-align:right;">ราคา</th><th style="text-align:right;">รวม</th></tr></thead>'+
      '<tbody>'+items.map(function(it){
        return '<tr>'+
          '<td style="color:#9ca3af;">'+h(it.sku||'')+'</td>'+
          '<td>'+h(it.name||'')+'</td>'+
          '<td style="text-align:right;">'+Number(it.qty)+'</td>'+
          '<td style="text-align:right;">'+fmt(it.price)+'</td>'+
          '<td style="text-align:right;font-weight:600;">'+fmt(it.qty*it.price)+'</td>'+
        '</tr>';
      }).join('')+
      '</tbody>'+
    '</table>'+
    '<div class="rv-sum">ยอดสุทธิ '+fmt(b.total)+'</div>';

  if(isPending){
    bodyHtml+=
      '<div id="eSaveArea" style="background:#f8f6f2;border-radius:8px;padding:12px;margin-bottom:2px;">'+
        '<div style="font-size:11px;font-weight:600;color:#374151;margin-bottom:8px;">บันทึกการแก้ไข</div>'+
        '<div style="display:flex;justify-content:flex-end;">'+
          '<button class="rv-btn rv-btn-ghost" style="font-size:12px;" onclick="saveEdit(\''+bid+'\')">บันทึกการแก้ไข</button>'+
        '</div>'+
      '</div>'+
      '<div id="eCompleteArea" style="background:#fffbf0;border:1px solid #e8b93e;border-radius:8px;padding:12px;margin-top:10px;">'+
        '<div style="font-size:11px;font-weight:600;color:#374151;margin-bottom:8px;">จบการขาย</div>'+
        '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">'+
          '<div style="flex:1;min-width:130px;">'+
            '<label style="font-size:11px;color:#6b7280;">วิธีชำระ</label>'+
            '<select id="ePayMethod" class="rv-select" style="margin-top:4px;">'+
              '<option value="cash">เงินสด</option>'+
              '<option value="transfer">โอนเงิน</option>'+
              '<option value="credit">เครดิต</option>'+
              '<option value="qr">QR Code</option>'+
            '</select>'+
          '</div>'+
          '<div style="flex:1;min-width:130px;">'+
            '<label style="font-size:11px;color:#6b7280;">รับเงิน</label>'+
            '<input id="ePaid" type="number" class="rv-input" style="margin-top:4px;" value="'+Number(b.total||0).toFixed(2)+'"/>'+
          '</div>'+
        '</div>'+
        '<div style="display:flex;justify-content:flex-end;margin-top:10px;">'+
          '<button id="eBtnComplete" class="rv-btn rv-btn-primary" onclick="doComplete(\''+bid+'\')">✓ จบการขาย</button>'+
        '</div>'+
      '</div>'+
      '<div style="display:flex;justify-content:flex-end;margin-top:8px;">'+
        '<button class="rv-btn rv-btn-danger" onclick="doVoid(\''+bid+'\',\''+h(b.bill_no)+'\')">ยกเลิกการจอง</button>'+
      '</div>';
  }

  document.getElementById('rvMBody').innerHTML=bodyHtml;
  document.getElementById('rvModal').style.display='flex';
  document.getElementById('rvModal').scrollTop=0;
};

window.closeModal=function(){document.getElementById('rvModal').style.display='none';};

window.saveEdit=function(bid){
  var b=allBills.find(function(x){return x.id===bid;});
  if(!b)return;
  var customer=document.getElementById('eCustomer');
  var pickup=document.getElementById('ePickup');
  var note=document.getElementById('eNote');
  var body={};
  if(customer)body.customer=customer.value;
  if(pickup)body.scheduled_at=pickup.value||null;
  if(note)body.note=note.value;
  var btn=event.target;btn.disabled=true;btn.textContent='กำลังบันทึก...';
  fetch(API+'/api/pos/bills/update-reserve/'+bid,{
    method:'PATCH',
    headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(r){return r.json();})
  .then(function(d){
    btn.disabled=false;btn.textContent='บันทึกการแก้ไข';
    if(d.ok){toast('บันทึกแล้ว','#16a34a');loadBills();}
    else toast(d.detail||'เกิดข้อผิดพลาด','#ef4444');
  }).catch(function(){btn.disabled=false;btn.textContent='บันทึกการแก้ไข';toast('เชื่อมต่อไม่ได้','#ef4444');});
};

window.doComplete=function(bid){
  var pm=document.getElementById('ePayMethod');
  var paid=document.getElementById('ePaid');
  var btn=document.getElementById('eBtnComplete');
  if(btn)btn.disabled=true;
  fetch(API+'/api/pos/bills/complete-reserve/'+bid,{
    method:'POST',
    headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
    body:JSON.stringify({pay_method:pm?pm.value:'cash',paid:paid?parseFloat(paid.value)||0:0})
  }).then(function(r){return r.json();})
  .then(function(d){
    if(btn)btn.disabled=false;
    if(d.ok){toast('จบการขายสำเร็จ '+d.bill_no,'#16a34a');closeModal();loadBills();}
    else toast(d.detail||'เกิดข้อผิดพลาด','#ef4444');
  }).catch(function(){if(btn)btn.disabled=false;toast('เชื่อมต่อไม่ได้','#ef4444');});
};

window.doVoid=function(bid,billNo){
  var reason=window.prompt('เหตุผลยกเลิกการจอง "'+billNo+'"');
  if(!reason||!reason.trim())return;
  fetch(API+'/api/pos/bills/void/'+bid,{
    method:'POST',
    headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
    body:JSON.stringify({void_type:'cancel',reason:reason.trim()})
  }).then(function(r){return r.json();})
  .then(function(d){
    if(d.message){toast('ยกเลิกสำเร็จ','#e8b93e');closeModal();loadBills();}
    else toast(d.detail||'เกิดข้อผิดพลาด','#ef4444');
  }).catch(function(){toast('เชื่อมต่อไม่ได้','#ef4444');});
};

(function(){
  window.removeEventListener('viiv_token_ready',window._rv_tok);
  window._rv_tok=function(e){
    if(e.detail&&e.detail.token)TOKEN=e.detail.token;
    loadBills();loadProducts();
  };
  window.addEventListener('viiv_token_ready',window._rv_tok);
})();
})();
</script>
</body>
