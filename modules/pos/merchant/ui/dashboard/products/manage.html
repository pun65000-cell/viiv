<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --viiv-gold:#E8B93E;--viiv-gold-text:#1a1200;--viiv-border:#d4b866;
  --viiv-bg:#fff;--viiv-text:#1a1a1a;--viiv-text-muted:#666;
  --viiv-card-bg:#fff;--viiv-border-light:#ede8d8;
  --viiv-gold-light:#fdf6e3;--viiv-gold-mid:#f5e4a8;
  --viiv-danger:#e53e3e;--viiv-success:#38a169;--viiv-success-light:#f0fff4;
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--viiv-bg);color:var(--viiv-text);font-size:13px;}

/* CONTROL BAR */
.cbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--viiv-border-light);flex-wrap:wrap;}
.cbar-main{display:flex;align-items:center;gap:4px;flex:1;flex-wrap:wrap;min-width:0;}
.adj-grps{display:flex;align-items:center;gap:4px;flex-wrap:nowrap;}
.cbar-actions{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;}
.adj-grp{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.cbar input[type=search]{height:30px;padding:0 10px;border:1px solid var(--viiv-border);border-radius:6px;font-family:'Sarabun',sans-serif;font-size:12.5px;color:var(--viiv-text);outline:none;width:180px;background:#fff;}
.cbar input[type=search]:focus{border-color:var(--viiv-gold);}
.cbar select{height:30px;padding:0 8px;border:1px solid var(--viiv-border);border-radius:6px;font-family:'Sarabun',sans-serif;font-size:12.5px;color:var(--viiv-text);outline:none;background:#fff;width:150px;}
.cbar select:focus{border-color:var(--viiv-gold);}
.cbar-sep{width:1px;height:20px;background:var(--viiv-border-light);margin:0 2px;}
.cbar-lbl{font-size:11px;color:var(--viiv-text-muted);white-space:nowrap;display:flex;align-items:center;gap:3px;}
.adj-inp{height:28px;padding:0 7px;border:1px solid var(--viiv-border-light);border-radius:6px;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;color:var(--viiv-text);outline:none;width:80px;background:var(--viiv-gold-light);}
.adj-inp:focus{border-color:var(--viiv-gold);background:#fff;}
.adj-inp::placeholder{color:#ccc;font-weight:400;font-size:11.5px;}
.adj-prev{font-size:11px;font-weight:700;min-width:28px;}
.adj-prev.pos{color:var(--viiv-success);}
.adj-prev.neg{color:var(--viiv-danger);}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot-cost{background:#e07a00;}
.dot-sell{background:var(--viiv-success);}
.dot-min{background:var(--viiv-danger);}

/* BUTTONS */
.btn{height:30px;padding:0 14px;border:none;border-radius:6px;font-family:'Sarabun',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:all .15s;}
.btn-gold{background:var(--viiv-gold);color:var(--viiv-gold-text);}
.btn-gold:hover{background:#d4a832;}
.btn-ghost{background:transparent;color:var(--viiv-text);border:1px solid var(--viiv-border);}
.btn-ghost:hover{background:var(--viiv-gold-light);}

/* SEL BAR */
.sbar{display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--viiv-gold-light);border-bottom:1px solid var(--viiv-border-light);}
.sbar .sp{flex:1;}
.sbar-cnt{font-size:12px;font-weight:700;color:var(--viiv-gold-text);}
.sbar-vis{font-size:11px;color:var(--viiv-text-muted);}

/* GRID */
.product-area{overflow-y:auto;max-height:calc(100vh - 260px);}
.product-area::-webkit-scrollbar{width:4px;}
.product-area::-webkit-scrollbar-thumb{background:var(--viiv-border);border-radius:2px;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;padding:12px 16px;}
.pcard{border:1.5px solid var(--viiv-border-light);border-radius:var(--r);background:#fff;padding:9px 9px 9px 8px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;gap:7px;align-items:flex-start;user-select:none;}
.pcard:hover{border-color:var(--viiv-gold);}
.pcard.sel{border-color:var(--viiv-gold);background:var(--viiv-gold-light);}
.pchk{width:15px;height:15px;min-width:15px;border:1.5px solid #ddd;border-radius:4px;background:#fff;display:flex;align-items:center;justify-content:center;margin-top:1px;font-size:9px;color:#fff;transition:all .12s;}
.pcard.sel .pchk{background:var(--viiv-gold);border-color:var(--viiv-gold);}
.pimg{width:34px;height:34px;border-radius:6px;background:var(--viiv-gold-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.pinfo{flex:1;min-width:0;}
.pname{font-weight:600;font-size:12px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:3px;}
.pcat{font-size:10.5px;color:var(--viiv-text-muted);margin-bottom:3px;}
.pprices{display:flex;flex-direction:column;gap:1px;}
.ppr{display:flex;justify-content:space-between;font-size:10.5px;align-items:center;gap:3px;}
.ppl{color:var(--viiv-text-muted);display:flex;align-items:center;gap:3px;}
.ppv{font-weight:700;font-size:11px;}
.ppv.cost{color:#e07a00;}.ppv.sell{color:var(--viiv-success);}.ppv.min{color:var(--viiv-danger);}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:#fff;border-radius:12px;padding:24px;width:440px;max-width:94vw;box-shadow:0 16px 48px rgba(0,0,0,.18);animation:mIn .18s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mtitle{font-size:15px;font-weight:700;margin-bottom:14px;}
.msum{background:var(--viiv-gold-light);border:1px solid var(--viiv-border-light);border-radius:7px;padding:10px 12px;margin-bottom:12px;font-size:12.5px;}
.msum table{width:100%;border-collapse:collapse;}
.msum td{padding:2px 5px;}
.msum td:last-child{text-align:right;font-weight:700;}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

/* LOG */
.log-row{padding:8px 16px;display:flex;align-items:center;gap:6px;border-top:1px solid var(--viiv-border-light);}
.log-panel{border-top:1px solid var(--viiv-border-light);display:none;}
.log-panel.open{display:block;}
.log-hd{padding:8px 16px;font-weight:700;font-size:12px;color:var(--viiv-text-muted);background:var(--viiv-gold-light);text-transform:uppercase;letter-spacing:.4px;}
.ltbl{width:100%;border-collapse:collapse;font-size:12px;}
.ltbl th{padding:6px 10px;text-align:left;font-weight:600;color:var(--viiv-text-muted);border-bottom:1px solid var(--viiv-border-light);font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;background:#fafafa;}
.ltbl td{padding:7px 10px;border-bottom:1px solid var(--viiv-border-light);}
.ltbl tr:last-child td{border-bottom:none;}
.ltbl tr:hover td{background:var(--viiv-gold-light);}
.badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10.5px;font-weight:600;}
.bg{background:var(--viiv-gold);color:var(--viiv-gold-text);}
.bb{background:#ebf8ff;color:#2b6cb0;}
.bk{background:var(--viiv-success-light);color:var(--viiv-success);}
.empty{text-align:center;padding:40px 20px;color:var(--viiv-text-muted);font-size:13px;}
.btn-ghost-active{background:var(--viiv-gold-light);border-color:var(--viiv-gold);color:var(--viiv-gold-text);}
.log-view{display:none;padding:12px 16px;}
.log-view.open{display:block;}
.log-filter{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.log-filter input{height:28px;padding:0 8px;border:1px solid var(--viiv-border);border-radius:6px;font-family:'Sarabun',sans-serif;font-size:12px;color:var(--viiv-text);outline:none;background:#fff;}
.log-filter input:focus{border-color:var(--viiv-gold);}
.log-filter input[type=search]{width:160px;}
.log-filter input[type=date]{width:130px;}
.log-filter label{font-size:11px;color:var(--viiv-text-muted);}
.lcard{border:1px solid var(--viiv-border-light);border-radius:8px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:border-color .15s;}
.lcard:hover{border-color:var(--viiv-gold);background:var(--viiv-gold-light);}
.lcard-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.lcard-no{font-size:11px;color:var(--viiv-text-muted);min-width:20px;}
.lcard-dt{font-size:12px;font-weight:600;}
.lcard-user{padding:1px 7px;border-radius:12px;background:#ebf8ff;color:#2b6cb0;font-size:11px;font-weight:600;}
.lcard-cat{font-size:11px;color:var(--viiv-text-muted);}
.lcard-sp{flex:1;}
.lcard-cnt{padding:1px 8px;border-radius:12px;background:var(--viiv-gold);color:var(--viiv-gold-text);font-size:11px;font-weight:700;}
.lcard-detail{display:flex;gap:6px;flex-wrap:wrap;}
.lcard-tag{padding:1px 7px;border-radius:10px;background:var(--viiv-success-light);color:var(--viiv-success);font-size:11px;font-weight:600;}
.lcard-skus{font-size:10.5px;color:var(--viiv-text-muted);margin-top:3px;line-height:1.5;}
.log-empty{text-align:center;padding:32px;color:var(--viiv-text-muted);font-size:13px;}
.sku-modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;align-items:center;justify-content:center;}
.sku-modal-ov.open{display:flex;}
.sku-modal{background:#fff;border-radius:12px;padding:20px;width:460px;max-width:94vw;box-shadow:0 16px 48px rgba(0,0,0,.18);animation:mIn .18s ease;max-height:80vh;overflow-y:auto;}
.sku-modal-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.sku-table{width:100%;border-collapse:collapse;font-size:12px;}
.sku-table th{padding:6px 8px;text-align:left;font-size:11px;font-weight:600;color:var(--viiv-text-muted);border-bottom:1px solid var(--viiv-border-light);background:#fafafa;}
.sku-table td{padding:6px 8px;border-bottom:1px solid var(--viiv-border-light);}
.sku-table tr:last-child td{border-bottom:none;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:#222;color:#fff;padding:9px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;transition:transform .28s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--viiv-success);}
.toast.warn{background:#c8860a;}
</style>
</head>
<body>

<div class="cbar">
  <div class="cbar-main">
    <input type="search" id="srQ" placeholder="ค้นหาชื่อ / SKU…" oninput="doFilter()">
    <select id="srCat" onchange="doFilter()"><option value="">หมวดหมู่ทั้งหมด</option></select>
    <div class="cbar-sep"></div>
    <div class="adj-grps">
      <div class="adj-grp">
        <span class="cbar-lbl"><span class="dot dot-cost"></span> ทุน</span>
        <input type="number" class="adj-inp" id="aC" placeholder="-5/+10" step="0.01" oninput="updPrev('aC','pvC')">
        <span class="adj-prev" id="pvC"></span>
      </div>
      <div class="adj-grp">
        <span class="cbar-lbl"><span class="dot dot-sell"></span> ขาย</span>
        <input type="number" class="adj-inp" id="aS" placeholder="-10/+20" step="0.01" oninput="updPrev('aS','pvS')">
        <span class="adj-prev" id="pvS"></span>
      </div>
      <div class="adj-grp">
        <span class="cbar-lbl"><span class="dot dot-min"></span> ต่ำสุด</span>
        <input type="number" class="adj-inp" id="aM" placeholder="-5/+5" step="0.01" oninput="updPrev('aM','pvM')">
        <span class="adj-prev" id="pvM"></span>
      </div>
    </div>
  </div>
  <div class="cbar-actions">
    <button class="btn btn-gold" id="btnApply" onclick="openConf()">ปรับราคาที่เลือก</button>
    <button class="btn btn-ghost" id="btnLog" onclick="togLogView()">ประวัติ</button>
  </div>
</div>

<div id="product-wrap">
<div class="sbar">
  <button class="btn btn-ghost" style="height:26px;font-size:11.5px;" onclick="togAll()">เลือกทั้งหมด</button>
  <button class="btn btn-ghost" style="height:26px;font-size:11.5px;" onclick="clrAll()">ยกเลิก</button>
  <span class="sbar-cnt" id="selCnt">เลือก 0 รายการ</span>
  <span class="sp"></span>
  <span class="sbar-vis">แสดง <span id="visCnt">0</span> รายการ</span>
</div>

<div class="product-area">
  <div class="pgrid" id="pgrid"></div>
  <div id="empt" class="empty" style="display:none">ไม่พบสินค้า</div>
</div>
</div>

<div class="log-view" id="logView">
  <div class="log-filter">
    <label>ค้นหา</label>
    <input type="search" id="logQ" placeholder="ผู้ปรับ / หมวดหมู่…" oninput="renderLog()">
    <label>ตั้งแต่</label>
    <input type="date" id="logFrom" onchange="renderLog()">
    <label>ถึง</label>
    <input type="date" id="logTo" onchange="renderLog()">
    <button class="btn btn-ghost" style="height:28px;font-size:11.5px;" onclick="document.getElementById('logFrom').value='';document.getElementById('logTo').value='';document.getElementById('logQ').value='';renderLog()">ล้าง</button>
  </div>
  <div id="lbody"></div>
</div>

<div class="sku-modal-ov" id="skuMo">
  <div class="sku-modal">
    <div class="sku-modal-title">
      <span id="skuMoTitle">รายละเอียด</span>
      <button class="btn btn-ghost" style="height:26px;padding:0 10px;font-size:12px;" onclick="document.getElementById('skuMo').classList.remove('open')">✕</button>
    </div>
    <table class="sku-table">
      <thead><tr><th>SKU/ID</th><th>ชื่อสินค้า</th><th>ทุน</th><th>ขาย</th><th>ต่ำสุด</th></tr></thead>
      <tbody id="skuMoBody"></tbody>
    </table>
  </div>
</div>
<div class="modal-ov" id="mOv">
  <div class="modal">
    <div class="mtitle">ยืนยันการปรับราคาแบบกลุ่ม</div>
    <div class="msum" id="mSum"></div>
    <div style="font-size:12px;color:var(--viiv-danger)">การกระทำนี้จะปรับราคาสินค้าที่เลือกทันที กรุณาตรวจสอบก่อนยืนยัน</div>
    <div class="mfoot">
      <button class="btn btn-ghost" onclick="closeConf()">ยกเลิก</button>
      <button class="btn btn-gold" onclick="doApply()">ยืนยันปรับราคา</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var TOKEN='',API_BASE='',products=[],visIds=[],priceLog=[],logOpen=false;
function _tok_sort(e){if(e&&e.detail&&e.detail.token)TOKEN=e.detail.token;init();}
window.removeEventListener('viiv_token_ready',window._tok_sort);
window._tok_sort=_tok_sort;
window.addEventListener('viiv_token_ready',_tok_sort);
var _t=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
if(_t)_tok_sort({detail:{token:_t}});
function init(){
  API_BASE=window.API_BASE||'';
  try{var s=localStorage.getItem('viiv_bulk_log');if(s)priceLog=JSON.parse(s);}catch(e){}
  updLogBadge();loadCats();loadProducts();
}
var CAT_MAP={};
async function loadCats(){
  try{
    var r=await fetch(API_BASE+'/api/pos/categories/list',{headers:{'Authorization':'Bearer '+TOKEN}});
    if(!r.ok)return;
    var cats=await r.json();
    var sel=document.getElementById('srCat');
    cats.forEach(function(ct){
      CAT_MAP[ct.id]=ct.name;
      var o=document.createElement('option');
      o.value=ct.id;
      o.textContent=(ct.icon?ct.icon+' ':'')+ct.name;
      sel.appendChild(o);
    });
  }catch(e){}
}
async function loadProducts(){
  try{
    var r=await fetch(API_BASE+'/api/pos/products/list',{headers:{'Authorization':'Bearer '+TOKEN}});
    if(!r.ok)return;
    var data=await r.json();
    products=(data.items||data).map(function(p){return Object.assign({},p,{selected:false});});
    visIds=products.map(function(p){return p.id;});
    renderGrid();
  }catch(e){console.error('loadProducts',e);}
}
function doFilter(){


  var q=document.getElementById('srQ').value.trim().toLowerCase();
  var cat=document.getElementById('srCat').value;
  visIds=products.filter(function(p){
    var catName=CAT_MAP[cat]||cat;
    var mc=!cat||(p.category===catName||p.category_name===catName||p.category===cat);
    var mq=!q||(p.name||'').toLowerCase().includes(q)||(p.sku||'').toLowerCase().includes(q);
    return mc&&mq;
  }).map(function(p){return p.id;});
  renderGrid();
}
function renderGrid(){
  var grid=document.getElementById('pgrid'),empt=document.getElementById('empt');
  if(visIds.length===0){grid.style.display='none';empt.style.display='block';updSelCnt();return;}
  grid.style.display='grid';empt.style.display='none';
  grid.innerHTML=visIds.map(function(id){
    var p=products.find(function(x){return x.id===id;});
    var icon=p.icon||p.emoji||'📦';
    var cat=p.category_name||p.cat||'';
    var cost=+(p.price_cost||p.cost||0);
    var sell=+(p.price_sell||p.price||0);
    var min=+(p.price_min||p.min_price||0);
    return '<div class="pcard'+(p.selected?' sel':'')+'" onclick="togCard(\''+p.id+'\')" id="pc_'+p.id+'">'
      +'<div class="pchk">'+(p.selected?'✓':'')+'</div>'
      +'<div class="pimg">'+icon+'</div>'
      +'<div class="pinfo">'
        +'<div class="pname">'+(p.name||'')+'</div>'
        +'<div class="pcat">'+cat+'</div>'
        +'<div class="pprices">'
          +'<div class="ppr"><span class="ppl"><span class="dot dot-cost"></span>ทุน</span><span class="ppv cost">'+cost.toLocaleString()+'</span></div>'
          +'<div class="ppr"><span class="ppl"><span class="dot dot-sell"></span>ขาย</span><span class="ppv sell">'+sell.toLocaleString()+'</span></div>'
          +'<div class="ppr"><span class="ppl"><span class="dot dot-min"></span>ต่ำสุด</span><span class="ppv min">'+min.toLocaleString()+'</span></div>'
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');
  document.getElementById('visCnt').textContent=visIds.length;
  updSelCnt();
}
function togCard(id){
  var p=products.find(function(x){return x.id===id;});
  p.selected=!p.selected;
  var c=document.getElementById('pc_'+id);
  c.classList.toggle('sel',p.selected);
  c.querySelector('.pchk').textContent=p.selected?'✓':'';
  updSelCnt();
}
function togAll(){
  var allSel=visIds.every(function(id){return products.find(function(x){return x.id===id;}).selected;});
  visIds.forEach(function(id){products.find(function(x){return x.id===id;}).selected=!allSel;});
  renderGrid();
}
function clrAll(){products.forEach(function(p){p.selected=false;});renderGrid();}
function selByCat(){
  var cat=document.getElementById('srCat').value;
  visIds.forEach(function(id){
    var p=products.find(function(x){return x.id===id;});
    p.selected=cat?(p.category_id===cat||p.cat_id===cat||p.category===cat||String(p.category_id)===String(cat)||String(p.cat_id)===String(cat)):true;
  });
  renderGrid();
}
function updSelCnt(){document.getElementById('selCnt').textContent='\u0e40\u0e25\u0e37\u0e2d\u0e01 '+products.filter(function(p){return p.selected;}).length+' \u0e23\u0e32\u0e22\u0e01\u0e32\u0e23';}
function updPrev(inp,pv){
  var v=parseFloat(document.getElementById(inp).value);
  var el=document.getElementById(pv);
  if(isNaN(v)||v===0){el.textContent='';el.className='adj-prev';return;}
  el.textContent=(v>0?'+':'')+v+'฿';
  el.className='adj-prev '+(v>0?'pos':'neg');
}
function openConf(){
  var sel=products.filter(function(p){return p.selected;});
  if(!sel.length){showToast('\u0e01\u0e23\u0e38\u0e13\u0e32\u0e40\u0e25\u0e37\u0e2d\u0e01\u0e2a\u0e34\u0e19\u0e04\u0e49\u0e32\u0e01\u0e48\u0e2d\u0e19','warn');return;}
  var aC=parseFloat(document.getElementById('aC').value)||0;
  var aS=parseFloat(document.getElementById('aS').value)||0;
  var aM=parseFloat(document.getElementById('aM').value)||0;
  if(!aC&&!aS&&!aM){showToast('\u0e01\u0e23\u0e38\u0e13\u0e32\u0e23\u0e30\u0e1a\u0e38\u0e08\u0e33\u0e19\u0e27\u0e19\u0e17\u0e35\u0e48\u0e15\u0e49\u0e2d\u0e07\u0e01\u0e32\u0e23\u0e1b\u0e23\u0e31\u0e1a','warn');return;}
  var cats={};
  sel.forEach(function(p){var k=p.category||p.category_name||p.cat||'\u0e44\u0e21\u0e48\u0e21\u0e35\u0e2b\u0e21\u0e27\u0e14';cats[k]=(cats[k]||0)+1;});
  var catStr=Object.entries(cats).map(function(e){return e[0]+'('+e[1]+')';}).join(', ');
  var f=function(v){return v===0?'—':(v>0?'+':'')+v+' ฿';};
  document.getElementById('mSum').innerHTML='<table>'
    +'<tr><td>สินค้าที่เลือก</td><td>'+sel.length+' รายการ</td></tr>'
    +'<tr><td>หมวดหมู่</td><td>'+catStr+'</td></tr>'
    +'<tr><td>ราคาทุน</td><td>'+f(aC)+'</td></tr>'
    +'<tr><td>ราคาขาย</td><td>'+f(aS)+'</td></tr>'
    +'<tr><td>ราคาต่ำสุด</td><td>'+f(aM)+'</td></tr>'
    +'</table>';
  document.getElementById('mOv').classList.add('open');
}
function closeConf(){document.getElementById('mOv').classList.remove('open');}
async function doApply(){
  var sel=products.filter(function(p){return p.selected;});
  var aC=parseFloat(document.getElementById('aC').value)||0;
  var aS=parseFloat(document.getElementById('aS').value)||0;
  var aM=parseFloat(document.getElementById('aM').value)||0;
  closeConf();
  sel.forEach(function(p){
    if(aC)p.price_cost=Math.max(0,(+(p.price_cost||0))+aC);
    if(aS)p.price_sell=Math.max(0,(+(p.price_sell||p.price||0))+aS);
    if(aM)p.price_min=Math.max(0,(+(p.price_min||0))+aM);
    p.selected=false;
  });
  var cats={};
  sel.forEach(function(p){var k=p.category||p.category_name||p.cat||'\u0e44\u0e21\u0e48\u0e21\u0e35\u0e2b\u0e21\u0e27\u0e14';cats[k]=(cats[k]||0)+1;});
  var entry={
    id:Date.now(),
    dt:new Date().toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'}),
    user:window.VIIV_STAFF_NAME||'staff',
    cats:Object.entries(cats).map(function(e){return e[0]+'('+e[1]+')';}).join(', '),
    count:sel.length,
    detail:[aC?'\u0e17\u0e38\u0e19'+(aC>0?'+':'')+aC+'B':'',aS?'\u0e02\u0e32\u0e22'+(aS>0?'+':'')+aS+'B':'',aM?'\u0e15\u0e48\u0e33\u0e2a\u0e38\u0e14'+(aM>0?'+':'')+aM+'B':''].filter(Boolean).join(', '),
    ids:sel.map(function(p){return p.sku||p.id;}),
    skus:sel.map(function(p){return {id:p.sku||p.id,name:p.name,cost:p.price_cost||0,sell:p.price_sell||0,min:p.price_min||0};})
  };
  priceLog.unshift(entry);
  try{localStorage.setItem('viiv_bulk_log',JSON.stringify(priceLog.slice(0,50)));}catch(e){}
  ['aC','aS','aM'].forEach(function(id){document.getElementById(id).value='';});
  ['pvC','pvS','pvM'].forEach(function(id){var el=document.getElementById(id);el.textContent='';el.className='adj-prev';});
  renderGrid();renderLog();updLogBadge();
  showToast('\u0e1b\u0e23\u0e31\u0e1a\u0e23\u0e32\u0e04\u0e32 '+sel.length+' \u0e23\u0e32\u0e22\u0e01\u0e32\u0e23\u0e40\u0e23\u0e35\u0e22\u0e1a\u0e23\u0e49\u0e2d\u0e22','success');
}
function togLogView(){
  logOpen=!logOpen;
  document.getElementById('logView').classList.toggle('open',logOpen);
  document.getElementById('product-wrap').style.display=logOpen?'none':'block';
  var btn=document.getElementById('btnLog');
  btn.classList.toggle('btn-ghost-active',logOpen);
  btn.textContent=logOpen?'ปิดประวัติ':'ประวัติ';
  if(logOpen)renderLog();
}
function renderLog(){
  var wrap=document.getElementById('lbody');
  var q=(document.getElementById('logQ')||{value:''}).value.trim().toLowerCase();
  var from=(document.getElementById('logFrom')||{value:''}).value;
  var to=(document.getElementById('logTo')||{value:''}).value;
  var filtered=priceLog.filter(function(l,i){
    var mq=!q||(l.user||'').toLowerCase().includes(q)||(l.cats||'').toLowerCase().includes(q)||(l.detail||'').toLowerCase().includes(q);
    var dt=l.dt||'';
    var mf=!from||dt>=from;
    var mt=!to||dt<=to+'z';
    return mq&&mf&&mt;
  });
  if(!filtered.length){
    wrap.innerHTML='<div class="log-empty">ไม่พบประวัติ</div>';
    return;
  }
  wrap.innerHTML=filtered.map(function(l,i){
    var skuHtml='';
    if(l.ids&&l.ids.length){
      var preview=l.ids.slice(0,5).join(', ')+(l.ids.length>5?' +'.concat(l.ids.length-5,' รายการ'):'');
      skuHtml='<div class="lcard-skus">'+preview+'</div>';
    }
    var tags=l.detail.split(',').map(function(d){return '<span class="lcard-tag">'+d.trim()+'</span>';}).join('');
    return '<div class="lcard" onclick="openSkuModal('+l.id+')">'
      +'<div class="lcard-top">'
        +'<span class="lcard-no">#'+(filtered.length-i)+'</span>'
        +'<span class="lcard-dt">'+l.dt+'</span>'
        +'<span class="lcard-user">'+l.user+'</span>'
        +'<span class="lcard-cat">'+l.cats+'</span>'
        +'<span class="lcard-sp"></span>'
        +'<span class="lcard-cnt">'+l.count+' ชิ้น</span>'
      +'</div>'
      +'<div class="lcard-detail">'+tags+'</div>'
      +skuHtml
    +'</div>';
  }).join('');
}
function openSkuModal(lid){
  var l=priceLog.find(function(x){return x.id===lid;});
  if(!l)return;
  var mo=document.getElementById('skuMo');
  document.getElementById('skuMoTitle').textContent='รายละเอียด #'+l.dt+' ('+l.count+' รายการ)';
  var rows='';
  if(l.skus&&l.skus.length){
    rows=l.skus.map(function(s){
      return '<tr><td>'+s.id+'</td><td>'+s.name+'</td>'
        +'<td style="text-align:right;color:#e07a00">'+s.cost+'</td>'
        +'<td style="text-align:right;color:var(--viiv-success)">'+s.sell+'</td>'
        +'<td style="text-align:right;color:var(--viiv-danger)">'+s.min+'</td></tr>';
    }).join('');
  } else if(l.ids){
    rows=l.ids.map(function(id){return '<tr><td colspan="5">'+id+'</td></tr>';}).join('');
  }
  document.getElementById('skuMoBody').innerHTML=rows||'<tr><td colspan="5" style="text-align:center;color:var(--viiv-text-muted)">ไม่มีข้อมูล SKU</td></tr>';
  mo.classList.add('open');
}
function updLogBadge(){
  var btn=document.getElementById('btnLog');
  if(btn) btn.textContent=logOpen?'\u0e1b\u0e34\u0e14\u0e1b\u0e23\u0e30\u0e27\u0e31\u0e15\u0e34':'\u0e1b\u0e23\u0e30\u0e27\u0e31\u0e15\u0e34'+(priceLog.length?' ('+priceLog.length+')':'');
}
function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'');
  setTimeout(function(){t.className='toast';},2600);
}
</script>
