<body>
<div style="padding:4px 0;">
  <div style="font-size:12px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;">พิมพ์สต็อกสินค้า</div>
  <div style="background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px;margin-bottom:12px;">
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;">
      <button id="wpSelectAll" style="height:28px;padding:0 12px;border:1px solid #d4b866;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;font-family:Sarabun,sans-serif;">✓ เลือกทั้งหมด</button>
      <button id="wpDeselectAll" style="height:28px;padding:0 12px;border:1px solid #d1d5db;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;font-family:Sarabun,sans-serif;">✗ ยกเลิกทั้งหมด</button>
      <select id="wpCatFilter" style="height:28px;padding:0 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;background:#fff;font-family:Sarabun,sans-serif;outline:none;">
        <option value="">ทุกหมวดหมู่</option>
      </select>
      <input id="wpSearch" placeholder="ค้นหาชื่อ / SKU..." style="flex:1;min-width:140px;height:28px;padding:0 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:Sarabun,sans-serif;outline:none;box-sizing:border-box;">
    </div>
    <div id="wpList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;max-height:320px;overflow-y:auto;"></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span id="wpCount" style="font-size:12px;color:#6b7280;"></span>
    <button id="wpPrintBtn" style="height:34px;padding:0 20px;border:none;border-radius:8px;background:#e8b93e;color:#1a1200;font-weight:700;font-size:13px;cursor:pointer;font-family:Sarabun,sans-serif;">🖨️ พิมพ์สต็อก</button>
  </div>
</div>
<script>
(function(){
var API=window.API_BASE||'';
var TOKEN=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
var _all=[],_selected=new Set(),_filtered=[];

function load(){
  fetch(API+'/api/pos/products/list',{headers:{'Authorization':'Bearer '+TOKEN}})
  .then(function(r){return r.json();})
  .then(function(d){
    _all=(d.items||d||[]).filter(function(p){return p.status!=='inactive';});
    var cats=[...new Set(_all.map(function(p){return p.category;}).filter(Boolean))];
    var sel=document.getElementById('wpCatFilter');
    cats.forEach(function(cat){
      var op=document.createElement('option');op.value=cat;op.textContent=cat;sel.appendChild(op);
    });
    _all.forEach(function(p){_selected.add(p.id);});
    filterAndRender();
  });
}

function filterAndRender(){
  var q=document.getElementById('wpSearch').value.toLowerCase();
  var cat=document.getElementById('wpCatFilter').value;
  _filtered=_all.filter(function(p){
    return (!q||(p.name||'').toLowerCase().includes(q)||(p.sku||'').toLowerCase().includes(q))
      &&(!cat||p.category===cat);
  });
  renderList();updateCount();
}

function renderList(){
  var el=document.getElementById('wpList');
  el.innerHTML=_filtered.map(function(p){
    var chk=_selected.has(p.id);
    return '<label style="display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid '+(chk?'#e8b93e':'#e5e5e5')+';border-radius:7px;cursor:pointer;font-size:12px;background:'+(chk?'#fdf6e3':'#fff')+';transition:.1s;">'
      +'<input type="checkbox" '+(chk?'checked':'')+' data-id="'+p.id+'" style="accent-color:#e8b93e;flex-shrink:0;">'
      +'<div><div style="font-weight:600;">'+p.name+'</div>'
      +(p.sku?'<div style="font-size:10.5px;color:#9ca3af;">'+p.sku+'</div>':'')
      +'</div></label>';
  }).join('');
  el.querySelectorAll('input[type=checkbox]').forEach(function(cb){
    cb.addEventListener('change',function(){
      var id=this.getAttribute('data-id');
      if(this.checked)_selected.add(id);else _selected.delete(id);
      renderList();updateCount();
    });
  });
}

function updateCount(){
  document.getElementById('wpCount').textContent='เลือกแล้ว '+_selected.size+' รายการ';
}

document.getElementById('wpSelectAll').addEventListener('click',function(){
  _filtered.forEach(function(p){_selected.add(p.id);});renderList();updateCount();
});
document.getElementById('wpDeselectAll').addEventListener('click',function(){
  _filtered.forEach(function(p){_selected.delete(p.id);});renderList();updateCount();
});
document.getElementById('wpSearch').addEventListener('input',filterAndRender);
document.getElementById('wpCatFilter').addEventListener('change',filterAndRender);

document.getElementById('wpPrintBtn').addEventListener('click',function(){
  var prods=_all.filter(function(p){return _selected.has(p.id);});
  if(!prods.length){alert('กรุณาเลือกสินค้าอย่างน้อย 1 รายการ');return;}
  // จัดกลุ่มตามหมวดหมู่
  var groups={};
  prods.forEach(function(p){
    var cat=p.category||'ไม่มีหมวดหมู่';
    if(!groups[cat])groups[cat]=[];
    groups[cat].push(p);
  });
  var bodyHtml='';
  Object.keys(groups).forEach(function(cat){
    bodyHtml+='<tr class="cat-row"><td colspan="7">'+cat+'</td></tr>';
    var gIdx=0;
    groups[cat].forEach(function(p){
      gIdx++;
      bodyHtml+='<tr>'
        +'<td style="text-align:center;color:#9ca3af;">'+gIdx+'</td>'
        +'<td style="color:#6b7280;">'+(p.sku||'-')+'</td>'
        +'<td>'+p.name+'</td>'
        +'<td style="text-align:center;">'+(p.stock_qty!=null?p.stock_qty:0)+'</td>'
        +'<td style="text-align:center;">'+(p.stock_back!=null?p.stock_back:0)+'</td>'
        +'<td style="text-align:center;"><div style="border-bottom:1px solid #555;width:44px;margin:0 auto;">&nbsp;</div></td>'
        +'<td><div style="border-bottom:1px solid #ccc;width:100%;">&nbsp;</div></td>'
        +'</tr>';
    });
  });
  var w=window.open('','_blank','width=900,height=700');
  w.document.write('<html><head><title>พิมพ์สต็อกสินค้า</title>'
    +'<style>'
    +'body{font-family:Sarabun,sans-serif;font-size:11px;padding:10mm 12mm;}'
    +'table{width:100%;border-collapse:collapse;}'
    +'th{background:#e8b93e;color:#1a1200;padding:3px 5px;text-align:left;font-size:10px;border-bottom:1px solid #d1d5db;}'
    +'td{padding:2px 5px;font-size:10.5px;line-height:1.3;border-bottom:1px solid #f0f0f0;}'
    +'.cat-row td{background:#f5f5f5;font-weight:700;font-size:10px;padding:2px 5px;border-bottom:1px solid #ddd;}'
    +'@media print{button{display:none;}@page{margin:8mm;}}'
    +'</style>'
    +'</head><body>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'
      +'<b style="font-size:13px;">ตรวจนับสต็อกสินค้า</b>'
      +'<span style="font-size:10px;">วันที่: _______________</span>'
    +'</div>'
    +'<table><thead><tr>'
      +'<th style="width:30px;">#</th>'
      +'<th style="width:70px;">รหัส</th>'
      +'<th>ชื่อสินค้า</th>'
      +'<th style="width:55px;text-align:center;">หน้าร้าน</th>'
      +'<th style="width:55px;text-align:center;">หลังร้าน</th>'
      +'<th style="width:60px;text-align:center;">เช็คสต็อก</th>'
      +'<th style="width:100px;">หมายเหตุ</th>'
    +'</tr></thead><tbody>'+bodyHtml+'</tbody></table>'
    +'<script>window.print();<\/script></body></html>');
  w.document.close();
});

load();
})();
</script>
</body>
