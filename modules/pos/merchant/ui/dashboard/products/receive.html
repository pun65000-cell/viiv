<style>
:root{--g:#E8B93E;--gt:#1a1200;--bd:#d4b866;--bl:#ede8d8;--gl:#fdf6e3;--mu:#888;--red:#e53e3e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Sarabun",sans-serif;font-size:13px;}
.rv-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bl);}
.btn{height:32px;padding:0 14px;border:none;border-radius:7px;font-family:"Sarabun",sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.btn-g{background:var(--g);color:var(--gt);}
.btn-g:disabled{background:#e5e7eb;color:#9ca3af;cursor:not-allowed;}
.btn-gh{background:#fff;border:1px solid var(--bd);color:#1a1a1a;}
.btn-gh:hover,.btn-g:hover:not(:disabled){opacity:.85;}
.btn-r{background:#fee2e2;border:1px solid #fca5a5;color:var(--red);}
.rv-list{padding:12px 16px;}
.rv-empty{text-align:center;padding:40px;color:var(--mu);}
.rv-card{border:1px solid var(--bl);border-radius:9px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.rv-card:hover{border-color:var(--g);background:var(--gl);}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;}
.mo.open{display:flex;}
.mo-box{background:#fff;border-radius:14px;width:min(640px,96vw);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.mo-box::-webkit-scrollbar{width:4px;}
.mo-box::-webkit-scrollbar-thumb{background:var(--bd);}
.mo-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bl);}
.mo-bd{padding:14px 18px;}
.mo-ft{display:flex;align-items:center;gap:8px;padding:12px 18px;border-top:1px solid var(--bl);}
.sp{flex:1;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.lbl{font-size:11px;font-weight:600;color:var(--mu);display:block;margin-bottom:3px;}
.inp{width:100%;height:30px;padding:0 8px;border:1px solid #d1d5db;border-radius:6px;font-family:"Sarabun",sans-serif;font-size:12.5px;outline:none;}
.inp:focus{border-color:var(--g);}
.inp-g{border-color:var(--bd);background:var(--gl);}
.sec{font-size:11px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--bl);}
.ac-w{position:relative;}
.ac-d{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--bd);border-radius:7px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:500;max-height:180px;overflow-y:auto;display:none;}
.ac-i{padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--bl);font-size:12px;}
.ac-i:hover{background:var(--gl);}
.ac-s{font-size:10.5px;color:var(--mu);}
.itbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:6px;}
.itbl th{background:var(--gl);padding:5px 7px;text-align:left;font-size:10.5px;font-weight:700;color:var(--mu);border-bottom:1px solid var(--bl);}
.itbl td{padding:4px 6px;border-bottom:1px solid var(--bl);vertical-align:middle;}
.ii{width:100%;height:26px;padding:0 5px;border:1px solid #d1d5db;border-radius:5px;font-family:"Sarabun",sans-serif;font-size:12px;outline:none;}
.ii:focus{border-color:var(--g);}
.xb{height:22px;width:22px;border:none;border-radius:4px;background:#fee2e2;color:var(--red);cursor:pointer;}
.req{color:var(--red);}
</style>
<div class="rv-hd">
  <div style="font-size:13px;font-weight:700;">รับสินค้า</div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-gh" onclick="openHist()">&#128203; ประวัติ</button>
    <button class="btn btn-gh" onclick="printBlank()">&#128424; ฟอร์มเปล่า</button>
    <button class="btn btn-g" onclick="openRcModal()">+ รับสินค้า</button>
  </div>
</div>
<div class="rv-list" id="rvList"><div class="rv-empty">กด "+ รับสินค้า" เพื่อบันทึกรายการ</div></div>
<div class="mo" id="rcMo">
  <div class="mo-box">
    <div class="mo-hd"><b>บันทึกรับสินค้า</b><button class="btn btn-gh" style="height:26px;padding:0 10px;" onclick="closeRcModal()">&#10005;</button></div>
    <div class="mo-bd">
      <div class="row2">
        <div><label class="lbl">คู่ค้า / ผู้จำหน่าย</label>
          <div class="ac-w"><input class="inp inp-g" id="rcPQ" placeholder="ค้นหาชื่อ / รหัส / เบอร์..." oninput="srchP(this.value)" autocomplete="off">
          <div class="ac-d" id="rcPD"></div></div>
          <input type="hidden" id="rcPId"><input type="hidden" id="rcPN"><input type="hidden" id="rcPC">
          <div id="rcPR" style="font-size:11px;color:var(--g);margin-top:3px;display:none;"></div>
          <button class="btn btn-gh" style="margin-top:5px;height:26px;font-size:11px;" onclick="goPartner()">+ สร้างคู่ค้าใหม่</button>
        </div>
        <div><label class="lbl">หมายเหตุ</label><input class="inp" id="rcNote" placeholder="หมายเหตุ (ถ้ามี)"></div>
      </div>
      <div class="sec">รายการสินค้า <span class="req">*</span></div>
      <div class="ac-w" style="margin-bottom:8px;">
        <input class="inp" id="rcProdQ" placeholder="ค้นหาสินค้าเพื่อเพิ่ม..." oninput="srchProd(this.value)" autocomplete="off">
        <div class="ac-d" id="rcProdD"></div>
      </div>
      <table class="itbl">
        <thead><tr><th style="width:26px">#</th><th>สินค้า</th><th style="width:88px">ราคารับ</th><th style="width:68px">จำนวน<span class="req">*</span></th><th style="width:100px">คลัง</th><th style="width:72px">รวม</th><th style="width:24px"></th></tr></thead>
        <tbody id="rcIB"><tr><td colspan="7" style="text-align:center;padding:14px;color:var(--mu);">ยังไม่มีสินค้า</td></tr></tbody>
      </table>
      <div style="display:flex;justify-content:flex-end;gap:16px;font-size:12.5px;padding:4px 0;"><span>ยอดรวม</span><b style="color:var(--g);" id="rcTot">฿0.00</b></div>
      <div style="margin-top:8px;"><label class="lbl">รูปบิล / ใบสั่งซื้อ (ไม่บังคับ)</label>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <label style="display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 10px;border:1px solid var(--bd);border-radius:6px;cursor:pointer;font-size:12px;background:#fff;">
            &#128247; เลือกรูป / กล้อง
            <input type="file" id="rcBF" accept="image/*" capture="environment" onchange="prevBill(this)" style="display:none;">
          </label>
          <div id="rcBP" style="display:none;"><img id="rcBI" style="height:46px;border-radius:5px;border:1px solid var(--bl);"></div>
        </div>
      </div>
    </div>
    <div class="mo-ft"><button class="btn btn-gh" onclick="closeRcModal()">ยกเลิก</button><div class="sp"></div><button class="btn btn-g" id="rcSB" onclick="saveRc()" disabled>บันทึก</button></div>
  </div>
</div>
<div class="mo" id="delMo">
  <div class="mo-box" style="max-width:360px;">
    <div class="mo-hd"><b>ยืนยันการลบ</b></div>
    <div class="mo-bd"><p style="color:var(--mu);font-size:13px;margin-bottom:10px;">การลบจะบันทึกในระบบ 365 วัน</p>
      <label class="lbl">เหตุผล</label><input class="inp" id="delR" placeholder="ระบุเหตุผล...">
    </div>
    <div class="mo-ft"><button class="btn btn-gh" onclick="document.getElementById('delMo').classList.remove('open')">ยกเลิก</button><div class="sp"></div><button class="btn btn-r" id="delCB">ยืนยันลบ</button></div>
  </div>
</div>
<script>
(function(){
"use strict";
var API=window.API_BASE||"";
var TOKEN=window.VIIV_TOKEN||localStorage.getItem("viiv_token")||"";
var items=[];
var _pT=null,_pdT=null,_bf=null;

function tok(e){if(e&&e.detail&&e.detail.token)TOKEN=e.detail.token;init();}
window.removeEventListener("viiv_token_ready",window._tok_rc);
window._tok_rc=tok;
window.addEventListener("viiv_token_ready",tok);
var _t=window.VIIV_TOKEN||localStorage.getItem("viiv_token")||"";
if(_t)tok({detail:{token:_t}});

function init(){API=window.API_BASE||"";loadList();}

var _rvCache=[];
function loadList(){
  fetch(API+"/api/pos/receive/list?limit=20",{headers:{"Authorization":"Bearer "+TOKEN}})
  .then(function(r){return r.json();})
  .then(function(d){
    var el=document.getElementById("rvList");
    var its=d.items||[];
    _rvCache=its;
    if(!its.length){el.innerHTML='<div class="rv-empty">ยังไม่มีประวัติ — กด "+ รับสินค้า" เพื่อเริ่ม</div>';return;}
    el.innerHTML=its.map(function(r,i){
      var cnt=r.items?r.items.length:0;
      var dt=new Date(r.receive_date||r.created_at);
      var dtStr=dt.toLocaleDateString("th-TH",{year:"numeric",month:"short",day:"numeric"});
      return '<div class="rv-card" style="cursor:pointer;" onclick="rvOpenDetail('+i+')">'
        +'<div style="flex:1;min-width:0;">'
          +'<div style="font-weight:700;">'+(r.partner_name||"ไม่ระบุคู่ค้า")+'</div>'
          +'<div style="font-size:11px;color:var(--mu);">'+dtStr+" &middot; "+(r.staff_name||"-")+" &middot; "+cnt+" รายการ"+'</div>'
          +(r.note?'<div style="font-size:11px;color:var(--mu);">'+r.note+'</div>':'')
        +'</div>'
        +'<div style="font-weight:700;color:var(--g);margin-right:8px;">&#3647;'+parseFloat(r.total_amount||0).toLocaleString("th-TH",{minimumFractionDigits:2})+'</div>'
        +'<button class="btn btn-r" style="height:28px;font-size:11.5px;" onclick="event.stopPropagation();openDel('+"'"+r.id+"'"+')">&#128465; ลบ</button>'
        +'</div>';
    }).join("");
  }).catch(function(){});
}
window.rvOpenDetail=function(i){
  var r=_rvCache[i];
  if(!r)return;
  var dt=new Date(r.receive_date||r.created_at);
  var dtStr=dt.toLocaleDateString("th-TH",{year:"numeric",month:"long",day:"numeric"})+" "+dt.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
  var rows=(r.items||[]).map(function(it,n){
    return "<tr>"
      +"<td style='padding:6px 8px;border-bottom:1px solid #f3f4f6;text-align:center;'>"+(n+1)+"</td>"
      +"<td style='padding:6px 8px;border-bottom:1px solid #f3f4f6;font-weight:600;'>"+it.product_name+(it.sku?"<br><span style='font-size:10px;color:#9ca3af;'>"+it.sku+"</span>":"")+"</td>"
      +"<td style='padding:6px 8px;border-bottom:1px solid #f3f4f6;text-align:right;'>"+parseFloat(it.cost_price||0).toLocaleString("th-TH",{minimumFractionDigits:2})+"</td>"
      +"<td style='padding:6px 8px;border-bottom:1px solid #f3f4f6;text-align:center;'>"+it.qty+"</td>"
      +"<td style='padding:6px 8px;border-bottom:1px solid #f3f4f6;text-align:center;color:#6b7280;'>"+it.warehouse+"</td>"
      +"<td style='padding:6px 8px;border-bottom:1px solid #f3f4f6;text-align:right;font-weight:600;color:#e8b93e;'>"+parseFloat((it.qty||0)*(it.cost_price||0)).toLocaleString("th-TH",{minimumFractionDigits:2})+"</td>"
      +"</tr>";
  }).join("");
  var dm=document.createElement("div");
  dm.style.cssText="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.45);z-index:99999;display:flex;align-items:center;justify-content:center;";
  dm.innerHTML="<div style='background:#fff;border-radius:14px;width:min(640px,94vw);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;font-family:Sarabun,sans-serif;font-size:13px;'>"
    +"<div style='display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #ede8d8;flex-shrink:0;'>"
      +"<b style='font-size:14px;'>รายละเอียดการรับสินค้า</b>"
      +"<button id='rvDetClose' style='border:none;background:none;font-size:18px;cursor:pointer;line-height:1;'>&#10005;</button>"
    +"</div>"
    +"<div style='padding:14px 16px;overflow-y:auto;flex:1;'>"
      +"<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;background:#fdf6e3;border-radius:8px;padding:10px 12px;border:1px solid #ede8d8;'>"
        +"<div><div style='font-size:10px;color:#888;margin-bottom:2px;'>คู่ค้า</div><div style='font-weight:700;'>"+(r.partner_name||"ไม่ระบุ")+"</div></div>"
        +"<div><div style='font-size:10px;color:#888;margin-bottom:2px;'>วันที่รับ</div><div>"+dtStr+"</div></div>"
        +"<div><div style='font-size:10px;color:#888;margin-bottom:2px;'>ผู้บันทึก</div><div>"+(r.staff_name||"-")+"</div></div>"
        +(r.note?"<div><div style='font-size:10px;color:#888;margin-bottom:2px;'>หมายเหตุ</div><div>"+r.note+"</div></div>":"<div></div>")
      +"</div>"
      +(r.bill_image_url?"<div style='margin-bottom:12px;'><div style='font-size:10px;color:#888;margin-bottom:4px;'>รูปบิล</div><img src='"+r.bill_image_url+"' style='max-width:100%;border-radius:8px;border:1px solid #ede8d8;'></div>":"")
      +"<table style='width:100%;border-collapse:collapse;font-size:12px;'>"
        +"<thead><tr style='background:#fdf6e3;'>"
          +"<th style='padding:6px 8px;text-align:center;font-size:10.5px;color:#888;border-bottom:1px solid #ede8d8;'>#</th>"
          +"<th style='padding:6px 8px;text-align:left;font-size:10.5px;color:#888;border-bottom:1px solid #ede8d8;'>สินค้า</th>"
          +"<th style='padding:6px 8px;text-align:right;font-size:10.5px;color:#888;border-bottom:1px solid #ede8d8;'>ราคารับ</th>"
          +"<th style='padding:6px 8px;text-align:center;font-size:10.5px;color:#888;border-bottom:1px solid #ede8d8;'>จำนวน</th>"
          +"<th style='padding:6px 8px;text-align:center;font-size:10.5px;color:#888;border-bottom:1px solid #ede8d8;'>คลัง</th>"
          +"<th style='padding:6px 8px;text-align:right;font-size:10.5px;color:#888;border-bottom:1px solid #ede8d8;'>รวม</th>"
        +"</tr></thead>"
        +"<tbody>"+rows+"</tbody>"
        +"<tfoot><tr>"
          +"<td colspan='5' style='padding:8px;text-align:right;font-weight:700;border-top:2px solid #ede8d8;'>ยอดรวม</td>"
          +"<td style='padding:8px;text-align:right;font-weight:700;color:#e8b93e;border-top:2px solid #ede8d8;'>"+parseFloat(r.total_amount||0).toLocaleString("th-TH",{minimumFractionDigits:2})+"</td>"
        +"</tr></tfoot>"
      +"</table>"
    +"</div>"
  +"</div>";
  document.body.appendChild(dm);
  document.getElementById("rvDetClose").addEventListener("click",function(){dm.remove();});
  dm.addEventListener("click",function(e){if(e.target===dm)dm.remove();});
};
window.openRcModal=function(){
  items=[];_bf=null;
  ["rcPId","rcPN","rcPC","rcPQ","rcNote"].forEach(function(id){var e=document.getElementById(id);if(e)e.value="";});
  document.getElementById("rcPR").style.display="none";
  document.getElementById("rcBP").style.display="none";
  renderItems();
  document.getElementById("rcMo").classList.add("open");
};
window.closeRcModal=function(){document.getElementById("rcMo").classList.remove("open");};

var _pCache=[];
window.srchP=function(q){
  clearTimeout(_pT);
  var d=document.getElementById("rcPD");
  if(!q){d.style.display="none";return;}
  _pT=setTimeout(function(){
    fetch(API+"/api/pos/partners/list",{headers:{"Authorization":"Bearer "+TOKEN}})
    .then(function(r){return r.json();})
    .then(function(list){
      _pCache=(list||[]).filter(function(p){
        var lq=q.toLowerCase();
        return (p.company_name||"").toLowerCase().includes(lq)||(p.partner_code||"").includes(q)||(p.contact_phone||p.phone||"").includes(q);
      }).slice(0,6);
      if(!_pCache.length){d.style.display="none";return;}
      d.innerHTML=_pCache.map(function(p,i){
        return '<div class="ac-i" onclick="selP('+i+')">'
          +'<div>'+p.company_name+'</div>'
          +'<div class="ac-s">'+(p.partner_code||"")+(p.partner_code?" &middot; ":"")+(p.contact_phone||p.phone||"")+'</div></div>';
      }).join("");
      d.style.display="block";
    }).catch(function(){});
  },400);
};

window.selP=function(i){
  var p=_pCache[i];if(!p)return;
  document.getElementById("rcPId").value=p.id;
  document.getElementById("rcPN").value=p.company_name;
  document.getElementById("rcPC").value=p.partner_code||"";
  document.getElementById("rcPQ").value=p.company_name;
  document.getElementById("rcPD").style.display="none";
  var r=document.getElementById("rcPR");
  r.style.display="block";
  r.textContent=(p.partner_code?"["+p.partner_code+"] ":"")+(p.contact_phone||p.phone||"");
};
window.goPartner=function(){
  var _ent="company";
  var PROVINCES=["กรุงเทพมหานคร","กระบี่","กาญจนบุรี","กาฬสินธุ์","กำแพงเพชร","ขอนแก่น","จันทบุรี","ฉะเชิงเทรา","ชลบุรี","ชัยนาท","ชัยภูมิ","ชุมพร","เชียงราย","เชียงใหม่","ตรัง","ตราด","ตาก","นครนายก","นครปฐม","นครพนม","นครราชสีมา","นครศรีธรรมราช","นครสวรรค์","นนทบุรี","นราธิวาส","น่าน","บึงกาฬ","บุรีรัมย์","ปทุมธานี","ประจวบคีรีขันธ์","ปราจีนบุรี","ปัตตานี","พระนครศรีอยุธยา","พะเยา","พังงา","พัทลุง","พิจิตร","พิษณุโลก","เพชรบุรี","เพชรบูรณ์","แพร่","ภูเก็ต","มหาสารคาม","มุกดาหาร","แม่ฮ่องสอน","ยโสธร","ยะลา","ร้อยเอ็ด","ระนอง","ระยอง","ราชบุรี","ลพบุรี","ลำปาง","ลำพูน","เลย","ศรีสะเกษ","สกลนคร","สงขลา","สตูล","สมุทรปราการ","สมุทรสงคราม","สมุทรสาคร","สระแก้ว","สระบุรี","สิงห์บุรี","สุโขทัย","สุพรรณบุรี","สุราษฎร์ธานี","สุรินทร์","หนองคาย","หนองบัวลำภู","อ่างทอง","อำนาจเจริญ","อุดรธานี","อุตรดิตถ์","อุทัยธานี","อุบลราชธานี"];
  var BANKS=["กสิกรไทย (KBank)","ไทยพาณิชย์ (SCB)","กรุงเทพ (BBL)","กรุงไทย (KTB)","กรุงศรีอยุธยา (BAY)","ทหารไทยธนชาต (TTB)","ออมสิน (GSB)","ธ.ก.ส.","อิสลาม","ซีไอเอ็มบี (CIMB)","ยูโอบี (UOB)","แลนด์แอนด์เฮ้าส์ (LH Bank)"];
  var COLORS=["#e8b93e","#38a169","#3b82f6","#8b5cf6","#ef4444","#f97316"];
  var ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;";
  var fw=document.createElement("div");
  fw.style.cssText="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(660px,96vw);max-height:92vh;overflow-y:auto;background:#fff;border-radius:14px;z-index:3001;box-shadow:0 8px 32px rgba(0,0,0,.2);font-family:Sarabun,sans-serif;font-size:13px;";
  document.body.appendChild(ov);
  document.body.appendChild(fw);
  function npClose(){ov.remove();fw.remove();}
  ov.addEventListener("click",npClose);
  function gv(id){var e=document.getElementById(id);return e?e.value.trim():"";}
  function npAColor(n){return COLORS[(n||"").charCodeAt(0)%COLORS.length];}

window.srchProd=function(q){
  clearTimeout(_pdT);

  _pdT=setTimeout(function(){
    fetch(API+"/api/pos/products/list",{headers:{"Authorization":"Bearer "+TOKEN}})
    .then(function(r){return r.json();})
    .then(function(data){
      var prods=data.items||data;
      var fl=prods.filter(function(p){
        var lq=q.toLowerCase();
        return (p.name||"").toLowerCase().includes(lq)||(p.sku||"").toLowerCase().includes(lq);
      }).slice(0,8);
      window._prodCache=fl;
      var html=fl.map(function(p,i){
        return '<div class="ac-i" onclick="addItem('+i+')">'
          +'<div>'+p.name+'</div>'
          +'<div class="ac-s">'+(p.sku?"SKU: "+p.sku:"")+(p.stock_qty!=null?" &middot; คงเหลือ: "+p.stock_qty:"")+'</div></div>';
      }).join("");
      html+='<div class="ac-i" onclick="goProd()">+ สร้างสินค้าใหม่</div>';
      d.innerHTML=html;d.style.display="block";
    }).catch(function(){});
  },400);
};

  document.getElementById("npPTrackRow").addEventListener("click",function(){
    _npPTrack=!_npPTrack;
    document.getElementById("npPTrackSlot").style.background=_npPTrack?"#e8b93e":"#d1d5db";
    document.getElementById("npPTrackThumb").style.left=_npPTrack?"21px":"3px";
    document.getElementById("npPStockFields").style.display=_npPTrack?"grid":"none";
    npPChk();
  });
  // โหลด categories
  fetch(API+"/api/pos/categories/list",{headers:{"Authorization":"Bearer "+TOKEN}})
  .then(function(r){return r.json();})
  .then(function(d){
    var sel=document.getElementById("npPCat");
    if(!sel)return;
    (d.items||d||[]).forEach(function(cat){
      var op=document.createElement("option");
      op.value=cat.name;
      op.textContent=(cat.icon?cat.icon+" ":"")+cat.name;
      sel.appendChild(op);
    });
  }).catch(function(){});
  function npPChk(){
    var stockOk=!_npPTrack||(document.getElementById("npPStock").value!=="");
    var ok=gv("npPName")&&gv("npPSku")&&gv("npPPrice")&&stockOk;
    var b=document.getElementById("npPSave");
    if(b){b.disabled=!ok;b.style.opacity=ok?"1":"0.5";}
  }
  document.getElementById("npPSave").addEventListener("click",function(){
    var b=this;
    if(b.disabled)return;
    b.textContent="กำลังบันทึก...";b.disabled=true;
    var imgFile=document.getElementById("npPImgF").files[0];
    var payload={
      name:gv("npPName"),sku:gv("npPSku"),
      category:gv("npPCat"),description:gv("npPDesc"),
      qr_url:gv("npPQr"),
      price:parseFloat(gv("npPPrice"))||0,
      cost_price:parseFloat(gv("npPCost"))||0,
      price_min:parseFloat(gv("npPPmin"))||0,
      pv:parseFloat(gv("npPPv"))||0,
      vat:document.getElementById("npPVat").value||"no_vat",
      status:"active",
      track_stock:_npPTrack,
      stock_qty:_npPTrack?(parseFloat(document.getElementById("npPStock").value)||0):0,
      stock_back:_npPTrack?(parseFloat(document.getElementById("npPBack").value)||0):0,
      min_alert:_npPTrack?(parseInt(document.getElementById("npPAlert").value)||0):0
    };
    fetch(API+"/api/pos/products/create",{
      method:"POST",
      headers:{"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    })
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.id)throw new Error(d.detail||"error");
      if(imgFile){
        var fd=new FormData();fd.append("file",imgFile);
        fetch(API+"/api/pos/products/upload-image?product_id="+d.id,{
          method:"POST",headers:{"Authorization":"Bearer "+TOKEN},body:fd
        }).catch(function(){});
      }
      addItem({id:d.id,name:payload.name,sku:payload.sku,cost_price:payload.cost_price,stock_qty:payload.stock_qty});
      npClose();
      toast("สร้างสินค้า "+payload.name+" สำเร็จ","#1a7a4a");
    })
    .catch(function(e){
      alert("บันทึกไม่สำเร็จ: "+e.message);
      b.textContent="บันทึกสินค้า";b.disabled=false;
    });
  });
};
window.addItem=function(s){
  var p=typeof s==="number"?(window._prodCache||[])[s]:JSON.parse(s);
  if(!p)return;
  document.getElementById("rcProdD").style.display="none";
  document.getElementById("rcProdQ").value="";
  var ex=items.findIndex(function(x){return x.product_id===p.id;});
  if(ex>=0){items[ex].qty++;renderItems();return;}
  items.push({product_id:p.id,product_name:p.name,sku:p.sku||"",qty:1,cost_price:parseFloat(p.cost_price||0),warehouse:"front"});
  renderItems();
};

function renderItems(){
  var tb=document.getElementById("rcIB");
  if(!tb)return;
  if(!items.length){
    tb.innerHTML='<tr><td colspan="7" style="text-align:center;padding:14px;color:var(--mu);">ยังไม่มีสินค้า</td></tr>';
    document.getElementById("rcTot").textContent="฿0.00";
    chk();return;
  }
  var whs=[["back","คลังหลัง"],["front","หน้าร้าน"],["other","อื่น"]];
  var tot=0;
  tb.innerHTML=items.map(function(it,i){
    var rt=(it.qty||0)*(it.cost_price||0);tot+=rt;
    var opts=whs.map(function(w){return '<option value="'+w[0]+'"'+(it.warehouse===w[0]?" selected":"")+'>'+w[1]+'</option>';}).join("");
    return '<tr><td>'+(i+1)+'</td>'
      +'<td><b>'+it.product_name+'</b>'+(it.sku?'<br><span style="font-size:10px;color:var(--mu)">'+it.sku+'</span>':'')+'</td>'
      +'<td><input class="ii" type="number" min="0" step="0.01" value="'+it.cost_price+'" onchange="upd('+i+',\'cost_price\',this.value)"></td>'
      +'<td><input class="ii" type="number" min="1" value="'+it.qty+'" onchange="upd('+i+',\'qty\',this.value)"></td>'
      +'<td><select class="ii" onchange="upd('+i+',\'warehouse\',this.value)">'+opts+'</select></td>'
      +'<td style="text-align:right;font-weight:600;">฿'+rt.toLocaleString("th-TH",{minimumFractionDigits:2})+'</td>'
      +'<td><button class="xb" onclick="remItem('+i+')">&times;</button></td>'
      +'</tr>';
  }).join("");
  document.getElementById("rcTot").textContent="฿"+tot.toLocaleString("th-TH",{minimumFractionDigits:2});
  chk();
}

window.upd=function(i,f,v){
  if(f==="qty"||f==="cost_price")items[i][f]=parseFloat(v)||0;
  else items[i][f]=v;
  renderItems();
};
window.remItem=function(i){items.splice(i,1);renderItems();};

function chk(){
  var ok=items.length>0&&items.every(function(x){return x.qty>0;});
  var b=document.getElementById("rcSB");
  if(b){b.disabled=!ok;b.style.opacity=ok?"1":"0.5";}
}

window.prevBill=function(inp){
  if(!inp.files||!inp.files[0])return;
  _bf=inp.files[0];
  var r=new FileReader();
  r.onload=function(e){document.getElementById("rcBI").src=e.target.result;document.getElementById("rcBP").style.display="block";};
  r.readAsDataURL(_bf);
};
window.openCam=function(){var f=document.getElementById("rcBF");f.setAttribute("capture","environment");f.click();};

window.saveRc=function(){
  var b=document.getElementById("rcSB");
  if(b&&b.disabled)return;
  if(b){b.textContent="กำลังบันทึก...";b.disabled=true;}
  var payload={
    partner_id:document.getElementById("rcPId").value,
    partner_name:document.getElementById("rcPN").value,
    partner_code:document.getElementById("rcPC").value,
    note:document.getElementById("rcNote").value,
    items:items.map(function(x){return {product_id:x.product_id,product_name:x.product_name,sku:x.sku,qty:x.qty,cost_price:x.cost_price,warehouse:x.warehouse};})
  };
  fetch(API+"/api/pos/receive/create",{method:"POST",headers:{"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"},body:JSON.stringify(payload)})

  .then(function(d){
    if(_bf&&d.id){var fd=new FormData();fd.append("file",_bf);fetch(API+"/api/pos/receive/upload-bill/"+d.id,{method:"POST",headers:{"Authorization":"Bearer "+TOKEN},body:fd});}

};

  mo.innerHTML="<div style='background:#fff;border-radius:14px;width:min(860px,94vw);height:auto;max-height:calc(100vh - 80px);display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;'>"
    +"<div style='display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #ede8d8;flex-shrink:0;'>"
      +"<b style='font-size:14px;'>ประวัติการรับสินค้า</b>"
      +"<button id='histCloseBtn' style='border:none;background:none;font-size:18px;cursor:pointer;line-height:1;'>&#10005;</button>"
    +"</div>"
    +"<div id='histBody' style='padding:14px 16px;overflow-y:auto;flex:1;'><div style='text-align:center;padding:30px;color:#888;'>กำลังโหลด...</div></div>"
  +"</div>";
  document.body.appendChild(mo);
  document.getElementById("histCloseBtn").addEventListener("click",function(){mo.remove();});
  mo.addEventListener("click",function(e){if(e.target===mo)mo.remove();});

  .then(function(r){return r.json();})
  .then(function(d){
    var its=d.items||[];
    var el=document.getElementById("histBody");
    if(!el)return;
    if(!its.length){el.innerHTML="<div style='text-align:center;padding:30px;color:#888;'>ยังไม่มีประวัติ</div>";return;}
    var IS2="height:30px;padding:0 10px;border:1px solid #d1d5db;border-radius:6px;font-family:Sarabun,sans-serif;font-size:12.5px;outline:none;";
    el.innerHTML="<div style='display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;'>"
      +"<input id='histSearch' placeholder='ค้นหาชื่อ / สินค้า...' style='flex:2;min-width:140px;"+IS2+"'>"
      +"<div style='display:flex;align-items:center;gap:4px;flex:1;min-width:200px;'>"
        +"<span style='font-size:11px;color:#888;white-space:nowrap;'>ตั้งแต่</span>"
        +"<input id='histDateF' type='date' style='flex:1;"+IS2+"'>"
        +"<span style='font-size:11px;color:#888;'>ถึง</span>"
        +"<input id='histDateT' type='date' style='flex:1;"+IS2+"'>"
      +"</div>"
      +"</div>"
      +"<div id='histList'></div>";
    var _cache=its;
    function applyFilter(){
      var q=document.getElementById("histSearch").value.toLowerCase();
      var df=document.getElementById("histDateF").value;
      var dt2=document.getElementById("histDateT").value;
      renderHist(_cache.filter(function(r){
        var mq=!q||(r.partner_name||"").toLowerCase().includes(q)
          ||(r.items||[]).some(function(it){return (it.product_name||"").toLowerCase().includes(q);});
        var d=new Date(r.receive_date||r.created_at);
        var ds=d.toISOString().slice(0,10);
        var mdf=!df||ds>=df;
        var mdt=!dt2||ds<=dt2;
        return mq&&mdf&&mdt;
      }));
    }
    function openHistDetail(r){
      var dt=new Date(r.receive_date||r.created_at);
      var dtStr=dt.toLocaleDateString("th-TH",{year:"numeric",month:"long",day:"numeric"})+" "+dt.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
      var rows=(r.items||[]).map(function(it,i){
        return "<tr>"
          +"<td style='padding:6px 8px;border-bottom:1px solid #f3f4f6;'>"+(i+1)+"</td>"
          +"<td style='padding:6px 8px;border-bottom:1px solid #f3f4f6;font-weight:600;'>"+it.product_name+(it.sku?"<br><span style='font-size:10px;color:#9ca3af;'>"+it.sku+"</span>":"")+"</td>"
          +"<td style='padding:6px 8px;border-bottom:1px solid #f3f4f6;text-align:right;'>"+parseFloat(it.cost_price||0).toLocaleString("th-TH",{minimumFractionDigits:2})+"</td>"
          +"<td style='padding:6px 8px;border-bottom:1px solid #f3f4f6;text-align:center;'>"+it.qty+"</td>"
          +"<td style='padding:6px 8px;border-bottom:1px solid #f3f4f6;text-align:center;color:#6b7280;'>"+it.warehouse+"</td>"
          +"<td style='padding:6px 8px;border-bottom:1px solid #f3f4f6;text-align:right;font-weight:600;color:#e8b93e;'>฿"+parseFloat(it.total||0).toLocaleString("th-TH",{minimumFractionDigits:2})+"</td>"
          +"</tr>";
      }).join("");
      var dm=document.createElement("div");
      dm.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:4000;display:flex;align-items:center;justify-content:center;";
      dm.innerHTML="<div style='background:#fff;border-radius:14px;width:min(640px,96vw);max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);font-family:Sarabun,sans-serif;font-size:13px;'>"
        +"<div style='display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #ede8d8;position:sticky;top:0;background:#fff;'>"
          +"<b style='font-size:14px;'>รายละเอียดการรับสินค้า</b>"
          +"<button id='detCloseBtn' style='border:none;background:none;font-size:18px;cursor:pointer;'>&#10005;</button>"
        +"</div>"
        +"<div style='padding:14px 16px;'>"
          +"<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;background:#fdf6e3;border-radius:8px;padding:10px 12px;border:1px solid #ede8d8;'>"
            +"<div><div style='font-size:10px;color:#888;'>คู่ค้า</div><div style='font-weight:700;'>"+(r.partner_name||"ไม่ระบุ")+"</div></div>"
            +"<div><div style='font-size:10px;color:#888;'>วันที่รับ</div><div>"+dtStr+"</div></div>"
            +"<div><div style='font-size:10px;color:#888;'>ผู้บันทึก</div><div>"+(r.staff_name||"-")+"</div></div>"

          +"</div>"

          +"<table style='width:100%;border-collapse:collapse;font-size:12px;'>"

              +"<th style='padding:6px 8px;text-align:left;font-size:10.5px;color:#888;border-bottom:1px solid #ede8d8;'>สินค้า</th>"
              +"<th style='padding:6px 8px;text-align:right;font-size:10.5px;color:#888;border-bottom:1px solid #ede8d8;'>ราคารับ</th>"
              +"<th style='padding:6px 8px;text-align:center;font-size:10.5px;color:#888;border-bottom:1px solid #ede8d8;'>จำนวน</th>"
              +"<th style='padding:6px 8px;text-align:center;font-size:10.5px;color:#888;border-bottom:1px solid #ede8d8;'>คลัง</th>"
              +"<th style='padding:6px 8px;text-align:right;font-size:10.5px;color:#888;border-bottom:1px solid #ede8d8;'>รวม</th>"
            +"</tr></thead>"
            +"<tbody>"+rows+"</tbody>"
            +"<tfoot><tr>"
              +"<td colspan='5' style='padding:8px;text-align:right;font-weight:700;'>ยอดรวม</td>"
              +"<td style='padding:8px;text-align:right;font-weight:700;color:#e8b93e;'>฿"+parseFloat(r.total_amount||0).toLocaleString("th-TH",{minimumFractionDigits:2})+"</td>"
            +"</tr></tfoot>"
          +"</table>"
        +"</div>"

      document.body.appendChild(dm);

    renderHist(_cache);
    document.getElementById("histSearch").addEventListener("input",applyFilter);
    document.getElementById("histDateF").addEventListener("change",applyFilter);
    document.getElementById("histDateT").addEventListener("change",applyFilter);
  }).catch(function(){});
};

function toast(msg,bg){
  var t=document.createElement("div");
  t.textContent=msg;
  t.style.cssText="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:"+bg+";color:#fff;padding:9px 18px;border-radius:22px;font-size:13px;font-weight:600;z-index:9999;font-family:Sarabun,sans-serif;";
  document.body.appendChild(t);setTimeout(function(){t.remove();},2500);
}
