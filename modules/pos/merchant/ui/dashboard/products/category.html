<body>
<div class="cat-wrap">

  <!-- header -->
  <div class="cat-header">
    <div>
      <div class="cat-title">หมวดหมู่สินค้า</div>
      <div class="cat-sub" id="catCount">กำลังโหลด...</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button id="catSortBtn" class="cat-btn-sort" onclick="catToggleSort()">จัดอันดับ</button>
      <button class="cat-btn-new" onclick="catNew()">+ สร้างหมวดหมู่</button>
    </div>
  </div>

  <!-- list -->
  <div id="catList" class="cat-list"></div>

  <!-- form panel -->
  <div id="catFormPanel" class="cat-form-panel" style="display:none;">
    <div class="cat-form-title" id="catFormTitle">สร้างหมวดหมู่ใหม่</div>

    <div class="cat-form-grid">
      <div class="cat-field full">
        <label>ชื่อหมวดหมู่ *</label>
        <input id="cfName" type="text" placeholder="เช่น อาหาร, เครื่องดื่ม..." class="cat-input"/>
      </div>
      <div class="cat-field full">
        <label>คำอธิบาย</label>
        <input id="cfDesc" type="text" placeholder="คำอธิบายสั้นๆ" class="cat-input"/>
      </div>
      <div class="cat-field">
        <label>ไอคอน (emoji)</label>
        <div id="cfIconPicker" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;">
          <button type="button" onclick="cfPickIcon(this)" data-icon="🍱" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🍱</button><button type="button" onclick="cfPickIcon(this)" data-icon="🍜" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🍜</button><button type="button" onclick="cfPickIcon(this)" data-icon="🍚" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🍚</button><button type="button" onclick="cfPickIcon(this)" data-icon="🍛" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🍛</button><button type="button" onclick="cfPickIcon(this)" data-icon="🍝" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🍝</button><button type="button" onclick="cfPickIcon(this)" data-icon="🍲" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🍲</button><button type="button" onclick="cfPickIcon(this)" data-icon="🥗" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🥗</button><button type="button" onclick="cfPickIcon(this)" data-icon="🍖" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🍖</button><button type="button" onclick="cfPickIcon(this)" data-icon="🍗" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🍗</button><button type="button" onclick="cfPickIcon(this)" data-icon="🥩" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🥩</button><button type="button" onclick="cfPickIcon(this)" data-icon="🍔" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🍔</button><button type="button" onclick="cfPickIcon(this)" data-icon="🍕" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🍕</button><button type="button" onclick="cfPickIcon(this)" data-icon="🌮" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🌮</button><button type="button" onclick="cfPickIcon(this)" data-icon="🥪" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🥪</button><button type="button" onclick="cfPickIcon(this)" data-icon="🍩" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🍩</button><button type="button" onclick="cfPickIcon(this)" data-icon="🎂" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🎂</button><button type="button" onclick="cfPickIcon(this)" data-icon="☕" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">☕</button><button type="button" onclick="cfPickIcon(this)" data-icon="🧃" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🧃</button><button type="button" onclick="cfPickIcon(this)" data-icon="🥤" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🥤</button><button type="button" onclick="cfPickIcon(this)" data-icon="🛒" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🛒</button><button type="button" onclick="cfPickIcon(this)" data-icon="📦" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">📦</button><button type="button" onclick="cfPickIcon(this)" data-icon="🏷" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🏷</button><button type="button" onclick="cfPickIcon(this)" data-icon="⭐" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">⭐</button><button type="button" onclick="cfPickIcon(this)" data-icon="🔥" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🔥</button><button type="button" onclick="cfPickIcon(this)" data-icon="💎" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">💎</button><button type="button" onclick="cfPickIcon(this)" data-icon="🎁" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🎁</button><button type="button" onclick="cfPickIcon(this)" data-icon="🌟" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">🌟</button><button type="button" onclick="cfPickIcon(this)" data-icon="✅" style="font-size:20px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">✅</button>
          <input type="hidden" id="cfIcon" value="">
        </div>
      </div>
      <div class="cat-field">
        <label>สถานะ</label>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button id="cfVisBtn" class="cat-vis-btn active" onclick="catToggleVis()">👁 แสดง</button>
        </div>
      </div>
    </div>

    <!-- กำหนดเวลาขาย -->
    <div class="cat-section-title">⏰ กำหนดเวลาจำหน่าย</div>
    <div style="font-size:11px;color:#6b7280;margin-bottom:8px;">ถ้าไม่กำหนด = จำหน่ายตลอดเวลา</div>
    <div id="cfSchedules" class="cat-schedules"></div>
    <button class="cat-btn-add-schedule" onclick="catAddSchedule()">+ เพิ่มช่วงเวลา</button>

    <div class="cat-form-actions">
      <button id="cfDeleteBtn" class="cat-btn-delete" style="display:none;" onclick="catDelete()">🗑 ลบหมวดหมู่</button>
      <div style="display:flex;gap:8px;">
        <button class="cat-btn-cancel" onclick="catCloseForm()">ยกเลิก</button>
        <button class="cat-btn-save" onclick="catSave()">บันทึก</button>
      </div>
    </div>
  </div>

</div>

<style>
.cat-wrap{padding:4px 0;box-sizing:border-box;width:100%;}
.cat-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.cat-title{font-size:15px;font-weight:700;color:#1f2937;}
.cat-sub{font-size:12px;color:#6b7280;margin-top:2px;}
.cat-btn-new{padding:7px 14px;background:#e8b93e;color:#1a1200;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.cat-btn-new:hover{opacity:.85;}
.cat-btn-sort{padding:7px 14px;background:#e8e8e8;color:#555;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;}
.cat-btn-sort.active{background:#22c55e;color:#fff;}
.cat-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.cat-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid #e5e5e5;border-radius:10px;transition:.15s;}
.cat-row:hover{border-color:#e8b93e;}
.cat-row.hidden-cat{opacity:.5;background:#f8f8f8;}
.cat-drag-handle{font-size:16px;color:#ccc;cursor:default;width:20px;text-align:center;}
.cat-drag-handle.enabled{cursor:grab;color:#e8b93e;}
.cat-icon-box{width:36px;height:36px;border-radius:8px;background:#f0ede8;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.cat-info{flex:1;min-width:0;}
.cat-name{font-size:13px;font-weight:700;color:#1f2937;}
.cat-desc{font-size:11px;color:#6b7280;margin-top:1px;}
.cat-meta{font-size:10px;color:#9ca3af;margin-top:2px;}
.cat-vis-tag{font-size:10px;padding:2px 7px;border-radius:10px;margin-left:6px;}
.cat-vis-tag.show{background:#dcfce7;color:#166534;}
.cat-vis-tag.hide{background:#f3f4f6;color:#9ca3af;}
.cat-actions{display:flex;gap:6px;flex-shrink:0;}
.cat-btn-edit{padding:4px 10px;background:#f0ede8;border:none;border-radius:6px;font-size:11px;cursor:pointer;color:#374151;}
.cat-btn-edit:hover{background:#e8b93e;color:#1a1200;}
.cat-btn-vis{padding:4px 8px;background:#f0ede8;border:none;border-radius:6px;font-size:11px;cursor:pointer;}
/* form */
.cat-form-panel{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px;margin-bottom:16px;}
.cat-form-title{font-size:14px;font-weight:700;color:#1f2937;margin-bottom:14px;}
.cat-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.cat-field{display:flex;flex-direction:column;gap:4px;}
.cat-field.full{grid-column:1/-1;}
.cat-field label{font-size:12px;font-weight:600;color:#374151;}
.cat-input{padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;outline:none;box-sizing:border-box;}
.cat-input:focus{border-color:#e8b93e;}
.cat-vis-btn{padding:6px 14px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;background:#f3f4f6;color:#374151;}
.cat-vis-btn.active{background:#dcfce7;color:#166534;border-color:#86efac;}
.cat-section-title{font-size:12px;font-weight:700;color:#e8b93e;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #f0ede8;}
.cat-schedules{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.cat-schedule-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 10px;background:#f8f6f2;border-radius:8px;}
.cat-schedule-row input{padding:6px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;outline:none;}
.cat-schedule-row input:focus{border-color:#e8b93e;}
.cat-btn-add-schedule{padding:6px 14px;background:#f0ede8;border:1px dashed #d1d5db;border-radius:7px;font-size:12px;cursor:pointer;color:#374151;margin-bottom:14px;}
.cat-btn-add-schedule:hover{border-color:#e8b93e;color:#e8b93e;}
.cat-form-actions{display:flex;justify-content:space-between;align-items:center;}
.cat-btn-delete{padding:7px 12px;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;}
.cat-btn-cancel{padding:7px 14px;background:#f3f4f6;color:#374151;border:1px solid #d1d5db;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;}
.cat-btn-save{padding:7px 18px;background:#e8b93e;color:#1a1200;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;}
.cat-btn-save:hover{opacity:.85;}
.cat-row.dragging{opacity:.4;border:2px dashed #e8b93e;}
.cat-row.drag-over{border-color:#e8b93e;background:#fffbf0;}
</style>

<script>
(function(){
'use strict';
var API=(location.hostname==='merchant.viiv.me')?'':'https://concore.viiv.me';
var TOKEN=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
var _cats=[];
var _editId=null;

function authH(){return {'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'};}

function loadCats(){
  fetch(API+'/api/pos/categories/list',{headers:authH()})
  .then(function(r){return r.json();})
  .then(function(d){
    _cats=d||[];
    // migrate localStorage ถ้ามี
    var old=JSON.parse(localStorage.getItem('viiv_categories')||'[]');
    if(old.length&&!_cats.length){
      Promise.all(old.map(function(cat){
        return fetch(API+'/api/pos/categories/create',{method:'POST',headers:authH(),
          body:JSON.stringify({name:cat.name,color:cat.color||'#e8b93e',is_visible:cat.visible!==false})});
      })).then(function(){
        localStorage.removeItem('viiv_categories');
        loadCats();
      });
      return;
    }
    renderList();
  }).catch(function(){renderList();});
}

function renderList(){
  var el=document.getElementById('catList');
  var count=document.getElementById('catCount');
  if(!el||!count) return;
  count.textContent='ทั้งหมด '+_cats.length+' หมวดหมู่';
  if(!_cats.length){
    el.innerHTML='<div style="color:#aaa;padding:30px;text-align:center;">ยังไม่มีหมวดหมู่</div>';
    return;
  }
  el.innerHTML=_cats.map(function(cat){
    return '<div style="background:#fff;border:1px solid #ede8d8;border-left:4px solid '+(cat.color||'#e8b93e')+';border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">'
      +'<div style="display:flex;align-items:center;gap:10px;">'
        +(cat.icon?'<span style="font-size:22px;">'+cat.icon+'</span>':'<span style="width:32px;height:32px;border-radius:50%;background:'+(cat.color||'#e8b93e')+';display:inline-block;"></span>')
        +'<div>'
          +'<div style="font-size:14px;font-weight:600;color:#1a1a1a;">'+cat.name+'</div>'
          +'<div style="font-size:11px;color:#888;margin-top:2px;">'+(cat.description||'')+(cat.is_visible?' · แสดง':' · ซ่อน')+'</div>'
        +'</div>'
      +'</div>'
      +'<div style="display:flex;gap:6px;">'
        +'<button data-id="'+cat.id+'" onclick="catEdit(this.dataset.id)" style="padding:5px 12px;font-size:12px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;font-family:Sarabun,sans-serif;">แก้ไข</button>'
        +'<button data-id="'+cat.id+'" onclick="catDelete(this.dataset.id)" style="padding:5px 12px;font-size:12px;border:1px solid #fca5a5;border-radius:6px;background:#fee2e2;color:#991b1b;cursor:pointer;font-family:Sarabun,sans-serif;">ลบ</button>'
      +'</div>'
    +'</div>';
  }).join('');
}

window.catEdit=function(id){
  var cat=_cats.find(function(x){return x.id===id;});
  if(!cat) return;
  _editId=id;
  document.getElementById('cfName').value=cat.name||'';
  document.getElementById('cfIcon').value=cat.icon||'';
  window._cfVisible=cat.is_visible!==false;var vb=document.getElementById('cfVisBtn');if(vb){vb.classList.toggle('active',window._cfVisible);};
  document.getElementById('catFormTitle').textContent='แก้ไขหมวดหมู่';
  document.getElementById('catFormPanel').style.display='block';
};

window.catNew=function(){
  _editId=null;
  document.getElementById('cfName').value='';
  document.getElementById('cfIcon').value='';
  window._cfVisible=true;var vb=document.getElementById('cfVisBtn');if(vb)vb.classList.add('active');;
  document.getElementById('catFormTitle').textContent='เพิ่มหมวดหมู่ใหม่';
  document.getElementById('catFormPanel').style.display='block';
};

window.catCancel=function(){
  document.getElementById('catFormPanel').style.display='none';
  _editId=null;
};

window.catSave=function(){
  var name=document.getElementById('cfName').value.trim();
  if(!name){alert('กรุณากรอกชื่อหมวดหมู่');return;}
  var payload={
    name:name,
    icon:document.getElementById('cfIcon').value||'',
    is_visible:window._cfVisible!==false
  };
  var url=_editId?API+'/api/pos/categories/update/'+_editId:API+'/api/pos/categories/create';
  var method=_editId?'PUT':'POST';
  fetch(url,{method:method,headers:authH(),body:JSON.stringify(payload)})
  .then(function(r){return r.json();})
  .then(function(){
    document.getElementById('catFormPanel').style.display='none';
    _editId=null;
    loadCats();
  }).catch(function(){alert('บันทึกไม่สำเร็จ');});
};

window.catDelete=function(id){
  if(!confirm('ลบหมวดหมู่นี้?')) return;
  fetch(API+'/api/pos/categories/delete/'+id,{method:'DELETE',headers:authH()})
  .then(function(){loadCats();});
};

window.catToggleSort=function(){alert('ฟีเจอร์จัดอันดับอยู่ระหว่างพัฒนา');};
window.catToggleVis=function(){
  window._cfVisible=!window._cfVisible;
  var btn=document.getElementById('cfVisBtn');
  if(btn){btn.classList.toggle('active',window._cfVisible);btn.textContent=window._cfVisible?'👁 แสดง':'🙈 ซ่อน';}
};
window._cfVisible=true;
function _tok(e){if(e.detail&&e.detail.token)TOKEN=e.detail.token;loadCats();}
window.removeEventListener('viiv_token_ready',window._tok_cat);
window._tok_cat=_tok;
window.addEventListener('viiv_token_ready',_tok);
var _t=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
if(_t){_tok({detail:{token:_t}});}
})();
window.cfPickIcon=function(btn){
  document.querySelectorAll('#cfIconPicker button[data-icon]').forEach(function(b){
    b.style.border='1px solid #d1d5db';b.style.background='#fff';
  });
  btn.style.border='2px solid #E8B93E';btn.style.background='#fef9c3';
  document.getElementById('cfIcon').value=btn.dataset.icon;
};
</script>
</body>
