<body>
<div id="esWrap" style="display:flex;gap:0;height:calc(100vh - 120px);min-height:500px;box-sizing:border-box;"></div>
<script>
(function(){
'use strict';
var API=(location.hostname==='merchant.viiv.me')?'':'https://concore.viiv.me';
var TOKEN=window.VIIV_TOKEN||localStorage.getItem('viiv_token')||'';
var allProducts=[],allCategories=[],cartItems=[];
var _selCat='',_searchQ='',_total=0,_selectedMember=null;
var _esPm='cash';

function fmt(n){return '฿'+(n||0).toLocaleString('th',{minimumFractionDigits:2});}

function loadData(){
  fetch(API+'/api/pos/products/list',{headers:{'Authorization':'Bearer '+TOKEN}})
  .then(function(r){return r.json();})
  .then(function(d){
    allProducts=d.products||d||[];
    allCategories=[...new Set(allProducts.map(function(p){return p.category;}).filter(Boolean))];
    renderShell();
  }).catch(function(){renderShell();});
}
function renderShell(){
  var wrap=document.getElementById('esWrap');if(!wrap)return;
  wrap.innerHTML='';
  var left=document.createElement('div');
  left.style.cssText='flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid #e5e5e5;';
  var bar=document.createElement('div');
  bar.style.cssText='display:flex;gap:8px;padding:10px;background:#fff;border-bottom:1px solid #e5e5e5;';
  var si=document.createElement('input');
  si.placeholder='ค้นหาชื่อ / SKU...';
  si.style.cssText='flex:1;padding:7px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;outline:none;';
  si.addEventListener('input',function(){_searchQ=this.value.toLowerCase();renderGrid();});
  bar.appendChild(si);left.appendChild(bar);
  var catBar=document.createElement('div');catBar.id='esCatBar';
  catBar.style.cssText='display:flex;gap:6px;flex-wrap:wrap;padding:8px 10px;background:#f8f6f2;border-bottom:1px solid #e5e5e5;';
  left.appendChild(catBar);
  var grid=document.createElement('div');grid.id='esPosGrid';
  grid.style.cssText='flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding:10px;align-content:start;';
  left.appendChild(grid);wrap.appendChild(left);
  var right=document.createElement('div');right.id='esPosCart';
  right.style.cssText='width:300px;flex-shrink:0;display:flex;flex-direction:column;background:#fff;';
  wrap.appendChild(right);
  renderCatBtns();renderGrid();renderCart();
}

function renderCatBtns(){
  var el=document.getElementById('esCatBar');if(!el)return;
  el.innerHTML='';
  var all=makeCatBtn('ทั้งหมด','');
  el.appendChild(all);
  allCategories.forEach(function(c){el.appendChild(makeCatBtn(c,c));});
}
function makeCatBtn(label,val){
  var btn=document.createElement('button');btn.textContent=label;
  var active=_selCat===val;
  btn.style.cssText='padding:3px 10px;border:1px solid '+(active?'#e8b93e':'#d1d5db')+';border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:'+(active?'#e8b93e':'#fff')+';color:'+(active?'#1a1200':'#374151')+';';
  btn.addEventListener('click',function(){_selCat=val;renderCatBtns();renderGrid();});
  return btn;
}
function renderGrid(){
  var el=document.getElementById('esPosGrid');if(!el)return;
  var filtered=allProducts.filter(function(p){
    return p.status!=='inactive'&&(!_selCat||p.category===_selCat)&&
      (!_searchQ||(p.name||'').toLowerCase().includes(_searchQ)||(p.sku||'').toLowerCase().includes(_searchQ));
  });
  el.innerHTML='';
  if(!filtered.length){el.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:30px;color:#aaa;">ไม่พบสินค้า</div>';return;}
  filtered.forEach(function(p){
    var card=document.createElement('div');
    card.style.cssText='background:#fff;border:1px solid #e5e5e5;border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s;';
    card.onmouseover=function(){this.style.borderColor='#e8b93e';this.style.boxShadow='0 2px 8px rgba(232,185,62,.2)';};
    card.onmouseout=function(){this.style.borderColor='#e5e5e5';this.style.boxShadow='';};
    var imgEl=document.createElement(p.image_url?'img':'div');
    if(p.image_url){imgEl.src=API+p.image_url;imgEl.style.cssText='width:100%;height:90px;object-fit:cover;display:block;';}
    else{imgEl.style.cssText='width:100%;height:90px;background:#f0ede8;display:flex;align-items:center;justify-content:center;font-size:24px;';imgEl.innerHTML='&#x1F4E6;';}
    var info=document.createElement('div');info.style.cssText='padding:6px;';
    info.innerHTML='<div style="font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+p.name+'</div>'+
      '<div style="font-size:11px;color:#e8b93e;font-weight:700;">฿'+parseFloat(p.price||0).toLocaleString()+'</div>'+
      (p.track_stock?'<div style="font-size:10px;color:'+(p.stock_qty>0?'#16a34a':'#ef4444')+';">สต็อก:'+(p.stock_qty||0)+'</div>':'');
    card.appendChild(imgEl);card.appendChild(info);
    card.addEventListener('click',function(){addToCart(p);});
    el.appendChild(card);
  });
}

function addToCart(p){
  var ex=cartItems.find(function(i){return i.id===p.id;});
  if(ex){ex.qty++;}
  else{
    var p1=parseFloat(p.price)||0,pl=parseFloat(p.price_min)||0;
    function fo(n){return n.toLocaleString('th',{minimumFractionDigits:2});}
    var opts=[{l:fo(p1),v:p1}];
    if(pl>0&&pl<p1){var diff=p1-pl,step=diff>200?10:diff>50?5:1;
      for(var r=Math.round((p1-step)*100)/100;r>=pl;r=Math.round((r-step)*100)/100)opts.push({l:fo(r),v:r});
      if(opts[opts.length-1].v!==pl)opts.push({l:fo(pl)+'(min)',v:pl});
    } else opts.push({l:'0.00(free)',v:0});
    cartItems.push({id:p.id,sku:p.sku||'',name:p.name,price:p1,qty:1,opts:opts,image_url:p.image_url||''});
  }
  calcTotal();renderCart();
}
function calcTotal(){_total=cartItems.reduce(function(s,i){return s+(i.qty*i.price);},0);}
function renderCart(){
  var el=document.getElementById('esPosCart');if(!el)return;
  el.innerHTML='';
  var hdr=document.createElement('div');
  hdr.style.cssText='padding:10px 12px;font-size:13px;font-weight:700;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center;';
  hdr.innerHTML='ตะกร้า <span style="font-size:11px;color:#9ca3af;font-weight:400;">'+(cartItems.length)+'</span>';
  var clrBtn=document.createElement('button');clrBtn.textContent='ล้าง';
  clrBtn.style.cssText='padding:3px 8px;background:#f3f4f6;border:1px solid #d1d5db;border-radius:6px;font-size:11px;cursor:pointer;';
  clrBtn.addEventListener('click',function(){if(cartItems.length&&confirm('ล้าง?')){cartItems=[];_total=0;renderCart();}});
  hdr.appendChild(clrBtn);el.appendChild(hdr);
  var items=document.createElement('div');items.style.cssText='flex:1;overflow-y:auto;padding:6px;';
  if(!cartItems.length){items.innerHTML='<div style="text-align:center;padding:20px;color:#aaa;font-size:12px;">ยังไม่มีสินค้า</div>';}
  else{cartItems.forEach(function(item,i){
    var row=document.createElement('div');row.style.cssText='display:flex;gap:6px;align-items:center;padding:5px 2px;border-bottom:1px solid #f0ede8;';
    var info=document.createElement('div');info.style.flex='1';
    info.innerHTML='<div style="font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+item.name+'</div>';
    var sel=document.createElement('select');sel.style.cssText='width:100%;padding:2px;border:1px solid #d1d5db;border-radius:4px;font-size:10px;margin-top:2px;';
    item.opts.forEach(function(o){var opt=document.createElement('option');opt.value=o.v;opt.textContent=o.l;if(o.v===item.price)opt.selected=true;sel.appendChild(opt);});
    sel.addEventListener('change',function(){item.price=parseFloat(this.value)||0;calcTotal();renderCartSummary();});
    info.appendChild(sel);
    var qr=document.createElement('div');qr.style.cssText='display:flex;align-items:center;gap:3px;flex-shrink:0;';
    var mb=document.createElement('button');mb.textContent='-';mb.style.cssText='width:20px;height:20px;border:1px solid #d1d5db;border-radius:4px;background:#f3f4f6;cursor:pointer;font-size:12px;line-height:1;';
    mb.addEventListener('click',function(){if(item.qty>1){item.qty--;calcTotal();renderCart();}else{cartItems.splice(i,1);calcTotal();renderCart();}});
    var qn=document.createElement('span');qn.textContent=item.qty;qn.style.cssText='font-size:12px;font-weight:700;min-width:18px;text-align:center;';
    var pb=document.createElement('button');pb.textContent='+';pb.style.cssText='width:20px;height:20px;border:1px solid #d1d5db;border-radius:4px;background:#f3f4f6;cursor:pointer;font-size:12px;line-height:1;';
    pb.addEventListener('click',function(){item.qty++;calcTotal();renderCart();});
    qr.appendChild(mb);qr.appendChild(qn);qr.appendChild(pb);
    row.appendChild(info);row.appendChild(qr);items.appendChild(row);
  });}
  el.appendChild(items);
  var sum=document.createElement('div');sum.id='esCartSummary';sum.style.cssText='border-top:1px solid #e5e5e5;padding:10px 12px;';
  el.appendChild(sum);
  renderCartSummary();
}

function renderCartSummary(){
  var el=document.getElementById('esCartSummary');if(!el)return;
  el.innerHTML='';
  // member
  var mWrap=document.createElement('div');mWrap.style.cssText='margin-bottom:8px;position:relative;';
  var mInp=document.createElement('input');mInp.id='esMemInp';mInp.type='text';
  mInp.placeholder='เลือกลูกค้า *';
  mInp.value=_selectedMember?_selectedMember.name:'';
  mInp.style.cssText='width:100%;padding:6px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;outline:none;box-sizing:border-box;';
  var mDrop=document.createElement('div');mDrop.id='esMDrop';
  mDrop.style.cssText='display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e5e5e5;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:100;max-height:140px;overflow-y:auto;';
  mInp.addEventListener('input',function(){
    _selectedMember=null;
    var q=this.value.toLowerCase();if(!q){mDrop.style.display='none';return;}
    var mems=JSON.parse(localStorage.getItem('viiv_members')||'[]');
    var found=mems.filter(function(m){return(m.name||'').toLowerCase().includes(q)||(m.phone||'').includes(q);}).slice(0,6);
    mDrop.innerHTML='';
    if(!found.length)mDrop.innerHTML='<div style="padding:8px 10px;font-size:11px;color:#aaa;">ไม่พบ</div>';
    else found.forEach(function(m){
      var d=document.createElement('div');d.style.cssText='padding:6px 10px;cursor:pointer;font-size:11px;display:flex;justify-content:space-between;';
      d.innerHTML='<span>'+m.name+'</span><span style="color:#9ca3af;">'+(m.code||'')+'</span>';
      d.addEventListener('mousedown',function(e){e.preventDefault();_selectedMember=m;mInp.value=m.name;mDrop.style.display='none';});
      d.onmouseover=function(){this.style.background='#fffbf0';};d.onmouseout=function(){this.style.background='';};
      mDrop.appendChild(d);
    });
    mDrop.style.display='block';
  });
  mInp.addEventListener('blur',function(){setTimeout(function(){mDrop.style.display='none';},200);});
  mWrap.appendChild(mInp);mWrap.appendChild(mDrop);el.appendChild(mWrap);
  // total
  var tot=document.createElement('div');tot.style.cssText='display:flex;justify-content:space-between;margin-bottom:8px;';
  tot.innerHTML='<span style="font-size:13px;font-weight:600;">ยอดรวม</span><span style="font-size:16px;font-weight:700;color:#e8b93e;">'+fmt(_total)+'</span>';
  el.appendChild(tot);
  // pay method
  var pm=document.createElement('div');pm.style.cssText='display:flex;gap:4px;margin-bottom:8px;';
  [['cash','สด'],['transfer','โอน'],['qr','QR'],['credit','เครดิต']].forEach(function(p){
    var b=document.createElement('button');b.textContent=p[1];b.dataset.pm=p[0];b.className='es-pm';
    var active=_esPm===p[0];
    b.style.cssText='flex:1;padding:5px 2px;border:1px solid '+(active?'#e8b93e':'#d1d5db')+';border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;background:'+(active?'#e8b93e':'#fff')+';color:'+(active?'#1a1200':'#374151')+';';
    b.addEventListener('click',function(){_esPm=p[0];renderCartSummary();});
    pm.appendChild(b);
  });
  el.appendChild(pm);
  var cb=document.createElement('button');cb.textContent='จบการขาย';
  cb.style.cssText='width:100%;padding:10px;background:#e8b93e;color:#1a1200;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;';
  cb.addEventListener('click',checkout);el.appendChild(cb);
  var msg=document.createElement('div');msg.id='esMsg';msg.style.cssText='display:none;font-size:11px;text-align:center;margin-top:4px;';
  el.appendChild(msg);
}
function checkout(){
  if(!cartItems.length){showMsg('กรุณาเพิ่มสินค้า','#ef4444');return;}
  if(!_selectedMember){showMsg('กรุณาเลือกลูกค้า','#ef4444');return;}
  var _pmStatusMap={cash:'paid',transfer:'paid',qr:'paid',credit:'pending'};
  var payload={
    doc_type:'receipt',
    status:_pmStatusMap[_esPm]||'paid',
    source:'pos',
    shipping_status:null,
    items:cartItems.map(function(i){return{id:i.id,sku:i.sku,name:i.name,qty:i.qty,price:i.price};}),
    customer:_selectedMember.name+(_selectedMember.phone?' ('+_selectedMember.phone+')':''),
    customer_code:_selectedMember.code||'',
    customer_data:{id:_selectedMember.id,name:_selectedMember.name,phone:_selectedMember.phone,code:_selectedMember.code},
    pay_method:_esPm,paid:_total,discount:0,discount_type:'amount',vat:0,note:''
  };
  var cb=document.querySelector('#esPosCart button');
  if(cb){cb.textContent='กำลังบันทึก...';cb.disabled=true;}
  fetch(API+'/api/pos/bills/create',{method:'POST',
    headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
    body:JSON.stringify(payload)})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.bill_no){
      var bill=Object.assign({},payload,{id:d.bill_no,db_id:d.id,total:_total,created_at:new Date().toISOString()});
      var bills=JSON.parse(localStorage.getItem('viiv_bills')||'[]');
      bills.unshift(bill);localStorage.setItem('viiv_bills',JSON.stringify(bills.slice(0,500)));
      showMsg('จบ #'+d.bill_no+' '+fmt(d.total),'#16a34a');
      cartItems=[];_selectedMember=null;_total=0;
      setTimeout(function(){renderCart();},1500);
    } else {showMsg(d.detail||'เกิดข้อผิดพลาด','#ef4444');if(cb){cb.textContent='จบการขาย';cb.disabled=false;}}
  })
  .catch(function(){showMsg('เชื่อมต่อไม่ได้','#ef4444');if(cb){cb.textContent='จบการขาย';cb.disabled=false;}});
}
function showMsg(msg,color){
  var el=document.getElementById('esMsg');if(!el)return;
  el.textContent=msg;el.style.color=color;el.style.display='block';
  clearTimeout(showMsg._t);showMsg._t=setTimeout(function(){el.style.display='none';},3000);
}
window.addEventListener('viiv_token_ready',function(e){
  if(e.detail&&e.detail.token)TOKEN=e.detail.token;
  loadData();
});
})();
</script>
</body>
