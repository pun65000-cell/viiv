<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VIIV Shop - Products</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --accent: #d6a94b;
        --accent-hover: #c89b3c;
        --bg-main: #e6e9ef;
        --content-bg: #f6f6f6;
        --text: #1f2937;
        --border: rgba(0,0,0,0.12);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg-main);
        color: var(--text);
      }

      .layout { display: flex; min-height: 100vh; }
      .sidebar {
        width: 200px;
        color: #fff;
        background: linear-gradient(180deg, #1a1d24 0%, #13161c 100%);
        padding: 16px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .nav-item {
        padding: 10px 14px;
        border-radius: 12px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        color: #cbd5e1;
        cursor: pointer;
        user-select: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
        text-decoration: none;
        display: block;
      }
      .nav-item:hover {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        color: #ffffff;
        transform: translateX(2px);
      }
      .nav-item.active {
        background: rgba(214,169,75,0.15);
        color: #ffffff;
        border: 1px solid rgba(214,169,75,0.6);
        box-shadow:
          0 0 0 1px rgba(214,169,75,0.25),
          0 4px 12px rgba(0,0,0,0.25);
      }
      .sidebar-footer {
        margin-top: auto;
        padding-top: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--accent);
        font-size: 11px;
        line-height: 1.1;
        text-align: center;
        white-space: nowrap;
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
        min-width: 0;
      }

      .topbar {
        display:flex;
        gap:8px;
        background:var(--content-bg);
        padding:6px;
        border-radius:10px;
      }
      .topbar button {
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #ffffff;
        color: var(--text);
        font-size: 13px;
        cursor: pointer;
      }

      .page-title {
        font-size: 18px;
        font-weight: 600;
        margin: 0;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 12px;
      }

      .card {
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
      }
      .row { display:flex; gap:12px; }
      .img {
        width: 200px;
        height: 200px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.08);
        background: #f3f4f6;
        overflow: hidden;
        flex: 0 0 auto;
        display:flex;
        align-items:center;
        justify-content:center;
        color: rgba(31,41,55,0.6);
        font-size: 12px;
      }
      .img img {
        width: 200px;
        height: 200px;
        object-fit: cover;
        display: block;
      }
      .meta { min-width:0; }
      .meta .name { font-weight: 700; margin-bottom: 6px; }
      .meta .line { font-size: 13px; color: rgba(31,41,55,0.75); margin-bottom: 4px; }
      .badge {
        display:inline-block;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 12px;
        background: rgba(214,169,75,0.15);
        border: 1px solid rgba(214,169,75,0.35);
        color: #6b4f12;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="sidebar">
        <a class="nav-item" href="/dashboard/view.html">สร้างสินค้า</a>
        <div class="sidebar-footer">VIIV Shop v 0.1.0</div>
      </div>

      <div class="main">
        <div class="topbar">
          <button type="button" onclick="window.location.href='/dashboard/view.html'">สร้างสินค้า</button>
        </div>

        <h1 class="page-title">สินค้าทั้งหมด</h1>
        <div id="product-list" class="grid"></div>
      </div>
    </div>

    <script>
      function renderProducts(data) {
        return (data || []).map((p) => {
          const name = p["ชื่อสินค้า"] || p.name || "-";
          const price = p["ราคา"] ?? p.selling_price ?? "-";
          const stock = p["สต็อก"] ?? p.stock_quantity ?? "-";
          const imgUrl = p["รูปภาพ"] || p.image_url || "";
          const pid = p["รหัสสินค้า"] || p.id || "-";
          const sku = p["SKU"] || p.sku || "-";
          const type = p["ประเภท"] || p.type || "normal";

          return `
            <div class="card">
              <div class="row">
                <div class="img">${imgUrl ? `<img src="${imgUrl}" alt="">` : "ไม่มีรูป"}</div>
                <div class="meta">
                  <div class="name">${name}</div>
                  <div class="line">SKU: ${sku}</div>
                  <div class="line">รหัสสินค้า: ${pid}</div>
                  <div class="line">ราคา: ${price}</div>
                  <div class="line">สต็อก: ${stock}</div>
                  <div class="badge">${type}</div>
                </div>
              </div>
            </div>
          `;
        }).join("");
      }

      (async function () {
        const container = document.getElementById("product-list");
        container.textContent = "กำลังโหลด...";
        try {
          const res = await fetch("/api/merchant/products");
          const data = await res.json().catch(() => null);
          if (!res.ok || !Array.isArray(data)) throw new Error("Load failed");

          if (data.length === 0) {
            container.textContent = "ยังไม่มีสินค้า";
            return;
          }

          container.innerHTML = renderProducts(data);
        } catch (e) {
          console.error(e);
          container.textContent = "โหลดสินค้าไม่สำเร็จ";
        }
      })();
    </script>
  </body>
</html>
